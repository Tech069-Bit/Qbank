<style>/* ============ DESIGN TOKENS ============ */

/* ADDED: global keyboard-focus ring for every text field. Several inputs/textareas across the
   app set `outline:none` inline (to avoid the default browser outline clipping oddly against
   their rounded corners) but never replaced it with anything — so a keyboard user tabbing into
   those fields saw no focus indicator at all. One rule here covers all of them at once, in the
   app's own accent color, without touching every individual inline style. */
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(var(--accent-rgb), .25);

/* ADDED: honor the OS/browser "reduce motion" accessibility setting. Nothing in the app checked

   down the card hover animations, transitions, or the pet running across the screen — this turns
   all of that into instant, non-animated state changes site-wide with one rule. */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
    scroll-behavior: auto !important;

}

/* ADDED: animated ECG divider strip, sits directly under the sticky nav bar.
   CHANGED: the old version was a single path that drew itself over 3.6s then snapped
   instantly back to blank and redrew — half its cycle was empty canvas, and the redraw was
   perfectly linear (metronomic, not heartbeat-like). Now there's a faint always-visible
   baseline trace (so the waveform shape never disappears) plus a bright glowing "comet"
   that sweeps the same path on a rhythm that bursts quickly through each spike and drifts
   slowly along the flat segments — reads as an actual pulse instead of a wiper.
   CHANGED AGAIN: the waveform itself now traces real ECG morphology — a small rounded
   P wave, a flat PR segment, a sharp Q-R-S spike, a flat ST segment, and a broader rounded
   T wave, repeated for 3 beats — instead of the old evenly-spaced zigzag spikes, which
   read as generic "heart-rate-monitor clipart" rather than an actual ECG trace. */
.ecg-strip {
  width: 100%;
  max-width: 1280px;
  margin: 0 auto;
  height: 20px;
  padding: 0 20px;
  overflow: visible; /* CHANGED: was hidden — the comet's glow filter needs room, not clipping */
  opacity: .65; /* CHANGED: was .55 — a touch more visible now that there's a glow to show off */
}
.ecg-strip-svg {
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible; /* ADDED: lets the glow filter's blur bleed slightly outside the viewBox */
}
.ecg-strip-line-base {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.4;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: .3; /* ADDED: constant faint trace so the waveform is grounded even between comet passes */
}
.ecg-strip-line-comet {
  fill: none;
  stroke: var(--accent);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  /* dash(140) + gap(855) = 995 ≈ the new path's actual traced length (~994.5, including
     the P/T wave curves and the QRS spike), so the loop point (dashoffset 995 === dashoffset 0)
     is still seamless — no visible jump/reset. */
  stroke-dasharray: 140 855;
  animation: ecgpulse 2.6s linear infinite;
}
/* CHANGED: keyframes now follow the arc-length of the new P-QRS-T path (computed, not
   eyeballed) so the comet's speed still bursts fast through each sharp QRS spike and
   drifts slowly through the flatter P wave / PR segment / T wave / baseline — same
   "real pulse, not a wiper" rhythm as before, just re-timed to the new shape. Each block
   below covers one full beat (3 identical beats fill the loop). */
@keyframes ecgpulse {
  0%     { stroke-dashoffset: 995; }
  4.02%  { stroke-dashoffset: 955; }   /* into P wave */
  7.25%  { stroke-dashoffset: 923; }   /* out of P wave */
  9.76%  { stroke-dashoffset: 898; }   /* PR segment */
  10.35% { stroke-dashoffset: 892; }   /* Q */
  12.15% { stroke-dashoffset: 874; }   /* R peak — fast burn */
  14.41% { stroke-dashoffset: 852; }   /* S */
  15.62% { stroke-dashoffset: 840; }   /* back to baseline */
  18.13% { stroke-dashoffset: 815; }   /* ST segment */
  23.78% { stroke-dashoffset: 758; }   /* out of T wave */
  33.33% { stroke-dashoffset: 663; }   /* baseline before beat 2 */
  37.35% { stroke-dashoffset: 623; }
  40.58% { stroke-dashoffset: 591; }
  43.09% { stroke-dashoffset: 566; }
  43.68% { stroke-dashoffset: 561; }
  45.48% { stroke-dashoffset: 543; }   /* R peak, beat 2 */
  47.74% { stroke-dashoffset: 520; }
  48.95% { stroke-dashoffset: 508; }
  51.46% { stroke-dashoffset: 483; }
  57.11% { stroke-dashoffset: 427; }
  66.67% { stroke-dashoffset: 332; }   /* baseline before beat 3 */
  70.69% { stroke-dashoffset: 292; }
  73.92% { stroke-dashoffset: 260; }
  76.43% { stroke-dashoffset: 235; }
  77.02% { stroke-dashoffset: 229; }
  78.82% { stroke-dashoffset: 211; }   /* R peak, beat 3 — fast burn */
  81.08% { stroke-dashoffset: 189; }
  82.28% { stroke-dashoffset: 177; }
  84.80% { stroke-dashoffset: 152; }
  90.44% { stroke-dashoffset: 95; }
  100%   { stroke-dashoffset: 0; }
}
@media (prefers-reduced-motion: reduce) {
  .ecg-strip-line-comet { animation: none; opacity: 0; }
  .ecg-strip-line-base { opacity: .55; }
  .ecg-strip-bulb { animation: none; opacity: 0; }
}
/* ADDED: a small bright "bulb" riding the leading tip of the comet — the bit of glow
   at the very front of a real scope trace, so the pulse reads as having a head, not
   just a moving dash.
   CHANGED: offset-distance = (995-dashoffset)/995 is actually the BACK edge of the
   visible dash (the point about to go dark as the window slides forward) — the front/
   leading edge that's newly lighting up new path is that plus the dash length itself
   (140/995 = 14.07% further along). Re-timed below so the bulb sits on the true head,
   with an explicit wrap (100%→0%) once the head laps back to the start of the path. */
.ecg-strip-bulb {
  fill: var(--accent); /* fallback for browsers without color-mix() */
  /* CHANGED: plain var(--accent) rendered at the exact same color/opacity as the comet
     line itself, so the bulb just melted into the trace instead of reading as a lit
     point — a real scope's leading dot is visibly brighter-hot than the tail. Mixing
     in white gives it that extra punch. */
  fill: color-mix(in srgb, white 72%, var(--accent) 28%);
  offset-path: path("M0,14 L40,14 Q55,4 70,14 L95,14 L100,17 L108,1 L116,22 L125,14 L150,14 Q175,4 205,14 L300,14 L340,14 Q355,4 370,14 L395,14 L400,17 L408,1 L416,22 L425,14 L450,14 Q475,4 505,14 L600,14 L640,14 Q655,4 670,14 L695,14 L700,17 L708,1 L716,22 L725,14 L750,14 Q775,4 805,14 L900,14");
  offset-rotate: 0deg;
  animation: ecgBulbMove 2.6s linear infinite;
}
@keyframes ecgBulbMove {
  0%      { offset-distance: 14.07%; }
  85.90%  { offset-distance: 100%; }
  85.91%  { offset-distance: 0%; }
  100%    { offset-distance: 14.07%; }
}
/* ============ TOP APP NAV ============ */
/* solid fallback color first, then the fancier translucent one — older iPadOS/Safari

}
@media (max-width: 640px) {
  .study-mode-badge { padding: 7px 12px; font-size: .72rem; bottom: calc(14px + env(safe-area-inset-bottom)); }
}
/* — Study Mode modal — */
.studymode-status-card {
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  background: var(--track);
}
.studymode-status-card.active {
  background: color-mix(in srgb, var(--indigo) 10%, var(--card-bg));
  border-color: var(--indigo);
}
.studymode-status-phase {
  font-size: .78rem;
  font-weight: 700;
  color: var(--indigo);
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-bottom: 4px;
}
.studymode-status-time {
  font-size: 2.1rem;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: -.02em;
}
.studymode-status-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 12px;
}
.studymode-preset-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.studymode-preset-btn {
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  border-radius: 10px;
  padding: 10px 4px;
  font-weight: 800;
  font-size: .92rem;
  color: var(--text);
  cursor: pointer;
  transition: .15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.studymode-preset-btn:hover {
  border-color: var(--indigo);
}
.studymode-preset-btn.active {
  border-color: var(--indigo);
  background: color-mix(in srgb, var(--indigo) 12%, var(--card-bg));
  color: var(--indigo);
}
.studymode-preset-unit {
  font-size: .62rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
}
/* ADDED: the "What are you studying?" type-choice buttons shown when Study Mode is started —
   Self Study (own notes) vs Screen Study (quiz/flashcards). Same tile language as the preset
   buttons above, just bigger since they're the primary decision on this screen. */
.studymode-type-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.studymode-type-btn {
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px 10px;
  cursor: pointer;
  transition: .15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-align: center;
}
.studymode-type-btn i {
  font-size: 1.3rem;
  color: var(--indigo);
}
.studymode-type-btn b {
  font-size: .85rem;
}
.studymode-type-btn .muted {
  font-size: .68rem;
  line-height: 1.3;
}
.studymode-type-btn:hover {
  border-color: var(--indigo);
  background: color-mix(in srgb, var(--indigo) 8%, var(--card-bg));
  transform: translateY(-1px);
}
/* ADDED: full-screen distraction-free timer used by the "Self Study (own notes)" flavor of
   Study Mode — the person is looking at their own physical/external notes, not the app, so
   this gets a big clock instead of the small floating badge. Minimizable back to the badge
   without stopping the session (see closeStudyFullscreen()). */
.studyfs-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: var(--bg-elev);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: studyBadgeIn .25s ease;
}
.studyfs-overlay.is-break {
  background: color-mix(in srgb, var(--green-status) 10%, var(--bg-elev));
}
.studyfs-minimize {
  position: absolute;
  top: max(16px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--muted);
  width: 40px;
  height: 32px;
  border-radius: 999px;
  cursor: pointer;
  display: grid;
  place-items: center;
}
.studyfs-inner {
  text-align: center;
  padding: 20px;
  max-width: 420px;
}
.studyfs-companion-anchor {
  height: 1px;
}
.studyfs-type {
  font-weight: 800;
  font-size: 1rem;
  color: var(--indigo);
  margin-bottom: 6px;
}
.studyfs-phase {
  font-size: .85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--muted);
  margin-bottom: 6px;
}
.studyfs-time {
  font-size: 4rem;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: -.02em;
  margin-bottom: 10px;
}
.studyfs-cycles {
  font-size: .8rem;
  color: var(--muted);
  margin-bottom: 18px;
}
.studyfs-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.studyfs-hint {
  margin-top: 20px;
  font-size: .74rem;
}
@media (max-width: 640px) {
  .studyfs-time { font-size: 3rem; }
}
/* ADDED: landscape / short-viewport layout for the full-screen self-study timer. On a phone
   turned sideways there isn't enough vertical room for the tall centered stack (big clock +
   type + phase + cycles + actions + hint all in a column), so past a certain height budget we
   shrink the type-out and let it lay out more compactly — while portrait/tall screens keep the
   original centered column layout untouched. The whole overlay also becomes scrollable as a
   safety net for any device short enough that even the compact layout doesn't fully fit. */
.studyfs-overlay {
  overflow-y: auto;
  padding: 12px 0;
}
.studyfs-minimize { z-index: 1; }
@media (orientation: landscape) and (max-height: 500px) {
  .studyfs-inner { max-width: 520px; padding: 10px 20px; }
  .studyfs-companion-anchor { height: 0; }
  .studyfs-type { margin-bottom: 2px; font-size: .85rem; }
  .studyfs-phase { margin-bottom: 2px; }
  .studyfs-time { font-size: 2.4rem; margin-bottom: 4px; }
  .studyfs-cycles { margin-bottom: 10px; }
  .studyfs-hint { margin-top: 10px; }
}
@media (max-height: 380px) {
  .studyfs-time { font-size: 2rem; }
  .studyfs-hint { display: none; }
}
/* Hide the small badge while the full-screen self-study timer is open (it's redundant). */
body.study-fullscreen-open .study-mode-badge { display: none; }
/* ADDED: top-right "More" button + dropdown — groups the search/import/recycle-bin/share/theme
   icon buttons behind a single trigger, leaving Settings as its own separate top-right button. */
.more-actions-wrap {
  position: relative;
}
/* ADDED: the trigger button gets a visible "pressed" look while its dropdown is open,
   instead of looking identical open vs. closed */
#btn-more-actions.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.more-actions-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  box-shadow: 0 12px 28px rgba(0,0,0,.2);
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  width: max-content;
  min-width: 210px;
  max-width: calc(100vw - 24px);
  z-index: 150;
  /* ADDED: fade + scale-in animation instead of an abrupt display:none/flex toggle */
  transform-origin: top right;
  opacity: 0;
  transform: scale(.96) translateY(-4px);
  pointer-events: none;
  visibility: hidden;
  transition: opacity .14s ease, transform .14s ease, visibility 0s linear .14s;
}
.more-actions-dropdown.open {
  opacity: 1;
  transform: scale(1) translateY(0);
  pointer-events: auto;
  visibility: visible;
  transition: opacity .14s ease, transform .14s ease;
}
.more-actions-dropdown .iconbtn {
  /* FIXED: the base .iconbtn class (used for the small square icon-only nav buttons) is
     display:grid + place-items:center. That was never overridden here, so inside this dropdown
     the icon and label were each being auto-placed into their own grid row and centered
     independently — stacking icon-on-top-of-label instead of sitting side by side in a row.
     Switching to flex is what actually makes gap/justify-content/align-items below take effect. */
  display: flex;
  align-items: center;
  width: 100%;
  height: auto;
  justify-content: flex-start;
  gap: 12px;
  padding: 10px;
  border-radius: 8px;
  border-color: transparent;
  background: transparent;
}
.more-actions-dropdown .iconbtn:hover {
  background: var(--body-bg, rgba(127,127,127,.1));
  border-color: transparent;
  transform: none;
  box-shadow: none;
}
/* ADDED: fixed-width icon column so the labels line up in a clean vertical column
   regardless of which Font Awesome glyph is used */
.more-actions-dropdown .iconbtn i {
  width: 18px;
  text-align: center;
  flex-shrink: 0;
  font-size: .95rem;
}
.more-actions-dropdown .iconbtn span {
  font-size: .85rem;
  font-weight: 600;
}
/* ADDED: thin divider separating content actions (search/import/share/recycle bin)
   from the appearance control (theme) below it, so the menu reads as two groups
   instead of one flat list */
.more-actions-divider {
  height: 1px;
  background: var(--card-border);
  margin: 5px 4px;
}
/* ADDED: the theme row shows the live theme name, so its label is naturally longer —
   keep the icon+label from ever wrapping awkwardly */
.more-actions-dropdown #btn-theme span {
  white-space: nowrap;
}
/* ============ BUTTONS ============ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: .6rem 1.05rem;
  border-radius: 10px;
  font-weight: 600;
  font-size: .85rem;
  border: 1px solid transparent;
  cursor: pointer;
  transition: transform .08s ease,filter .12s ease;
}
.btn:active {
  transform: scale(.97);
}
.btn-accent {
  background: var(--accent);
  color: #fff;
}
.btn-accent:hover, .btn-accent:active {
  filter: brightness(1.07);
}
.btn-outline {
  background: transparent;
  border-color: var(--card-border);
  color: var(--text);
}
.btn-outline:hover, .btn-outline:focus-visible {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-outline:active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  filter: brightness(.92);
}
.btn-danger {
  background: var(--red-status);
  color: #fff;
}
.btn-danger:hover, .btn-danger:active {
  filter: brightness(1.08);
}
.btn-ghost {
  background: transparent;
  border: none;
  color: var(--muted);
}
.btn-ghost:hover, .btn-ghost:focus-visible {
  background: var(--accent);
  color: #fff;
}
.btn-ghost:active {
  background: var(--accent);
  color: #fff;
  filter: brightness(.92);
}
.btn-sm {
  padding: .4rem .75rem;
  font-size: .76rem;
  border-radius: 8px;
}
.btn:disabled {
  opacity: .45;
  cursor: not-allowed;
}
/* ============ TOGGLE SWITCH ============ */
.switch {
  position: relative;
  display: inline-block;
  width: 42px;
  height: 24px;
  flex: none;
}
.switch input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}
.slider-toggle {
  position: absolute;
  inset: 0;
  background: var(--track);
  border: 1px solid var(--card-border);
  transition: .18s;
  border-radius: 999px;
  cursor: pointer;
}
.slider-toggle:before {
  content: "";
  position: absolute;
  height: 16px;
  width: 16px;
  left: 3px;
  top: 3px;
  background: #fff;
  box-shadow: 0 1px 3px rgba(0,0,0,.3);
  transition: .18s;
  border-radius: 50%;
}
.switch input:checked + .slider-toggle {
  background: var(--accent);
  border-color: var(--accent);
}
.switch input:checked + .slider-toggle:before {
  transform: translateX(18px);
}
/* ============ SEGMENTED CONTROL ============ */
.segmented {
  display: inline-flex;
  background: var(--track);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
  flex-wrap: wrap;
}
.segmented button {
  border: none;
  background: transparent;
  padding: .45rem .85rem;
  border-radius: 8px;
  font-size: .78rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
}
.segmented button.active {
  background: var(--card-bg);
  color: var(--accent);
  box-shadow: var(--shadow-sm);
}
/* ============ SETUP FORM ============ */
.setup-grid {
  display: grid;
  grid-template-columns: 1.2fr .8fr;
  gap: 20px;
}
@media(max-width:900px) {
  .setup-grid {
    grid-template-columns: 1fr;
  }
}
.field-block {
  padding: 18px;
  border-bottom: 1px solid var(--card-border);
}
.field-block:last-child {
  border-bottom: none;
}
.field-label {
  font-weight: 700;
  font-size: .82rem;
  margin-bottom: 9px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.chiplist {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}
.chipbox {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 11px;
  border: 1px solid var(--card-border);
  border-radius: 999px;
  font-size: .78rem;
  cursor: pointer;
  background: var(--track);
  user-select: none;
}
.chipbox input {
  accent-color: var(--accent);
}
.chipbox.checked {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}
.testlist {
  max-height: 230px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 8px;
  background: var(--bg);
}
.testrow {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 6px;
  border-radius: 6px;
  font-size: .79rem;
}
.testrow:hover, .testrow:active {
  background: var(--accent-soft);
  color: var(--accent);
}
.testrow input {
  accent-color: var(--accent);
}
.testrow .cnt {
  margin-left: auto;
  color: var(--muted);
  font-size: .72rem;
}
.subject-group summary {
  cursor: pointer;
  font-weight: 700;
  font-size: .8rem;
  padding: 6px 4px;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 6px;
}
.subject-group summary::-webkit-details-marker {
  display: none;
}
.subject-group summary:before {
  content: '▸';
  display: inline-block;
  transition: .15s;
  color: var(--muted);
}
.subject-group[open] summary:before {
  transform: rotate(90deg);
}
input[type=text].search-input,input[type=number].num-input {
  background: var(--bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: .5rem .7rem;
  font-size: .8rem;
  color: var(--text);
  width: 100%;
}
/* ============ RESOURCE CARDS ============ */
.res-card {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.res-title {
  font-weight: 700;
  font-size: .95rem;
}
.res-meta {
  font-size: .75rem;
  color: var(--muted);
}
.pyq-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: linear-gradient(135deg,#f59e0b,#dc2626);
  color: #fff;
  font-size: .68rem;
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 999px;
}
/* ============ QUIZ NAVBAR ============ */
.quiznav {
  position: sticky;
  /* CHANGED: was top:0, which made this stick at the exact same offset as
     .appnav (also sticky top:0, z-index 40). Since both compete for the
     same spot, this bar scrolled *underneath* the app header instead of
     sitting below it — hiding the timer pill and Submit button on scroll.
     Now it sticks right beneath the 72px-tall header instead (updated
     from 60px to match the taller boxy nav tabs). */
  top: calc(72px + env(safe-area-inset-top));
  z-index: 35;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--card-border);
}
.quiznav-inner {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
  max-width: 1400px;
  margin: 0 auto;
  padding-left: max(20px, env(safe-area-inset-left));
  padding-right: max(20px, env(safe-area-inset-right));
}
.progress-track {
  flex: 1;
  height: 7px;
  background: var(--track);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width .25s ease;
}
.timer-pill {
  font-variant-numeric: tabular-nums;
  font-weight: 700;
  font-size: .85rem;
  padding: 6px 12px;
  border-radius: 9px;
  background: var(--track);
  display: inline-flex;
  align-items: center;
  gap: 7px;
}
/* ADDED: small pulsing dot ahead of the timer digits, like a vitals monitor —
   green while time remains, switches to red in the .warn (low-time) state.
   Purely decorative, no markup change needed. */
.timer-pill::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green-status);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--green-status) 25%, transparent);
  animation: timerpulse 1.4s ease-in-out infinite;
  flex: none;
}
@keyframes timerpulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .25; }
}
.timer-pill.warn {
  background: #fee2e2;
  color: #b91c1c;
}
.timer-pill.warn::before {
  background: var(--red-status);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--red-status) 25%, transparent);
  animation: timerpulse .8s ease-in-out infinite;
}
html.dark .timer-pill.warn {
  background: #3f1414;
  color: #fca5a5;
}
html.dark .timer-pill.warn::before {
  background: var(--red-status);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--red-status) 25%, transparent);
}
/* ============ ADDED: correct-answer streak strip — sits fixed just below the timer/submit
   bar (inside the same sticky .quiznav so it scrolls/sticks together with it). Shows up to
   5 individual boxes lighting up one by one for each correct answer in a row; once the streak
   passes 5 it stops adding boxes and switches to a plain running count (6, 7, 8…) instead. */
.streak-strip-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 20px 9px;
  max-width: 1400px;
  margin: 0 auto;
  padding-left: max(20px, env(safe-area-inset-left));
  padding-right: max(20px, env(safe-area-inset-right));
  border-top: 1px solid var(--card-border);
}
.streak-strip-label {
  font-size: .74rem;
  font-weight: 700;
  color: var(--muted);
  white-space: nowrap;
}
.streak-boxes {
  display: flex;
  gap: 4px;
}
.streak-box {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  background: var(--track);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .66rem;
  color: var(--muted);
  transition: background .2s ease, transform .2s ease;
  flex-shrink: 0;
}
.streak-box.lit {
  background: linear-gradient(135deg,#f97316,#dc2626);
  color: #fff;
  transform: scale(1.05);
  animation: streakPop .3s ease;
}
@keyframes streakPop {
  0% { transform: scale(.55); }
  60% { transform: scale(1.18); }
  100% { transform: scale(1.05); }
}
.streak-count {
  font-weight: 800;
  font-size: .8rem;
  color: #dc2626;
  display: flex;
  align-items: center;
  gap: 4px;
  background: color-mix(in srgb, #dc2626 12%, transparent);
  padding: 3px 10px;
  border-radius: 999px;
  animation: streakPop .3s ease;
}
html.dark .streak-count {
  color: #fca5a5;
}
/* ============ QUIZ LAYOUT ============ */
.quiz-layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  align-items: start;
  max-width: 1000px;
  margin: 18px auto;
  padding: 0 20px;
  padding-left: max(20px, env(safe-area-inset-left));
  padding-right: max(20px, env(safe-area-inset-right));
  /* ADDED: room at the bottom so the last bit of content (explanation box, etc.)
     never sits underneath the fixed .quiz-bottombar — see that rule below for
     how this number is derived (bar content height + its own top/bottom padding). */
  padding-bottom: calc(112px + env(safe-area-inset-bottom));
}
/* ============ ADDED: fixed bottom action bar (Prev/Review/Skip/Next + counter) —
   previously these lived inline at the end of the question card, which meant on a
   long question (lots of text/images) they scrolled out of reach until the user
   scrolled all the way down. Pinning them to the bottom of the viewport keeps quiz
   navigation reachable at all times, on every screen size. */
.quiz-bottombar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 30;
  background: var(--bg-elev);
  border-top: 1px solid var(--card-border);
  box-shadow: 0 -4px 16px rgba(0,0,0,.08);
  padding-bottom: env(safe-area-inset-bottom);
}
.quiz-bottombar-inner {
  max-width: 1000px;
  margin: 0 auto;
  padding: 10px 20px 8px;
  padding-left: max(20px, env(safe-area-inset-left));
  padding-right: max(20px, env(safe-area-inset-right));
}
@media(max-width:980px) {
  .quiz-layout {
    grid-template-columns: 1fr;
  }
}
.qtags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.tag {
  font-size: .7rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 999px;
  background: var(--track);
  color: var(--muted);
  max-width: 100%;
  overflow-wrap: break-word;
  word-break: break-word;
}
.tag.tag-accent {
  background: var(--accent-soft);
  color: var(--accent);
}
.qtext {
  font-size: 1.02rem;
  line-height: 1.7;
  margin-bottom: 14px;
  overflow-wrap: break-word;
  word-break: break-word;
}
.qtext p {
  margin: .4em 0;
}
.hide-clues .qtext strong,.hide-clues .qtext b,.hide-clues .qtext u,.hide-clues .qtext mark {
  font-weight: inherit;
  text-decoration: none;
  background: none;
  color: inherit;
}
.qimg {
  max-width: 100%;
  max-height: 340px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  cursor: zoom-in;
  margin: 6px 8px 6px 0;
}
/* ADDED: question/explanation/option text can contain raw <img> tags pasted straight
   into the HTML (not just the separate question_images/explanation_images arrays).
   Those had no size cap and could push wider than their card, breaking the layout —
   this caps them the same way as .qimg and makes them zoomable via wireImageZoom(). */
.qtext img, .explain-box img, .opt-btn img, .review-detail img {
  max-width: 100%;
  max-height: 340px;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  cursor: zoom-in;
  margin: 6px 8px 6px 0;
  display: inline-block;
}
@media(max-width:560px) {
  .qimg, .qtext img, .explain-box img, .opt-btn img, .review-detail img {
    max-height: 220px;
  }
}
.opt-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  text-align: left;
  padding: 13px 15px;
  border: 1.5px solid var(--card-border);
  border-radius: 12px;
  background: var(--bg);
  margin-bottom: 9px;
  cursor: pointer;
  font-size: .92rem;
  transition: .12s;
  color: var(--text);
}
.opt-btn.locked {
  cursor: default;
}
.opt-btn:hover {
  border-color: var(--accent);
}
.opt-letter {
  width: 26px;
  height: 26px;
  flex: none;
  border-radius: 50%;
  background: var(--track);
  display: grid;
  place-items: center;
  font-weight: 700;
  font-size: .78rem;
}
/* FIXED: the option text sits next to .opt-letter in a flex row. Flex items default
   to min-width:auto, so a long unbroken word/URL/chemical-formula in an option could
   refuse to wrap and push the button wider than its card, overflowing the viewport
   on phones. This makes the text the flexible, shrinkable, wrapping part of the row. */
.opt-btn > span:not(.opt-letter) {
  flex: 1 1 auto;
  min-width: 0;
  overflow-wrap: break-word;
  word-break: break-word;
}
.opt-btn.selected {
  border-color: var(--indigo);
  background: color-mix(in srgb, var(--indigo) 8%, var(--card-bg));
}
.opt-btn.selected .opt-letter {
  background: var(--indigo);
  color: #fff;
}
.opt-btn.correct {
  border-color: var(--green-status);
  background: color-mix(in srgb, var(--green-status) 10%, var(--card-bg));
}
.opt-btn.correct .opt-letter {
  background: var(--green-status);
  color: #fff;
}
.opt-btn.incorrect {
  border-color: var(--red-status);
  background: color-mix(in srgb, var(--red-status) 10%, var(--card-bg));
}
.opt-btn.incorrect .opt-letter {
  background: var(--red-status);
  color: #fff;
}
.explain-box {
  margin-top: 16px;
  padding: 16px;
  border-radius: 12px;
  background: var(--accent-soft);
  border: 1px solid var(--card-border);
  font-size: .9rem;
  overflow-wrap: break-word;
  word-break: break-word;
}
.explain-locked {
  margin-top: 16px;
  padding: 16px;
  border-radius: 12px;
  background: var(--track);
  border: 1px dashed var(--card-border);
  font-size: .85rem;
  color: var(--muted);
  text-align: center;
}
.actionbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 18px;
  flex-wrap: wrap;
}
/* ============ SIDEBAR GRID ============ */
.sidebar-card {
  position: sticky;
  top: 76px;
  padding: 14px;
}
/* ADDED: small question-map "strip" shown above the question on the Review-all-
   questions page — lets you jump straight to any question without a dropdown or
   modal. Wraps into multiple rows (not a single scrolling line) so every question
   stays visible and reachable, especially on mobile. Reuses the .navnum color
   states (correct/incorrect/skipped/bookmarked/active) plus an explicit ✓/✗ mark. */
.navstrip-wrap {
  margin: 0 0 18px;
}
.navstrip {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  justify-content: center;
  max-height: 168px;
  overflow-y: auto;
  padding: 2px;
  -webkit-overflow-scrolling: touch;
}
.navstrip .navnum {
  flex: 0 0 38px;
  width: 38px;
  height: 38px;
  aspect-ratio: unset;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}
.navstrip-num {
  font-size: .74rem;
  font-weight: 800;
  line-height: 1.1;
}
.navstrip-mark {
  font-size: .58rem;
  line-height: 1.1;
  opacity: .9;
}
@media(max-width:560px) {
  .navstrip {
    gap: 6px;
    max-height: 148px;
  }
  .navstrip .navnum {
    flex-basis: 32px;
    width: 32px;
    height: 32px;
  }
  .navstrip-num {
    font-size: .64rem;
  }
  .navstrip-mark {
    font-size: .5rem;
  }
}
.navgrid {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  gap: 7px;
  max-height: 420px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-right: 2px;
}
.navnum {
  aspect-ratio: 1;
  border-radius: 8px;
  border: 1.5px solid var(--card-border);
  background: var(--bg);
  display: grid;
  place-items: center;
  font-size: .72rem;
  font-weight: 700;
  cursor: pointer;
  color: var(--muted);
  position: relative;
}
.navnum.st-answered {
  background: var(--blue-status);
  border-color: var(--blue-status);
  color: #fff;
}
.navnum.st-skipped {
  background: var(--yellow-status);
  border-color: var(--yellow-status);
  color: #3f2d00;
}
.navnum.st-review {
  background: var(--orange-status);
  border-color: var(--orange-status);
  color: #fff;
}
.navnum.st-bookmarked {
  background: var(--purple-status);
  border-color: var(--purple-status);
  color: #fff;
}
.navnum.st-review.st-bookmarked {
  background: linear-gradient(135deg, var(--orange-status) 0 50%, var(--purple-status) 50% 100%);
  border-color: var(--purple-status);
  color: #fff;
}
.navnum.st-active {
  outline: 2.5px solid var(--indigo);
  outline-offset: 1px;
}
/* ADDED: study-mode nav states — right/wrong instead of a generic "answered" blue */
.navnum.st-correct {
  background: var(--green-status);
  border-color: var(--green-status);
  color: #fff;
}
.navnum.st-incorrect {
  background: var(--red-status);
  border-color: var(--red-status);
  color: #fff;
}
/* CHANGED: the always-visible running-line question-number strip has been removed
   entirely — it never worked well on mobile (too small to read, or needed sliding/
   scrolling to reach later questions). All that's left above the question card is a
   simple, compact bar with a "Question X of Y" label and the Map button, which opens
   the full question-map grid (.navgrid, in a modal) for jumping to any question. */
.qnav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  width: 100%;
  max-width: 100%;
}
.qnav-bar-label {
  font-weight: 700;
  font-size: .84rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.qmap-toggle-btn {
  flex: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1.5px solid var(--card-border);
  background: var(--bg);
  color: var(--text);
  font-size: .78rem;
  font-weight: 700;
  cursor: pointer;
  transition: .12s;
}
.qmap-toggle-btn:hover {
  border-color: var(--accent);
}
.legend {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 12px;
  font-size: .72rem;
  color: var(--muted);
}
.legend span {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.dot {
  width: 9px;
  height: 9px;
  border-radius: 3px;
  flex: none;
}
/* ============ ANALYTICS ============ */
.stat-card {
  padding: 16px;
}
.stat-num {
  font-family: 'Lexend';
  font-size: 1.7rem;
  font-weight: 800;
}
.ring {
  --pct: 0;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: conic-gradient(var(--accent) calc(var(--pct)*3.6deg), var(--track) 0deg);
  display: grid;
  place-items: center;
  flex: none;
}
.ring-inner {
  width: 47px;
  height: 47px;
  border-radius: 50%;
  background: var(--card-bg);
  display: grid;
  place-items: center;
  font-size: .68rem;
  font-weight: 800;
}
/* ADDED: compact progress ring shown in the quiz header (replaces the old linear progress
   bar) — small enough to sit inline next to the "answered/total" count without crowding
   the Save/Timer/Submit buttons. */
.quiz-progress-ring {
  width: 32px;
  height: 32px;
  flex: none;
}
.quiz-progress-ring .ring-inner {
  width: 24px;
  height: 24px;
  font-size: .52rem;
}
.heatgrid {
  display: grid;
  grid-auto-flow: column;
  grid-template-rows: repeat(7,1fr);
  gap: 3px;
  overflow-x: auto;
  padding-bottom: 6px;
}
.heatcell {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  background: var(--track);
}
.review-row {
  border-bottom: 1px solid var(--card-border);
}
.review-row:last-child {
  border-bottom: none;
}
.review-summary {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 4px;
  cursor: pointer;
  font-size: .83rem;
}
.pill-correct {
  color: var(--green-status);
  font-weight: 700;
}
.pill-wrong {
  color: var(--red-status);
  font-weight: 700;
}
.pill-skip {
  color: var(--muted);
  font-weight: 700;
}
.review-detail {
  padding: 0 4px 16px 4px;
  font-size: .85rem;
  overflow-wrap: break-word;
  word-break: break-word;
}
/* ADDED: full-screen review page star-bookmark toggle inside each row */
.review-star-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.05rem;
  line-height: 1;
  color: var(--muted);
  padding: 2px 4px;
}
.review-star-btn.active {
  color: #f59e0b;
}
.review-empty {
  padding: 30px 10px;
  text-align: center;
  color: var(--muted);
  font-size: .85rem;
}
/* ============ MODAL ============ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,14,25,.55);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
}
.modal-box {
  position: relative;
  background: var(--card-bg);
  background: color-mix(in srgb, var(--card-bg) 96%, transparent);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  max-width: 520px;
  width: 100%;
  padding: 22px;
  box-shadow: var(--shadow-md);
  max-height: 88vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
/* ADDED: floating close (X) button pinned to the top-right corner of every modal,
   including Settings and all of its sub-pages — always visible while scrolling
   the modal body, no need to click the backdrop to dismiss. */
.modal-floating-close {
  position: sticky;
  float: right;
  top: 0;
  right: 0;
  margin: -6px -6px 0 10px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--card-border);
  background: color-mix(in srgb, var(--card-bg) 92%, transparent);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .95rem;
  cursor: pointer;
  z-index: 5;
  box-shadow: var(--shadow-sm, 0 1px 4px rgba(0,0,0,.12));
  transition: background .15s, transform .1s;
}
.modal-floating-close:hover {
  background: color-mix(in srgb, var(--red-status) 14%, var(--card-bg));
  color: var(--red-status);
}
.modal-floating-close:active {
  transform: scale(.92);
}
.zoom-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 110;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 30px;
  cursor: zoom-out;
}
.zoom-overlay img {
  max-width: 100%;
  max-height: 100%;
  border-radius: 8px;
}
/* ADDED: download-as-JPG button shown inside the image zoom/lightbox overlay */
.zoom-download-btn {
  position: fixed;
  top: 18px;
  right: 18px;
  z-index: 111;
  background: rgba(255,255,255,.95);
  color: #111;
  border: none;
  border-radius: 8px;
  padding: 9px 14px;
  font-weight: 700;
  font-size: .8rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 2px 10px rgba(0,0,0,.3);
}
.zoom-download-btn:hover {
  background: #fff;
}
@media(max-width:560px) {
  .zoom-download-btn {
    top: 10px;
    right: 10px;
    padding: 7px 10px;
    font-size: .72rem;
  }
}
/* ============ MISC ============ */
.dropzone {
  border: 2px dashed var(--card-border);
  border-radius: 14px;
  padding: 34px 20px;
  text-align: center;
  cursor: pointer;
  transition: .15s;
}
.dropzone.hover {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.spinner {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2.5px solid var(--card-border);
  border-top-color: var(--accent);
  animation: spin .7s linear infinite;
}
@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
.toast {
  position: fixed;
  bottom: calc(20px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  padding: 10px 18px;
  border-radius: 10px;
  font-size: .82rem;
  font-weight: 600;
  z-index: 200;
  box-shadow: var(--shadow-md);
  max-width: calc(100vw - 32px);
}
/* ADDED: small success/error toast for copy-cut-paste actions — distinct from the generic bottom .toast
   and from the big centered import notification modal. Slides in from the top-right, auto-dismisses. */
@keyframes miniToastIn {
  from {
    opacity: 0;
    transform: translateX(24px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}
@keyframes miniToastOut {
  from {
    opacity: 1;
    transform: translateX(0);
  }
  to {
    opacity: 0;
    transform: translateX(24px);
  }
}
.mini-toast-stack {
  position: fixed;
  top: calc(70px + env(safe-area-inset-top));
  right: max(16px, env(safe-area-inset-right));
  z-index: 210;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
  max-width: calc(100vw - 32px);
}
.mini-toast {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border-radius: 9px;
  font-size: .8rem;
  font-weight: 600;
  box-shadow: var(--shadow-md);
  animation: miniToastIn .18s ease-out;
  max-width: 280px;
}
.mini-toast.success {
  background: color-mix(in srgb, var(--green-status) 16%, var(--bg-elev));
  color: var(--green-status);
  border: 1px solid color-mix(in srgb, var(--green-status) 45%, transparent);
}
.mini-toast.error {
  background: color-mix(in srgb, var(--red-status, #e5484d) 16%, var(--bg-elev));
  color: var(--red-status, #e5484d);
  border: 1px solid color-mix(in srgb, var(--red-status, #e5484d) 45%, transparent);
}
.mini-toast.leaving {
  animation: miniToastOut .18s ease-in forwards;
}
@media (max-width:640px) {
  .mini-toast-stack {
    top: auto;
    bottom: calc(20px + env(safe-area-inset-bottom));
    right: max(12px, env(safe-area-inset-right));
    left: max(12px, env(safe-area-inset-left));
    align-items: stretch;
    max-width: none;
  }
  .mini-toast {
    max-width: none;
  }
}
/* ============ CENTERED IMPORT NOTIFICATION MODAL ============ */
.import-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  opacity: 0;
  animation: fadeIn .3s ease forwards;
}
@keyframes fadeIn {
  to {
    opacity: 1;
  }
}
.import-notification-modal {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 40px;
  max-width: 520px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  animation: slideUp .4s cubic-bezier(.34,.1,.68,.55) forwards;
}
@keyframes slideUp {
  from {
    transform: translateY(30px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
.import-emoji {
  font-size: 5rem;
  margin-bottom: 16px;
  display: block;
  animation: bounce .8s ease-in-out;
}
@keyframes bounce {
  0%,100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.15);
  }
}
.import-title {
  font-size: 1.8rem;
  font-weight: 800;
  margin-bottom: 12px;
  background: var(--brand-grad);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.import-message {
  font-size: 1.05rem;
  color: var(--muted);
  margin-bottom: 20px;
  line-height: 1.6;
}
.import-stats {
  background: var(--track);
  border-radius: 12px;
  padding: 20px;
  margin: 20px 0;
  font-size: 1rem;
}
.import-stat-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  font-weight: 600;
}
.import-stat-label {
  color: var(--muted);
  font-weight: 500;
}
.import-stat-value {
  font-size: 1.4rem;
  color: var(--accent);
  font-weight: 800;
}
.import-close-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 12px 32px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 16px;
  transition: filter .2s ease;
}
.import-close-btn:hover {
  filter: brightness(1.1);
}
.import-close-btn:active {
  transform: scale(.97);
}
.radio-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px;
  border: 1px solid var(--card-border);
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
}
.radio-row:hover, .radio-row:active {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.radio-row input {
  margin-top: 3px;
  accent-color: var(--accent);
}
/* ============ ADDED FEATURES ============ */
/* ADDED: mobile hamburger button — hidden on desktop, shown only under the mobile breakpoint below */
.hamburger-btn {
  display: none;
}
/* ADDED: backdrop shared by both mobile drawers (nav on the left, actions on the right) */
.mobile-nav-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,14,25,.5);
  z-index: 190;
}
.mobile-nav-backdrop.show {
  display: block;
}
/* — Responsive mobile/tablet — */
@media(max-width:640px) {
  .appnav-inner {
    height: 56px;
    padding: 8px 12px;
    gap: 8px;
  }
  .hamburger-btn {
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  /* ADDED: the standalone Study Mode nav icon is desktop-only — on phones it's reached via
     the drawer tab above Home instead (see .studymode-drawer-tab) */
  .studymode-nav-btn { display: none; }
  /* ADDED: Study Mode's drawer entry, placed as the first item (above Home) */
  .studymode-drawer-tab {
    display: flex;
    color: var(--indigo);
    margin-bottom: 8px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--card-border);
  }
  /* ADDED: nav tabs slide in from the LEFT as a drawer, opened by the hamburger button */
  .navtabs {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    height: 100dvh;
    z-index: 200;
    width: 230px;
    max-width: 78vw;
    background: var(--card-bg);
    flex-direction: column;
    align-items: stretch;
    padding: calc(70px + env(safe-area-inset-top)) 12px calc(20px + env(safe-area-inset-bottom));
    padding-left: max(12px, env(safe-area-inset-left));
    border-radius: 0;
    box-shadow: 2px 0 24px rgba(0,0,0,.2);
    transform: translateX(-100%);
    transition: transform .25s ease;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    gap: 4px;
  }
  .navtabs.open {

  }

  }
  /* ADDED: compact Map button + narrower question-map modal grid on mobile */

}
/* ============================================================
   ADDED: iPad / tablet top-bar fix — portrait AND landscape.
   The inline desktop nav (brand + all tabs + More/Settings/Profile) is too
   wide for an iPad's viewport, which crowds the row and pushes the More /
   Settings / Profile buttons uncomfortably close to the edge (or off
   reach) in both orientations.
   CHANGED: now keyed purely on viewport width (641–1024px) rather than
   touch input capability — so ANY window in this size range (iPad,
   Android tablet, or a mouse-driven desktop window resized into this
   range) gets the hamburger drawer, and anything wider always gets the
   normal horizontal navbar, regardless of touch vs mouse. Phones are
   already handled by the max-width:640px rules above.
   Reuses the same hamburger + slide-in drawer pattern as the phone view.
   ============================================================ */
@media (min-width:641px) and (max-width:1024px) {
  .hamburger-btn {
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  /* ADDED: same reasoning as the phone breakpoint above — real touch tablets (iPad) reach
     Study Mode via the drawer tab above Home, not this standalone desktop nav icon */
  .studymode-nav-btn { display: none; }
  .studymode-drawer-tab {
    display: flex;
    color: var(--indigo);
    margin-bottom: 8px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--card-border);
  }
  .navtabs {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    height: 100dvh;
    z-index: 200;
    width: 280px;
    max-width: 60vw;
    background: var(--card-bg);
    flex-direction: column;
    align-items: stretch;
    padding: calc(70px + env(safe-area-inset-top)) 16px calc(20px + env(safe-area-inset-bottom));
    padding-left: max(16px, env(safe-area-inset-left));
    border-radius: 0;
    box-shadow: 2px 0 24px rgba(0,0,0,.2);
    transform: translateX(-100%);
    transition: transform .25s ease;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    gap: 6px;
  }
  .navtabs.open {
    transform: translateX(0);
  }
  .navtabs .navtab {
    padding: 12px 14px;
    font-size: .9rem;
    width: 100%;
    justify-content: flex-start;
    text-align: left;
  }
  /* ADDED: the boxy stacked (icon-top/label-bottom) style only applies to the
     wide desktop bar — undo it here so the drawer keeps its original
     horizontal icon+label row layout. */
  .navtabs > .navtab,
  .navtabs > .navtab-more-wrap > #navtab-more {
    flex-direction: row;
    min-width: 0;
    gap: 0;
  }
  .navtabs > .navtab i,
  .navtabs > .navtab-more-wrap > #navtab-more i {
    margin-right: 6px !important;
    margin-bottom: 0 !important;
    font-size: 1rem;
  }
  .navtabs > .navtab-more-wrap > #navtab-more i.fa-caret-down {
    margin-right: 0 !important;
    margin-left: 6px !important;
    margin-top: 0 !important;
    font-size: .7rem;
  }
  /* ADDED: same inline-accordion treatment for the More dropdown as the 640px drawer */
  .navtab-more-wrap {
    width: 100%;
  }
  .navtab-more-dropdown {
    position: static;
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: none;
    box-shadow: none;
    border: none;
    background: transparent;
    padding: 0 0 0 14px;
    max-height: 0;
    overflow: hidden;
    transition: max-height .2s ease;
  }
  .navtab-more-dropdown.open {
    max-height: 200px;
  }
}
@media(max-width:480px) {
  .navtab {
    padding: 6px 8px;
    font-size: .72rem;
  }
  .wrap {
    padding: 0 12px;
  }
  .navgrid {
    grid-template-columns: repeat(6,1fr);
    gap: 4px;
    max-height: 160px;
  }
  .navnum {
    font-size: .58rem;
  }
  .qnav-bar-label {
    font-size: .72rem;
  }
  .hide-xs2 {
    display: none;
  }
  /* ADDED: the question card's own inline padding (22px, 52px on the right for the
     bookmark star) eats into precious width on very small phones — trim it down here */
  #quiz-layout .card {
    padding: 16px !important;
    padding-right: 42px !important;
  }
  .qbookmark-corner {
    right: 10px !important;
    top: 10px !important;
  }
}
/* the 480px rule above overrides the drawer's own .navtab sizing on very small phones —
   restore full-width sidebar-style buttons at that breakpoint too */
@media(max-width:480px) {
  .navtabs .navtab {
    padding: 10px 12px;
    font-size: .85rem;
    width: 100%;
    justify-content: flex-start;
    text-align: left;
  }
}
/* — User Profile Badge — */
.profile-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 10px 5px 5px;
  border: 1px solid var(--card-border);
  border-radius: 999px;
  cursor: default;
  background: var(--card-bg);
  transition: .15s;
  flex-shrink: 0;
}
.profile-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: .78rem;
  color: #fff;
  flex: none;
  overflow: hidden; /* ADDED: clips a photo image (if set) to the circle */
}
/* ADDED: user-picked profile photo, used inside .profile-avatar (nav) and the
   Your Profile modal's avatar preview whenever APP.userProfile.photo is set */
.profile-avatar img,
.avatar-photo-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  display: block;
  pointer-events: none;
  user-select: none;
}
.profile-name {
  font-size: .78rem;
  font-weight: 600;
  max-width: 90px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
@media(max-width:640px) {
  .profile-name {
    display: none;
  }
}
/* CHANGED: the mobile-only full-screen action drawer + its trigger icon are retired — the
   "More" dropdown + Settings button (see .more-actions-wrap) are now used on ALL devices
   (mobile/tablet/desktop) instead of switching to a different pattern on small screens. */
.action-drawer-btn {
  display: none;
}

/* — Search modal — */
.search-overlay-box {
  max-width: 680px;
}
.search-field {
  display: flex;
  gap: 8px;
  align-items: center;
  background: var(--bg);
  border: 1.5px solid var(--card-border);
  border-radius: 11px;
  padding: 10px 14px;
  margin-bottom: 12px;
}
.search-field:focus-within {
  border-color: var(--accent);
}
.search-field input {
  border: none;
  background: transparent;
  outline: none;
  font-size: .95rem;
  flex: 1;
  color: var(--text);
}
.search-field input::placeholder {
  color: var(--muted);
}
.search-result-row {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid transparent;
  margin-bottom: 6px;
  background: var(--bg);
}
.search-result-row:hover, .search-result-row:active {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.search-result-qtext {
  font-size: .84rem;
  line-height: 1.5;
  color: var(--text);
}
.search-result-meta {
  font-size: .72rem;
  color: var(--muted);
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.search-results-wrap {
  max-height: 55vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-right: 2px;
}
/* — PYQ year filter — */
.year-filter-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.year-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border: 1px solid var(--card-border);
  border-radius: 999px;
  font-size: .75rem;
  font-weight: 600;
  cursor: pointer;
  background: var(--track);
  user-select: none;
  transition: .1s;
}
.year-chip.active {
  background: linear-gradient(135deg,#f59e0b,#dc2626);
  color: #fff;
  border-color: transparent;
}
.year-chip.all {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}
/* — 3-column actionbar for quiz — */
.actionbar-3col {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  align-items: center;
  margin-top: 18px;
  padding: 10px 0 0;
}
.actionbar-btn {
  background: var(--accent-soft, color-mix(in srgb, var(--accent) 14%, transparent));
  border: 1.5px solid var(--accent);
  color: var(--accent);
  font-weight: 700;
  min-height: 38px;
  font-size: .78rem;
  padding: .42rem .5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  white-space: nowrap;
}
.actionbar-btn:hover, .actionbar-btn:focus-visible {
  background: var(--accent);
  color: #fff;
}
.actionbar-btn:active {
  background: var(--accent);
  color: #fff;
  filter: brightness(.92);
}
.actionbar-btn:disabled {
  opacity: .4;
}
.q-counter-row {
  display: flex;
  justify-content: center;
  margin-top: 8px;
}
.q-counter {
  font-size: .8rem;
  font-weight: 700;
  color: var(--muted);
  white-space: nowrap;
}
@media(max-width:560px) {
  .actionbar-3col {
    gap: 6px;
  }
  .actionbar-btn {
    padding: .42rem .25rem;
    font-size: .68rem;
  }
  .nav-arrow-label, .hide-xs2 {
    display: none;
  }
}
/* — Section label with select-all — */
.section-label-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.section-label-row .field-label {
  margin-bottom: 0;
}
.sel-all-btn {
  font-size: .72rem;
  font-weight: 600;
  color: var(--accent);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
}
.sel-all-btn:hover {
  background: var(--accent-soft);
}
/* — Reset Progress modal — */
.reset-subject-list {
  max-height: 220px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 8px;
  background: var(--bg);
  margin: 8px 0;
}
.reset-subject-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 6px;
  border-radius: 6px;
  font-size: .8rem;
}
.reset-subject-row:hover, .reset-subject-row:active {
  background: color-mix(in srgb, var(--red-status) 14%, transparent);
}
.reset-subject-row input {
  accent-color: var(--red-status);
}
.danger-note {
  background: color-mix(in srgb, var(--red-status) 10%, var(--card-bg));
  border: 1px solid color-mix(in srgb, var(--red-status) 30%, transparent);
  border-radius: 9px;
  padding: 10px 14px;
  font-size: .8rem;
  color: var(--red-status);
  margin-bottom: 12px;
}
/* — Settings hub rows — */
.settings-row {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  text-align: left;
  padding: 12px;
  border: 1px solid var(--card-border);
  border-radius: 12px;
  background: var(--bg);
  margin-bottom: 9px;
  cursor: pointer;
  transition: .15s;
  color: var(--text);
}
.settings-row:hover, .settings-row:active {
  border-color: var(--accent);
  background: var(--accent-soft);
  box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 35%, transparent);
  transform: translateY(-1px);
}
.settings-row-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--accent-soft);
  color: var(--accent);
  display: grid;
  place-items: center;
  flex: none;
  font-size: .9rem;
}
.settings-row-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  font-size: .88rem;
}
.settings-row-arrow {
  color: var(--muted);
  font-size: .75rem;
  flex: none;
}
/* ADDED: on/off switch used for settings toggles (e.g. toast notifications, running pet) */
.settings-toggle {
  position: relative;
  flex: none;
  width: 42px;
  height: 24px;
  border-radius: 999px;
  background: var(--border, #ccc);
  cursor: pointer;
  transition: background .18s ease;
  border: none;
  padding: 0;
}
.settings-toggle.on {
  background: var(--accent);
}
.settings-toggle::before {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 2px rgba(0,0,0,.25);
  transition: transform .18s ease;
}
.settings-toggle.on::before {
  transform: translateX(18px);
}
.settings-row.settings-row-static {
  cursor: default;
}
.settings-row.settings-row-static:hover {
  background: none;
}
.theme-swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 10px 4px;
  border: 1.5px solid var(--card-border);
  border-radius: 10px;
  background: var(--bg-elev);
  cursor: pointer;
  font-size: .68rem;
  font-weight: 600;
  color: var(--muted);
}
.theme-swatch:hover {
  border-color: var(--accent);
}
.theme-swatch.active {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}
.theme-swatch-dot {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,.1);
}
.theme-swatch-light .theme-swatch-dot { background: linear-gradient(135deg,#f4f6fa 50%,#0f766e 50%); }
.theme-swatch-dark .theme-swatch-dot { background: linear-gradient(135deg,#0A0A0D 50%,#2dd4bf 50%); }
.theme-swatch-sepia .theme-swatch-dot { background: linear-gradient(135deg,#f4ecdd 50%,#a3673a 50%); }
.theme-swatch-midnight .theme-swatch-dot { background: linear-gradient(135deg,#05070f 50%,#6d8bff 50%); }
@media (max-width: 420px) {
  #theme-swatch-row {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  .theme-swatch {
    flex-direction: row;
    justify-content: flex-start;
    padding: 10px 12px;
    font-size: .74rem;
  }

  justify-content: space-between;
  margin: 16px 0 8px;
}
.kind-box-title {

  font-weight: 700;
  text-transform: uppercase;

.kind-box {

  gap: 8px;

.kind-tile-wrap {

.kind-tile-icon {

  place-items: center;
  width: 30px;
  height: 30px;

.kind-tile-icon img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
}
.kind-tile-label {

.kind-tile-check {

  right: 4px;

  background: var(--accent);

  text-align: center;
}
.home-stat-icon {
  font-size: 1.1rem;
  margin-bottom: 4px;
}
.home-stat-num {
  font-size: 1.35rem;
  font-weight: 800;
  line-height: 1.1;
}
.home-stat-label {
  font-size: .68rem;
  color: var(--muted);
  margin-top: 2px;
}
/* — ADDED: Home action bar — */
.home-action-bar {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  margin-bottom: 20px;
}
@media (max-width:640px) {
  .home-action-bar {
    grid-template-columns: 1fr;
  }
}
.home-action-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  cursor: pointer;
  text-align: left;
  transition: .15s;
  color: var(--text);
}
.home-action-btn:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,.08);
}
.home-action-icon {
  width: 42px;
  height: 42px;
  border-radius: 11px;
  background: var(--accent-soft);
  color: var(--accent);
  display: grid;
  place-items: center;
  flex: none;
  font-size: 1.05rem;
}
.home-action-text b {
  display: block;
  font-size: .88rem;
}
.home-action-text span {
  display: block;
  font-size: .72rem;
  color: var(--muted);
  margin-top: 1px;
}
/* — ADDED: Daily quiz card — */
.daily-quiz-card {
  padding: 20px;
  margin-bottom: 24px;
  border-color: var(--accent);
  position: relative;
  overflow: hidden;
}
.daily-quiz-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.daily-quiz-badge {
  font-size: .7rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--accent-soft);
  color: var(--accent);
}
.daily-quiz-badge.done {
  background: color-mix(in srgb, var(--green-status) 16%, transparent);
  color: var(--green-status);
}
.daily-opt-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 12px 0;
}
/* — ADDED: Recent Questions Tile — */
.recent-questions-tile {
  padding: 20px;
  margin-bottom: 24px;
  background: linear-gradient(135deg, var(--accent-soft) 0%, color-mix(in srgb, var(--accent-soft) 50%, transparent) 100%);
  border-color: var(--accent);
  position: relative;
  overflow: hidden;
}
.recent-questions-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.recent-questions-icon {
  font-size: 1.8rem;
}
.recent-questions-title {
  font-weight: 800;
  font-size: 1rem;
  color: var(--text);
}
.recent-questions-subtitle {
  font-size: .75rem;
  color: var(--muted);
  font-weight: 500;
}
.recent-questions-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.recent-stat-box {
  background: var(--card-bg);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
  border: 1px solid var(--card-border);
}
.recent-stat-num {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--accent);
  display: block;
}
.recent-stat-label {
  font-size: .7rem;
  color: var(--muted);
  margin-top: 4px;
  display: block;
}
.recent-questions-cta {
  display: inline-block;
  margin-top: 12px;
  font-size: .8rem;
  color: var(--accent);
  font-weight: 600;
  cursor: pointer;
  transition: .2s;
}
.recent-questions-cta:hover {
  transform: translateX(4px);
}
/* — ADDED: Resource card progress + delete — */
.res-card {
  position: relative;
}
.res-delete-icon {
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: .85rem;
  padding: 4px;
  border-radius: 6px;
  flex: none;
}
.res-delete-icon:hover {
  color: var(--red-status);
  background: color-mix(in srgb, var(--red-status) 12%, transparent);
}
.res-progress-track {
  height: 6px;
  border-radius: 4px;
  background: var(--track);
  overflow: hidden;
  margin: 8px 0 2px;
}
.res-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width .3s;
}
.res-progress-label {
  font-size: .68rem;
  color: var(--muted);
}
/* — ADDED: Resource detail directory tree — */
.tree-folder {
  border: 1px solid var(--card-border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
  background: var(--card-bg);
}
.tree-folder-head {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px 10px;
  padding: 12px 14px;
  cursor: pointer;
  font-weight: 700;
  font-size: .86rem;
}
.subj-name-text {
  flex: 1 1 auto;
  min-width: 80px;
}
.tree-folder-head:hover, .tree-folder-head:active {
  background: var(--accent-soft);
  color: var(--accent);
}
.tree-folder-count {
  margin-left: auto;
  font-weight: 400;
  font-size: .74rem;
  color: var(--muted);
  white-space: nowrap;
}
@media (max-width: 480px) {
  .tree-folder-count {
    margin-left: 0;
    flex-basis: 100%;
  }
}
/* ADDED: up/down reorder-arrow buttons shown on each folder/lesson row while in Edit mode and
   "Custom order" is the active sort — lets people manually reorder items at ANY nesting level
   (root subjects, subfolders, and individual lessons inside a folder) without drag-and-drop. */
.tree-folder-arrows, .lesson-arrows {
  display: flex;
  gap: 2px;
  flex: none;
  margin-left: 4px;
}
.tree-arrow-btn {
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--muted);
  cursor: pointer;
  font-size: .7rem;
  width: 26px;
  height: 26px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex: none;
}
.tree-arrow-btn:hover:not(:disabled) {
  color: var(--accent);
  background: var(--accent-soft);
  border-color: var(--accent);
}
.tree-arrow-btn:disabled {
  opacity: .3;
  cursor: default;
}
.tree-folder-body {
  display: none;
  border-top: 1px solid var(--card-border);
}
.tree-folder.open .tree-folder-body {
  display: block;
}
.tree-folder.open .tree-caret {
  transform: rotate(90deg);
}
/* — ADDED: standalone "folder page" — shown after tapping a folder row, replacing the old
   inline-expanding accordion body. This is a distinct page: a header card (name, counts,
   folder-level actions) followed by a flat list of lesson cards, none of it nested inside
   the folder's own bordered box. */
.folder-page-header {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px 10px;
  padding: 16px 18px;
  margin-bottom: 14px;
}
.folder-page-title {
  font-size: 1.08rem;
  font-weight: 800;
  flex: 1 1 auto;
  min-width: 80px;
}
.folder-page-count {
  font-weight: 400;
  font-size: .78rem;
  color: var(--muted);
  white-space: nowrap;
}
@media (max-width: 480px) {
  .folder-page-count { flex-basis: 100%; }
}
.lesson-card {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px 10px;
  padding: 12px 14px;
  font-size: .86rem;
  margin-bottom: 8px;
}
.lesson-card .tree-lesson-count { margin-right: 0; }
@media (max-width: 480px) {
  .lesson-card .tree-lesson-count { flex-basis: 100%; }
}
/* — ADDED: Anki-style "::" nested subfolder/branch tree (groups that contain other folders) — */
.tree-group {
  margin-bottom: 10px;
}
.tree-group-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  font-weight: 700;
  font-size: .86rem;
  border: 1px dashed var(--card-border);
  border-radius: 12px;
  background: transparent;
}
.tree-group-head:hover, .tree-group-head:active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}
.tree-group-name {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tree-group-body {
  display: none;
  padding: 10px 0 0 22px;
  border-left: 2px solid var(--card-border);
  margin: 6px 0 0 20px;
}
.tree-group.open > .tree-group-head .tree-caret {
  transform: rotate(90deg);
}
.tree-group.open > .tree-group-body {
  display: block;
}
.tree-caret {
  transition: .15s;
  font-size: .7rem;
}
/* — ADDED: breadcrumb bar shown at the top of a folder/subfolder's own zoomed-in page — */
.zoom-crumbs {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  font-size: 1rem;
  color: var(--muted);
  margin-bottom: 14px;
  gap: 2px;
}
.zoom-crumb {
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
}
.zoom-crumb:hover {
  color: var(--accent);
  background: var(--accent-soft);
}
/* CHANGED: current-location crumb is now visibly highlighted (accent background + border),
   not just bold text, so it's obvious at a glance where in the folder tree you are. */
.zoom-crumb-current {
  color: var(--accent);
  font-weight: 800;
  cursor: default;
  background: var(--accent-soft) !important;
  border: 1.5px solid var(--accent);
  padding: 4px 10px;
}
.tree-lesson-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px 10px;
  padding: 10px 14px 10px 30px;
  font-size: .82rem;
  border-top: 1px solid var(--card-border);
}
.tree-lesson-row:first-child {
  border-top: none;
}
.lesson-name-text {
  flex: 1 1 auto;
  min-width: 80px;
}
.tree-lesson-count {
  color: var(--muted);
  font-size: .72rem;
  margin-right: auto;
  white-space: nowrap;
}
@media (max-width: 480px) {
  .tree-lesson-count {
    margin-right: 0;
    flex-basis: 100%;
  }
}
/* ADDED: rename/edit-name feature — pencil icon reveals an inline input only after click */
.rename-icon-btn {
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: .78rem;
  padding: 4px;
  border-radius: 6px;
  flex: none;
}
.rename-icon-btn:hover {
  color: var(--accent);
  background: var(--accent-soft);
}
.inline-rename-input {
  border: 1.5px solid var(--accent);
  border-radius: 6px;
  padding: 2px 6px;
  font-size: inherit;
  font-weight: inherit;
  font-family: inherit;
  background: var(--bg-elev);
  color: var(--text);
  outline: none;
  min-width: 90px;
  max-width: 100%;
}
.inline-rename-actions {
  display: inline-flex;
  gap: 2px;
  margin-left: 2px;
}
/* — ADDED: Analytics score ring (large) — */
.score-ring-lg {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: conic-gradient(var(--accent) calc(var(--pct,0)*1%), var(--track) 0);
  display: grid;
  place-items: center;
  flex: none;
}
.score-ring-lg-inner {
  width: 118px;
  height: 118px;
  border-radius: 50%;
  background: var(--card-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.score-ring-lg-inner b {
  font-size: 1.5rem;
}
.score-ring-lg-inner span {
  font-size: .68rem;
  color: var(--muted);
}
.badge-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: .78rem;
  font-weight: 600;
}
.badge-pill.b-correct {
  background: color-mix(in srgb, var(--green-status) 14%, transparent);
  color: var(--green-status);
}
.badge-pill.b-incorrect {
  background: color-mix(in srgb, var(--red-status) 14%, transparent);
  color: var(--red-status);
}
.badge-pill.b-skipped {
  background: color-mix(in srgb, var(--yellow-status) 20%, transparent);
  color: #92620a;
}
html.dark .badge-pill.b-skipped {
  color: var(--yellow-status);
}
.badge-pill.b-time {
  background: var(--track);
  color: var(--text);
}
/* — ADDED: subject accuracy ring conditional coloring — */
.ring.acc-green {
  background: conic-gradient(var(--green-status) calc(var(--pct)*3.6deg), var(--track) 0deg);
}
.ring.acc-yellow {
  background: conic-gradient(var(--yellow-status) calc(var(--pct)*3.6deg), var(--track) 0deg);
}
.ring.acc-red {
  background: conic-gradient(var(--red-status) calc(var(--pct)*3.6deg), var(--track) 0deg);
}
/* — ADDED: Achievements page — badge grid, cards, and tier styling — */
.ach-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap: 14px;
}
.ach-card {
  position: relative;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  opacity: .55;
  filter: grayscale(.55);
  transition: .2s ease;
}
.ach-card.unlocked {
  opacity: 1;
  filter: none;
  border-color: var(--tier-color, var(--accent));
  box-shadow: 0 4px 14px rgba(16,24,39,.07);
}
.ach-icon {
  font-size: 1.8rem;
  margin-bottom: 6px;
  line-height: 1;
}
.ach-tier-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: .58rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: #fff;
  padding: 2px 8px;
  border-radius: 999px;
}
.ach-title {
  font-weight: 700;
  font-size: .88rem;
  margin-bottom: 2px;
  padding-right: 50px;
}
.ach-desc {
  font-size: .74rem;
  color: var(--muted);
  margin-bottom: 6px;
  min-height: 2.1em;
}
.ach-unlocked-tag {
  font-size: .72rem;
  font-weight: 700;
  color: var(--green-status);
  margin-top: 6px;
}
/* — ADDED: Home page "Today's Goals" card — */
.goal-row-label {
  display: flex;
  justify-content: space-between;
  font-size: .8rem;
  margin-bottom: 5px;
}
/* — ADDED: 14-day activity bar chart — */
.bar14-wrap {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  height: 120px;
  padding-top: 10px;
}
.bar14-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  height: 100%;
  justify-content: flex-end;
}
.bar14-bar {
  width: 100%;
  max-width: 26px;
  border-radius: 5px 5px 2px 2px;
  background: var(--accent);
  min-height: 3px;
  transition: height .3s;
}
.bar14-label {
  font-size: .62rem;
  color: var(--muted);
  white-space: nowrap;
}
/* — ADDED: historical review tab filters — */
.review-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.review-tab-btn {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--text);
}
.review-tab-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
/* — ADDED: collapsible section toggle (Resources / Subjects / Topics) — */
.sec-toggle-btn {
  border: none;
  background: var(--track);
  color: var(--text);
  width: 24px;
  height: 24px;
  border-radius: 7px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: .7rem;
  flex: none;
  transition: .15s;
}
.sec-toggle-btn:hover {
  background: var(--accent-soft);
  color: var(--accent);
}
.sec-toggle-btn i {
  transition: transform .15s;
}
.sec-toggle-btn.collapsed i {
  transform: rotate(-90deg);
}
/* — ADDED: Flashcards page — */
.fc-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.fc-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.fc-filter-btn {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--text);
}
.fc-filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.fc-select {
  padding: 7px 12px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text);
  font-size: .8rem;
  font-weight: 600;
}
.fc-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 8px 0 28px;
}
.fc-progress {
  font-size: .8rem;
  color: var(--muted);
  font-weight: 600;
}
.fc-card-outer {
  width: 100%;
  max-width: 640px;
  min-height: 320px;
  perspective: 1400px;
  cursor: pointer;
}
.fc-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 320px;
  transition: transform .5s cubic-bezier(.4,.2,.2,1);
  transform-style: preserve-3d;
}
.fc-card-outer.flipped .fc-card-inner {
  transform: rotateY(180deg);
}
.fc-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  box-shadow: var(--shadow-md);
  padding: 26px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.fc-face-back {
  transform: rotateY(180deg) translateZ(0);
  -webkit-transform: rotateY(180deg) translateZ(0);
}
/* ADDED: scrolling now happens on this inner wrapper, not on the backface-visibility:hidden face itself — putting overflow:auto directly on a rotated/backface-hidden element makes some browsers (esp. Chrome/Safari) fail to paint its content at all */
.fc-face-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.fc-face-label {
  font-size: .68rem;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.fc-face-body {
  flex: 1;
  font-size: .98rem;
  line-height: 1.55;
  overflow-wrap: break-word;
  word-break: break-word;
}
.fc-face-hint {
  margin-top: auto;
  padding-top: 10px;
  font-size: .72rem;
  color: var(--muted);
  text-align: center;
}
.fc-answer-pill {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 8px;
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 700;
  font-size: .82rem;
  margin-bottom: 10px;
}
.fc-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}
/* ADDED: Stop & exit now sits on its own row below the card controls, left-aligned,
   instead of sharing the top progress line */
.fc-stop-row {
  display: flex;
  justify-content: flex-start;
  width: 100%;
  max-width: 640px;
  margin-top: 4px;
}
.fc-know-row {
  display: flex;
  gap: 10px;
}
.fc-empty {
  text-align: center;
  padding: 50px 0;
  color: var(--muted);
}
/* — ADDED: flashcard stats bar — */
.fc-stats-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.fc-stat {
  flex: 1;
  min-width: 78px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 10px 8px;
  text-align: center;
}
.fc-stat-num {
  display: block;
  font-size: 1.15rem;
  font-weight: 800;
  line-height: 1.2;
}
.fc-stat-label {
  display: block;
  font-size: .66rem;
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-top: 2px;
}
/* — ADDED: Anki-style 4-button rating row — */
.fc-rate-row {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
  width: 100%;
  max-width: 640px;
}
.fc-rate-btn {
  border: none;
  border-radius: 10px;
  padding: 10px 6px;
  font-weight: 700;
  font-size: .82rem;
  cursor: pointer;
  color: #fff;
  transition: .15s filter;
}
.fc-rate-btn:hover {
  filter: brightness(1.08);
}
.fc-rate-again {
  background: var(--red-status);

/* — ADDED: Flashcard launch screen (Start button + recent session history) — */
.fc-launch-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 26px 12px 10px;
}
.fc-start-btn {
  width: 148px;
  height: 148px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #7c3aed));
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;

.fc-start-btn:hover {

.fc-start-btn .fc-start-label {

  letter-spacing: .02em;
}

.fc-launch-empty {

.fc-recent-sessions {

}
.fc-recent-sessions-title {

  font-weight: 800;

.fc-session-row {
  display: flex;
  align-items: center;
  justify-content: space-between;

.fc-session-row-when {

.fc-session-row-stats {
