/* ============================================================
   ADDED: FULL BACKUP & RESTORE — bundles every IndexedDB store
   (resources, history, sessions, media) plus every localStorage key
   into one downloadable .json file, and can rebuild the whole app's
   data from that file (e.g. after clearing browser data, or to move
   to a new device). This is separate from the per-resource "Share /
   Export" feature, which only exports question content, not progress.
   ============================================================ */
const BACKUP_LS_KEYS = [
  LS_SETTINGS, LS_STREAK, LS_ACTIVE_SESSION, LS_USER_PROFILE, LS_DAILY,
  LS_RECYCLE_BIN, LS_FLASHCARD_SRS, LS_FLASHCARD_SESSIONS, LS_BOOKMARK_LISTS,
  LS_TOPIC_TRACKER
];

// ADDED: media blobs (images/audio pulled from imported .apkg decks) can't go straight into
// JSON, so each one is base64-encoded as a data URL; restoreFullBackup() decodes it back to
// a real Blob with dataUrlToBlob() below.
function blobToDataUrl(blob){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = ()=>reject(r.error || new Error('Could not read media file'));
    r.readAsDataURL(blob);
  });
}
async function dataUrlToBlob(dataUrl){
  const res = await fetch(dataUrl);
  return await res.blob();
}

async function collectFullBackup(){
  const [resources, history, sessions, mediaRecords] = await Promise.all([
    idbGetAll('resources'), idbGetAll('history'), idbGetAll('sessions'), idbGetAll('media')
  ]);
  const media = [];
  for(const m of mediaRecords){
    let dataUrl = null;
    try{ dataUrl = m.blob ? await blobToDataUrl(m.blob) : null; }
    catch(e){ console.warn('Backup: skipped one media file that could not be encoded ('+(m.filename||m.id)+')', e); }
    media.push({ id:m.id, resourceId:m.resourceId, filename:m.filename, dataUrl });
  }
  const localStorageData = {};
  BACKUP_LS_KEYS.forEach(k=>{ const raw = localStorage.getItem(k); if(raw!==null) localStorageData[k]=raw; });
  return {
    __qbankBackup: true,
    version: 1,
    exportedAt: new Date().toISOString(),
    idb: { resources, history, sessions, media },
    localStorage: localStorageData
  };
}

async function downloadFullBackup(){
  showMiniToast('Preparing backup…', 'success');
  try{
    const backup = await collectFullBackup();
    const json = JSON.stringify(backup);
    downloadTextAsFile(json, `qbank-backup-${todayStr()}.json`, 'application/json');
    showMiniToast('Backup downloaded', 'success');
  }catch(e){
    console.error('Backup export failed', e);
    showMiniToast('Could not build the backup file — check the browser console for details', 'error');
  }
}

async function restoreFullBackup(file){
  let backup;
  try{
    const text = await file.text();
    backup = JSON.parse(text);
  }catch(e){
    console.error('Backup file parse failed', e);
    showMiniToast(`"${file.name}" isn't readable — make sure it's an unmodified QBank backup .json file`, 'error');
    return;
  }
  if(!backup || !backup.__qbankBackup || !backup.idb){
    showMiniToast(`"${file.name}" doesn't look like a QBank backup file`, 'error');
    return;
  }
  if(!confirm('Restore this backup? This REPLACES all resources, questions, history, sessions, flashcard progress, and settings currently on this device. This cannot be undone.')) return;

  showMiniToast('Restoring backup…', 'success');
  try{
    await idbClearStore('resources');
    await idbClearStore('history');
    await idbClearStore('sessions');
    await idbClearStore('media');

    const idb = backup.idb || {};
    for(const r of (idb.resources||[])) await idbPut('resources', r);
    for(const h of (idb.history||[])) await idbPut('history', h);
    for(const s of (idb.sessions||[])) await idbPut('sessions', s);
    let mediaSkipped = 0;
    for(const m of (idb.media||[])){
      let blob = null;
      if(m.dataUrl){
        try{ blob = await dataUrlToBlob(m.dataUrl); }
        catch(e){ mediaSkipped++; console.warn('Restore: skipped one media file that could not be decoded ('+(m.filename||m.id)+')', e); }
      }
      await idbPut('media', { id:m.id, resourceId:m.resourceId, filename:m.filename, blob });
    }

    const ls = backup.localStorage || {};
    let lsSkipped = 0;
    Object.keys(ls).forEach(k=>{
      try{ localStorage.setItem(k, ls[k]); }
      catch(e){ lsSkipped++; console.warn('Restore: could not write localStorage key', k, e); }
    });

    const noteBits = [];
    if(mediaSkipped) noteBits.push(`${mediaSkipped} media file${mediaSkipped===1?'':'s'} skipped`);
    if(lsSkipped) noteBits.push(`${lsSkipped} setting${lsSkipped===1?'':'s'} skipped`);
    showMiniToast(`Backup restored${noteBits.length ? ' ('+noteBits.join(', ')+')' : ''} — reloading…`, noteBits.length ? 'error' : 'success');
    setTimeout(()=>{ location.reload(); }, 900);
  }catch(e){
    console.error('Backup restore failed', e);
    showMiniToast('Something went wrong restoring the backup — your previous data may be partially cleared. Check the browser console for details.', 'error');
  }
}

// ADDED: friendly display names for each pet emoji, used in the pet-settings sub-modal
const CRITTER_LABELS = {
  cat: 'Cat', dog: 'Dog', mouse: 'Mouse', rabbit: 'Rabbit', fox: 'Fox', bear: 'Bear',
  panda: 'Panda', koala: 'Koala', tiger: 'Tiger', lion: 'Lion', penguin: 'Penguin', owl: 'Owl',
  hedgehog: 'Hedgehog', chick: 'Chick', frog: 'Frog', hamster: 'Hamster', unicorn: 'Unicorn', dragon: 'Dragon'
};
// Every pet kind id currently in play — built-in animal names plus each imported pet's id.
function allPetKindIds(){
  return Object.keys(CRITTER_EMOJIS).concat((APP.settings.customPetImages || []).map(p => p.id));
}
// Is this specific pet kind allowed to appear? `kind` is either a built-in animal name
// (toggle stored in petKinds) or an imported pet's own id (toggle stored on the item
// itself in customPetImages, since that's user data rather than a fixed built-in list).
// Missing entry (never toggled) = enabled by default.
function petKindEnabled(kind){
  if(CRITTER_EMOJIS[kind]) return !(APP.settings.petKinds && APP.settings.petKinds[kind] === false);
  const item = (APP.settings.customPetImages || []).find(p => p.id === kind);
  return item ? item.enabled !== false : false;
}
// ADDED: one tap-to-choose tile for a built-in animal, sitting in the single "Default
// pets" grid box — tap anywhere on the tile toggles it on/off (multiple can be on).
function renderPetKindTile(kind){
  const on = petKindEnabled(kind);
  const label = CRITTER_LABELS[kind] || kind;
  return `
    <button type="button" class="kind-tile ${on ? 'on' : ''}" data-kind="${kind}" aria-pressed="${on}" aria-label="${label}">
      <span class="kind-tile-icon">${CRITTER_EMOJIS[kind]}</span>
      <span class="kind-tile-label">${label}</span>
      ${on ? '<span class="kind-tile-check"><i class="fa-solid fa-check"></i></span>' : ''}
    </button>`;
}
// ADDED: same tap-to-choose tile, but for one imported pet image — sits in its own
// independent "Imported pets" grid box, with a small delete "x" overlay (only imported
// pets get this, since built-ins can't be removed). Its own size slider is rendered
// separately below the grid, since that's a fine-tune control rather than a pick.
function renderCustomPetTile(item){
  const on = item.enabled !== false;
  return `
    <div class="kind-tile-wrap">
      <button type="button" class="kind-tile ${on ? 'on' : ''}" data-kind="${item.id}" aria-pressed="${on}" aria-label="Imported pet">
        <span class="kind-tile-icon"><img src="${item.dataUrl}" alt="" draggable="false"></span>
        <span class="kind-tile-label">Imported</span>
        ${on ? '<span class="kind-tile-check"><i class="fa-solid fa-check"></i></span>' : ''}
      </button>
      <button type="button" class="kind-tile-delete" data-delete-pet="${item.id}" aria-label="Delete imported pet" title="Delete"><i class="fa-solid fa-xmark"></i></button>
    </div>`;
}
// ADDED: the per-item size slider row for one imported pet (rendered below the
// "Imported pets" grid, one per item, since sizing is a fine-tune control not a pick).
function renderCustomPetSizeRow(item){
  const scale = item.sizeScale || 1;
  return `
    <div class="custom-item-size-row">
      <span class="custom-item-size-preview" data-item-size-preview="${item.id}" style="font-size:calc(1.3rem * ${scale});"><img src="${item.dataUrl}" alt="" draggable="false"></span>
      <input type="range" data-item-size-slider="${item.id}" min="0.5" max="2" step="0.05" value="${scale}" aria-label="Size of this imported pet">
      <span class="size-slider-value" data-item-size-value="${item.id}">${Math.round(scale * 100)}%</span>
      <button class="btn btn-ghost btn-sm size-slider-reset" data-item-size-reset="${item.id}" title="Reset this pet's size to 100%" aria-label="Reset this pet's size"><i class="fa-solid fa-arrow-rotate-left"></i></button>
    </div>`;
}
// ADDED: detail screen for the pet feature — a master on/off plus several finer-grained
// controls (quiz cheering, speech bubbles, free roaming, and which individual animals
// are allowed to appear), reached by tapping the "Running pet" row in Settings.
// ADDED: picks what to show inside the live size-preview stage in the pet settings
// modal — the first currently-enabled built-in animal, or the first enabled imported
// image if every built-in animal is turned off. Deterministic (not random) so the
// preview doesn't jump around every time the modal re-renders.
function petPreviewInnerHTML(){
  const kinds = Object.keys(CRITTER_EMOJIS).filter(petKindEnabled);
  if(kinds.length) return CRITTER_EMOJIS[kinds[0]];
  const customImages = ((APP.settings && APP.settings.customPetImages) || []).filter(img => petKindEnabled(img.id));
  if(customImages.length) return `<img src="${customImages[0].dataUrl}" alt="Your pet" draggable="false">`;
  return CRITTER_EMOJIS[Object.keys(CRITTER_EMOJIS)[0]]; // nothing enabled — fall back so the preview isn't blank
}
// ADDED: same idea for the companion settings modal's size preview.
function companionPreviewInnerHTML(){
  const builtInIds = companionBuiltInAvatarIds();
  const enabledBuiltIn = builtInIds.filter(companionAvatarEnabled);
  if(enabledBuiltIn.length) return companionBuiltInAvatarHtml(enabledBuiltIn[0]);
  const customImages = ((APP.settings && APP.settings.customCompanionImages) || []).filter(img => img.enabled !== false);
  if(customImages.length) return `<img src="${customImages[0].dataUrl}" alt="Your companion" draggable="false">`;
  return companionBuiltInAvatarHtml(builtInIds[0]); // nothing enabled — fall back so the preview isn't blank
}

        check.remove();
      }
    };
  });
}

  document.getElementById('companion-settings-close').onclick = closeModal;

  // ADDED: wire up the "Avatar style" switcher — re-renders the whole modal so the Avatar

  document.getElementById('companion-style-emoji').onclick = ()=>{

  document.getElementById('companion-style-realistic').onclick = ()=>{

    renderHomeCompanionCard();
    openCompanionSettingsModal();
  };

  // ADDED: wire up the "Companion size" slider — dragging it updates the shared
  // --companion-size-scale CSS variable immediately, which resizes BOTH this preview
  // (avatar + sample speech text, via the .size-preview-avatar/.size-preview-bubble-companion
  // CSS above) AND every real on-screen companion (toasts, mini-toasts, the Home card)
  // the moment it next appears, since they all read the same variable. The value is
  // only written to settings (and so persisted) as it changes, same as every other
  // control on this screen.
  document.getElementById('companion-size-slider').oninput = (e)=>{
    const val = parseFloat(e.target.value);
    document.documentElement.style.setProperty('--companion-size-scale', val);
    document.getElementById('companion-size-slider-value').textContent = Math.round(val * 100) + '%';
    APP.settings.companionSizeScale = val;

    document.documentElement.style.setProperty('--companion-size-scale', 1);

    document.getElementById('companion-size-slider-value').textContent = '100%';

    lsSet(LS_SETTINGS, APP.settings);

  // ADDED: wire up each imported avatar's OWN size slider + reset button (rendered by
  // renderCustomCompanionSizeRow below the grid) — same live-CSS-var trick as

  // that preview isn't wired to a CSS variable (it's one of several imports, not "the"
  // companion).
  document.querySelectorAll('[data-item-size-slider]').forEach(slider=>{
    slider.oninput = (e)=>{
      const id = slider.dataset.itemSizeSlider;

      if(!item) return;
      item.sizeScale = 1;
      lsSet(LS_SETTINGS, APP.settings);
      const sliderEl = document.querySelector(`[data-item-size-slider="${id}"]`);
      if(sliderEl) sliderEl.value = 1;
      const valueEl = document.querySelector(`[data-item-size-value="${id}"]`);
      if(valueEl) valueEl.textContent = '100%';
      const previewEl = document.querySelector(`[data-item-size-preview="${id}"]`);

  // ADDED: wire up "learn new lines from the internet"

    const btn = document.getElementById('companion-learn-btn');

    const origLabel = btn.textContent;
    btn.textContent = 'Learning…';
    try{
      // Yesterday's (or older) learned batch has expired — start this tap from a clean slate
      // so today's fresh lines replace it rather than mixing with stale ones.
      if(APP.settings.learnedCompanionLinesDate !== todayStr()) APP.settings.learnedCompanionLines = [];
      const known = new Set(
        COMPANION_LINES.concat(APP.settings.learnedCompanionLines || [])
          .map(m => m.toLowerCase())
      );
      const fresh = await fetchLearnedMessages(MESSAGE_LEARN_COUNT, known);
      if(!fresh.length){
        showMiniToast('No new lines found this time — try again in a bit', 'error');
        btn.disabled = false;
        btn.textContent = origLabel;
        return;
      }
      APP.settings.learnedCompanionLines = (APP.settings.learnedCompanionLines || []).concat(fresh).slice(-MESSAGE_LEARN_MAX_STORED);
      APP.settings.learnedCompanionLinesDate = todayStr();
      lsSet(LS_SETTINGS, APP.settings);
      showMiniToast(`Learned ${fresh.length} new line${fresh.length===1?'':'s'}!`, 'success');
      openCompanionSettingsModal(); // re-render so the "learned so far" count updates
    }catch(err){
      showMiniToast('Could not reach the internet to learn new lines', 'error');
      btn.disabled = false;
      btn.textContent = origLabel;
    }
  };
  const companionLearnClearBtn = document.getElementById('companion-learn-clear');
  if(companionLearnClearBtn){

      APP.settings.learnedCompanionLines = [];

      lsSet(LS_SETTINGS, APP.settings);
      showMiniToast('Learned lines cleared', 'success');
      openCompanionSettingsModal();
    };

  // ADDED: wire up the "import my own companion(s)" upload control — accepts multiple

  document.getElementById('companion-custom-choose').onclick = ()=> document.getElementById('companion-custom-input').click();
  document.getElementById('companion-custom-input').onchange = (e)=>{
    const files = Array.from(e.target.files || []);
    e.target.value = ''; // allow re-choosing the same file(s) later
    if(!files.length) return;
    if(!APP.settings.customCompanionImages) APP.settings.customCompanionImages = [];
    let imported = 0, remaining = files.length, hitLimit = false;
    const finish = ()=>{
      if(imported){
        lsSet(LS_SETTINGS, APP.settings);
        showMiniToast(`${imported} avatar${imported===1?'':'s'} imported`, 'success');
        renderHomeCompanionCard();
      }
      if(hitLimit) showMiniToast(`Import limit reached (max ${MAX_CUSTOM_IMAGES})`, 'error');
      openCompanionSettingsModal(); // re-render so the new entries/toggles appear
    };
    files.forEach(file=>{
      if(APP.settings.customCompanionImages.length >= MAX_CUSTOM_IMAGES){
        hitLimit = true;
        if(--remaining === 0) finish();
        return;
      }
      importCustomImageFile(file, (dataUrl)=>{
        APP.settings.customCompanionImages.push({id: genCustomImageId(), dataUrl, enabled: true, sizeScale: 1});
        imported++;
        if(--remaining === 0) finish();
      }, ()=>{ if(--remaining === 0) finish(); });
    });
  };
  document.querySelectorAll('#companion-avatar-grid-imported [data-delete-companion]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      const id = btn.dataset.deleteCompanion;
      APP.settings.customCompanionImages = (APP.settings.customCompanionImages || []).filter(i => i.id !== id);
      lsSet(LS_SETTINGS, APP.settings);
      showMiniToast('Imported avatar removed', 'success');
      renderHomeCompanionCard();
      openCompanionSettingsModal();
    };
  });
  // ADDED: shared "keep at least one avatar source on" guard — checks every built-in
  // avatar tile plus every imported avatar, since selection is now per-avatar rather
  // than per-gender-group.
  const anyOtherCompanionAvatarOn = (excludeId)=>{
    const builtInOn = companionBuiltInAvatarIds().some(id => id !== excludeId && companionAvatarEnabled(id));
    const customOn = (APP.settings.customCompanionImages || []).some(i => i.id !== excludeId && i.enabled !== false);
    return builtInOn || customOn;
  };

    if(next && !check){
      const span = document.createElement('span');
      span.className = 'kind-tile-check';
      span.innerHTML = '<i class="fa-solid fa-check"></i>';
      btn.appendChild(span);
    } else if(!next && check){
      check.remove();
    }
  };
  document.querySelectorAll('#companion-avatar-grid-default [data-companion-avatar]').forEach(btn=>{

      const next = !companionAvatarEnabled(emoji);
      if(!next && !anyOtherCompanionAvatarOn(emoji)){
        showMiniToast('Keep at least one avatar on', 'error');
        return;
      }
      if(!APP.settings.companionAvatars) APP.settings.companionAvatars = {};
      APP.settings.companionAvatars[emoji] = next;
      lsSet(LS_SETTINGS, APP.settings);
      toggleTileVisual(btn, next);

  });
  document.querySelectorAll('#companion-avatar-grid-imported [data-companion-id]').forEach(btn=>{
    btn.onclick = ()=>{

      const item = (APP.settings.customCompanionImages || []).find(i => i.id === id);
      if(!item) return;
      const next = !(item.enabled !== false);
      if(!next && !anyOtherCompanionAvatarOn(id)){
        showMiniToast('Keep at least one avatar on', 'error');
        return;

      item.enabled = next;
      lsSet(LS_SETTINGS, APP.settings);
      toggleTileVisual(btn, next);

  document.getElementById('companion-avatar-select-all-default').onclick = ()=>{
    const ids = companionBuiltInAvatarIds();
    const next = !ids.every(companionAvatarEnabled);

      const customOn = (APP.settings.customCompanionImages || []).some(i => i.enabled !== false);
      if(!customOn){
        showMiniToast('Keep at least one avatar on', 'error');
        return;
      }
    }
    if(!APP.settings.companionAvatars) APP.settings.companionAvatars = {};
    ids.forEach(id=>{ APP.settings.companionAvatars[id] = next; });
    lsSet(LS_SETTINGS, APP.settings);
    showMiniToast(next ? 'All default avatars selected' : 'All default avatars deselected', 'success');
    openCompanionSettingsModal();
  };
  const companionImportedSelectAllBtn = document.getElementById('companion-avatar-select-all-imported');
  if(companionImportedSelectAllBtn){
    companionImportedSelectAllBtn.onclick = ()=>{
      const ids = (APP.settings.customCompanionImages || []).map(c => c.id);
      const next = !ids.every(companionAvatarEnabled);
      if(!next){
        const builtInOn = companionBuiltInAvatarIds().some(companionAvatarEnabled);
        if(!builtInOn){
          showMiniToast('Keep at least one avatar on', 'error');
          return;
        }
      }
      (APP.settings.customCompanionImages || []).forEach(item=>{ item.enabled = next; });
      lsSet(LS_SETTINGS, APP.settings);
      showMiniToast(next ? 'All imported avatars selected' : 'All imported avatars deselected', 'success');
      renderHomeCompanionCard();
      openCompanionSettingsModal();
    };
  }

  const wireToggle = (id, key, onChange)=>{
    const btn = document.getElementById(id);
    if(!btn) return;
    btn.onclick = ()=>{
      const next = !(APP.settings[key] !== false);
      APP.settings[key] = next;
      lsSet(LS_SETTINGS, APP.settings);
      btn.classList.toggle('on', next);
      btn.setAttribute('aria-checked', String(next));
      if(onChange) onChange(next);
    };
  };
  wireToggle('companion-toggle-master', 'companionEnabled', ()=>renderHomeCompanionCard());
  wireToggle('companion-toggle-toasts', 'companionOnToasts');
  wireToggle('companion-toggle-home', 'companionOnHome', ()=>renderHomeCompanionCard());
  wireToggle('companion-toggle-popups', 'companionOnPopups');
  wireToggle('companion-toggle-reactions', 'companionReactionsEnabled', ()=>{
    const btn = document.getElementById('companion-toggle-reactions');
    if(btn && btn.classList.contains('on')) spawnCompanionReaction('party', btn); // little live preview when turning it on
  });
  
  // ADDED: wire up companion name input
  const companionNameInput = document.getElementById('companion-name-setting-input');
  if(companionNameInput){
    companionNameInput.oninput = ()=>{
      const newName = companionNameInput.value.trim() || 'Dr.Mini';
      APP.settings.companionName = newName;
      lsSet(LS_SETTINGS, APP.settings);
      renderHomeCompanionCard();
    };
  }
}

/* ADDED: closes both mobile drawers (nav on the left, actions on the right); no-op on desktop */
function closeMobileNav(){
  const nav = document.getElementById('main-tabs');
  const actions = document.getElementById('action-drawer');
  const backdrop = document.getElementById('mobile-nav-backdrop');
  if(nav) nav.classList.remove('open');
  if(actions) actions.classList.remove('open');
  if(backdrop) backdrop.classList.remove('show');
  // ADDED: also collapse the "More" nav dropdown (Topics/Achievements) so it doesn't
  // stay expanded the next time the mobile drawer is opened
  const moreDropdown = document.getElementById('navtab-more-dropdown');
  const moreBtn = document.getElementById('navtab-more');
  if(moreDropdown) moreDropdown.classList.remove('open');
  if(moreBtn){ moreBtn.classList.remove('active'); moreBtn.setAttribute('aria-expanded','false'); }
}

// ADDED: main nav "More" dropdown — click to toggle, click a menu item or click outside
// to close. This is the button that holds the Topics and Achievements tabs.
(function setupMoreNavDropdown(){
  const moreBtn = document.getElementById('navtab-more');
  const dropdown = document.getElementById('navtab-more-dropdown');
  if(!moreBtn || !dropdown) return;
  const setOpen = (open)=>{
    dropdown.classList.toggle('open', open);
    moreBtn.classList.toggle('active', open);
    moreBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
  };
  moreBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    setOpen(!dropdown.classList.contains('open'));
  });
  // ADDED: picking Topics or Achievements from the dropdown closes it again (the
  // #main-tabs delegated click handler still runs setTab() for these, since they
  // keep their data-tab attribute and .navtab class)
  dropdown.addEventListener('click', (e)=>{
    if(e.target.closest('button')) setOpen(false);
  });
  document.addEventListener('click', (e)=>{
    if(!dropdown.classList.contains('open')) return;
    if(!dropdown.contains(e.target) && e.target!==moreBtn && !moreBtn.contains(e.target)){
      setOpen(false);
    }
  });
  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape' && dropdown.classList.contains('open')) setOpen(false);
  });
})();

// ADDED: desktop top-right "More" dropdown — click to toggle, click a menu item or click
// outside to close. This is the button that holds search/import/recycle-bin/share/theme.
(function setupMoreActionsDropdown(){
  const moreBtn = document.getElementById('btn-more-actions');

  const setOpen = (open)=>{

  };
  moreBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    setOpen(!dropdown.classList.contains('open'));
  });
  dropdown.addEventListener('click', (e)=>{
    if(e.target.closest('button')) setOpen(false);
  });
  document.addEventListener('click', (e)=>{

    if(!dropdown.contains(e.target) && e.target!==moreBtn && !moreBtn.contains(e.target)){
      setOpen(false);

// ADDED: the only tab names setTab() is ever actually called with (matches the .navtab buttons in
// the nav bar) — used to validate a saved tab name before restoring it on boot, so a corrupted or
// stale localStorage value can never point at something setTab() doesn't know how to show.
const VALID_MAIN_TABS = ['home','resources','practice','analytics','achievements','bookmarks','flashcards','flashcarddecks','topics'];

function setTab(tab){
  if(APP.currentTab==='practice' && tab!=='practice' && APP.activeSession && !APP.activeSession.submitted){
    stopQuizTimer();
    lsSet(LS_ACTIVE_SESSION, APP.activeSession);
    saveIncompleteSession(APP.activeSession); // ADDED: keeps it available in the Practice tab's "Continue a test" list
  }
  APP.currentTab = tab;
  // ADDED: remember the tab so refreshing/reopening the app returns here instead of always
  // resetting to Home — see boot() below, which reads this back. Only real nav tabs ever reach
  // this function (see VALID_MAIN_TABS above), so it's always safe to restore later.
  if(VALID_MAIN_TABS.includes(tab)) lsSet(LS_CURRENT_TAB, tab);
  document.querySelectorAll('.navtab').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('view-home').classList.toggle('hidden', tab!=='home');
  document.getElementById('view-resources').classList.toggle('hidden', tab!=='resources'); // ADDED: Resources tab
  document.getElementById('view-practice').classList.toggle('hidden', tab!=='practice');
  document.getElementById('view-analytics').classList.toggle('hidden', tab!=='analytics');
  document.getElementById('view-achievements').classList.toggle('hidden', tab!=='achievements'); // ADDED: Achievements tab
  document.getElementById('view-bookmarks').classList.toggle('hidden', tab!=='bookmarks'); // ADDED: Bookmarks tab
  document.getElementById('view-flashcards').classList.toggle('hidden', tab!=='flashcards'); // ADDED: Flashcards tab
  document.getElementById('view-flashcarddecks').classList.toggle('hidden', tab!=='flashcarddecks'); // ADDED: Flashcard Decks tab
  document.getElementById('view-topics').classList.toggle('hidden', tab!=='topics'); // ADDED: Topic Tracker tab
  document.getElementById('view-resource').classList.add('hidden'); // ADDED: leaving resource-detail via nav
  document.getElementById('view-flashcarddeck').classList.add('hidden'); // ADDED: leaving flashcard-deck-detail via nav
  document.getElementById('view-review').classList.add('hidden'); // ADDED: leaving the session-review page via nav
  document.getElementById('view-quizreview').classList.add('hidden'); // ADDED: leaving the one-by-one quiz-style review page via nav
  if(tab==='home') renderHome();
  if(tab==='resources') renderResourcesList(); // ADDED
  if(tab==='practice') renderPractice();
  if(tab==='analytics') renderAnalytics();
  if(tab==='achievements') renderAchievementsPage(); // ADDED
  if(tab==='bookmarks') renderBookmarksPage(); // ADDED
  if(tab==='flashcards') renderFlashcardsPage(); // ADDED
  if(tab==='flashcarddecks') renderFlashcardDecksPage(); // ADDED
  if(tab==='topics') renderTopicsPage(); // ADDED
  window.scrollTo({top:0});
}

const THEME_ORDER = ['light','dark','sepia','midnight'];
const THEME_ICONS = {light:'fa-sun',dark:'fa-moon',sepia:'fa-book',midnight:'fa-star'};
// ADDED: human-friendly names shown in the button label, and used in applyTheme() below
const THEME_LABELS = {light:'Light',dark:'Dark',sepia:'Sepia',midnight:'Midnight'};
function applyTheme(){
  const t = THEME_ORDER.includes(APP.settings.theme) ? APP.settings.theme : 'light';
  document.documentElement.classList.remove('dark','sepia','midnight');
  if(t!=='light') document.documentElement.classList.add(t);
  const btn = document.getElementById('btn-theme');
  // FIXED: this used to do `btn.innerHTML = '<i class="fa-solid ...">'`, which replaced the
  // ENTIRE button content — silently deleting the "Toggle theme" <span> label the very first
  // time the theme changed, leaving an icon-only row with no text in a menu built for icon+label
  // rows. Now the icon class and label text are updated in place, and the label shows the
  // current theme name (e.g. "Theme: Dark") so it also doubles as a status indicator.
  if(btn){
    const icon = btn.querySelector('i');
    const label = btn.querySelector('span');
    if(icon) icon.className = `fa-solid ${THEME_ICONS[t]}`;
    if(label) label.textContent = `Theme: ${THEME_LABELS[t]}`;
    btn.title = `Toggle theme (currently ${THEME_LABELS[t]})`;
  }
}

async function boot(){
  // ADDED: footer credit text — the "v1.0" part is the app version, kept in sync with
  // APP_VERSION automatically so it never needs a manual edit here when you bump a release.
  // creditFooterText() is the single source of truth for what the footer should say; both the
  // line that writes it and the check below that reads it back use this same function.
  function creditFooterText(){
    return `created by @Dr.Vicky · ${APP_VERSION.replace(/^V/i, 'v')}`;
  }
  const footerEl0 = document.getElementById('app-credit-footer');
  if(footerEl0) footerEl0.textContent = creditFooterText();

  // ADDED: license/credit footer check — flags if the footer credit was tampered with, but
  // NEVER blocks app usage. It used to replace the entire <body> with a full-screen error when
  // the check failed, which meant any harmless mismatch (a publish/minify pass reflowing
  // whitespace, a hosting platform serving a stripped/placeholder page while "unpublished", a
  // stale cache, etc.) could lock the whole app out — and since the live network copy and the
  // offline-cached copy can differ, that made the block appear/disappear depending on
  // connectivity instead of ever being reliably fixed. Now it only shows a small, dismissible
  // notice and the app keeps working either way.
  (function checkCreditFooter(){
    const normalize = (s)=> s.normalize('NFC').replace(/\s+/g,' ').trim();
    const expected = normalize(creditFooterText());
    const footerEl = document.getElementById('app-credit-footer');
    const actual = footerEl ? normalize(footerEl.textContent) : '';
    window.__QBANK_LICENSE_OK__ = (actual === expected);
  })();
  if(!window.__QBANK_LICENSE_OK__){
    const notice = document.createElement('div');
    notice.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#0f172a;color:#f1f5f9;font-size:.78rem;padding:8px 14px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;text-align:center;';
    notice.innerHTML = `<span>⚠️ Footer credit looks different than expected — the app still works normally.</span>
      <button id="credit-notice-dismiss" style="background:transparent;color:#f1f5f9;border:1px solid #f1f5f9;border-radius:6px;padding:3px 9px;cursor:pointer;font-size:.78rem;">Dismiss</button>`;
    document.body.appendChild(notice);
    const dismissBtn = document.getElementById('credit-notice-dismiss');
    if(dismissBtn) dismissBtn.onclick = ()=>notice.remove();
  }
  // ADDED: settings integrity check — repairs corrupted toggles/learned pools
  // back to safe defaults on every launch. Built-in default messages are
  // consts and are never touched by this (or anything else); see
  // sanitizeSettings() above for exactly what it checks and why.
  APP.settings = sanitizeSettings(APP.settings);
  lsSet(LS_SETTINGS, APP.settings);
  try{
    await bootstrapSeedIfNeeded();
    await loadAllFromDB();
  }catch(e){
    console.error('Boot data load failed', e);
    // ADDED: a failure here used to be silent (console-only), so the app could come up looking
    // empty/reset with no clue why. Show a persistent, dismissible banner instead so the person
    // knows their data may not have loaded and shouldn't assume it's actually gone.
    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:var(--red-status);color:#fff;font-size:.82rem;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;text-align:center;';
    banner.innerHTML = `<span>⚠️ Couldn't load your saved data — it may be a private/incognito window, low storage, or a locked database in another tab. Your data is likely still on this device.</span>
      <button id="boot-error-retry" style="background:#fff;color:var(--red-status);border:none;border-radius:6px;padding:4px 10px;font-weight:700;cursor:pointer;">Retry</button>
      <button id="boot-error-dismiss" style="background:transparent;color:#fff;border:1px solid #fff;border-radius:6px;padding:4px 10px;cursor:pointer;">Dismiss</button>`;
    document.body.appendChild(banner);
    document.getElementById('boot-error-retry').onclick = ()=>location.reload();
    document.getElementById('boot-error-dismiss').onclick = ()=>banner.remove();
  }
  invalidateFlatMap();
  applyTheme();
  applyFontScale();
  applyPetCompanionScale();
  // FIXED: checkAchievements() runs a batch of user-supplied progress() functions — wrapped so a
  // single bad one (e.g. a corrupted history entry causing a runtime error inside one achievement's
  // math) can no longer abort the rest of boot().
  try{ checkAchievements(true); }catch(e){ console.error('checkAchievements failed at boot', e); } // ADDED: silently catch up on any achievement a returning user already qualifies for — no celebration burst on load, only genuinely new unlocks from here on celebrate

  // ADDED: kick off automatic background learning (see autoLearnMessagesIfNeeded() above) —
  // fire-and-forget so a slow/offline network never delays the app finishing boot; it silently
  // fills in the pet/companion phrase pools whenever it succeeds.
  autoLearnMessagesIfNeeded();

  // FIXED: restoring/rendering the last-viewed tab used to happen at the very end of boot(),
  // after a long chain of nav-button wiring, mobile-layout setup, and profile-prompt logic below.
  // If ANY single step in that chain threw (a missing element on some device/orientation, a
  // corrupted saved value, a race with the DOM, etc.), everything after it — including this
  // render — was silently skipped, since one uncaught error stops the rest of an async function.
  // The visible symptom was exactly "refresh takes a long time / sometimes gets stuck": the page
  // shell (nav bar) would show, but the tab content never rendered and nothing responded, because
  // boot() had quietly died partway through. Rendering the current tab is the one thing that must
  // always happen, so it now runs first and no longer depends on anything below succeeding. Every
  // remaining step (nav click wiring, mobile drawer, profile prompt, Study Mode) is secondary UI
  // wiring and is now wrapped in its own try/catch below so a failure there is logged and skipped
  // instead of ever being able to block the app from being usable again.
  const savedTab = lsGet(LS_CURRENT_TAB, 'home');
  setTab(VALID_MAIN_TABS.includes(savedTab) ? savedTab : 'home');

  try{

  document.getElementById('main-tabs').addEventListener('click', e=>{
    const b = e.target.closest('.navtab'); if(!b) return;
    if(!b.dataset.tab) return; // ADDED: the Study Mode drawer button has its own handler below, not a real tab
    setTab(b.dataset.tab);
    closeMobileNav(); // ADDED: tapping a link closes the nav drawer on mobile
  });
  // ADDED: Study Mode drawer entry (mobile/iPad only, above Home — see .studymode-drawer-tab)
  const studyDrawerBtn = document.getElementById('navtab-study-mode');
  if(studyDrawerBtn) studyDrawerBtn.onclick = ()=>{ closeMobileNav(); openStudyModeModal(); };
  // ADDED: tapping/clicking the "QBank Center" brand area in the top-left always returns to Home
  const brandHomeBtn = document.getElementById('btn-brand-home');
  brandHomeBtn.onclick = ()=>{
    setTab('home');
    closeMobileNav();
  };
  brandHomeBtn.onkeydown = (e)=>{
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      brandHomeBtn.click();
    }
  };
  // ADDED: mobile hamburger menu — opens/closes the LEFT nav drawer only
  document.getElementById('btn-mobile-menu').onclick = ()=>{
    const opening = !document.getElementById('main-tabs').classList.contains('open');
    closeMobileNav();
    if(opening){
      document.getElementById('main-tabs').classList.add('open');
      document.getElementById('mobile-nav-backdrop').classList.add('show');
    }
  };
  document.getElementById('mobile-nav-backdrop').onclick = closeMobileNav;
  document.getElementById('btn-settings').onclick = openSettingsModal;
  document.getElementById('btn-theme').onclick = ()=>{
    const idx = THEME_ORDER.indexOf(APP.settings.theme);
    APP.settings.theme = THEME_ORDER[(idx+1) % THEME_ORDER.length];
    lsSet(LS_SETTINGS, APP.settings);
    applyTheme();
  };

  // ADDED: wire new nav buttons
  document.getElementById('btn-search').onclick = openSearchModal;
  document.getElementById('btn-recycle-bin').onclick = renderRecycleBinModal;
  updateRecycleBinBadge();
  document.getElementById('btn-import').onclick = ()=>{
    setTab('home');
    setTimeout(()=>document.getElementById('global-file-input').click(), 50);
  };
  document.getElementById('global-file-input').onchange = e=>{
    if(e.target.files && e.target.files.length){
      handleFiles(e.target.files);
      e.target.value = '';
    }
  };
  // ADDED: second import button — same pipeline as "Import resource", just a dedicated
  // entry point for QBank-style APP_DATA exports (see tryParseAppDataFormat()).
  document.getElementById('btn-import2').onclick = ()=>{
    setTab('home');
    setTimeout(()=>document.getElementById('global-file-input-2').click(), 50);
  };
  document.getElementById('global-file-input-2').onchange = e=>{
    if(e.target.files && e.target.files.length){
      handleFiles(e.target.files);
      e.target.value = '';
    }
  };
  // ADDED: profile pill is a static display badge (in both desktop and mobile) —
  // editing the name is only reachable via Settings, never by tapping the pill.

  // FIXED: the hamburger nav drawer (#main-tabs) used to live nested inside .appnav, which has
  // backdrop-filter:blur() on it. backdrop-filter creates a new stacking context, so the drawer's
  // z-index:200 was only ever being compared *within* .appnav's own context — and .appnav itself
  // only has z-index:40, well below the .mobile-nav-backdrop dimmer (z-index:190). Net effect: the
  // dark backdrop rendered ON TOP of the open drawer, making it look washed-out/faded and hard to
  // read. Moving the drawer out to be a direct child of <body> (same place the icon drawer already
  // lives) escapes that trapped stacking context, so it now renders crisp above the backdrop.
  function setupMobileNavTabs(isMobile){
    const nav = document.getElementById('main-tabs');
    const anchor = document.getElementById('nav-tabs-anchor');
    if(!nav || !anchor) return;
    if(isMobile){
      if(nav.parentElement === document.body) return; // already moved
      document.body.appendChild(nav);
    } else {
      if(nav.parentElement !== document.body) return; // already in place
      anchor.insertAdjacentElement('afterend', nav);
    }
  }

  // REMOVED: the mobile-only full-screen action drawer (setupActionDrawer) — the "More" dropdown
  // + Settings button in the top nav are now used on every device instead.


  function setupMobileLayout(isMobile){
    setupMobileNavTabs(isMobile);
    // CHANGED: setupActionDrawer() is no longer called — the "More" dropdown + Settings button
    // now stay in place on every screen size instead of the icons swapping into a full-screen
    // drawer on mobile.
  }

  // FIXED: this query used to be just '(max-width:640px)', which only ever matched phones.
  // The hamburger button is ALSO shown on iPad/tablet-sized viewports via the width-based CSS
  // rule at '(min-width:641px) and (max-width:1024px)' (see the iPad top-bar fix above), but
  // setupMobileLayout()/setupMobileNavTabs() never ran for that case — so on iPad the nav
  // drawer was never moved out of .appnav's backdrop-filter stacking context, and tapping the
  // hamburger icon opened a drawer that rendered behind the dark backdrop (washed-out/unreadable/
  // hard to tap), same as the bug already fixed for phones. Matching both queries here (OR'd via
  // comma) keeps iPad in sync with the phone behavior.
  const mobileLayoutMQ = window.matchMedia('(max-width:1024px)');
  setupMobileLayout(mobileLayoutMQ.matches);
  const mobileLayoutMQHandler = (e)=> setupMobileLayout(e.matches);
  if(mobileLayoutMQ.addEventListener) mobileLayoutMQ.addEventListener('change', mobileLayoutMQHandler);
  else if(mobileLayoutMQ.addListener) mobileLayoutMQ.addListener(mobileLayoutMQHandler); // older iOS Safari fallback



  // ADDED: apply user profile to nav
  applyUserProfile();

  // FIXED: this used to auto-open on every single app launch as long as no name was set —
  // so a person who dismissed it (or just hit Cancel) without entering a name got nagged with
  // the same popup again and again, forever, every time they reopened the app. It should only
  // ever introduce itself once. profileSetupPromptShown is stamped true the moment it's shown
  // here (not only on save), so declining to give a name is remembered just like giving one is —
  // the name can always be set later from Settings > Profile if they change their mind.
  if((!APP.userProfile || !APP.userProfile.name) && !APP.settings.profileSetupPromptShown){
    APP.settings.profileSetupPromptShown = true;
    lsSet(LS_SETTINGS, APP.settings);
    setTimeout(()=>openProfileModal(), 600);
  }

  if(!STORAGE_AVAILABLE){
    const warn = document.createElement('div');
    warn.style.cssText = 'background:#fee2e2;color:#b91c1c;text-align:center;font-size:.8rem;font-weight:600;padding:8px;';
    warn.textContent = "⚠ This browser/mode won't save your data between visits (private browsing or file-access restrictions). Try a normal window, or serve this file from a local folder instead of double-clicking it.";
    document.body.insertBefore(warn, document.body.firstChild);
  }

  // CHANGED: used to always force Home on every boot, even mid-refresh on a completely different
  // page — so simply reloading (or the PWA relaunching) any tab bounced you back to Home every
  // time. That "always Home" behavior was only ever meant to protect against one specific case:
  // dropping someone straight into a live, unfinished practice quiz on open. renderPractice()
  // already never auto-resumes a quiz on its own (it only ever offers an explicit "Continue a
  // test" pick-list — see the CHANGED note at the top of renderPractice()), so restoring the
  // Practice tab itself is just as safe as restoring any other tab. The saved tab name is
  // validated against VALID_MAIN_TABS before use, so a corrupted/stale value can't land on
  // something setTab() wouldn't know how to render.
  // (Restoring/rendering the saved tab itself now happens earlier — see the FIXED note above —
  // so it can no longer be skipped by a failure anywhere in this wiring block.)
  if(APP.activeSession && !APP.activeSession.submitted){
    setTimeout(()=>showResumeSessionToast(), 700); // small delay so it doesn't collide with other startup toasts
  }

  // ADDED: Study Mode — restores any in-progress focus/break session across a reload, and
  // wires the desktop-only quick-access nav icon (mobile/iPad reach the same feature via
  // the drawer entry above Home instead — see .studymode-drawer-tab / #navtab-study-mode).
  initStudyMode();
  const studyNavBtn = document.getElementById('btn-study-mode');
  if(studyNavBtn) studyNavBtn.onclick = ()=>openStudyModeModal();

  }catch(e){
    // FIXED: this used to be uncaught — one missing element or bad reference anywhere above (a
    // different browser, a partially-loaded DOM, a corrupted setting) would silently abort all
    // remaining wiring with no visible error and no way to tell what went wrong. Now it's caught,
    // logged, and the app keeps working: the tab content itself already rendered above regardless.
    console.error('Boot UI wiring failed partway through (app should still be usable — some buttons/menus may need a manual refresh to wire up)', e);
  }
}

/* ============================================================
   ADDED: idle "critter" easter egg. After 5s with no mouse/keyboard/touch
   activity, a random cat/dog/mouse pops in and either runs across the
   bottom of the screen or sits in a corner for a bit, then fades out.
   It deliberately skips showing itself while an actual question is on
   screen (live quiz question, flashcard full-screen practice, or any
   open modal/zoom overlay) so it never covers content the user is
   reading or answering — it only shows up over genuinely free space.
   ============================================================ */
/* ============================================================
   ADDED: roaming "critter" easter egg. 5 seconds after the app loads, a
   random cat/dog/mouse starts wandering the free space of the screen —
   running across at a random height, occasionally stopping to sit in a
   corner — and keeps doing this continuously (not just once while idle;
   it keeps going while you're actively using the app too). It hides
   itself immediately whenever an actual question is on screen (live quiz
   question, flashcard full-screen practice, or any open modal/zoom
   overlay) and resumes roaming as soon as that clears.
   ============================================================ */
const CRITTER_START_DELAY_MS = 5000;
// ADDED: single source of truth for "how active is the pet" — tune these instead of
// hunting for magic numbers throughout critterSpawnOne/critterScheduleNext below.
const CRITTER_RUN_CHANCE = 0.3;          // odds it dashes across vs. just sits when idle-roaming
const CRITTER_PAUSE_MIN_MS = 4000;       // shortest gap before the next appearance
const CRITTER_PAUSE_RANGE_MS = 6000;     // added on top of the min, randomly, for the gap
const CRITTER_SIT_DUR_MIN_MS = 4000;     // how long a sitting/idle appearance lasts (min)
const CRITTER_SIT_DUR_RANGE_MS = 2500;   // added on top of the min, randomly
// CHANGED: a much bigger cast of roaming pets/companions, not just cat/dog/mouse.
const CRITTER_EMOJIS = {
  cat: '🐱', dog: '🐶', mouse: '🐭', rabbit: '🐰', fox: '🦊', bear: '🐻',
  panda: '🐼', koala: '🐨', tiger: '🐯', lion: '🦁', penguin: '🐧', owl: '🦉',
  hedgehog: '🦔', chick: '🐥', frog: '🐸', hamster: '🐹', unicorn: '🦄', dragon: '🐲'
};
// ADDED: two DIFFERENT pools of short phrases, used at two different moments —
// they should never be mixed, since they're saying two different things:
//  - CRITTER_QUIZ_MESSAGES: shown ONLY while a live question is on screen (mode
//    === 'quiz'). The pet is parked quietly in a corner cheering you on mid-task,
//    so these are real-time encouragement ("you're doing this right now").
//  - CRITTER_IDLE_MESSAGES: shown while the pet is just roaming/sitting around
//    elsewhere in the app (no quiz in progress). These nudge you TOWARD starting
//    a quiz, since there's no quiz happening yet to cheer you through.
const CRITTER_QUIZ_MESSAGES = [
  "You've got this!", "Keep going!", "Almost there!", "Nice work!", "Stay focused!",
  "Believe in yourself!", "One step at a time!", "You're doing great!", "Cheering for you!",
  "Don't give up!", "Great effort!", "Keep it up!", "You can do this!", "Onward!",
  "Go go go!", "Focus, you got it!", "Trust your prep!", "Stay sharp!", "You're crushing it!"
];
const CRITTER_IDLE_MESSAGES = [
  "Ready for a quick quiz?", "Some questions are waiting for you!", "Let's practice something!",
  "Feel like testing yourself?", "A few questions a day keeps the exam fear away!",
  "Your question bank misses you!", "How about a short study session?", "Let's keep that streak alive!",
  "Time flies — sneak in a quiz?", "I bet you could ace a few right now!", "Shall we review something?",
  "Practice makes progress — got a minute?"
];
let _lastCritterQuizMsg = null;
let _lastCritterIdleMsg = null;
// Picks a message from the pool that matches WHEN it's being shown — pass 'quiz'
// while a live question is on screen, anything else (or omit) for idle roaming.
function critterPickMessage(mode){
  // ADDED: lines learned from the internet are mixed in with whichever built-in
  // pool matches the current moment (still never mixing quiz-cheer with idle-nudge).
  const learned = (APP.settings && APP.settings.learnedPetMessages) || [];
  if(mode === 'quiz'){
    const pool = learned.length ? CRITTER_QUIZ_MESSAGES.concat(learned) : CRITTER_QUIZ_MESSAGES;
    let m;
    do{ m = pool[Math.floor(Math.random()*pool.length)]; }while(pool.length>1 && m===_lastCritterQuizMsg);
    _lastCritterQuizMsg = m;
    return m;
  }
  const pool = learned.length ? CRITTER_IDLE_MESSAGES.concat(learned) : CRITTER_IDLE_MESSAGES;
  let m;
  do{ m = pool[Math.floor(Math.random()*pool.length)]; }while(pool.length>1 && m===_lastCritterIdleMsg);
  _lastCritterIdleMsg = m;
  return m;
}
let critterActiveEl = null;
let critterActiveSpeechEl = null;
let critterLoopTimer = null;
let critterRemoveTimeoutId = null; // ADDED: id of the pending "end this appearance" timer, so a tap reaction can cancel/replace it
let critterLastTapAt = 0; // ADDED: simple throttle so rapid repeated taps don't spam reactions

// CHANGED: returns the pet's current visibility mode instead of a plain yes/no —
// 'hidden' = a real modal/overlay is up, nowhere safe to show it at all;
// 'quiz'   = a live question OR full-screen flashcard practice is on screen, so it
//            may only cheer quietly from a corner;
// 'full'   = totally free space, it can roam/run anywhere.
function critterVisibilityMode(){
  // ADDED: Study Mode is distraction-free by design — the pet stays away entirely
  // while it's running (the companion still has a presence, just shrunk down to the
  // small static focus-buddy badge — see renderStudyBadge()).
  if(typeof isStudyModeActive === 'function' && isStudyModeActive()) return 'hidden';
  // A genuine modal/zoom/nav drawer is open — these cover the whole screen with
  // interactive content the pet could get in the way of, so there's nowhere safe
  // to show it at all.
  const modalRoot = document.getElementById('modal-root');
  if(modalRoot && modalRoot.children.length) return 'hidden';
  const zoomOverlay = document.querySelector('.zoom-overlay');
  if(zoomOverlay) return 'hidden';
  const navBackdrop = document.querySelector('.mobile-nav-backdrop.show');
  if(navBackdrop) return 'hidden';
  // A live quiz question is being answered, OR full-screen flashcard practice is
  // active right now — the pet still gets to show up and cheer you on (unless
  // that's specifically turned off), just parked quietly in a corner so it never
  // covers the question/card.
  const taskInProgress = (APP.currentTab==='practice' && APP.activeSession && !APP.activeSession.submitted) || fcState.active;
  if(taskInProgress){
    return (APP.settings && APP.settings.petQuizCheerEnabled === false) ? 'hidden' : 'quiz';
  }
  return 'full';
}

function critterRemoveActive(){
  if(critterActiveEl){
    const el = critterActiveEl;
    critterActiveEl = null;
    el.classList.remove('critter-show','critter-run','critter-run-rtl','critter-sit','critter-quiz');
    el.classList.add('critter-hide');
    setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 350);
  }
  if(critterActiveSpeechEl){
    const s = critterActiveSpeechEl;
    critterActiveSpeechEl = null;
    s.classList.remove('critter-speech-show');
    setTimeout(()=>{ if(s.parentNode) s.parentNode.removeChild(s); }, 300);
  }
}

// ADDED: pick a vertical spot to roam at, clear of the top nav bar and bottom edge
function critterRandomTop(){
  const minTop = 70;
  const maxTop = Math.max(minTop + 40, window.innerHeight - 90);
  return Math.round(minTop + Math.random()*(maxTop-minTop));
}

// ADDED: positions and shows a motivating speech bubble right above (or below, if too
// close to the top nav) the given pet element. `mode` decides which message pool it
// draws from — 'quiz' = mid-task cheering, anything else = idle nudge to go practice.
function critterShowSpeech(petEl, mode){
  const speechEl = document.createElement('div');
  speechEl.className = 'critter-speech';
  speechEl.textContent = critterPickMessage(mode);
  // ADDED: an imported pet's own size slider (--pet-item-scale, set on petEl below)
  // should size its speech bubble too, not just the character — carry it over.
  const itemScale = petEl.style.getPropertyValue('--pet-item-scale');
  if(itemScale) speechEl.style.setProperty('--pet-item-scale', itemScale);
  document.body.appendChild(speechEl);
  critterActiveSpeechEl = speechEl;
  requestAnimationFrame(()=>{
    if(critterActiveSpeechEl !== speechEl) return; // already dismissed before we got to position it
    const petRect = petEl.getBoundingClientRect();
    const sRect = speechEl.getBoundingClientRect();
    let sLeft = petRect.left + petRect.width/2 - sRect.width/2;
    sLeft = Math.max(6, Math.min(sLeft, window.innerWidth - sRect.width - 6));
    let sTop = petRect.top - sRect.height - 8;
    if(sTop < 60) sTop = petRect.bottom + 8; // flip below the pet if too close to the top nav
    speechEl.style.left = sLeft + 'px';
    speechEl.style.top = sTop + 'px';
    speechEl.classList.add('critter-speech-show');
  });
}

function critterSpawnOne(mode){
  const kinds = Object.keys(CRITTER_EMOJIS).filter(petKindEnabled);
  // ADDED: any number of user-imported custom pet images join the pool, each as its own
  // "kind" (keyed by its own id) — only the ones whose own toggle (in the pet kind list)
  // is on — instead of overriding the built-in animals.
  const customImages = (APP.settings && APP.settings.customPetImages) || [];
  customImages.forEach(img => { if(petKindEnabled(img.id)) kinds.push(img.id); });
  if(!kinds.length){ critterScheduleNext(1000); return; } // every pet kind turned off — nothing to spawn
  const kind = kinds[Math.floor(Math.random()*kinds.length)];
  const isCustom = !CRITTER_EMOJIS[kind];
  const emoji = isCustom ? null : CRITTER_EMOJIS[kind];
  const customImgItem = isCustom ? (customImages.find(img => img.id === kind) || null) : null;
  const customImgSrc = customImgItem ? customImgItem.dataUrl : null;

  const el = document.createElement('div');
  el.className = 'critter-pet';
  if(isCustom){
    el.innerHTML = `<img src="${customImgSrc}" alt="Your pet" draggable="false">`;
    // ADDED: this import's own size slider (sizeScale) multiplies on top of the global
    // "Pet size" slider via --pet-item-scale — falls back to 1 (no effect) if never set.
    if(customImgItem && customImgItem.sizeScale && customImgItem.sizeScale !== 1){
      el.style.setProperty('--pet-item-scale', customImgItem.sizeScale);
    }
  } else {
    el.textContent = emoji;
  }
  const petLabel = isCustom ? 'Your pet' : `A ${kind}`; // used in the title tooltip below

  let activeDurMs;
  let sitting = false;
  const roamAllowed = APP.settings && APP.settings.petRoamEnabled !== false;

  if(mode === 'quiz'){
    // Quiz-safe cheer: small, stationary, tucked in a corner — never runs across the
    // screen so it can't ever cover the question or answer options.
    el.classList.add('critter-quiz');
    el.title = `${petLabel} is cheering you on`;
    const fromBottom = Math.random() < 0.7; // mostly bottom corner
    const side = Math.random() < 0.5 ? 'left' : 'right';
    if(fromBottom) el.style.bottom = (14 + Math.random()*10) + 'px';
    else el.style.top = critterRandomTop() + 'px';
    el.style[side] = (10 + Math.random()*16) + 'px';
    sitting = true;
    activeDurMs = 3200 + Math.random()*1600;
  } else {
    const doRun = roamAllowed && Math.random() < CRITTER_RUN_CHANCE; // mostly sits, sometimes runs across; never runs if roaming is turned off
    if(doRun){
      const rtl = Math.random() < 0.5;
      el.classList.add(rtl ? 'critter-run-rtl' : 'critter-run');
      el.style.top = critterRandomTop() + 'px';
      const dur = 6 + Math.random()*4; // 6-10s crossing the screen
      el.style.setProperty('--critter-run-dur', dur.toFixed(1)+'s');
      activeDurMs = dur*1000;
      el.title = `${petLabel} is running by`;
    } else {
      el.classList.add('critter-sit');
      // Park somewhere in the free space — random corner-ish spot, top or bottom
      const fromBottom = Math.random() < 0.5;
      const side = Math.random() < 0.5 ? 'left' : 'right';
      if(fromBottom) el.style.bottom = (14 + Math.random()*10) + 'px';
      else el.style.top = critterRandomTop() + 'px';
      el.style[side] = (14 + Math.random()*40) + 'px';
      sitting = true;
      activeDurMs = CRITTER_SIT_DUR_MIN_MS + Math.random()*CRITTER_SIT_DUR_RANGE_MS;
      el.title = `${petLabel} is taking a break`;
    }
  }

  document.body.appendChild(el);
  critterActiveEl = el;

  // Motivating speech bubble: always while cheering during a live quiz question, and
  // sometimes just while sitting around elsewhere in the app — unless turned off in Settings.
  const speechAllowed = APP.settings && APP.settings.petSpeechEnabled !== false;
  const showSpeech = speechAllowed && (mode === 'quiz' ? true : (sitting && Math.random() < 0.45));
  if(showSpeech) critterShowSpeech(el, mode);

  critterRemoveTimeoutId = setTimeout(()=>{
    if(critterActiveEl===el) critterRemoveActive();
    // brief pause, then keep roaming
    critterScheduleNext(CRITTER_PAUSE_MIN_MS + Math.random()*CRITTER_PAUSE_RANGE_MS);
  }, activeDurMs);
}

function critterScheduleNext(delay){
  if(critterLoopTimer) clearTimeout(critterLoopTimer);
  critterLoopTimer = setTimeout(critterTick, delay);
}

function critterTick(){
  if(APP.settings && APP.settings.petEnabled === false){
    critterRemoveActive();
    critterScheduleNext(1000); // pet disabled in settings — check back in case it's re-enabled
    return;
  }
  const mode = critterVisibilityMode();
  if(mode === 'hidden'){
    critterRemoveActive();
    critterScheduleNext(1000); // full-screen overlay is up — check back shortly
    return;
  }
  critterSpawnOne(mode);
}

// ADDED: fun little particle burst where the pet was tapped — same visual idea as the
// companion's "pat hearts" (reuses that CSS class since it's generic), just with
// pet-flavored emoji instead of hearts.
function spawnCritterTapBurst(x, y){
  const bits = ['✨','💫','⭐','🐾'];
  const count = 2 + Math.floor(Math.random()*2); // 2-3 per tap
  for(let i=0;i<count;i++){
    const el = document.createElement('div');
    el.className = 'companion-pat-heart';
    el.textContent = bits[Math.floor(Math.random()*bits.length)];
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.setProperty('--heart-drift', (Math.random()*50-25) + 'px');
    el.style.setProperty('--heart-spin', (Math.random()*40-20) + 'deg');
    el.style.animationDelay = (i*60) + 'ms';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1000 + i*60);
  }
}

// ADDED: tapping the roaming pet makes it react — either a quick happy bounce-in-place, or
// (if it was just sitting/cheering) it gets startled and dashes off running, each roughly a
// coin flip. A pet that's already mid-run just gets the particle burst, since re-animating
// motion it's already doing mid-flight would fight the CSS transform the run keyframes use.
// Wired once via delegation on document (like initCompanionPatting) since the pet element is
// torn down and recreated constantly as it roams.
function initCritterTapInteraction(){
  document.addEventListener('click', (e)=>{
    const el = e.target.closest('.critter-pet');
    if(!el || el !== critterActiveEl) return;
    const now = Date.now();
    if(now - critterLastTapAt < 350) return; // throttle: ignore rapid repeat taps
    critterLastTapAt = now;

    const rect = el.getBoundingClientRect();
    spawnCritterTapBurst(rect.left + rect.width/2, rect.top + rect.height/2);

    const alreadyRunning = el.classList.contains('critter-run') || el.classList.contains('critter-run-rtl');
    if(alreadyRunning){
      return; // particle burst is reaction enough — don't fight the in-flight run animation
    }

    const goHappy = Math.random() < 0.5; // coin flip: happy bounce in place, or startled dash away
    if(goHappy){
      el.classList.remove('critter-tap-happy');
      void el.offsetWidth; // restart the animation even if tapped again before the last bounce finished
      el.classList.add('critter-tap-happy');
      setTimeout(()=>{ if(el.isConnected) el.classList.remove('critter-tap-happy'); }, 560);
      return;
    }

    // Startled dash: cancel whatever timer was going to end this sit/cheer appearance, and
    // switch it straight into a run — same mechanics as the normal "run across" spawn path.
    if(critterRemoveTimeoutId){ clearTimeout(critterRemoveTimeoutId); critterRemoveTimeoutId = null; }
    if(critterActiveSpeechEl){
      const s = critterActiveSpeechEl;
      critterActiveSpeechEl = null;
      s.classList.remove('critter-speech-show');
      setTimeout(()=>{ if(s.parentNode) s.parentNode.removeChild(s); }, 300);
    }
    el.classList.remove('critter-sit','critter-quiz','critter-tap-happy');
    el.style.bottom = '';
    el.style.left = '';
    el.style.right = '';
    const rtl = Math.random() < 0.5;
    el.classList.add(rtl ? 'critter-run-rtl' : 'critter-run');
    el.style.top = critterRandomTop() + 'px';
    const dur = 3.5 + Math.random()*2.5; // a quicker startled scurry vs. a normal leisurely run
    el.style.setProperty('--critter-run-dur', dur.toFixed(1)+'s');
    el.title = 'Startled! Running off';
    critterRemoveTimeoutId = setTimeout(()=>{
      if(critterActiveEl===el) critterRemoveActive();
      critterScheduleNext(CRITTER_PAUSE_MIN_MS + Math.random()*CRITTER_PAUSE_RANGE_MS);
    }, dur*1000);
  });
}

function initCritterPet(){
  // Watchdog: if a modal pops up mid-roam, hide the critter immediately instead of
  // waiting for its current run/sit animation to finish. If a quiz question appears
  // while the pet is mid-run, clear that run too so the next spawn switches to the
  // quiz-safe corner-cheer mode right away rather than finishing its crossing.
  setInterval(()=>{
    if(!critterActiveEl) return;
    const mode = critterVisibilityMode();
    if(mode === 'hidden'){ critterRemoveActive(); return; }
    if(mode === 'quiz' && (critterActiveEl.classList.contains('critter-run') || critterActiveEl.classList.contains('critter-run-rtl'))){
      critterRemoveActive();
    }
  }, 400);
  critterScheduleNext(CRITTER_START_DELAY_MS);
}

document.addEventListener('DOMContentLoaded', boot);
document.addEventListener('DOMContentLoaded', initCritterPet);
document.addEventListener('DOMContentLoaded', initCritterTapInteraction); // ADDED: makes the roaming pet react (happy bounce / startled dash) when tapped
document.addEventListener('DOMContentLoaded', initCompanionPatting); // ADDED: enables tap-to-pet hearts on every Dr.KC avatar
document.addEventListener('DOMContentLoaded', initCompanionIdleActivity); // ADDED: occasional idle wave/lean gesture so Dr.KC feels active, not just reactive

/* PWA service worker — registered from a real same-origin file (service-worker.js),
   which is required (along with manifest.webmanifest being a real fetchable file,
   not a data: URI) for Android/Chrome to mint a real installable WebAPK instead of
   a plain "Add to Home screen" shortcut. A real WebAPK shows up in Android Settings
   > Apps with its own "Uninstall" entry, and uninstalling it clears this site's
   storage (localStorage/IndexedDB) automatically. */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js', {scope:'./'}).catch(()=>{});
  });
}

</script></body></html>
