// ADDED: turns an Anki "::"-nested deck path into a { flat, full, subjectPath, leaf } entry.
// subjectPath keeps the "::" separators for every level EXCEPT the last (e.g. "Deck::Sub::Chapter"),
// so buildSubjectTreeHtml() — which already nests any subject containing "::" into real collapsible
// branches — rebuilds the deck's actual folder structure instead of collapsing every sub-deck into
// one flat "Deck - Sub - Chapter" lesson name under a single top-level folder.
function apkgBuildDeckNameEntry(full){
  const parts = String(full||'').split('::').map(p=>p.trim()).filter(Boolean);
  if(!parts.length) parts.push('General');
  let subjectPath, leaf;
  if(parts.length === 1){
    // top-level deck with no sub-decks: the deck name itself is the subject folder,
    // and its cards form a single "General" lesson inside it.
    subjectPath = parts[0];
    leaf = 'General';
  } else {
    leaf = parts[parts.length-1];
    subjectPath = parts.slice(0, -1).join('::');
  }
  return { flat: full.split('::').join(' - '), full, subjectPath, leaf };
}
function apkgGetDeckNameMap(db){
  const map = {};
  // ADDED: keep both a flattened display name (unchanged, used everywhere in the app's UI/title
  // logic) AND the ORIGINAL "::"-separated path (used only at re-export time to rebuild real
  // Anki folder/subfolder nesting instead of collapsing it into one flat name).
  try{
    const dRows = db.exec("SELECT id, name FROM decks");
    if(dRows.length){
      for(const row of dRows[0].values){
        const full = String(row[1]||'').split('\x1f').join('::');
        map[row[0]] = apkgBuildDeckNameEntry(full);
      }
    }
  }catch(e){ /* modern schema table absent — fall back below */ }
  if(Object.keys(map).length === 0){
    try{
      const colRows = db.exec("SELECT decks FROM col");
      if(colRows.length){
        const decks = JSON.parse(colRows[0].values[0][0]);
        for(const did in decks){
          const full = String(decks[did].name||'');
          map[did] = apkgBuildDeckNameEntry(full);
        }
      }
    }catch(e){ console.warn('apkg legacy deck parse failed', e); }
  }
  return map;
}
function buildTestsFromApkg(db, mediaUrlMap, preBuiltNtMap){
  const ntMap = preBuiltNtMap || apkgGetNoteTypeFieldMap(db); // ADDED: allow caller to pass in a map already merged with a legacy collection.anki2's clean css/templates
  const deckMap = apkgGetDeckNameMap(db);

  const noteById = {};
  const notesRows = db.exec("SELECT id, mid, flds FROM notes");
  if(notesRows.length){
    for(const row of notesRows[0].values){
      const [id, mid, flds] = row;
      noteById[id] = { mid, values: String(flds).split('\x1f') };
    }
  }

  const deckBuckets = {};
  const cardsRows = db.exec("SELECT id, nid, did, ord FROM cards");
  if(cardsRows.length){
    for(const row of cardsRows[0].values){
      const [cardId, nid, did, ord] = row;
      const note = noteById[nid];
      if(!note) continue;
      const nt = ntMap[note.mid];
      const fieldNames = (nt && nt.fields) || [];
      const values = note.values;
      const byName = (want)=>{
        const idx = fieldNames.findIndex(n => n && n.toLowerCase() === want);
        return idx !== -1 ? idx : -1;
      };

      let frontHtml, backHtml, plainAnswer;
      if(nt && nt.isCloze){
        const textIdx = byName('text');
        const rawText = values[textIdx !== -1 ? textIdx : 0] || '';
        const extraIdx = fieldNames.findIndex(n=>n && /extra/i.test(n));
        const extra = extraIdx !== -1 ? (values[extraIdx]||'') : '';
        frontHtml = apkgClozeFront(rawText, ord+1);
        backHtml = apkgClozeBack(rawText, ord+1) + (extra ? '<div style="margin-top:10px;">'+extra+'</div>' : '');
        plainAnswer = apkgStripTags(apkgClozeBack(rawText, ord+1));
      } else {
        let frontIdx = byName('front'), backIdx = byName('back');
        if(nt && nt.isReversed && ord === 1){ const t = frontIdx; frontIdx = backIdx; backIdx = t; }
        if(frontIdx !== -1 || backIdx !== -1){
          frontHtml = values[frontIdx !== -1 ? frontIdx : 0] || '';
          backHtml = values[backIdx !== -1 ? backIdx : 1] || '';
        } else {
          // Unrecognized note type: first field is the front, every other
          // non-empty field is dumped (labeled) into the back as a fallback.
          frontHtml = values[0] || '';
          const rest = [];
          for(let k=1;k<values.length;k++){
            if(values[k] && String(values[k]).trim()){
              const label = fieldNames[k] || ('Field '+(k+1));
              rest.push('<div style="margin-bottom:8px;"><b>'+escapeHtml(label)+':</b> '+values[k]+'</div>');
            }
          }
          backHtml = rest.join('');
        }
        plainAnswer = apkgStripTags(backHtml);
      }

      frontHtml = apkgStripSound(frontHtml);
      backHtml = apkgStripSound(backHtml);
      // ADDED: keep a copy with the ORIGINAL media filenames (before swapping to this session's
      // blob: URLs) so a later "download as .apkg" can re-embed the real files instead of a dead link.
      const frontHtmlOrig = frontHtml;
      const backHtmlOrig = backHtml;
      frontHtml = apkgSwapMedia(frontHtml, mediaUrlMap);
      backHtml = apkgSwapMedia(backHtml, mediaUrlMap);
      const plainFront = apkgStripTags(frontHtml) || 'Untitled card';
      const answerPreview = (plainAnswer||'').slice(0,150) || '(see explanation)';

      const q = {
        id: 'card_' + cardId,
        text: plainFront,
        raw_text: frontHtml,
        raw_text_orig: frontHtmlOrig, // ADDED: original-filename version, used for .apkg re-export
        question_images: [],
        options: [{ label:'A', text: answerPreview, correct:true }],
        correct_answer: answerPreview,
        explanation: backHtml || 'No explanation provided.',
        explanation_orig: backHtmlOrig || '', // ADDED: original-filename version, used for .apkg re-export
        explanation_images: [],
        // ADDED: the note's real field values (original media filenames, untouched by the
        // front/back simplification above) plus which note type + template produced this card —
        // this is what lets a later "download as .apkg" rebuild the ORIGINAL note type's exact
        // layout/CSS instead of a generic Basic template. Harmless if unused elsewhere in the app.
        apkgNtid: note.mid,
        apkgOrd: ord,
        apkgFieldValues: values.slice()
      };
      (deckBuckets[did] = deckBuckets[did] || []).push(q);
    }
  }

  const tests = [];
  for(const did in deckBuckets){
    if(!deckBuckets[did].length) continue;
    const dn = deckMap[did];
    // Written straight into structured fields (real array, not a joined string) so any nested
    // "::" levels from the original Anki deck become real folders via subjectOf()/
    // buildSubjectTreeHtml() without ever being parsed back out of display text.
    const newTest = {
      id: uid('test'),
      subjectPath: dn ? String(dn.subjectPath||'').split('::').map(p=>p.trim()).filter(Boolean) : ['Imported'],
      lessonName: dn ? dn.leaf : ('Deck ' + did),
      questions: deckBuckets[did],
      apkgDeckPath: dn && dn.full // ADDED: original "::"-nested deck path, used to rebuild real Anki folder/subfolder structure on re-export
    };
    if(!newTest.subjectPath.length) newTest.subjectPath = ['Imported'];
    syncTestTitle(newTest);
    tests.push(newTest);
  }
  return tests;
}
async function importApkgFile(file){
  let libs;
  try{ libs = await ensureApkgLibs(); }
  catch(e){ console.error(e); showMiniToast('Could not load Anki import tools — check your connection', 'error'); return null; }
  const { JSZip, fzstd, SQL } = libs;

  let zip;
  try{ zip = await JSZip.loadAsync(file); }
  catch(e){ showMiniToast('"'+file.name+'" is not a valid .apkg file', 'error'); return null; }

  let sqliteBytes = null;
  let usedLegacyDirectly = false; // ADDED: true when collection.anki2 (plain-JSON schema) was itself the source
  try{
    if(zip.file('collection.anki21b')){
      const compressed = await zip.file('collection.anki21b').async('uint8array');
      sqliteBytes = fzstd.decompress(compressed);
    } else if(zip.file('collection.anki21')){
      sqliteBytes = await zip.file('collection.anki21').async('uint8array');
    } else if(zip.file('collection.anki2')){
      sqliteBytes = await zip.file('collection.anki2').async('uint8array');
      usedLegacyDirectly = true;
    }
  }catch(e){ console.error('apkg collection read failed', e); }
  if(!sqliteBytes){ showMiniToast('Could not find a collection database inside "'+file.name+'"', 'error'); return null; }

  let db;
  try{ db = new SQL.Database(sqliteBytes); }
  catch(e){ console.error(e); showMiniToast('Could not read the Anki database in "'+file.name+'"', 'error'); return null; }

  // ADDED: build the note-type/template map now (rather than inside buildTestsFromApkg) so we can
  // enrich it with a bundled legacy collection.anki2, if the file has one. Modern Anki schemas store
  // css/qfmt/afmt as protobuf blobs (recovered only heuristically, see apkgExtractCss/Fmts above),
  // but most .apkg exports still bundle a plain-JSON collection.anki2 for older-Anki compatibility —
  // when present, that gives us the exact original css/templates with no guesswork involved.
  let ntMap = apkgGetNoteTypeFieldMap(db);
  if(!usedLegacyDirectly && zip.file('collection.anki2')){
    try{
      const legacyBytes = await zip.file('collection.anki2').async('uint8array');
      const legacyDb = new SQL.Database(legacyBytes);
      const legacyMap = apkgGetNoteTypeFieldMap(legacyDb);
      for(const id in legacyMap){
        if(ntMap[id] && legacyMap[id]){
          if(legacyMap[id].css) ntMap[id].css = legacyMap[id].css;
          if(legacyMap[id].tmpls && legacyMap[id].tmpls.length) ntMap[id].tmpls = legacyMap[id].tmpls;
        }
      }
      legacyDb.close();
    }catch(e){ console.warn('legacy collection.anki2 template merge skipped', e); }
  }

  // Best-effort media extraction — never blocks the import if it fails.
  let mediaUrlMap = {};
  const mediaBlobsToPersist = []; // ADDED: {filename, blob} pairs to save into IDB for later .apkg re-export
  try{
    const mediaEntry = zip.file('media');
    if(mediaEntry){
      let mediaBytes = await mediaEntry.async('uint8array');
      if(mediaBytes.length >= 4 && mediaBytes[0]===0x28 && mediaBytes[1]===0xB5 && mediaBytes[2]===0x2F && mediaBytes[3]===0xFD){
        mediaBytes = fzstd.decompress(mediaBytes);
      }
      const indexToName = apkgParseMediaList(mediaBytes);
      const names = Object.keys(indexToName);
      if(names.length && names.length < 3000){
        await Promise.all(names.map(async (idxKey)=>{
          const fileEntry = zip.file(idxKey);
          if(!fileEntry) return;
          const blob = await fileEntry.async('blob');
          mediaUrlMap[indexToName[idxKey]] = URL.createObjectURL(blob);
          mediaBlobsToPersist.push({ filename: indexToName[idxKey], blob }); // ADDED
        }));
      }
    }
  }catch(e){ console.warn('apkg media extraction skipped', e); }

  let tests;
  try{ tests = buildTestsFromApkg(db, mediaUrlMap, ntMap).filter(t=>t.questions && t.questions.length); }
  catch(e){ console.error(e); showMiniToast('Could not parse cards inside "'+file.name+'"', 'error'); return null; }
  finally{ try{ db.close(); }catch(e){} }

  if(!tests.length){ showMiniToast('No cards found in "'+file.name+'"', 'error'); return null; }

  let qCount = 0;
  for(const t of tests) qCount += t.questions.length;
  const resource = {
    id: uid('res'),
    name: file.name.replace(/\.apkg$/i,''),
    addedAt: Date.now(),
    tests: tests,
    stats: { tests: tests.length, questions: qCount },
    isFlashcardDeck: true, // ADDED: flags this as a flashcard-only deck (see "Flashcard Decks" tab) so it stays out of the Resources tab / Practice Builder / Home resource counts
    apkgNoteTypes: ntMap // ADDED: original note-type field/template/css map, kept so "download as .apkg" can rebuild the exact original layout later (even in a future session)
  };
  await idbPut('resources', resource);
  APP.resources.unshift(resource); // CHANGED: new resource appears at the top of the list
  rebuildFlatIndex();
  // ADDED: persist the actual media bytes (keyed by this resource's id + filename) so a later
  // "download as .apkg" can bundle the real files instead of the session-only blob: URLs above.
  if(mediaBlobsToPersist.length){
    Promise.all(mediaBlobsToPersist.map(({filename, blob})=>
      idbPut('media', { id: resource.id + '::' + filename, resourceId: resource.id, filename, blob })
    )).catch(e=>console.warn('storing apkg media for re-export failed', e));
  }
  return resource;
}

/* ============================================================
   ADDED: Import Flashcards from Text — a bridge for content with no native
   flashcard export (handwritten/typed notes from apps like GoodNotes, plain
   study notes, etc.). GoodNotes' own file format (.goodnotes) is a closed,
   undocumented Protocol-Buffer container with no public spec, so there's no
   reliable way to parse it directly — but GoodNotes (and most note apps) can
   turn handwritten pages into typed text via "Convert to Text", which can
   then be copied/pasted or saved as a .txt file and imported here.
   ============================================================ */

// Parses pasted/uploaded text into an array of {front, back} cards.
// Two formats are auto-detected:
//   1) Tab-separated — one card per line: "front<TAB>back" (matches Anki's
//      own plain-text card export, so it round-trips with that ecosystem too)
//   2) Q:/A: blocks — cards separated by a blank line, each block starting
//      with "Q:" and containing an "A:" line further down; either label can
//      span multiple lines. Falls back to "first line = front, rest = back"
//      for any block that has no Q:/A: labels at all.
function parseFlashcardTextInput(raw){
  if(!raw || !String(raw).trim()) return [];
  const text = String(raw).replace(/\r\n?/g, '\n');
  const lines = text.split('\n');
  const nonEmpty = lines.filter(l=>l.trim());
  if(!nonEmpty.length) return [];

  // --- tab-separated mode: every non-empty line has a tab ---
  if(nonEmpty.every(l=>l.includes('\t'))){
    return nonEmpty.map(l=>{
      const idx = l.indexOf('\t');
      return { front: l.slice(0, idx).trim(), back: l.slice(idx+1).trim() };
    }).filter(c=>c.front && c.back);
  }

  // --- Q:/A: block mode ---
  const blocks = text.split(/\n\s*\n+/).map(b=>b.trim()).filter(Boolean);
  // FIXED: decide the parsing mode once for the whole document instead of per block.
  // The old per-block fallback treated ANY two-or-more-line paragraph (e.g. a leading
  // instructions/notes block) as a real flashcard even when the rest of the document
  // used proper "Q:"/"A:" labels — silently creating garbage cards out of prose that
  // was never meant to be one (this is exactly what happened importing this app's own
  // flashcard template unedited). If any block anywhere uses a "Q:" label, treat the
  // whole document as Q:/A: mode and skip unlabeled blocks rather than guessing at
  // them; only fall back to the naive "first line=front, rest=back" heuristic when NO
  // block in the document uses "Q:"/"A:" labels at all.
  const hasAnyQBlock = blocks.some(b => /^Q\s*[:.]\s*/i.test(b));
  const cards = [];
  for(const block of blocks){
    const qMatch = block.match(/^Q\s*[:.]\s*/i);
    if(qMatch){
      const aIdx = block.search(/\n\s*A\s*[:.]\s*/i);
      if(aIdx !== -1){
        const front = block.slice(qMatch[0].length, aIdx).trim();
        const back = block.slice(aIdx).replace(/^\n\s*A\s*[:.]\s*/i, '').trim();
        if(front && back){ cards.push({front, back}); continue; }
      }
    }
    if(hasAnyQBlock) continue; // document uses Q:/A: labels elsewhere — don't guess at an unlabeled block
    // fallback: first line = front, remaining lines = back (only reached when the
    // WHOLE document has no Q:/A:-labeled blocks at all)
    const blockLines = block.split('\n').map(l=>l.trim()).filter(Boolean);
    if(blockLines.length >= 2){
      cards.push({ front: blockLines[0], back: blockLines.slice(1).join('<br>') });
    }
  }
  return cards;
}

// Builds and saves a real flashcard-deck resource (same shape the .apkg
// importer produces) from parsed {front, back} pairs.
async function createFlashcardDeckFromText(deckName, subject, lesson, cards){
  const questions = cards.map(c=>({
    id: uid('q'),
    text: c.front,
    raw_text: c.front,
    question_images: [],
    options: [{ label:'A', text: c.back, correct:true }],
    correct_answer: c.back,
    explanation: c.back,
    explanation_images: []
  }));
  const newTest = { id: uid('test'), questions,
    subjectPath: String(subject||'Imported').split('::').map(p=>p.trim()).filter(Boolean),
    lessonName: (lesson||'Imported Cards').trim() || 'Imported Cards' };
  if(!newTest.subjectPath.length) newTest.subjectPath = ['Imported'];
  syncTestTitle(newTest);
  const resource = {
    id: uid('res'),
    name: deckName,
    addedAt: Date.now(),
    tests: [newTest],
    stats: { tests: 1, questions: questions.length },
    isFlashcardDeck: true,
    custom: true // ADDED: marks decks built from text rather than a real .apkg import
  };
  await idbPut('resources', resource);
  APP.resources.unshift(resource); // new deck appears at the top of the list
  rebuildFlatIndex();
  return resource;
}

/* ADDED: Downloadable blank .txt template specifically for the "Import Flashcards from
   Text" flow (GoodNotes bridge). Meant to be filled in on a computer OR typed/pasted
   straight into GoodNotes as a text box, then exported from GoodNotes ("Convert to Text"
   already gives plain text, or just share the page as .txt/copy the text) and re-uploaded
   here via "Upload .txt" / pasted into the textarea. */
function buildFlashcardImportTemplateTxt(){
  return `Flashcard Import Template (for GoodNotes & other note apps)
------------------------------------------------------------
HOW TO USE:
1) In GoodNotes: write your Q&A on the page, select it, tap "Convert to Text"
   (or just type it as text to begin with), then copy it — or export/share the
   note as a .txt file if your version of GoodNotes supports that.
2) Paste the text below into the format shown, OR just write directly in this
   Q:/A: format inside GoodNotes from the start, so "Convert to Text" needs no
   cleanup afterward.
3) Keep exactly one blank line between cards (that's how one card is told apart
   from the next). Every card needs one "Q:" line and one "A:" line.
4) Save this file (keep the .txt extension), then in the app open
   "Import Flashcards from Text" and either upload this file or paste its
   contents into the box.

FORMAT NOTES:
- Each card: "Q:" followed by the question/front, then "A:" followed by the
  answer/back. Either side can span multiple lines — just keep writing until
  the next "Q:"/blank line.
- Leave exactly ONE blank line between cards.
- Alternative format: one card per line as "front[TAB]back" (a single Tab
  character between front and back) — useful if you're pasting from a
  spreadsheet instead of GoodNotes.
- Delete these instructions before importing if you'd like a cleaner file,
  but they won't break the import — only text below "Q:"/"A:" is read.
------------------------------------------------------------

Q: Type your first question here?
A: Type the answer here.

Q: Type your second question here?
A: Type the answer here.

Q: Type your third question here?
A: Type the answer here.
`;
}
function downloadFlashcardImportTemplateTxt(){
  downloadTextAsFile(buildFlashcardImportTemplateTxt(), 'flashcard-import-template.txt', 'text/plain');
  showMiniToast('Template downloaded — fill it in (or write this format in GoodNotes) and import it back', 'success');
}

/* ============================================================
   history / streak writes
   ============================================================ */
async function recordAnswer(cid, chosenLabel, correct){
  let h = APP.historyMap[cid];
  if(!h) h = { qid: cid, attempts: [], bookmarked:false, lastCorrect:null, timesSeen:0 };
  h.attempts.push({ ts: Date.now(), chosen: chosenLabel, correct });
  h.lastCorrect = correct;
  h.timesSeen = (h.timesSeen||0) + 1;
  APP.historyMap[cid] = h;
  await idbPut('history', h);
}
async function toggleBookmark(cid){
  let h = APP.historyMap[cid];
  if(!h) h = { qid: cid, attempts: [], bookmarked:false, lastCorrect:null, timesSeen:0, lists:[] };
  h.bookmarked = !h.bookmarked;
  if(!h.bookmarked) h.lists = []; // ADDED: fully removing a bookmark also clears its category lists
  APP.historyMap[cid] = h;
  await idbPut('history', h);
  if(h.bookmarked) checkAchievements(); // ADDED: bookmark-count achievement may now be met
  return h.bookmarked;
}

/* ============================================================
   ADDED: BOOKMARK CATEGORY LISTS (Easy / Difficult / Hard / Silly Mistake / custom)
   Each history record gets a `lists` array of list-names it belongs to.
   h.bookmarked stays true whenever lists.length > 0, so all existing
   bookmark-based filters (home stat, flashcards, practice builder) keep working untouched.
   ============================================================ */
function saveBookmarkLists(){ lsSet(LS_BOOKMARK_LISTS, APP.bookmarkLists); }

function createBookmarkList(name){
  name = (name||'').trim();
  if(!name) return false;
  if(APP.bookmarkLists.some(l=>l.toLowerCase()===name.toLowerCase())) return false;
  APP.bookmarkLists.push(name);
  saveBookmarkLists();
  return true;
}

// Removing a list also strips it out of every question that had it tagged.
async function deleteBookmarkList(name){
  APP.bookmarkLists = APP.bookmarkLists.filter(l=>l!==name);
  saveBookmarkLists();
  const affected = Object.values(APP.historyMap).filter(h=>h.lists && h.lists.includes(name));
  for(const h of affected){
    h.lists = h.lists.filter(l=>l!==name);
    h.bookmarked = h.lists.length>0;
    await idbPut('history', h);
  }
}

async function setQuestionBookmarkLists(cid, lists){
  let h = APP.historyMap[cid];
  if(!h) h = { qid: cid, attempts: [], bookmarked:false, lastCorrect:null, timesSeen:0, lists:[] };
  h.lists = lists.slice();
  h.bookmarked = h.lists.length>0;
  APP.historyMap[cid] = h;
  await idbPut('history', h);
  return h;
}

// Popover shown when the ☆/★ corner button is tapped: choose which category
// list(s) this question should be saved under, or create a brand-new list.
function openBookmarkListPicker(cid, onSaved){
  const h = APP.historyMap[cid];
  const current = new Set((h && h.lists) ? h.lists : []);
  const renderChecks = ()=> APP.bookmarkLists.map(name=>`
    <label class="chipbox ${current.has(name)?'checked':''}" data-bmlist-chip="${escapeHtml(name)}">
      <input type="checkbox" value="${escapeHtml(name)}" ${current.has(name)?'checked':''}/>${escapeHtml(name)}
    </label>
  `).join('');

  showModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px;">
      <h3 style="margin:0;">☆ Save to list</h3>
      <button class="btn btn-outline btn-sm" id="bmpick-close">✕</button>
    </div>
    <div class="muted" style="font-size:.82rem;margin-bottom:12px;">Pick one or more lists for this question. It'll only show up under the lists you choose, on the Bookmarks page.</div>
    <div class="chiplist" id="bmpick-chips" style="margin-bottom:12px;">${renderChecks()}</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <input type="text" id="bmpick-new-name" placeholder="New list name…" style="flex:1;padding:8px 10px;border-radius:9px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);"/>
      <button class="btn btn-outline btn-sm" id="bmpick-add-list">+ Add list</button>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn btn-outline btn-sm" id="bmpick-cancel">Cancel</button>
      <button class="btn btn-accent btn-sm" id="bmpick-save">Save</button>
    </div>
  `);

  const wireChipClicks = ()=>{
    document.querySelectorAll('#bmpick-chips [data-bmlist-chip]').forEach(chip=>{
      chip.onclick = (e)=>{
        e.preventDefault();
        const name = chip.dataset.bmlistChip;
        if(current.has(name)) current.delete(name); else current.add(name);
        chip.classList.toggle('checked', current.has(name));
        chip.querySelector('input').checked = current.has(name);
      };
    });
  };
  wireChipClicks();

  document.getElementById('bmpick-add-list').onclick = ()=>{
    const inp = document.getElementById('bmpick-new-name');
    const name = inp.value.trim();
    if(!name) return;
    if(createBookmarkList(name)){
      current.add(name);
      document.getElementById('bmpick-chips').innerHTML = renderChecks();
      wireChipClicks();
      inp.value = '';
    } else {
      toast('That list already exists');
    }
  };

  document.getElementById('bmpick-close').onclick = closeModal;
  document.getElementById('bmpick-cancel').onclick = closeModal;
  document.getElementById('bmpick-save').onclick = async ()=>{
    await setQuestionBookmarkLists(cid, [...current]);
    closeModal();
    if(onSaved) onSaved(current.size>0);
  };
}

/* ============================================================
   ADDED: FLASHCARDS — full nav tab, between Bookmarks and Analytics.
   Front shows the question; flipping reveals the question again plus the
   answer + explanation. Filterable by All / Bookmarked / Subject / Due,
   shuffleable, with an Anki-style 4-button spaced-repetition rating
   (Again / Hard / Good / Easy) stored in localStorage, plus a small stats
   bar at the top of the page.
   ============================================================ */
const fcState = { pool: [], idx: 0, filter: 'all', subject: '', resource: '', testId: '', bookmarkList: '', completedRating: 'all', flipped: false, order: [], active: false, session: { reviewed: 0, again: 0, hard: 0, good: 0, easy: 0 } }; // ADDED: testId supports studying a single lesson/test as flashcards; session tracks this study session's live stats for the Stop & exit summary; active toggles between the launch screen and full-screen practice

// ADDED: persisted history of past flashcard study sessions, shown on the launch screen below the Start button
function fcSessionHistory(){ return lsGet(LS_FLASHCARD_SESSIONS, []); }
function fcSaveSessionRecord(rec){
  const list = fcSessionHistory();
  list.unshift(rec);
  if(list.length > 50) list.length = 50; // keep it bounded
  lsSet(LS_FLASHCARD_SESSIONS, list);
}

function fcSrsMap(){ return lsGet(LS_FLASHCARD_SRS, {}); }
function fcSrsFor(cid){
  const m = fcSrsMap();
  return m[cid] || { reps:0, ease:2.5, interval:0, due:0, lapses:0, lastRating:null };
}
function fcSrsStatus(s){
  if(!s || (!s.lastRating)) return 'new';
  if(s.interval >= 21) return 'mature';
  return 'learning';
}
function fcRate(cid, rating){
  const m = fcSrsMap();
  const s = m[cid] || { reps:0, ease:2.5, interval:0, due:0, lapses:0, lastRating:null };
  const now = Date.now();
  const DAY = 24*60*60*1000;
  if(rating === 'again'){
    s.lapses = (s.lapses||0) + 1;
    s.reps = 0;
    s.ease = Math.max(1.3, s.ease - 0.2);
    s.interval = 0;
    s.due = now + 10*60*1000; // due again in 10 minutes
  } else if(rating === 'hard'){
    s.ease = Math.max(1.3, s.ease - 0.15);
    s.interval = s.interval ? Math.max(1, Math.round(s.interval*1.2)) : 1;
    s.reps = (s.reps||0) + 1;
    s.due = now + s.interval*DAY;
  } else if(rating === 'good'){
    s.interval = s.reps ? Math.round(s.interval*s.ease) : 1;
    s.reps = (s.reps||0) + 1;
    s.due = now + s.interval*DAY;
  } else if(rating === 'easy'){
    s.ease = s.ease + 0.15;
    s.interval = s.reps ? Math.round(s.interval*s.ease*1.3) : 4;
    s.reps = (s.reps||0) + 1;
    s.due = now + s.interval*DAY;
  }
  s.lastRating = rating;
  s.lastReviewed = now;
  m[cid] = s;
  lsSet(LS_FLASHCARD_SRS, m);
  // ADDED: bump this study session's live stats (shown in the Stop & exit summary)
  fcState.session.reviewed = (fcState.session.reviewed||0) + 1;
  if(fcState.session[rating] !== undefined) fcState.session[rating] = (fcState.session[rating]||0) + 1;
  bumpGoalProgress('cards', 1); // ADDED: today's flashcards goal
}

function fcBuildPool(){
  let pool = APP.flatIndex.slice();
  if(fcState.filter === 'bookmarked'){
    pool = pool.filter(f => APP.historyMap[f.compositeId] && APP.historyMap[f.compositeId].bookmarked);
    // ADDED: optionally narrow bookmarked cards down to a single tag/list (Easy/Difficult/Hard/Silly Mistake/custom)
    if(fcState.bookmarkList){
      pool = pool.filter(f => { const h = APP.historyMap[f.compositeId]; return h && h.lists && h.lists.includes(fcState.bookmarkList); });
    }
  } else if(fcState.filter === 'subject' && fcState.subject){
    pool = pool.filter(f => f.subject === fcState.subject);
  } else if(fcState.filter === 'resource' && fcState.resource){
    pool = pool.filter(f => f.resourceId === fcState.resource);
  } else if(fcState.filter === 'decksubject' && fcState.resource && fcState.subject){
    // ADDED: study just one subject folder within one flashcard deck (from Flashcard Deck detail page)
    // FIXED: was f.subject === fcState.subject (exact match only) — the "🧠 Study folder" button
    // means "study everything in this folder", so a folder that also has nested subfolders under
    // it needs those included too, same fix as rename/delete/copy elsewhere in the subject tree.
    pool = pool.filter(f => f.resourceId === fcState.resource && pathIsSubjectOrDescendant(f.subject, fcState.subject));
  } else if(fcState.filter === 'lesson' && fcState.testId){
    // ADDED: study just one lesson/test within a flashcard deck (from Flashcard Deck detail page)
    pool = pool.filter(f => f.testId === fcState.testId);
  } else if(fcState.filter === 'due'){
    const now = Date.now();
    const m = fcSrsMap();
    pool = pool.filter(f => { const s = m[f.compositeId]; return !s || !s.lastRating || s.due <= now; });
  } else if(fcState.filter === 'completed'){
    // ADDED: Old/Completed — cards that have already been rated at least once, optionally narrowed to one rating
    const m = fcSrsMap();
    pool = pool.filter(f => { const s = m[f.compositeId]; return s && s.lastRating; });
    if(fcState.completedRating && fcState.completedRating !== 'all'){
      pool = pool.filter(f => { const s = m[f.compositeId]; return s.lastRating === fcState.completedRating; });
    }
  }
  fcState.pool = pool;
  fcState.order = pool.map((_,i)=>i);
  fcState.idx = 0;
  fcState.flipped = false;
  fcState.session = { reviewed: 0, again: 0, hard: 0, good: 0, easy: 0 }; // ADDED: fresh session stats every time the pool is (re)built
}

function fcShuffle(){
  const arr = fcState.order;
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  fcState.idx = 0;
  fcState.flipped = false;
  fcRenderStage();
}

function fcComputeStats(){
  const m = fcSrsMap();
  const now = Date.now();
  let stats = { total: APP.flatIndex.length, new:0, learning:0, mature:0, due:0 };
  for(const f of APP.flatIndex){
    const s = m[f.compositeId];
    const status = fcSrsStatus(s);
    if(status === 'new') stats.new++;
    else if(status === 'mature') stats.mature++;
    else stats.learning++;
    if(!s || !s.lastRating || s.due <= now) stats.due++;
  }
  return stats;
}

// ADDED: per-subject flashcard SRS breakdown (new/learning/mature/due counts), used by the
// Flashcard Analysis section on the Analytics page.
// ADDED: per-resource flashcard SRS breakdown (new/learning/mature/due counts), used by the
// "By resource" sub-section inside Flashcard analysis.
function fcComputeResourceBreakdown(){
  const m = fcSrsMap();
  const now = Date.now();
  const byRes = {};
  for(const f of APP.flatIndex){
    const t = (byRes[f.resourceId] = byRes[f.resourceId] || {total:0, new:0, learning:0, mature:0, due:0});
    t.total++;
    const s = m[f.compositeId];
    const status = fcSrsStatus(s);
    if(status==='new') t.new++;
    else if(status==='mature') t.mature++;
    else t.learning++;
    if(!s || !s.lastRating || s.due<=now) t.due++;
  }
  return byRes;
}

function fcComputeSubjectBreakdown(){
  const m = fcSrsMap();
  const now = Date.now();
  const bySubj = {};
  for(const f of APP.flatIndex){
    const t = (bySubj[f.subject] = bySubj[f.subject] || {total:0, new:0, learning:0, mature:0, due:0});
    t.total++;
    const s = m[f.compositeId];
    const status = fcSrsStatus(s);
    if(status==='new') t.new++;
    else if(status==='mature') t.mature++;
    else t.learning++;
    if(!s || !s.lastRating || s.due<=now) t.due++;
  }
  return bySubj;
}

// ADDED: aggregate last-rating distribution (Again/Hard/Good/Easy), lapses, and average ease
// across every flashcard that has been rated at least once, for the Flashcard Analysis section.
function fcComputeRatingBreakdown(){
  const m = fcSrsMap();
  let again=0, hard=0, good=0, easy=0, totalLapses=0, easeSum=0, touched=0;
  for(const cid in m){
    const s = m[cid];
    if(!s) continue;
    touched++;
    totalLapses += (s.lapses||0);
    easeSum += (typeof s.ease === 'number' ? s.ease : 2.5);
    if(s.lastRating==='again') again++;
    else if(s.lastRating==='hard') hard++;
    else if(s.lastRating==='good') good++;
    else if(s.lastRating==='easy') easy++;
  }
  const ratedTotal = again+hard+good+easy;
  const retention = ratedTotal ? Math.round((good+easy)/ratedTotal*100) : 0;
  const avgEase = touched ? (easeSum/touched) : 2.5;
  return { again, hard, good, easy, ratedTotal, totalLapses, avgEase, retention };
}

      else if(!fcState.resource && resourcesAll.length) fcState.resource = resourcesAll[0].id;
      if(fcState.filter !== 'bookmarked') fcState.bookmarkList = '';
      if(fcState.filter !== 'completed') fcState.completedRating = 'all';
      renderFlashcardsPage();
    };
  });
  const subjSel = document.getElementById('fc-subject-select');
  if(subjSel) subjSel.onchange = ()=>{ fcState.subject = subjSel.value; fcBuildPool(); fcRenderStartScreen(); };
  const resSel = document.getElementById('fc-resource-select');
  if(resSel) resSel.onchange = ()=>{ fcState.resource = resSel.value; fcBuildPool(); fcRenderStartScreen(); };
  // ADDED: tag select (Bookmarked) and rating select (Old/Completed)
  const bmListSel = document.getElementById('fc-bookmarklist-select');
  if(bmListSel) bmListSel.onchange = ()=>{ fcState.bookmarkList = bmListSel.value; fcBuildPool(); fcRenderStartScreen(); };
  const completedRatingSel = document.getElementById('fc-completed-rating-select');
  if(completedRatingSel) completedRatingSel.onchange = ()=>{ fcState.completedRating = completedRatingSel.value; fcBuildPool(); fcRenderStartScreen(); };
  document.getElementById('fc-shuffle-btn').onclick = ()=>{ fcShuffle(); fcRenderStartScreen(); };

  // ADDED: Import Flashcards (.apkg) — click the button to open a hidden
  // file picker, then parse + import every selected .apkg on change.
  const apkgBtn = document.getElementById('fc-import-apkg-btn');
  const apkgInput = document.getElementById('fc-apkg-input');
  if(apkgBtn && apkgInput){
    apkgBtn.onclick = ()=> apkgInput.click();
    apkgInput.onchange = async ()=>{
      const files = Array.from(apkgInput.files||[]);
      apkgInput.value = '';
      if(!files.length) return;
      const origHtml = apkgBtn.innerHTML;
      apkgBtn.disabled = true;
      apkgBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:6px;"></i>Importing…';
      let successCount = 0, failCount = 0, newQuestions = 0, newTests = 0;
      const errorDetails = []; // ADDED: per-file reasons, shown in the notification instead of just a bare fail count
      for(const f of files){
        try{
          const res = await importApkgFile(f);
          if(res){ successCount++; newQuestions += res.stats.questions; newTests += res.stats.tests; }
          else { failCount++; errorDetails.push(`${f.name}: no valid cards found in this file`); }
        }catch(e){ console.error(e); failCount++; errorDetails.push(`${f.name}: ${e && e.message ? e.message : 'failed to import'}`); }
      }
      apkgBtn.disabled = false;
      apkgBtn.innerHTML = origHtml;
      // CHANGED: notify on failure too, not only on success — a batch that fails entirely used to show nothing at all
      if(successCount || failCount) showImportNotification(successCount, failCount, newQuestions, newTests, errorDetails);
      renderFlashcardsPage();
    };
  }

  fcRenderStartScreen();
}

// ADDED: relative/short timestamp formatter for the recent-sessions list ("Today 3:40 PM", "Yesterday", or a date)
function fmtSessionWhen(ts){
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString()===now.toDateString();
  const yest = new Date(now); yest.setDate(now.getDate()-1);
  const isYest = d.toDateString()===yest.toDateString();
  const time = d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  if(sameDay) return `Today, ${time}`;
  if(isYest) return `Yesterday, ${time}`;
  return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ', ' + time;
}

// ADDED: renders the active practice card into the full-screen overlay (#fc-fullscreen-overlay).
// The top bar carries the progress indicator, the live Again/Hard/Good/Easy session tally, and
// the Exit button, all in one row so the counts sit right alongside the exit control.
function fcRenderStage(){
  const stage = document.getElementById('fc-fullscreen-overlay');
  if(!stage) return;
  const pool = fcState.pool;
  if(!pool.length){
    // Nothing left to study (e.g. pool emptied out from under us) — just close back out.
    fcCloseFullscreenOverlay();
    renderFlashcardsPage();
    return;
  }
  const fq = pool[fcState.order[fcState.idx]];
  const q = fq.q;
  const srs = fcSrsFor(fq.compositeId);
  const status = fcSrsStatus(srs);
  const statusLabel = status==='new' ? '<span style="color:var(--blue-status);">● new</span>'
    : status==='mature' ? '<span style="color:var(--green-status);">● mature</span>'
    : '<span style="color:var(--orange-status);">● learning</span>';
  const correctLabel = correctLabelOf(q);
  const questionHtml = sanitizeHtml(q.raw_text || escapeHtml(q.text||''));
  const s = fcState.session;
  stage.innerHTML = `
    <!-- ADDED: top bar — progress + live session tally on the left, Exit in the corner on the right -->
    <div class="fc-fs-topbar">
      <div>
        <div class="fc-fs-progress">Card ${fcState.idx+1} of ${pool.length} · ${escapeHtml(fq.subject)} · ${statusLabel}</div>
        <div class="fc-fs-session-stats">
          <span>Reviewed <b>${s.reviewed}</b></span>
          <span style="color:var(--red-status);">Again ${s.again}</span>
          <span style="color:var(--orange-status);">Hard ${s.hard}</span>
          <span style="color:var(--blue-status);">Good ${s.good}</span>
          <span style="color:var(--green-status);">Easy ${s.easy}</span>
        </div>
      </div>
      <button class="fc-fs-exit-btn" id="fc-stop-btn" title="End this study session"><i class="fa-solid fa-xmark" style="margin-right:6px;"></i>End session</button>
    </div>
    <div class="fc-stage">
      <div class="fc-card-outer ${fcState.flipped?'flipped':''}" id="fc-card">
        <div class="fc-card-inner">
          <div class="fc-face fc-face-front">
            <div class="fc-face-scroll">
              <div class="fc-face-label">Question</div>
              <div class="fc-face-body">${questionHtml}</div>
              <div class="fc-face-hint">Tap card to flip</div>
            </div>
          </div>
          <div class="fc-face fc-face-back">
            <div class="fc-face-scroll">
              <div class="fc-face-label">Question</div>
              <div class="fc-face-body" style="flex:none;margin-bottom:10px;">${questionHtml}</div>
              <div class="fc-face-label">Answer</div>
              <div class="fc-answer-pill">${escapeHtml(correctLabel||'?')} — ${escapeHtml(correctAnswerTextOnly(q, correctLabel))}</div>
              <div class="fc-face-body explain-box">${sanitizeHtml(q.explanation||'No explanation provided.')}</div>
              <div class="fc-face-hint">Tap card to flip back</div>
            </div>
          </div>
        </div>
      </div>
      ${fcState.flipped ? `
      <!-- ADDED: Anki-style 4-button rating row, shown once the answer is revealed -->
      <div class="fc-rate-row">
        <button class="fc-rate-btn fc-rate-again" data-fc-rate="again">Again</button>
        <button class="fc-rate-btn fc-rate-hard" data-fc-rate="hard">Hard</button>
        <button class="fc-rate-btn fc-rate-good" data-fc-rate="good">Good</button>
        <button class="fc-rate-btn fc-rate-easy" data-fc-rate="easy">Easy</button>
      </div>` : ''}
      <div class="fc-controls">
        <button class="btn btn-outline btn-sm" id="fc-prev" ${fcState.idx===0?'disabled':''}>← Prev</button>
        <button class="btn btn-outline btn-sm" id="fc-next" ${fcState.idx===pool.length-1?'disabled':''}>Next →</button>
      </div>
    </div>
  `;

  document.getElementById('fc-card').onclick = ()=>{
    fcState.flipped = !fcState.flipped;
    fcRenderStage();
  };
  document.getElementById('fc-stop-btn').onclick = (e)=>{
    e.stopPropagation();
    fcShowStopSummary();
  };
  document.getElementById('fc-prev').onclick = (e)=>{
    e.stopPropagation();
    if(fcState.idx>0){ fcState.idx--; fcState.flipped=false; fcRenderStage(); }
  };
  document.getElementById('fc-next').onclick = (e)=>{
    e.stopPropagation();
    if(fcState.idx<pool.length-1){ fcState.idx++; fcState.flipped=false; fcRenderStage(); }
  };
  stage.querySelectorAll('[data-fc-rate]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      fcRate(fq.compositeId, btn.dataset.fcRate);
      if(fcState.idx < pool.length-1){ fcState.idx++; }
      fcState.flipped = false;
      fcRenderStage();
    };
  });
}

// ADDED: reset back to the neutral "All" picker state and go back to whichever tab the
// study session should return to (Flashcard Deck detail if launched from there, otherwise Flashcards)
function fcExitSession(){
  // ADDED: persist this session to history (shown on the launch screen) before resetting state
  if(fcState.session.reviewed > 0){
    fcSaveSessionRecord({
      ts: Date.now(),
      reviewed: fcState.session.reviewed,
      again: fcState.session.again,
      hard: fcState.session.hard,
      good: fcState.session.good,
      easy: fcState.session.easy,
      total: fcState.pool.length
    });
    checkAchievements(); // ADDED: flashcard-volume achievements may now be met
  }
  fcCloseFullscreenOverlay();
  const cameFromDeck = (fcState.filter === 'decksubject' || fcState.filter === 'lesson' || fcState.filter === 'resource') && fcState.resource;
  const returnDeckId = fcState.resource;
  fcState.filter = 'all';
  fcState.subject = '';
  fcState.resource = '';
  fcState.testId = '';
  fcState.bookmarkList = '';
  fcState.flipped = false;
  if(cameFromDeck && APP.resources.find(r=>r.id===returnDeckId && r.isFlashcardDeck)){
    openFlashcardDeckDetail(returnDeckId);
  } else {
    renderFlashcardsPage();
  }
}

      <div>
        <h1 style="font-size:1.5rem;font-weight:800;margin:0 0 4px;">🗃️ Flashcard Decks</h1>
        <div class="muted" style="font-size:.86rem;">${decks.length} deck${decks.length===1?'':'s'} · ${totalCards.toLocaleString()} cards imported</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <select class="fc-select" id="fcd-sort-select" title="Sort decks">
          ${Object.keys(RESOURCE_SORT_LABELS).map(m=>`<option value="${m}" ${sortMode===m?'selected':''}>${RESOURCE_SORT_LABELS[m]}</option>`).join('')}
        </select>
        <button class="btn btn-outline btn-sm" id="fcd-template-btn" title="Download a blank .txt template — shows the exact format to write in GoodNotes or any editor"><i class="fa-solid fa-file-arrow-down" style="margin-right:6px;"></i>Download Template</button>
        <button class="btn btn-outline btn-sm" id="fcd-import-text-btn"><i class="fa-solid fa-file-lines" style="margin-right:6px;"></i>Import from Text</button>
        <button class="btn btn-accent btn-sm" id="fcd-import-btn"><i class="fa-solid fa-file-import" style="margin-right:6px;"></i>Import .apkg Deck</button>
      </div>
    </div>
    <input type="file" id="fcd-apkg-input" accept=".apkg" multiple class="hidden">
    <div id="fcd-import-status" style="margin-bottom:12px;"></div>
    <div id="fcd-cards"></div>
  `;

  // CHANGED: wire the sort dropdown — this now persists to its OWN setting (fcDeckSortMode),
  // completely separate from the Resources tab's resourceSortMode.
  const fcdSortSel = document.getElementById('fcd-sort-select');
  if(fcdSortSel) fcdSortSel.onchange = ()=>{
    APP.settings.fcDeckSortMode = fcdSortSel.value;
    lsSet(LS_SETTINGS, APP.settings);
    renderFlashcardDecksPage();
  };

  // ADDED: "Import from Text" — for content that has no native flashcard export (handwritten/typed
  // notes from apps like GoodNotes, plain notes, etc.) — see openImportTextDeckModal()
  const importTextBtn = document.getElementById('fcd-import-text-btn');
  if(importTextBtn) importTextBtn.onclick = ()=>openImportTextDeckModal();

  // ADDED: standalone template download, outside the Import from Text modal, so it
  // can be grabbed straight from the deck list without opening the import flow first
  const templateBtn = document.getElementById('fcd-template-btn');
  if(templateBtn) templateBtn.onclick = ()=>downloadFlashcardImportTemplateTxt();

  const importBtn = document.getElementById('fcd-import-btn');
  const importInput = document.getElementById('fcd-apkg-input');
  importBtn.onclick = ()=>importInput.click();
  importInput.onchange = async ()=>{
    const files = Array.from(importInput.files||[]);
    importInput.value = '';
    if(!files.length) return;
    const origHtml = importBtn.innerHTML;
    importBtn.disabled = true;
    importBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:6px;"></i>Importing…';
    let successCount = 0, failCount = 0, newQuestions = 0, newTests = 0;
    const errorDetails = []; // ADDED: per-file reasons, shown in the notification instead of just a bare fail count
    for(const f of files){
      try{
        const res = await importApkgFile(f);
        if(res){ successCount++; newQuestions += res.stats.questions; newTests += res.stats.tests; }
        else { failCount++; errorDetails.push(`${f.name}: no valid cards found in this file`); }
      }catch(e){ console.error(e); failCount++; errorDetails.push(`${f.name}: ${e && e.message ? e.message : 'failed to import'}`); }
    }
    importBtn.disabled = false;
    importBtn.innerHTML = origHtml;
    // CHANGED: notify on failure too, not only on success — a batch that fails entirely used to show nothing at all
    if(successCount || failCount) showImportNotification(successCount, failCount, newQuestions, newTests, errorDetails);
    renderFlashcardDecksPage();
  };

  const cardsWrap = document.getElementById('fcd-cards');
  if(decks.length === 0){
    cardsWrap.innerHTML = `<div class="card" style="padding:40px;text-align:center;">
      ${companionAllowed('home') ? `<div style="display:flex;justify-content:center;margin-bottom:8px;">${pickCompanionAvatarDiv()}</div>` : `<div style="font-size:1.8rem;margin-bottom:8px;">🗃️</div>`}
      <div style="font-weight:600;">No flashcard decks yet</div>
      <div class="muted" style="font-size:.82rem;">Import an Anki .apkg file, or paste/upload text to get started.</div>
    </div>`;
    return;
  }

  cardsWrap.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;">
    ${decks.map(r=>{
      const deckCards = APP.flatIndex.filter(f=>f.resourceId===r.id);
      const m = fcSrsMap();
      const dueCount = deckCards.filter(f=>{ const s=m[f.compositeId]; return !s || !s.lastRating || s.due<=Date.now(); }).length;
      return `<div class="card res-card" data-open-deck="${r.id}" style="cursor:pointer;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
          <div class="res-title">${escapeHtml(r.name)}</div>
          <div style="display:flex;align-items:center;gap:4px;">
            <button class="rename-icon-btn" data-rename-deck="${r.id}" title="Rename deck"><i class="fa-solid fa-pen"></i></button>
            <button class="res-delete-icon" data-remove-deck="${r.id}" title="Delete deck"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>
        <div class="res-meta">${r.stats.questions.toLocaleString()} cards · ${dueCount.toLocaleString()} due now</div>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn btn-accent btn-sm" data-study-deck="${r.id}" style="flex:1;">Study this deck</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;

  cardsWrap.querySelectorAll('[data-study-deck]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      fcState.filter = 'resource';
      fcState.resource = btn.dataset.studyDeck;
      setTab('flashcards');
    };
  });
  cardsWrap.querySelectorAll('[data-open-deck]').forEach(card=>{
    card.addEventListener('click', ()=>openFlashcardDeckDetail(card.dataset.openDeck));
  });
  cardsWrap.querySelectorAll('[data-remove-deck]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      deleteResourceById(btn.dataset.removeDeck).then(()=>{
        if(APP.currentTab==='flashcarddecks') renderFlashcardDecksPage();
      });
    };
  });
  cardsWrap.querySelectorAll('[data-rename-deck]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      const resId = btn.dataset.renameDeck;
      const r = APP.resources.find(x=>x.id===resId);
      if(!r) return;
      const nameEl = btn.closest('.res-card').querySelector('.res-title');
      startInlineRename(nameEl, r.name, (newName)=>renameResource(resId, newName));
    };
  });
}

/* ============================================================
   ADDED: FLASHCARD DECK DETAIL — opened by clicking a deck card on the
   Flashcard Decks tab. Mirrors the Resources tab's resource-detail
   folder/lesson tree (renderResourceDetail) but read-only (no add/edit/
   reorder/copy-paste — decks come from imported .apkg files, not the
   manual QBank editor) and every "Practice" action here launches the
   Flashcards study page instead of a timed/graded practice session.
   ============================================================ */
let fcdEditMode = false;      // ADDED: whether the flashcard-deck folder/lesson tree is in "edit" (reorder/rename/copy/cut/delete) mode
let fcdWorkingOrder = null;   // ADDED: subject order being edited (not yet saved), same pattern as resDetailWorkingOrder
let fcdZoomPath = null;       // ADDED: when set, the folder/subfolder ("::" path) currently opened into its own zoomed-in page; null = show the full tree
function fcdZoomTo(path){ fcdZoomPath = path || null; renderFlashcardDeckDetail(APP.flashcardDeckDetailResId); } // ADDED: called from breadcrumb/back-button clicks (global so inline onclick="" HTML can reach it)

function openFlashcardDeckDetail(resId){
  APP.currentTab = 'flashcarddeck';
  APP.flashcardDeckDetailResId = resId; // ADDED: lets fcdZoomTo() re-render without needing a closure over resId
  fcdEditMode = false;         // ADDED: always start a freshly-opened deck out of edit mode
  fcdWorkingOrder = null;
  fcdZoomPath = null;          // ADDED: always start out of a zoomed-in folder page
  document.querySelectorAll('.navtab').forEach(b=>b.classList.remove('active'));
  ['view-home','view-resources','view-practice','view-analytics','view-bookmarks','view-flashcards','view-flashcarddecks','view-topics','view-resource','view-review','view-quizreview']
    .forEach(id=>{ const e=document.getElementById(id); if(e) e.classList.add('hidden'); });
  document.getElementById('view-flashcarddeck').classList.remove('hidden');
  renderFlashcardDeckDetail(resId);
  window.scrollTo({top:0});
}
function closeFlashcardDeckDetail(){ setTab('flashcarddecks'); }

function renderFlashcardDeckDetail(resId){
  const el = document.getElementById('view-flashcarddeck');
  const res = APP.resources.find(r=>r.id===resId && r.isFlashcardDeck);
  if(!res){ closeFlashcardDeckDetail(); return; }

  const deckCards = APP.flatIndex.filter(f=>f.resourceId===resId);
  const m = fcSrsMap();
  const dueCount = deckCards.filter(f=>{ const s=m[f.compositeId]; return !s || !s.lastRating || s.due<=Date.now(); }).length;

  // group into folder(subject) -> lesson(test) tree, same shape as the Resources tab tree
  const bySubject = {};
  for(const t of res.tests){
    const subj = subjectOf(t);
    (bySubject[subj] = bySubject[subj] || []).push(t);
  }
  // ADDED: seed in any empty subject folders (created via "Add Subject" with no tests yet)
  // so they still show up in the tree with zero lessons inside.
  (res.emptySubjects||[]).forEach(s=>{ if(!bySubject[s]) bySubject[s] = []; });
  const defaultOrder = Object.keys(bySubject).sort();
  // ADDED: respect saved custom subject order (res.subjectOrder), same mechanism the Resources tab uses
  const savedOrder = Array.isArray(res.subjectOrder) ? res.subjectOrder.filter(s=>bySubject[s]) : [];
  defaultOrder.slice().reverse().forEach(s=>{ if(!savedOrder.includes(s)) savedOrder.unshift(s); }); // CHANGED: newly created subject folders are placed at the top instead of appended at the bottom
  const baseOrder = savedOrder.length ? savedOrder : defaultOrder;
  const subjSortMode = (APP.settings && APP.settings.fcDeckSubjectSortMode) || 'custom'; // CHANGED: this deck screen's OWN folder-level sort choice, independent from the Resources tab's subjectSortMode
  // ADDED: while editing, use the in-progress working order so arrow clicks reorder instantly without saving
  // (only meaningful in 'custom' mode — a name sort recomputes fresh every render regardless of edits)
  if(fcdEditMode && subjSortMode==='custom'){
    if(!fcdWorkingOrder) fcdWorkingOrder = baseOrder.slice();
    fcdWorkingOrder = fcdWorkingOrder.filter(s=>bySubject[s]);
    baseOrder.forEach(s=>{ if(!fcdWorkingOrder.includes(s)) fcdWorkingOrder.push(s); });
  }
  let subjects;
  if(subjSortMode === 'name-asc') subjects = baseOrder.slice().sort((a,b)=>a.localeCompare(b));
  else if(subjSortMode === 'name-desc') subjects = baseOrder.slice().sort((a,b)=>b.localeCompare(a));
  else if(subjSortMode === 'number') subjects = baseOrder.slice().sort(naturalCompare); // ADDED: numeric-aware sort, e.g. "Lesson 2" before "Lesson 10"
  else if(subjSortMode === 'created-desc') subjects = baseOrder.slice().sort((a,b)=>((res.subjectCreatedAt&&res.subjectCreatedAt[b])||0)-((res.subjectCreatedAt&&res.subjectCreatedAt[a])||0)); // ADDED: newest-created folder first; unstamped (legacy) folders sort last
  else subjects = fcdEditMode ? fcdWorkingOrder : baseOrder;

  // ADDED: edit-mode toolbar buttons — same pattern as the Resources tab's Edit/Save/Paste buttons
  const saveOrderBtnHtml = (fcdEditMode && subjSortMode==='custom')
    ? `<button class="btn btn-accent btn-sm" id="fcd-save-order-btn"><i class="fa-solid fa-floppy-disk" style="margin-right:6px;"></i>Save changes</button>`
    : '';
  const pasteSubjectBtnHtml = (fcdEditMode && treeClipboard && treeClipboard.type==='subject')
    ? `<button class="btn btn-accent btn-sm" id="fcd-paste-subject-btn" title="Paste the copied/cut subject folder into this deck"><i class="fa-solid fa-paste" style="margin-right:6px;"></i>Paste "${escapeHtml(treeClipboard.sourceSubject)}"</button>`
    : '';

  // ADDED: a saved zoom path only counts if it still resolves to something real (an exact subject,
  // or a "::" prefix at least one subject still lives under) — otherwise a rename/delete elsewhere
  // could strand the page on an empty zoomed-in view, so fall back to the full tree instead.
  if(fcdZoomPath && !bySubject.hasOwnProperty(fcdZoomPath) && !subjects.some(s=>s.startsWith(fcdZoomPath+'::'))){
    fcdZoomPath = null;
  }
  const fcdZoomBreadcrumbHtml = fcdZoomPath
    ? `<div class="zoom-crumbs">${buildZoomBreadcrumbHtml(fcdZoomPath, 'All subjects', 'fcdZoomTo')}</div>`
    : '';
  // ADDED: when zoomed into one exact subject folder, its folder-level actions (Study folder,
  // +Test, download/copy/move/delete in edit mode) now live in this compact row next to the
  // breadcrumb instead of a redundant header card repeating the folder name/count shown above.
  const fcdZoomedToLeafForActions = fcdZoomPath && bySubject.hasOwnProperty(fcdZoomPath);
  const fcdZoomFolderActionsHtml = fcdZoomedToLeafForActions ? (()=>{
    const subj = fcdZoomPath;
    return `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;">
      <button class="rename-icon-btn" data-rename-subject="${escapeHtml(subj)}" title="Rename this folder"><i class="fa-solid fa-pen"></i></button>
      <button class="btn btn-outline btn-sm" data-study-folder="${escapeHtml(subj)}">🧠 Study folder</button>
      <button class="btn btn-outline btn-sm" data-add-test-to-subject="${escapeHtml(subj)}" title="Add a new test/lesson under this subject"><i class="fa-solid fa-plus"></i> Test</button>
      <button class="btn btn-outline btn-sm" data-download-folder="${escapeHtml(subj)}" title="Download this subject" style="${fcdEditMode?'':'display:none;'}"><i class="fa-solid fa-download"></i></button>
      ${fcdEditMode && treeClipboard && treeClipboard.type==='test' ? `<button class="btn btn-outline btn-sm" data-paste-test-into="${escapeHtml(subj)}" title="Paste the copied/cut test/lesson into this subject"><i class="fa-solid fa-paste"></i> Paste</button>` : ''}
      ${fcdEditMode?`<button class="btn btn-outline btn-sm" data-copy-subject="${escapeHtml(subj)}" title="Copy this subject folder"><i class="fa-solid fa-copy"></i></button>
      <button class="btn btn-outline btn-sm" data-move-subject="${escapeHtml(subj)}" title="Cut this subject folder (paste it into another subject folder/deck)"><i class="fa-solid fa-scissors"></i></button>`:''}
      <button class="btn btn-danger btn-sm" data-delete-subject="${escapeHtml(subj)}" title="Delete this entire subject" style="${fcdEditMode?'':'display:none;'}"><i class="fa-solid fa-trash"></i></button>
    </div>`;
  })() : '';

  el.innerHTML = `
    <button class="btn btn-outline btn-sm" id="fcd-detail-back" style="margin-bottom:16px;"><i class="fa-solid fa-arrow-left" style="margin-right:6px;"></i>Back to Flashcard Decks</button>
    <div class="card" style="padding:20px;margin-bottom:20px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;">
        <div>
          <div style="display:flex;align-items:center;gap:6px;">
            <h1 id="fcd-detail-name" style="font-size:1.35rem;font-weight:800;margin:0 0 4px;">${escapeHtml(res.name)}</h1>
            <button class="rename-icon-btn" id="fcd-detail-rename-btn" title="Rename deck"><i class="fa-solid fa-pen"></i></button>
          </div>
          <div class="muted" style="font-size:.82rem;">${res.stats.tests} lesson${res.stats.tests===1?'':'s'} · ${res.stats.questions.toLocaleString()} cards · ${subjects.length} subject${subjects.length===1?'':'s'} · ${dueCount.toLocaleString()} due now</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-outline btn-sm" id="fcd-detail-download-btn"><i class="fa-solid fa-download" style="margin-right:6px;"></i>Download</button>
          <button class="btn btn-danger btn-sm" id="fcd-detail-delete"><i class="fa-solid fa-trash" style="margin-right:6px;"></i>Delete deck</button>
        </div>
      </div>
      <button class="btn btn-accent" id="fcd-detail-study-all" style="margin-top:14px;">🧠 Study entire deck as flashcards</button>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
      <div style="font-weight:700;font-size:.9rem;">📂 Subjects & lessons</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <select class="fc-select" id="fcd-subject-sort-select" title="Sort subject folders">
          ${Object.keys(SUBJECT_SORT_LABELS).map(m=>`<option value="${m}" ${subjSortMode===m?'selected':''}>${SUBJECT_SORT_LABELS[m]}</option>`).join('')}
        </select>
        <button class="btn btn-accent btn-sm" id="fcd-add-btn"><i class="fa-solid fa-plus" style="margin-right:6px;"></i>Add</button>
        <button class="btn btn-outline btn-sm" id="fcd-edit-btn"><i class="fa-solid ${fcdEditMode?'fa-xmark':'fa-pen'}" style="margin-right:6px;"></i>${fcdEditMode?'Cancel':'Edit'}</button>
        ${saveOrderBtnHtml}
        ${pasteSubjectBtnHtml}
      </div>
    </div>
    ${fcdZoomBreadcrumbHtml}
    ${fcdZoomFolderActionsHtml}
    <div id="fcd-detail-tree"></div>
  `;

  // CHANGED: wire the folder-sort dropdown — persists to fcDeckSubjectSortMode, this deck screen's
  // OWN setting, fully separate from the Resources tab's subjectSortMode. Switching away from
  // "Custom order" also drops out of edit mode's reorder arrows since a name sort recomputes fresh every render.
  const fcdSubjSortSel = document.getElementById('fcd-subject-sort-select');
  if(fcdSubjSortSel) fcdSubjSortSel.onchange = ()=>{
    APP.settings.fcDeckSubjectSortMode = fcdSubjSortSel.value;
    lsSet(LS_SETTINGS, APP.settings);
    renderFlashcardDeckDetail(resId);
  };

  const treeWrap = document.getElementById('fcd-detail-tree');
  // ADDED: builds the standalone "folder page" shown after tapping a folder — a header card with
  // the folder's name/counts/actions, followed by a flat list of lesson cards (no accordion nesting).
  function buildFcdFolderPageHtml(subj){
    const rawTests = bySubject[subj] || [];
    // FIXED: same fix as the (fully separate) Resources system — lessons previously always used
    // the saved custom order and ignored the folder-sort dropdown entirely once you were on a leaf
    // folder's lesson list. Now lessons follow subjSortMode the same way subject folders do.
    let tests;
    if(subjSortMode === 'name-asc') tests = rawTests.slice().sort((a,b)=>lessonNameOf(a).localeCompare(lessonNameOf(b)));
    else if(subjSortMode === 'name-desc') tests = rawTests.slice().sort((a,b)=>lessonNameOf(b).localeCompare(lessonNameOf(a)));
    else if(subjSortMode === 'number') tests = rawTests.slice().sort((a,b)=>naturalCompare(lessonNameOf(a), lessonNameOf(b))); // ADDED: numeric-aware lesson-name sort
    else if(subjSortMode === 'created-desc') tests = rawTests.slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); // ADDED: newest-created lesson first
    else tests = orderedTestsFor(res, subj, rawTests); // 'custom' — respect saved lesson order
    const lessons = tests.map((t, idx)=>{
      // CHANGED: reorder arrows now also require subjSortMode==='custom' — matches the
      // subject-folder arrows' gating, for the same reason (see Resources-tab comment).
      const arrowsHtml = (fcdEditMode && subjSortMode==='custom' && tests.length > 1) ? `<div class="lesson-arrows">
        <button class="tree-arrow-btn" data-move-test-up="${escapeHtml(t.id)}" data-subject="${escapeHtml(subj)}" title="Move up" ${idx===0?'disabled':''}><i class="fa-solid fa-arrow-up"></i></button>
        <button class="tree-arrow-btn" data-move-test-down="${escapeHtml(t.id)}" data-subject="${escapeHtml(subj)}" title="Move down" ${idx===tests.length-1?'disabled':''}><i class="fa-solid fa-arrow-down"></i></button>
      </div>` : '';
      return `<div class="card lesson-card">
      <i class="fa-solid fa-file-lines" style="color:var(--muted);"></i>
      <span class="lesson-name-text">${escapeHtml(lessonNameOf(t))}</span>
      ${arrowsHtml}
      <button class="rename-icon-btn" data-rename-test="${escapeHtml(t.id)}" data-subject="${escapeHtml(subj)}" title="Rename lesson" style="${fcdEditMode?'':'display:none;'}"><i class="fa-solid fa-pen"></i></button>
      <span class="tree-lesson-count">${(t.questions||[]).length} cards</span>
      <button class="btn btn-outline btn-sm" data-study-lesson="${escapeHtml(t.id)}" style="margin-left:auto;">🧠 Study</button>
      <button class="btn btn-outline btn-sm" data-download-lesson="${escapeHtml(t.id)}" title="Download this lesson" style="${fcdEditMode?'':'display:none;'}"><i class="fa-solid fa-download"></i></button>
      ${fcdEditMode?`<button class="btn btn-outline btn-sm" data-copy-test="${escapeHtml(t.id)}" title="Copy this test/lesson"><i class="fa-solid fa-copy"></i></button>
      <button class="btn btn-outline btn-sm" data-move-test="${escapeHtml(t.id)}" title="Cut this test/lesson (paste it into another subject folder/deck)"><i class="fa-solid fa-scissors"></i></button>`:''}
      <button class="btn btn-danger btn-sm" data-delete-test="${escapeHtml(t.id)}" title="Delete this test/lesson" style="${fcdEditMode?'':'display:none;'}"><i class="fa-solid fa-trash"></i></button>
    </div>`;
    }).join('');
    return lessons || `<div class="card" style="padding:30px;text-align:center;"><span class="muted">No lessons in this folder yet.</span></div>`;
  }
  // SIMPLIFIED: same fix as the (fully separate) Resources system — show only the CURRENT level's
  // direct subfolders (clean names, one consistent row style, no recursive inline nesting) plus
  // any lessons this exact folder owns directly, instead of the old recursive tree that produced
  // odd-looking duplicate/mismatched rows. Clicking a folder navigates one level deeper via fcdZoomTo.
  const fcdOwnLessonsHtml = (fcdZoomPath && bySubject[fcdZoomPath] && bySubject[fcdZoomPath].length)
    ? buildFcdFolderPageHtml(fcdZoomPath) : '';
  const fcdFolderRowsHtml = buildFolderChildrenHtml(subjects, fcdZoomPath, 'cards', 'fcdZoomTo', fcdEditMode && subjSortMode==='custom');
  const fcdIsPureLeaf = fcdZoomPath && !fcdFolderRowsHtml; // zoomed folder has no subfolders of its own
  treeWrap.innerHTML = fcdIsPureLeaf
    ? buildFcdFolderPageHtml(fcdZoomPath)
    : ((fcdFolderRowsHtml + fcdOwnLessonsHtml) || `<div class="card" style="padding:30px;text-align:center;" class="muted">No lessons found${fcdZoomPath?' in this subfolder':' in this deck'}.</div>`);

  document.getElementById('fcd-detail-back').onclick = closeFlashcardDeckDetail;
  document.getElementById('fcd-detail-download-btn').onclick = ()=> openFlashcardDownloadModal(
    res.name,
    ()=>downloadFlashcardDeckExport(res.id),
    ()=>downloadFlashcardDeckAsText(res.id),
    ()=>downloadFlashcardDeckAsGoodnotesCsv(res.id),
    ()=>downloadFlashcardDeckAsPdf(res.id)
  );
  document.getElementById('fcd-detail-delete').onclick = ()=>{
    deleteResourceById(res.id).then(()=>{
      if(APP.currentTab==='flashcarddeck') closeFlashcardDeckDetail();
    });
  };
  document.getElementById('fcd-detail-rename-btn').onclick = (e)=>{
    e.stopPropagation();
    const nameEl = document.getElementById('fcd-detail-name');
    startInlineRename(nameEl, res.name, (newName)=>renameResource(res.id, newName).then(()=>renderFlashcardDeckDetail(res.id)));
  };
  document.getElementById('fcd-detail-study-all').onclick = ()=>{
    fcState.filter = 'resource';
    fcState.resource = res.id;
    fcState.subject = '';
    fcState.testId = '';
    setTab('flashcards');
  };

  // ADDED: header "Add" button — opens a chooser to pick Subject (folder) or Test/Lesson, then create
  const addBtn = document.getElementById('fcd-add-btn');
  // FIXED: same root-cause as Resources — pass the current zoom path whenever we're zoomed into
  // any folder (leaf or one that already has subfolders) so nesting keeps working indefinitely.
  if(addBtn) addBtn.onclick = ()=>openAddChooserModal(res.id, subjects, fcdZoomPath || null);

function bumpStreak(count){
  const t = todayStr();
  APP.streak[t] = (APP.streak[t]||0) + count;
  lsSet(LS_STREAK, APP.streak);
}
function currentStreakDays(){
  let streak = 0;
  let d = new Date();
  while(true){
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(APP.streak[key] && APP.streak[key] > 0){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

/* ============================================================
   ADDED: TODAY'S GOALS — three small daily targets (questions answered,
   study minutes, flashcards reviewed) shown on the Home page. Progress is
   tracked in real time (bumped from finalizeSubmit(), fcRate(), and
   studyModeTick() below) rather than re-derived from scattered timestamps,
   so it stays cheap and exact. Resets itself automatically the instant
   todayStr() rolls over to a new calendar day. Targets are user-editable
   via the gear icon on the Home card (openGoalsEditModal()).
   ============================================================ */
function getGoalProgress(){
  const t = todayStr();
  if(!APP.goalProgress || APP.goalProgress.date !== t){
    APP.goalProgress = { date:t, questions:0, focusSeconds:0, cards:0, celebrated:{}, allHit:false };
    lsSet(LS_GOAL_PROGRESS, APP.goalProgress);
  }
  return APP.goalProgress;
}
function goalTargets(){
  return {
    questions: Math.max(1, APP.settings.dailyGoalQuestions || 20),
    focusSeconds: Math.max(1, (APP.settings.dailyGoalMinutes || 30) * 60),
    cards: Math.max(1, APP.settings.dailyGoalCards || 20)
  };
}
function bumpGoalProgress(key, amount){
  const g = getGoalProgress();
  g[key] = (g[key]||0) + amount;
  lsSet(LS_GOAL_PROGRESS, g);
  maybeCelebrateGoal(key, g);
  if(APP.currentTab==='home') renderHomeGoalsCard();
}
// ADDED: fires a one-time toast the moment a single goal is hit, then — once all three are hit
// on the same day — bumps the lifetime "all goals hit" day counter used by the Goal Getter
// achievement. Each celebration is guarded so it can only ever fire once per goal per day.
function maybeCelebrateGoal(key, g){
  if(g.celebrated[key]) return;
  const targets = goalTargets();
  if(g[key] < targets[key]) return;
  g.celebrated[key] = true;
  lsSet(LS_GOAL_PROGRESS, g);
  const labels = { questions:'question goal 🎯', focusSeconds:'study-time goal ⏱️', cards:'flashcard goal 🗂️' };
  toast(`Nice! You hit today's ${labels[key]}!`);
  spawnCompanionReaction('clap', null, {x: window.innerWidth/2, y: window.innerHeight - 90});
  if(!g.allHit && g.celebrated.questions && g.celebrated.focusSeconds && g.celebrated.cards){
    g.allHit = true;
    lsSet(LS_GOAL_PROGRESS, g);
    const n = (lsGet(LS_GOAL_DAYS_HIT, 0)||0) + 1;
    lsSet(LS_GOAL_DAYS_HIT, n);
    setTimeout(()=>{
      toast('🎉 All three daily goals done — amazing work today!');
      spawnCompanionReaction('party', null, {x: window.innerWidth/2, y: window.innerHeight - 90});
    }, 900);
  }
  checkAchievements();
}

/* ============================================================
   ADDED: ACHIEVEMENTS — a badge system built entirely on top of data the
   app already tracks (practice sessions, Study Mode sessions, flashcard
   reviews, bookmarks, streaks, resources, daily goals), so nothing new
   needs to be logged just for this — see the small ach*() readers below.
   Unlocking is permanent (stored by id + timestamp in LS_ACHIEVEMENTS)
   even if the underlying stat later drops (e.g. a streak resets), which
   matches how real achievement systems work. checkAchievements() is
   called after every relevant action; boot() also runs it once silently
   to retroactively unlock anything a returning user already qualifies
   for without a burst of celebration toasts on first load.
   ============================================================ */
function achTotalAttempts(){
  return Object.values(APP.historyMap).reduce((s,h)=>s+((h.attempts&&h.attempts.length)||0),0);
}
function achAllTimeAccuracy(){
  let attempted=0, correct=0;
  for(const s of APP.sessions){ attempted += s.attempted||0; correct += s.correct||0; }
  return { attempted, correct, pct: attempted ? Math.round(correct/attempted*100) : 0 };
}
function achTotalPracticeSec(){
  return APP.sessions.reduce((s,se)=>s+(se.elapsedSec||0),0);
}
function achHasPerfectSession(){
  return APP.sessions.some(s=>(s.attempted||0)>=10 && s.correct===s.attempted && (s.accuracy||0)===100);
}
function achLongestStreakEver(){
  const days = Object.keys(APP.streak).filter(k=>APP.streak[k]>0).sort();
  if(!days.length) return 0;
  let max=1, run=1;
  for(let i=1;i<days.length;i++){
    const diffDays = Math.round((new Date(days[i]) - new Date(days[i-1])) / 86400000);
    if(diffDays===1){ run++; max=Math.max(max,run); } else if(diffDays>1){ run=1; }
  }
  return max;
}
function achStudyModeFocusSec(){
  return getStudySessions().reduce((s,se)=>s+(se.focusedMs||0),0)/1000;
}
function achSelfStudyCount(){
  return getStudySessions().filter(s=>s.type==='notes').length;
}
function achFlashcardsReviewedTotal(){
  const sessions = fcSessionHistory();
  return sessions.reduce((s,se)=>s+(se.reviewed||0),0);
}
function achBookmarksCount(){
  return Object.values(APP.historyMap).filter(h=>h.bookmarked).length;
}
function achResourcesCount(){
  return nonFcResources().length;
}
function achEarlyBird(){
  return APP.sessions.some(s=>new Date(s.ts).getHours()<7);
}
function achNightOwl(){
  return APP.sessions.some(s=>new Date(s.ts).getHours()>=23);
}
function achGoalDaysHit(){
  return lsGet(LS_GOAL_DAYS_HIT, 0) || 0;
}

// ADDED: scans every achievement, unlocks (and persists) any that are newly met. Pass
// silent=true to skip the celebration toast (used once at boot to catch up quietly on
// anything a returning user already qualifies for before this feature existed).
function checkAchievements(silent){
  let newlyUnlocked = [];
  for(const a of ACHIEVEMENTS){
    if(APP.achievements[a.id]) continue;
    let p;
    try{ p = a.progress(); }catch(e){ continue; }
    if(p && p.current >= p.target){
      APP.achievements[a.id] = Date.now();
      newlyUnlocked.push(a);
    }
  }
  if(newlyUnlocked.length){
    lsSet(LS_ACHIEVEMENTS, APP.achievements);
    if(!silent){
      newlyUnlocked.forEach((a,i)=>{
        setTimeout(()=>{
          toast(`🏆 Achievement unlocked: ${a.title}!`);
          spawnCompanionReaction(a.tier==='gold' ? 'fire' : 'party', null, {x: window.innerWidth/2, y: window.innerHeight - 90});
        }, i*1000);
      });
    }
  }
  if(APP.currentTab==='achievements') renderAchievementsPage();
  return newlyUnlocked;
}

// ADDED: current filter shown on the Achievements page (All / Unlocked / Locked).
let achFilterState = 'all';

function renderAchievementsPage(){
  const el = document.getElementById('view-achievements');
  if(!el) return;
  const unlockedCount = ACHIEVEMENTS.filter(a=>APP.achievements[a.id]).length;
  const totalPoints = ACHIEVEMENTS.reduce((s,a)=> s + (APP.achievements[a.id] ? (ACH_TIER_POINTS[a.tier]||0) : 0), 0);
  const pct = Math.round((unlockedCount/ACHIEVEMENTS.length)*100);

  const filtered = ACHIEVEMENTS.filter(a=>{
    if(achFilterState==='unlocked') return !!APP.achievements[a.id];
    if(achFilterState==='locked') return !APP.achievements[a.id];
    return true;
  });
  // Unlocked-most-recent-first, then locked sorted by how close they are to completion.
  const sorted = filtered.slice().sort((a,b)=>{
    const uA = APP.achievements[a.id], uB = APP.achievements[b.id];
    if(uA && uB) return uB - uA;
    if(uA && !uB) return -1;
    if(!uA && uB) return 1;
    const pa = a.progress(), pb = b.progress();
    return (pb.current/pb.target) - (pa.current/pa.target);
  });

  el.innerHTML = `
    <h1 style="font-size:1.5rem;font-weight:800;margin:0 0 4px;">🏆 Achievements</h1>
    <div class="muted" style="font-size:.82rem;margin-bottom:16px;">Badges earned from practicing, studying, and building good habits — once unlocked, they're yours for good.</div>

    <div class="card" style="padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:26px;flex-wrap:wrap;">
      <div class="ring" style="--pct:${pct};width:100px;height:100px;">
        <div class="ring-inner" style="width:80px;height:80px;font-size:.68rem;line-height:1.3;"><b style="font-size:1.05rem;display:block;">${pct}%</b>done</div>
      </div>

function saveTopicTracker(){ lsSet(LS_TOPIC_TRACKER, APP.topicTracker); }

function ttUid(){ return 'topic_' + Date.now() + '_' + Math.floor(Math.random()*9999); }

function ttAllSubjects(){
  const fromQuestions = APP.flatIndex ? [...new Set(APP.flatIndex.map(f=>f.subject))] : [];
  const fromTopics = Object.values(APP.topicTracker).map(t=>t.subject);
  return [...new Set([...fromQuestions, ...fromTopics])].filter(Boolean).sort();
}

function ttComputeStats(){
  const vals = Object.values(APP.topicTracker);
  const total = vals.length;
  const done = vals.filter(t=>t.completed).length;
  const hy = vals.filter(t=>t.highYield).length;
  const hyDone = vals.filter(t=>t.highYield && t.completed).length;
  const r1 = vals.filter(t=>t.r1).length;
  const r2 = vals.filter(t=>t.r2).length;
  const r3 = vals.filter(t=>t.r3).length;
  return {total, done, hy, hyDone, r1, r2, r3, pct: total ? Math.round((done/total)*100) : 0};
}

function ttRenderGrid(){
  const grid = document.getElementById('tt-grid');
  if(!grid) return;
  grid.innerHTML = '';
  const search = ttState.search.toLowerCase();

  let entries = Object.entries(APP.topicTracker);
  entries.sort((a,b)=> (b[1].highYield?1:0) - (a[1].highYield?1:0));

  let count = 0;
  entries.forEach(([id, t])=>{
    if(ttState.hyOnly && !t.highYield) return;
    if(ttState.subject!=='all' && t.subject!==ttState.subject) return;
    if(search && !t.topic.toLowerCase().includes(search) && !t.subject.toLowerCase().includes(search) && !(t.notes||'').toLowerCase().includes(search)) return;
    count++;
    grid.appendChild(ttBuildCard(id, t));
  });

  if(count===0){
    grid.innerHTML = `<div class="tt-empty">No topics match yet. Tap "Add topic" to start tracking your syllabus.</div>`;
  }
}
