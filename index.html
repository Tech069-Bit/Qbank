/* ============================================================
   ADDED: "Import my own pet / companion" — lets the user upload their own
   image to use instead of the built-in emoji, for either the roaming pet
   or the notification companion (or both). Shared validation + read logic;
   each settings sub-modal wires its own file input to this.
   ============================================================ */
const CUSTOM_IMAGE_ACCEPT = 'image/png,image/jpeg,image/gif,image/webp,image/svg+xml';
const CUSTOM_IMAGE_ACCEPT_LABEL = 'PNG, JPG, GIF, WEBP, or SVG'; // shown in the import box so it's clear what file types are accepted
const CUSTOM_IMAGE_MAX_BYTES = 500 * 1024; // 500KB — kept small since it's stored as a data URL in localStorage
const MAX_CUSTOM_IMAGES = 8; // cap per pool (pets / companions) — each is stored as a data URL in localStorage, so this bounds how much can pile up

// ADDED: generates a short unique id for each imported pet/companion image, used as
// the key for its own on/off toggle and delete button (and, for pets, doubles as the
// "kind" identifier alongside the built-in animal names).
function genCustomImageId(){
  return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

// Reads+validates a File from an <input type="file">, then calls onDone(dataUrl) on success
// or shows an error mini-toast and calls onError() on failure.
function importCustomImageFile(file, onDone, onError){
  if(!file) return;
  const okType = /^image\/(png|jpe?g|gif|webp|svg\+xml)$/i.test(file.type);
  if(!okType){
    showMiniToast(`Please choose a ${CUSTOM_IMAGE_ACCEPT_LABEL} image`, 'error');
    if(onError) onError();
    return;
  }
  if(file.size > CUSTOM_IMAGE_MAX_BYTES){
    showMiniToast(`Image is too big — please pick one under ${Math.round(CUSTOM_IMAGE_MAX_BYTES/1024)}KB`, 'error');
    if(onError) onError();
    return;
  }
  const reader = new FileReader();
  reader.onload = ()=> onDone(reader.result);
  reader.onerror = ()=>{
    showMiniToast('Could not read that image', 'error');
    if(onError) onError();
  };
  reader.readAsDataURL(file);
}

/* ============================================================
   ADDED: "Learn new messages from the internet" — lets the pet/companion pick
   up fresh motivational lines beyond the built-in hand-written pools, fetched
   from a small free public API (affirmations.dev — no key required, one short
   affirmation per request). Learned lines are stored in Settings (localStorage)
   and merged into the existing phrase pools everywhere they're picked from,
   they never replace the built-ins.
   ============================================================ */
const MESSAGE_LEARN_API = 'https://www.affirmations.dev/';
const MESSAGE_LEARN_COUNT = 6; // how many to request per "Learn more" tap
const MESSAGE_LEARN_MAX_STORED = 10; // cap so localStorage / the pool don't grow forever
const MESSAGE_LEARN_TTL_DAYS = 1; // learned messages are only good for one calendar day; the next day they're cleared and the next "Learn more" tap replaces them with a fresh batch

// Fetches up to `count` fresh lines from the internet, skipping ones already known
// (case-insensitive, checked against `knownLower` — a Set of lowercased existing lines).
// Resolves to an array of new unique lines (possibly empty if everything was a repeat).
// Throws if the network request itself fails (e.g. offline / blocked).
/* ============================================================
   ADDED: automatic background learning — previously the only way to get a fresh
   daily batch of pet/companion phrases was to open Settings and tap "Learn more"
   yourself. Now it also happens on its own once a day as soon as the device has
   an internet connection: attempted once at boot, and retried the moment
   connectivity comes back if the device was offline at boot (via the 'online'
   listener wired up right after this function). The "Learn more" buttons in
   Settings still work exactly as before, for anyone who wants a fresh batch
   sooner instead of waiting for the automatic daily one.
   ============================================================ */
let _autoLearnInFlight = false;
async function autoLearnMessagesIfNeeded(){
  if(_autoLearnInFlight) return; // avoid overlapping runs if 'online' fires more than once
  if(!navigator.onLine) return;  // nothing to do while offline — the 'online' listener retries this later
  const today = todayStr();
  const needsPet = APP.settings.petSpeechEnabled !== false && APP.settings.learnedPetMessagesDate !== today;
  const needsCompanion = APP.settings.companionEnabled !== false && APP.settings.learnedCompanionLinesDate !== today;
  if(!needsPet && !needsCompanion) return; // already learned today (or the feature's turned off) — nothing to do

  _autoLearnInFlight = true;
  try{
    const tasks = [];
    if(needsPet){
      tasks.push((async()=>{
        // Stamp today's date up front (not just on success) so a failed/empty attempt — e.g. no
        // network after all, or every candidate line was a repeat — doesn't retry on every single
        // load; it'll just try again automatically tomorrow, same cadence as a manual tap would.
        APP.settings.learnedPetMessagesDate = today;
        try{
          const known = new Set(
            CRITTER_QUIZ_MESSAGES.concat(CRITTER_IDLE_MESSAGES, APP.settings.learnedPetMessages || [])
              .map(m => m.toLowerCase())
          );
          const fresh = await fetchLearnedMessages(MESSAGE_LEARN_COUNT, known);
          if(fresh.length){
            APP.settings.learnedPetMessages = (APP.settings.learnedPetMessages || []).concat(fresh).slice(-MESSAGE_LEARN_MAX_STORED);
            // If the pet Settings sub-screen happens to be open right now, re-render it so the
            // "N/MAX learned today" count reflects this automatic batch immediately.
            if(document.getElementById('pet-learn-btn')) openPetSettingsModal();
          }
        }catch(err){
          console.warn('Automatic pet-message learning failed (will retry tomorrow, or via the manual "Learn more" button)', err);
        }
      })());
    }
    if(needsCompanion){
      tasks.push((async()=>{
        APP.settings.learnedCompanionLinesDate = today;
        try{
          const known = new Set(
            COMPANION_LINES.concat(APP.settings.learnedCompanionLines || [])
              .map(m => m.toLowerCase())
          );
          const fresh = await fetchLearnedMessages(MESSAGE_LEARN_COUNT, known);
          if(fresh.length){
            APP.settings.learnedCompanionLines = (APP.settings.learnedCompanionLines || []).concat(fresh).slice(-MESSAGE_LEARN_MAX_STORED);
            // If the companion Settings sub-screen happens to be open right now, re-render it so
            // the "N/MAX learned today" count reflects this automatic batch immediately.
            if(document.getElementById('companion-learn-btn')) openCompanionSettingsModal();
          }
        }catch(err){
          console.warn('Automatic companion-line learning failed (will retry tomorrow, or via the manual "Learn more" button)', err);
        }
      })());
    }
    await Promise.allSettled(tasks);
    lsSet(LS_SETTINGS, APP.settings);
  } finally {
    _autoLearnInFlight = false;
  }
}
// ADDED: if the device is offline at boot, retry the moment connectivity returns — this is what
// makes the feature genuinely automatic rather than only "automatic if you happened to be online
// when the app loaded". Safe to call repeatedly: the once-per-day date stamps above make every
// call after the first same-day success (or same-day failed attempt) a fast no-op.
window.addEventListener('online', ()=>{ autoLearnMessagesIfNeeded(); });

/* ============================================================
   ADDED: Settings integrity check/repair — runs at boot (and after loading
   any imported/shared settings blob) to make sure:
     1) the built-in default messages can never be pushed out — this just
        re-confirms the learned arrays stay separate; it never touches
        CRITTER_QUIZ_MESSAGES / CRITTER_IDLE_MESSAGES / COMPANION_LINES,
        which are consts and literally cannot be reassigned by anything.
     2) the "learned" pools are actually well-formed (real arrays of
        non-empty strings, deduped, capped at MESSAGE_LEARN_MAX_STORED —
        oldest learned entries are dropped first, same rule as the normal
        learn flow) so a corrupted/hand-edited localStorage or a bad
        imported file can't blow them up or wedge the pool.
     3) every "when / where / what to say" toggle (companionOnToasts,
        companionOnHome, companionOnPopups, companionMaleEnabled,
        companionFemaleEnabled, companionEnabled,
        petEnabled, petSpeechEnabled, petQuizCheerEnabled, petRoamEnabled,
        petKinds) is a real boolean (or plain object for petKinds) — if one
        got corrupted (e.g. by a hand-edited import) it's repaired back to
        its safe default rather than silently misbehaving. Learning new
        messages NEVER touches these; this check exists purely to catch
        outside corruption (imports, manual localStorage edits), not
        anything the learn/clear buttons do themselves.
   Mutates+returns the settings object in place so callers can just do
   `APP.settings = sanitizeSettings(APP.settings)`.
   ============================================================ */
function sanitizeSettings(s){
  if(!s || typeof s !== 'object') s = {};

  // --- learned message pools: real array of trimmed, non-empty, deduped strings ---
  const cleanLearnedPool = (arr, builtins)=>{
    if(!Array.isArray(arr)) return [];
    const knownLower = new Set(builtins.map(m=>String(m).toLowerCase()));
    const out = [];
    for(const item of arr){
      if(typeof item !== 'string') continue;
      const text = item.trim();
      if(!text) continue;
      const key = text.toLowerCase();
      if(knownLower.has(key)) continue; // never let a learned entry shadow/duplicate a built-in default
      knownLower.add(key);
      out.push(text);
    }
    // keep only the most recent MAX — oldest learned entries drop first, defaults are unaffected
    return out.slice(-MESSAGE_LEARN_MAX_STORED);
  };
  s.learnedPetMessages = cleanLearnedPool(s.learnedPetMessages, CRITTER_QUIZ_MESSAGES.concat(CRITTER_IDLE_MESSAGES));
  s.learnedCompanionLines = cleanLearnedPool(s.learnedCompanionLines, COMPANION_LINES);

  // --- daily expiry: a learned batch is only good for MESSAGE_LEARN_TTL_DAYS (1 day).
  // Once the stamped date isn't today, wipe it — the pool falls back to just the
  // built-in defaults until the person taps "Learn more" again for a fresh batch. ---
  const today = todayStr();
  if(s.learnedPetMessages.length && s.learnedPetMessagesDate !== today){
    s.learnedPetMessages = [];
    s.learnedPetMessagesDate = null;
  }
  if(s.learnedCompanionLines.length && s.learnedCompanionLinesDate !== today){
    s.learnedCompanionLines = [];
    s.learnedCompanionLinesDate = null;
  }
  if(typeof s.learnedPetMessagesDate !== 'string') s.learnedPetMessagesDate = s.learnedPetMessages.length ? today : null;
  if(typeof s.learnedCompanionLinesDate !== 'string') s.learnedCompanionLinesDate = s.learnedCompanionLines.length ? today : null;

  // --- boolean "when/where/what to say" toggles: repair to safe default if corrupted ---
  const boolDefaults = {
    toastsEnabled:true, petEnabled:false, petSpeechEnabled:true, petQuizCheerEnabled:true, petRoamEnabled:true,
    companionEnabled:true, companionOnToasts:true, companionOnHome:true, companionOnPopups:true, companionReactionsEnabled:true,
    companionMaleEnabled:true, companionFemaleEnabled:true, reviewShowAnswers:true,
    profileSetupPromptShown:false, sessionTimerIntroShown:false
  };
  for(const key in boolDefaults){
    if(typeof s[key] !== 'boolean') s[key] = boolDefaults[key];
  }

  // --- petSizeScale/companionSizeScale: numeric multipliers driving the roaming pet
  // and companion (avatar + speech text) size — repair to 1 (100%) if corrupted, and
  // clamp into the same 0.5–2 range the slider allows. ---
  if(typeof s.petSizeScale !== 'number' || !isFinite(s.petSizeScale)) s.petSizeScale = 1;
  s.petSizeScale = Math.min(2, Math.max(0.5, s.petSizeScale));
  if(typeof s.companionSizeScale !== 'number' || !isFinite(s.companionSizeScale)) s.companionSizeScale = 1;
  s.companionSizeScale = Math.min(2, Math.max(0.5, s.companionSizeScale));
  // ADDED: companionPats — how many times the person has tapped/petted Dr.KC's avatar;
  // repair to 0 if corrupted, never negative.
  if(typeof s.companionPats !== 'number' || !isFinite(s.companionPats) || s.companionPats < 0) s.companionPats = 0;
  
  // ADDED: companionName — the user's chosen name for their companion; default to 'Dr.Mini' if missing/invalid
  if(typeof s.companionName !== 'string' || !s.companionName.trim()) s.companionName = 'Dr.Mini';
  s.companionName = s.companionName.trim().substring(0, 30); // cap length and trim whitespace

  // --- petKinds: plain object of booleans, not an array/string/etc ---
  if(!s.petKinds || typeof s.petKinds !== 'object' || Array.isArray(s.petKinds)) s.petKinds = {};
  else{
    for(const k in s.petKinds){ if(typeof s.petKinds[k] !== 'boolean') delete s.petKinds[k]; }
  }

  // --- companionAvatars: same shape/repair rules as petKinds — plain object of booleans,
  // keyed by the built-in avatar emoji itself (the only stable id it has). Missing entry
  // (never toggled) = enabled by default. ---
  if(!s.companionAvatars || typeof s.companionAvatars !== 'object' || Array.isArray(s.companionAvatars)) s.companionAvatars = {};
  else{
    for(const k in s.companionAvatars){ if(typeof s.companionAvatars[k] !== 'boolean') delete s.companionAvatars[k]; }
  }

  // --- custom pet/companion images: arrays of {id, dataUrl, enabled}, each a real
  // data: URL with a unique id — anything malformed (bad shape, duplicate/missing id,
  // corrupted dataUrl) is dropped or repaired rather than breaking the list. Capped at
  // MAX_CUSTOM_IMAGES, keeping the most recently imported ones. ---
  const cleanCustomImages = (arr)=>{
    if(!Array.isArray(arr)) return [];
    const out = [];
    const seenIds = new Set();
    for(const item of arr){
      if(!item || typeof item !== 'object') continue;
      const dataUrl = (typeof item.dataUrl === 'string' && item.dataUrl.startsWith('data:image/')) ? item.dataUrl : null;
      if(!dataUrl) continue;
      let id = (typeof item.id === 'string' && item.id) ? item.id : genCustomImageId();
      while(seenIds.has(id)) id = genCustomImageId();
      seenIds.add(id);
      // ADDED: sizeScale is that one import's own size multiplier (its slider in the
      // "Which pets can appear" / "Avatar pool" list) — repair to 1 (100%) and clamp
      // into the same 0.5–2 range the slider allows if corrupted.
      let sizeScale = (typeof item.sizeScale === 'number' && isFinite(item.sizeScale)) ? item.sizeScale : 1;
      sizeScale = Math.min(2, Math.max(0.5, sizeScale));
      out.push({id, dataUrl, enabled: item.enabled !== false, sizeScale});
    }
    return out.slice(-MAX_CUSTOM_IMAGES);
  };
  // One-time migration: older versions stored a single customPetImage/customCompanionImage
  // string instead of an array — fold it in as the first imported entry, then drop the
  // legacy fields for good.
  if(typeof s.customPetImage === 'string' && s.customPetImage.startsWith('data:image/')){
    if(!Array.isArray(s.customPetImages)) s.customPetImages = [];
    s.customPetImages.push({id: genCustomImageId(), dataUrl: s.customPetImage, enabled: true});
  }
  if(typeof s.customCompanionImage === 'string' && s.customCompanionImage.startsWith('data:image/')){
    if(!Array.isArray(s.customCompanionImages)) s.customCompanionImages = [];
    s.customCompanionImages.push({id: genCustomImageId(), dataUrl: s.customCompanionImage, enabled: s.companionCustomEnabled !== false});
  }
  delete s.customPetImage;
  delete s.customCompanionImage;
  delete s.companionCustomEnabled;
  s.customPetImages = cleanCustomImages(s.customPetImages);
  s.customCompanionImages = cleanCustomImages(s.customCompanionImages);

  // --- resourceSortMode: must be one of the known sort options, repair to 'newest' otherwise ---
  // ADDED: 'recent-practice' — sorts by the most recent attempt timestamp found in APP.historyMap
  // for any question belonging to that resource (see sortResourcesArray()/lastPracticedAt() below).
  if(!['newest','oldest','name-asc','name-desc','recent-practice'].includes(s.resourceSortMode)) s.resourceSortMode = 'newest';
  // --- subjectSortMode: must be one of the known sort options, repair to 'custom' otherwise ---
  // ADDED: 'number' — natural/numeric sort of the folder path string (so "Lesson 2" sorts before
  // "Lesson 10"); 'created-desc' — newest-created folder first, backed by res.subjectCreatedAt.
  if(!['custom','name-asc','name-desc','number','created-desc'].includes(s.subjectSortMode)) s.subjectSortMode = 'custom';
  // ADDED: fcDeckSortMode/fcDeckSubjectSortMode — the Flashcard Decks tab's OWN sort-order settings,
  // fully independent from resourceSortMode/subjectSortMode above (see settings default object for why).
  if(!['newest','oldest','name-asc','name-desc','recent-practice'].includes(s.fcDeckSortMode)) s.fcDeckSortMode = 'newest';
  if(!['custom','name-asc','name-desc','number','created-desc'].includes(s.fcDeckSubjectSortMode)) s.fcDeckSubjectSortMode = 'custom';
  // --- companionAvatarStyle: must be 'emoji' or 'realistic', repair to 'emoji' otherwise ---
  if(!['emoji','realistic'].includes(s.companionAvatarStyle)) s.companionAvatarStyle = 'emoji';

  return s;
}

/* ============================================================
   ADDED: Home screen companion — figures out the single most useful
   thing to nudge the student about right now (empty question bank,
   recent mistakes, due flashcards, waiting bookmarks) and falls back
   to a plain motivating line when there's nothing specific to flag.
   ============================================================ */
let homeCompanionTipIdx = 0;
let homeCompanionAvatar = null; // fixed for the lifetime of one Home render so it doesn't flicker between clicks

function computeHomeCompanionTips(){
  const tips = [];
  const homeResources = nonFcResources();
  const mistakesCount = Object.values(APP.historyMap).filter(h=>h && h.lastCorrect===false).length;
  const bookmarkedCount = Object.values(APP.historyMap).filter(h=>h && h.bookmarked).length;
  let dueFlashcards = 0;
  try{ dueFlashcards = fcComputeStats().due; }catch(e){ dueFlashcards = 0; }

  if(homeResources.length === 0){
    tips.push({
      icon: '📥',
      text: "Your question bank is empty! Want help getting started? I can import a file or build one from scratch with you.",
      cta: 'Create / Import a QBank',
      action: ()=>{ setTab('resources'); }
    });
  }

  if(mistakesCount > 0){
    tips.push({
      icon: '📝',
      text: `You got ${mistakesCount} question${mistakesCount===1?'':'s'} wrong last time round — let's go fix that.`,
      cta: 'Review my mistakes',
      action: ()=>{
        practiceSetupState.resourceIds = new Set();
        practiceSetupState.subjects = new Set();
        practiceSetupState.testIds = new Set();
        practiceSetupState.historyFilter = 'incorrect';
        practiceSetupState.bookmarkListFilter = null;
        setTab('practice');
      }
    });
  }

  if(dueFlashcards > 0){
    tips.push({
      icon: '🧠',
      text: `${dueFlashcards} flashcard${dueFlashcards===1?'':'s'} ${dueFlashcards===1?'is':'are'} due for review. A few minutes now saves a lot of relearning later!`,
      cta: 'Study flashcards',
      action: ()=>{ setTab('flashcards'); }
    });
  }

  if(bookmarkedCount > 0){
    tips.push({
      icon: '⭐',
      text: `You've bookmarked ${bookmarkedCount} question${bookmarkedCount===1?'':'s'} — good time to circle back to ${bookmarkedCount===1?'it':'them'}.`,
      cta: 'Open bookmarks',
      action: ()=>{ setTab('bookmarks'); }
    });
  }

  const streak = currentStreakDays();
  tips.push({
    icon: '💪',
    text: streak > 0
      ? `${streak}-day streak going — ${companionPickLine()}`
      : companionPickLine(),
    cta: 'Start practicing',
    action: ()=>{ setTab('practice'); }
  });

  return tips;
}

function renderHomeCompanionCard(){
  const slot = document.getElementById('home-companion-slot');
  if(!slot) return;
  if(!companionAllowed('home')){ slot.innerHTML = ''; return; } // ADDED: companion turned off in Settings

  const tips = computeHomeCompanionTips();
  if(!tips.length){ slot.innerHTML = ''; return; }
  if(homeCompanionTipIdx >= tips.length) homeCompanionTipIdx = 0;
  const tip = tips[homeCompanionTipIdx];

  if(!homeCompanionAvatar) homeCompanionAvatar = pickCompanionAvatarDiv('home-companion-avatar');

  slot.innerHTML = `
    <div class="card home-companion-card">
      ${homeCompanionAvatar}
      <div class="home-companion-body">
        <div class="home-companion-text">${tip.icon} ${escapeHtml(tip.text)}<span class="companion-signature">— ${escapeHtml(getCompanionName())}</span></div>
        <div class="home-companion-actions">
          <button class="btn btn-accent btn-sm" id="home-companion-yes">✅ ${escapeHtml(tip.cta)}</button>
          <button class="btn btn-ghost btn-sm" id="home-companion-no">Not right now</button>
        </div>
      </div>
    </div>
  `;

  // "Yes" performs the suggested action; "Not right now" just rotates to the next
  // suggestion — the companion never goes away, it just keeps asking.
  document.getElementById('home-companion-yes').onclick = tip.action;
  document.getElementById('home-companion-no').onclick = ()=>{
    homeCompanionTipIdx = (homeCompanionTipIdx + 1) % tips.length;
    renderHomeCompanionCard();
  };
}
// Spawns the companion avatar+bubble anchored beside targetEl (a DOM node already in the page).
// opts: { message, duration, side: 'left'|'right' }
function spawnCompanionNear(targetEl, opts){
  if(!targetEl) return;
  if(!companionAllowed('popups')) return; // ADDED: companion turned off in Settings — skip the popup entirely
  opts = opts || {};
  const avatarDiv = pickCompanionAvatarDiv();
  const line = opts.message || companionPickLine();

  const wrap = document.createElement('div');
  wrap.className = 'companion-bubble ' + (opts.side==='right' ? 'companion-tail-right' : 'companion-tail-left');
  wrap.innerHTML = `${avatarDiv}<div class="companion-speech">${escapeHtml(line)}</div>`;
  document.body.appendChild(wrap);

  // Position beside the target, vertically centered on it; flip side if it would run off-screen
  const rect = targetEl.getBoundingClientRect();
  const bw = wrap.offsetWidth, bh = wrap.offsetHeight;
  let side = opts.side==='right' ? 'right' : 'left';
  let left = side==='right' ? rect.right + 10 : rect.left - bw - 10;
  if(side==='left' && left < 8){ side = 'right'; left = rect.right + 10; wrap.classList.remove('companion-tail-left'); wrap.classList.add('companion-tail-right'); }
  if(side==='right' && left + bw > window.innerWidth - 8){ side = 'left'; left = rect.left - bw - 10; wrap.classList.remove('companion-tail-right'); wrap.classList.add('companion-tail-left'); }
  let top = rect.top + rect.height/2 - bh/2;
  top = Math.max(8, Math.min(window.innerHeight - bh - 8, top));
  wrap.style.top = top + 'px';
  wrap.style.left = Math.max(8, left) + 'px';

  requestAnimationFrame(()=>wrap.classList.add('companion-show'));
  const dur = opts.duration || 2800;
  setTimeout(()=>{
    wrap.classList.remove('companion-show');
    wrap.classList.add('companion-hide');
    setTimeout(()=>{ if(wrap.parentNode) wrap.remove(); }, 300);
  }, dur);
}

/* CHANGED: mini-toast (copy/cut/paste + create-resource actions) now renders as the companion
   avatar + a color-coded speech bubble instead of the old icon+text pill — replaces the old
   design entirely rather than sitting beside it. Still stacks top-right, still auto-dismisses. */
function showMiniToast(msg, type){
  if(APP.settings && APP.settings.toastsEnabled === false) return;
  type = type === 'error' ? 'error' : 'success';
  let stack = document.querySelector('.mini-toast-stack');
  if(!stack){ stack = document.createElement('div'); stack.className = 'mini-toast-stack'; stack.setAttribute('role','status'); stack.setAttribute('aria-live','polite'); document.body.appendChild(stack); }
  const avatarHtml = companionAllowed('toasts') ? pickCompanionAvatarDiv() : '';
  const el = document.createElement('div');
  el.className = `mini-toast-companion ${type}`;
  el.innerHTML = `${avatarHtml}<div class="companion-speech">${escapeHtml(msg)}</div>`;
  stack.appendChild(el);
  setTimeout(()=>{
    el.classList.add('leaving');
    setTimeout(()=>el.remove(), 200);
  }, 2400);
}

// ADDED: a mini-toast with an "Undo" button, so destructive-but-reversible actions (like
// clearing practice history) give the person a real way back instead of just a confirm() dialog.
// `onUndo` runs once, then the toast turns into a plain confirmation; it also auto-expires after
// `ms` so it never lingers forever.
function showUndoToast(msg, onUndo, ms){
  ms = ms || 8000;
  if(APP.settings && APP.settings.toastsEnabled === false){ onUndo._expired = true; return; }
  let stack = document.querySelector('.mini-toast-stack');
  if(!stack){ stack = document.createElement('div'); stack.className = 'mini-toast-stack'; stack.setAttribute('role','status'); stack.setAttribute('aria-live','polite'); document.body.appendChild(stack); }
  const avatarHtml = companionAllowed('toasts') ? pickCompanionAvatarDiv() : '';
  const el = document.createElement('div');
  el.className = 'mini-toast-companion success';
  el.innerHTML = `${avatarHtml}<div class="companion-speech">${escapeHtml(msg)} <button class="undo-toast-btn" style="margin-left:8px;background:none;border:1px solid currentColor;border-radius:6px;padding:2px 8px;font-size:.75rem;font-weight:700;cursor:pointer;color:inherit;">Undo</button></div>`;
  stack.appendChild(el);
  let done = false;
  const finish = ()=>{
    if(done) return;
    done = true;
    el.classList.add('leaving');
    setTimeout(()=>el.remove(), 200);
  };
  const timer = setTimeout(finish, ms);
  el.querySelector('.undo-toast-btn').onclick = async ()=>{
    if(done) return;
    clearTimeout(timer);
    done = true;
    el.querySelector('.undo-toast-btn').disabled = true;
    try{
      await onUndo();
      showMiniToast('Undone', 'success');
    }catch(e){
      console.error('Undo failed', e);
      showMiniToast('Could not undo — check the browser console for details', 'error');
    }
    el.classList.add('leaving');
    setTimeout(()=>el.remove(), 200);
  };
}

// ADDED: on launch, if there's an unfinished practice session, actively notify the person with a
// Resume/Dismiss toast instead of only showing a quiet "Resume session" button buried on Home —
// see boot() near the bottom of the file for where this gets called.
function showResumeSessionToast(){
  if(APP.settings && APP.settings.toastsEnabled === false) return;
  const s = APP.activeSession;
  if(!s || s.submitted) return;
  const total = (s.compositeIds||[]).length;
  const answered = Object.keys(s.answers||{}).length;
  const msg = total
    ? `You have an unfinished practice session — ${answered}/${total} answered.`
    : 'You have an unfinished practice session.';

  let stack = document.querySelector('.mini-toast-stack');
  if(!stack){ stack = document.createElement('div'); stack.className = 'mini-toast-stack'; stack.setAttribute('role','status'); stack.setAttribute('aria-live','polite'); document.body.appendChild(stack); }
  const avatarHtml = companionAllowed('toasts') ? pickCompanionAvatarDiv() : '';
  const el = document.createElement('div');
  el.className = 'mini-toast-companion success';
  el.innerHTML = `${avatarHtml}<div class="companion-speech">${escapeHtml(msg)}
    <div style="margin-top:6px;display:flex;gap:6px;">
      <button class="resume-toast-btn" style="background:none;border:1px solid currentColor;border-radius:6px;padding:2px 10px;font-size:.75rem;font-weight:700;cursor:pointer;color:inherit;">▶ Resume</button>
      <button class="resume-toast-dismiss" style="background:none;border:none;font-size:.75rem;cursor:pointer;color:inherit;opacity:.7;">Dismiss</button>
    </div>
  </div>`;
  stack.appendChild(el);
  let done = false;
  const dismiss = ()=>{
    if(done) return;
    done = true;
    el.classList.add('leaving');
    setTimeout(()=>el.remove(), 200);
  };
  const timer = setTimeout(dismiss, 15000); // ADDED: auto-clears after 15s so it doesn't linger forever if ignored
  el.querySelector('.resume-toast-btn').onclick = ()=>{
    clearTimeout(timer);
    dismiss();
    setTab('practice');
    if(APP.activeSession && !APP.activeSession.submitted) renderQuizRunner(); // ADDED: this is an explicit resume tap, so still jump straight back in
  };
  el.querySelector('.resume-toast-dismiss').onclick = ()=>{
    clearTimeout(timer);
    dismiss();
  };
}

function showImportNotification(successCount, failCount, newQuestions, newTests, errorDetails){

    emoji = '⚠️';
    title = 'Partial Import';
    message = `${successCount} file${successCount===1?'':'s'} imported, ${failCount} failed`;
    messageColor = 'var(--yellow-status)';
  } else if(failCount){
    emoji = '😢';
    title = 'Import Failed';
    message = `${failCount} file${failCount===1?'':'s'} failed to import`;
    messageColor = 'var(--red-status)';
  }

  // ADDED: when we have specific per-file failure reasons (not just a bare count), list them so
  // the person can actually act on it — e.g. "Anatomy.apkg: not a valid Anki package" instead of
  // just "1 file failed".
  const errorListHtml = (errorDetails && errorDetails.length) ? `
    <div style="text-align:left;font-size:.76rem;color:var(--red-status);background:color-mix(in srgb, var(--red-status) 8%, transparent);border-radius:8px;padding:8px 10px;margin-top:10px;max-height:120px;overflow-y:auto;">
      ${errorDetails.slice(0,8).map(d=>`<div style="margin-bottom:4px;">• ${escapeHtml(d)}</div>`).join('')}
      ${errorDetails.length > 8 ? `<div>…and ${errorDetails.length-8} more</div>` : ''}
    </div>` : '';
  
  // Create backdrop
  const backdrop = document.createElement('div');
  backdrop.className = 'import-modal-backdrop';
  
  // Create modal
  const modal = document.createElement('div');
  modal.className = 'import-notification-modal';
  
  modal.innerHTML = `
    <span class="import-emoji">${emoji}</span>
    <div class="import-title">${title}</div>
    <div class="import-message" style="color:${messageColor};">${escapeHtml(message)}</div>
    ${errorListHtml}
    ${successCount > 0 ? `
      <div class="import-stats">
        <div class="import-stat-item">
          <span class="import-stat-label">📋 New Tests Added</span>
          <span class="import-stat-value">${newTests}</span>
        </div>
        <div class="import-stat-item">
          <span class="import-stat-label">❓ New Questions Added</span>
          <span class="import-stat-value">${newQuestions.toLocaleString()}</span>
        </div>
      </div>
    ` : ''}
    <button class="import-close-btn">Close</button>
  `;
  
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  spawnCompanionNear(modal, {duration: 7500, side: 'left'}); // ADDED: companion pops in beside the import summary
  
  // Close button handler
  modal.querySelector('.import-close-btn').onclick = ()=>{
    backdrop.style.animation = 'fadeOut .3s ease forwards';
    setTimeout(()=>backdrop.remove(), 300);
  };
  
  // Close on backdrop click
  backdrop.onclick = (e)=>{
    if(e.target === backdrop){
      backdrop.style.animation = 'fadeOut .3s ease forwards';
      setTimeout(()=>backdrop.remove(), 300);
    }
  };
  
  // Auto close after 8 seconds
  setTimeout(()=>{
    if(backdrop.parentElement){
      backdrop.style.animation = 'fadeOut .3s ease forwards';
      setTimeout(()=>backdrop.remove(), 300);
    }
  }, 8000);
}
/* Add fadeOut animation */
const style = document.createElement('style');
style.textContent = '@keyframes fadeOut{to{opacity:0}}';
document.head.appendChild(style);
function compositeId(resourceId, testId, qid){ return resourceId+'::'+testId+'::'+qid; }

/* ============================== REPLACED: structured subject/folder identity ==============================
   Previously a test's folder/subject was found by re-parsing its display title (split on " - " for the
   subject, "::" inside that for nesting) every single time it was needed — fragile, since a real lesson
   name containing either separator got misread as extra folder levels, and renaming/moving meant editing
   a text string everywhere instead of one field.
   Now each test carries its own structured fields:
     test.subjectPath : array of folder-name segments, outermost first, e.g. ["1st Year","Anatomy"]
     test.lessonName  : the leaf lesson/test display name, e.g. "Pelvis"
   test.title is kept as a DERIVED, always-in-sync display string ("subjectPath::joined - lessonName"),
   regenerated by syncTestTitle() below — so every existing piece of code that still reads test.title
   (PDF/CSV/.apkg filenames, list rendering, the manual-import HTML template, etc.) keeps working
   unmodified. Nothing should derive subject/lesson identity by parsing test.title anymore; ensureSubjectPath()/
   subjectOf()/lessonNameOf() are the only source of truth. ensureSubjectPath() migrates any older test (or a
   hand-written import using the old "Subject - Lesson" / "Subject::Sub - Lesson" convention) to real fields
   the first time it's touched, then never re-parses it again. */
function ensureSubjectPath(t){
  if(!t) return ['General'];
  if(Array.isArray(t.subjectPath) && t.subjectPath.length) return t.subjectPath;
  const raw = String(t.title || '');
  const dashIdx = raw.indexOf(' - ');
  const subjectStr = dashIdx !== -1 ? raw.slice(0, dashIdx) : '';
  const lesson = dashIdx !== -1 ? raw.slice(dashIdx + 3).trim() : (raw || 'General');
  const parts = subjectStr.split('::').map(p=>p.trim()).filter(Boolean);
  if(!parts.length) parts.push('General');
  t.subjectPath = parts;
  if(!t.lessonName) t.lessonName = lesson || 'General';
  return t.subjectPath;
}
/* Regenerates the derived display title from the structured fields — call this after changing
   t.subjectPath and/or t.lessonName so every other part of the app (which still just reads
   test.title for display/filenames) sees the update. */
function syncTestTitle(t){
  ensureSubjectPath(t);
  const subjStr = t.subjectPath.join('::');
  t.title = t.lessonName ? `${subjStr} - ${t.lessonName}` : subjStr;
  return t.title;
}
/* Canonical grouping key — the "::"-joined folder path a test lives under. Pass the test object
   itself (not test.title); a bare string is still accepted as a defensive fallback but won't persist
   a migration since there's no real object to write onto. */
function subjectOf(t){
  if(typeof t === 'string') t = { title: t };
  return ensureSubjectPath(t).join('::');
}
/* The leaf lesson/test display name, read from structured data instead of stripping a subject
   prefix off the title text. */
function lessonNameOf(t){
  ensureSubjectPath(t);
  return t.lessonName || 'General';
}
/* FIXED: rename/delete/copy/move "an entire subject folder" used to match tests by exact string
   equality only (subjectOf(t)===subject). That's correct for a folder's OWN direct lessons, but a
   folder can ALSO have nested subfolders under it (e.g. "Anatomy" holds some lessons directly AND
   has "Anatomy::Upper Limb" underneath) — those descendant tests were silently left untouched:
   renaming "Anatomy" orphaned "Anatomy::Upper Limb" under a name that no longer existed, deleting
   "Anatomy" left its subfolders behind (contradicting the confirm dialog's "and all N lessons under
   it"), and moving/copying "Anatomy" dropped every nested subfolder's lessons entirely. This helper
   is the single shared test for "does this test live at `subject` itself, or somewhere inside it" —
   every subject-folder operation below now uses it instead of a bare === check.*/
function testInSubjectOrDescendant(t, subject){
  const s = subjectOf(t);
  return s === subject || s.startsWith(subject + '::');
}
/* FIXED companion: true for a folder-path string (e.g. from res.emptySubjects, res.subjectOrder,
   or a res.testOrder key) that is `subject` itself or nested under it — same exact-match gap as
   testInSubjectOrDescendant above, but for the plain path strings the app tracks alongside tests. */
function pathIsSubjectOrDescendant(path, subject){
  return path === subject || (typeof path === 'string' && path.startsWith(subject + '::'));
}
/* FIXED: everywhere a test is created, its subject/folder string is normalized by splitting on
   "::", trimming each segment, and dropping empty ones (e.g. addTestToResource does this before
   ever storing test.subjectPath) — so "A::" , "::A", and "A::::B" all collapse to the same
   canonical path a real test would end up with. The one path that skipped this — creating an EMPTY
   subject folder (no tests yet) via "Add Folder" — stored whatever string the user typed as-is.
   Typing a trailing/leading/doubled "::" (easy to do given the UI explicitly documents "::" as the
   nesting syntax) created a folder tracked under an unnormalized path like "Anatomy::" that no
   longer matched the "Anatomy" every other part of the app would compute for it — so renaming/
   deleting/etc. that folder by its displayed name silently missed the stale tracker entry. This
   helper is that same normalization, exposed so folder-creation can apply it too. */
function normalizeSubjectString(str){
  return String(str||'').split('::').map(p=>p.trim()).filter(Boolean).join('::');
}

/* ============================== ADDED: Anki-style "::" hierarchy tree ==============================
   A subject name can contain "::" to express nested subfolders/branches, exactly like Anki deck
   names (e.g. "Anatomy::Upper Limb::Shoulder"). Everything else in the app (rename/delete/copy/
   move/practice/study/download, the .apkg exporter/importer, etc.) already just treats a subject
   as one opaque string, so no data model changes are needed — this only changes how the flat
   subject list is *displayed*: instead of one folder row per subject, matching "::" prefixes are
   grouped into collapsible parent branches, with each branch showing the combined lesson/card
   count of everything nested inside it. A subject with no "::" renders exactly as before. */
function buildSubjectTreeHtml(subjects, testsBySubject, leafHtmlMap, countLabel, scopePath){
  countLabel = countLabel || 'questions';
  const root = { name:'', path:'', children: new Map(), subject: null };
  subjects.forEach(subj=>{
    const parts = String(subj).split('::').map(p=>p.trim()).filter(Boolean);
    if(!parts.length) parts.push(subj);
    let node = root, pathSoFar = '';
    parts.forEach((part, i)=>{
      pathSoFar = pathSoFar ? (pathSoFar + '::' + part) : part;
      if(!node.children.has(part)) node.children.set(part, { name: part, path: pathSoFar, children: new Map(), subject: null });
      node = node.children.get(part);
      if(i === parts.length - 1) node.subject = subj;
    });
  });
  function countsOf(node){
    let lessons = 0, cards = 0;
    if(node.subject && testsBySubject[node.subject]){
      lessons += testsBySubject[node.subject].length;
      cards += testsBySubject[node.subject].reduce((s,t)=>s+(t.questions||[]).length, 0);
    }
    node.children.forEach(child=>{ const c = countsOf(child); lessons += c.lessons; cards += c.cards; });
    return { lessons, cards };
  }
  function renderNode(node){
    let html = '';
    if(node.subject && leafHtmlMap[node.subject] !== undefined) html += leafHtmlMap[node.subject];
    if(node.children.size){
      const { lessons, cards } = countsOf(node);
      const childrenHtml = Array.from(node.children.values()).map(renderNode).join('');
      html += `<div class="tree-group" data-group-path="${escapeHtml(node.path)}">
        <div class="tree-group-head" data-group-toggle="${escapeHtml(node.path)}">
          <i class="fa-solid fa-chevron-right tree-caret"></i>
          <i class="fa-solid fa-folder-tree" style="color:var(--accent);"></i>
          <span class="tree-group-name">${escapeHtml(node.name)}</span>
          <span class="tree-folder-count">${lessons} lesson${lessons===1?'':'s'} · ${cards} ${countLabel}</span>
        </div>
        <div class="tree-group-body">${childrenHtml}</div>
      </div>`;
    }
    return html;
  }
  // ADDED: scopePath lets a caller render just one branch's children (e.g. when the person
  // has navigated into a folder/subfolder's own page) instead of the whole tree from the root.
  let startNode = root;
  if(scopePath){
    const scopeParts = String(scopePath).split('::').map(p=>p.trim()).filter(Boolean);
    for(const part of scopeParts){
      if(!startNode.children.has(part)) return ''; // scoped path no longer exists (e.g. renamed/deleted) — nothing to show
      startNode = startNode.children.get(part);
    }
  }
  return Array.from(startNode.children.values()).map(renderNode).join('');
}
/* ADDED: shared, deliberately SIMPLE one-level-at-a-time folder listing — replaces the recursive
   nested tree above for the two subject-folder screens (Resources detail, Flashcard Deck detail).
   The old recursive version rendered every descendant level inline in one page, which is what
   produced the odd-looking duplicate/mismatched rows people reported: a folder that was both a
   registered subject AND had children got shown TWICE (once as its own row using the *full*
   "A::B::C" string as its label, once again as a group wrapper using just the last segment), with
   two different icons. This version shows only the CURRENT level's direct children — one row per
   folder, always the same icon, always just its own short name — and clicking a folder navigates
   one level deeper (via navigateFn), the same way a normal file explorer works. No inline nesting,
   so there is nothing to render twice and no full path ever leaks into a label. */
// ADDED: returns the ordered list of direct-child subject paths under scopePath (e.g. the
// siblings shown as one folder-row level), in the same relative order they appear in `orderArr`.
// Shared by buildFolderChildrenHtml (for rendering) and moveSubjectInOrder (for reordering) so
// both always agree on what counts as "siblings" at a given level.
function siblingSubjectPaths(orderArr, scopePath){
  const prefix = scopePath ? scopePath + '::' : '';
  const seen = new Map(); // short name -> full "::" path
  orderArr.forEach(subj=>{
    if(scopePath){
      if(subj === scopePath || !subj.startsWith(prefix)) return;
    }
    const rest = scopePath ? subj.slice(prefix.length) : subj;
    const firstSeg = rest.split('::')[0].trim();
    if(!firstSeg) return;
    const fullPath = prefix + firstSeg;
    if(!seen.has(firstSeg)) seen.set(firstSeg, fullPath);
  });
  return seen; // Map preserves insertion order: name -> full path
}
// FIXED: moves subjPath up/down (dir -1/+1) relative to its true siblings only — i.e. other
// folders that share the exact same parent — instead of blindly swapping with whatever the
// next entry happens to be in the flat saved-order array. This is what makes reordering work
// correctly at every nesting level: reordering inside a subfolder can never accidentally jump
// a folder across into an unrelated parent's group.
//   Deep-level fix: `orderArr` only ever holds LEAF subject paths (subjects that actually have
// tests directly in them, from bySubject/emptySubjects) — a folder row like "1st Year" is often
// just a synthesized group standing in for several deeper leaf paths ("1st Year::Biochemistry",
// "1st Year::Physiology", ...) and never appears in orderArr itself. Looking it up with
// orderArr.indexOf(subjPath) therefore always returned -1 and silently did nothing whenever the
// row being moved had its own children nested more than one level down. Fixed by finding every
// leaf entry that belongs to each of the two sibling groups (subjPath and its up/down neighbor)
// and swapping those two blocks as a unit, preserving each group's internal order.
// Mutates orderArr in place; returns true if a swap happened.
function moveSubjectInOrder(orderArr, subjPath, dir){
  const lastSep = subjPath.lastIndexOf('::');
  const scope = lastSep === -1 ? '' : subjPath.slice(0, lastSep);
  const siblings = Array.from(siblingSubjectPaths(orderArr, scope).values());
  const si = siblings.indexOf(subjPath);
  if(si === -1) return false;
  const ti = si + dir;
  if(ti < 0 || ti >= siblings.length) return false;
  const other = siblings[ti];
  const belongsToGroup = (entry, group)=> entry === group || entry.startsWith(group + '::');
  const idxA = [], idxB = [];
  orderArr.forEach((entry, i)=>{
    if(belongsToGroup(entry, subjPath)) idxA.push(i);
    else if(belongsToGroup(entry, other)) idxB.push(i);
  });
  if(!idxA.length || !idxB.length) return false;
  const valsA = idxA.map(i=>orderArr[i]);
  const valsB = idxB.map(i=>orderArr[i]);
  const aWasFirst = idxA[0] < idxB[0];
  const allIdx = new Set([...idxA, ...idxB]);
  const firstIdx = Math.min(idxA[0], idxB[0]);
  let insertAt = 0;
  for(let i=0;i<firstIdx;i++){ if(!allIdx.has(i)) insertAt++; }
  const rest = orderArr.filter((_,i)=>!allIdx.has(i));
  const newBlock = aWasFirst ? valsB.concat(valsA) : valsA.concat(valsB);
  rest.splice(insertAt, 0, ...newBlock);
  orderArr.length = 0;
  orderArr.push(...rest);
  return true;
}
// ADDED: a second, lower-level "custom order" system — lets people manually reorder the
// individual lessons/tests inside a subject folder (there was previously no way to reorder
// lessons at all). Order is stored per-resource as res.testOrder[subjectPath] = [testId, ...];
// any lesson not yet in that list (new, or from before this feature existed) is appended in its
// existing order, and stale ids (deleted lessons) are silently dropped.
function orderedTestsFor(res, subj, tests){
  const ids = tests.map(t=>t.id);
  const saved = (res.testOrder && Array.isArray(res.testOrder[subj])) ? res.testOrder[subj].filter(id=>ids.includes(id)) : [];
  const missing = ids.filter(id=>!saved.includes(id));
  const order = saved.concat(missing);
  return order.map(id=>tests.find(t=>t.id===id)).filter(Boolean);
}
// ADDED: moves testId up/down (dir -1/+1) among the other lessons in the same subject folder,
// persists the new order straight to storage, and returns true if a swap happened.
async function moveTestInOrder(res, subj, testId, dir){
  const rawTests = res.tests.filter(t=>subjectOf(t)===subj);
  const ids = orderedTestsFor(res, subj, rawTests).map(t=>t.id);
  const i = ids.indexOf(testId), j = i + dir;
  if(i === -1 || j < 0 || j >= ids.length) return false;
  [ids[i], ids[j]] = [ids[j], ids[i]];
  res.testOrder = res.testOrder || {};
  res.testOrder[subj] = ids;
  await idbPut('resources', res);
  return true;
}
// CHANGED: now accepts `editMode` — when true (and the screen is in "Custom order" sort), each
// folder row gets up/down reorder-arrow buttons (data-move-subject-up/-down), disabled at the
// start/end of its own sibling group. FIXED: these buttons previously didn't exist at all, so
// Edit mode's "Save changes" button had nothing to actually reorder — this is the core fix for
// the custom-order issue. Navigation is now wired via data-folder-toggle/data-folder-subject
// (picked up by the existing click-guard listener in the caller) instead of an inline onclick,
// so clicks on the new arrow buttons don't also trigger a navigation.
function buildFolderChildrenHtml(subjects, scopePath, countLabel, navFnName, editMode){
  countLabel = countLabel || 'questions';
  const seen = siblingSubjectPaths(subjects, scopePath);
  if(!seen.size) return '';
  const entries = Array.from(seen.entries());
  return entries.map(([name, path], idx)=>{
    const arrowsHtml = editMode ? `<div class="tree-folder-arrows">
        <button class="tree-arrow-btn" data-move-subject-up="${escapeHtml(path)}" title="Move up" ${idx===0?'disabled':''}><i class="fa-solid fa-arrow-up"></i></button>
        <button class="tree-arrow-btn" data-move-subject-down="${escapeHtml(path)}" title="Move down" ${idx===entries.length-1?'disabled':''}><i class="fa-solid fa-arrow-down"></i></button>
      </div>` : '';
    return `<div class="tree-folder" data-folder-path="${escapeHtml(path)}">
      <div class="tree-folder-head" data-folder-toggle data-folder-subject="${escapeHtml(path)}" data-nav-folder="${escapeHtml(path)}">
        <i class="fa-solid fa-folder" style="color:var(--accent);"></i>
        <span class="subj-name-text">${escapeHtml(name)}</span>
        ${arrowsHtml}
        <i class="fa-solid fa-chevron-right" style="margin-left:auto;opacity:.45;font-size:.75rem;"></i>
      </div>
    </div>`;
  }).join('');
}
/* Wires up click-to-navigate for every ".tree-group" branch header inside a rendered tree wrapper.
   Call once after setting treeWrap.innerHTML via buildSubjectTreeHtml().
   ADDED: onNavigate(path), when given, is called with the branch's full "::" path instead of the
   old inline expand/collapse — this is what opens a subfolder into its own zoomed-in page. */
function wireSubjectTreeGroupToggles(treeWrap, onNavigate){
  treeWrap.querySelectorAll('[data-group-toggle]').forEach(head=>{
    head.addEventListener('click', (e)=>{
      e.stopPropagation();
      if(onNavigate) onNavigate(head.dataset.groupToggle);
      else head.closest('.tree-group').classList.toggle('open'); // fallback: old inline expand behaviour
    });
  });
}
/* ADDED: shared breadcrumb bar for a zoomed-in folder/subfolder page — "All Subjects" (root) plus
   one clickable crumb per "::" segment of the current path, with the current segment shown in bold
   and not clickable. navigateFnName is the global function name to call on click (e.g.
   "resDetailZoomTo" / "fcdZoomTo") since this HTML is built via template strings, not closures. */
function jsAttrEscape(s){
  // ADDED: safely embeds a string as a double-quoted JS string literal inside a single-quoted
  // HTML attribute (subject/folder names can contain quotes, backslashes, etc.)
  return String(s).replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function buildZoomBreadcrumbHtml(zoomPath, rootLabel, navigateFnName){
  const parts = zoomPath ? String(zoomPath).split('::').map(p=>p.trim()).filter(Boolean) : [];
  let acc = '';
  let html = `<span class="zoom-crumb" onclick='${navigateFnName}(null)'>${escapeHtml(rootLabel)}</span>`;
  parts.forEach((p, i)=>{
    acc = acc ? acc+'::'+p : p;
    const isLast = i===parts.length-1;
    html += `<i class="fa-solid fa-chevron-right" style="font-size:.72rem;opacity:.45;margin:0 4px;"></i>`;
    html += isLast
      ? `<span class="zoom-crumb zoom-crumb-current">${escapeHtml(p)}</span>`
      : `<span class="zoom-crumb" onclick='${navigateFnName}("${jsAttrEscape(acc)}")'>${escapeHtml(p)}</span>`;
  });
  return html;
}
function isPyqTest(test, resourceName){
  const s = (test.title||'') + ' ' + (resourceName||'');
  return /AIIMS|NEET|INICET|FMGE|PGI|JIPMER|PYQ|USMLE|CET/i.test(s) || /\b(19|20)\d{2}\b/.test(s);
}
function correctLabelOf(q){
  const opt = (q.options||[]).find(o=>o.correct);
  if(opt) return opt.label;
  if(q.correct_answer) return String(q.correct_answer).trim().charAt(0).toUpperCase();
  return null;
}
// FIXED: q.correct_answer sometimes already carries its own leading label
// ("C. Memory cells") in addition to the label resolved separately via
// correctLabelOf() (from the matching option's `label` field). Every call site
// that prints "${label} — ${q.correct_answer}" was concatenating both, so the
// letter appeared twice ("C — C. Memory cells"). This strips a leading label
// from the answer text whenever it matches the label already being shown
// alongside it, so the same "C." fragment is never printed twice; text that
// doesn't start with a matching label prefix is returned unchanged.
function correctAnswerTextOnly(q, label){
  const text = String((q && q.correct_answer) || '').trim();
  if(!text || !label) return text;
  const escapedLabel = String(label).trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('^' + escapedLabel + '\\s*[\\.:\\)\\-–—]\\s*', 'i');
  return text.replace(re, '').trim();
}

/* ============================== ADDED: Downloadable blank import template ==============================

   importer (extractTestsArray/importFile) already understands. Users can open it in any

  FIELD NOTES:

-->

const TESTS_LIST = [

          { "label": "D", "text": "Option D text", "correct": false }
        ],

        "explanation_images": []
      }

];
<\/script>
</body>
</html>
`;
}

/* ADDED: Produces a blank .txt template in the plain-text "Part 1 / Part 2 / Part 3"
   Q&A markdown format that parsePlainQAText() understands. Users can duplicate the
   "## Question N" block for every question, fill it in, save as .txt, and re-import
   via "Import Resource" / drag-drop. */
function buildImportTemplateTxt(){
  return `QBank Import Template (Plain Text Q&A format)
------------------------------------------------
HOW TO USE:
1) Keep the "## Question N" / "### Part 1" / "### Part 2" / "### Part 3" structure exactly as-is.
2) Duplicate the whole block (from "## Question N" down to the "---" divider) for every
   new question you want to add, and number each one sequentially (Question 1, 2, 3, ...).
3) Save this file with a .txt extension and import it back into the app using the
   "Import Resource" button on the Home tab (or drag-and-drop it in).

FIELD NOTES:
- Options: list as "A) text", "B) text", etc. (up to F supported).
- Correct Answer: write exactly one letter matching one of the options above, e.g. "B) Strong nuclear force".
- Explanation: any text under "### Part 3" is shown after the question is answered.
- All questions in this file are imported together as a single test.
------------------------------------------------

## Question 1

### Part 1: Question

**Q1. Type your question stem here?**
A) Option A text

B) Option B text

C) Option C text

D) Option D text

### Part 2: Answer

**Correct Answer:** B) Option B text

### Part 3: Explanation

Explain why the correct answer is correct here.

---

## Question 2

### Part 1: Question

**Q2. Type your second question stem here?**
A) Option A text

B) Option B text

C) Option C text

D) Option D text

### Part 2: Answer

**Correct Answer:** A) Option A text

### Part 3: Explanation

Explain why the correct answer is correct here.

---
`;
}

/* ============================== ADDED: Flashcard Deck downloads (whole deck / one subject / one lesson) as real .apkg files ==============================
   Builds an actual Anki-compatible collection (legacy anki2 SQLite schema, same shape genanki/Anki
   itself produces) and zips it into a .apkg using the sql.js + JSZip libs already loaded for .apkg
   import (see ensureApkgLibs). The result can be imported straight into Anki desktop/mobile/AnkiWeb.
   Deck names are exported as "Label::Subject::Lesson" so re-importing recreates the folder structure. */
function apkgFieldChecksum(sfld){
  // Lightweight positional hash used only to give each note a distinct/stable csum value —
  // Anki uses this purely as a dedupe hint, not as a security checksum, so this is sufficient.
  let h = 0;
  const s = String(sfld||'');
  for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) >>> 0; }
  return h;
}
async function buildApkgBytes(tests, deckLabel, resourceId){
  const libs = await ensureApkgLibs();
  const { JSZip, SQL } = libs;
  const db = new SQL.Database();

  const nowMs = Date.now();
  const nowSec = Math.floor(nowMs/1000);

  db.run(`
    CREATE TABLE col (
      id integer primary key, crt integer not null, mod integer not null, scm integer not null,
      ver integer not null, dty integer not null, usn integer not null, ls integer not null,
      conf text not null, models text not null, decks text not null, dconf text not null, tags text not null
    );
    CREATE TABLE notes (
      id integer primary key, guid text not null, mid integer not null, mod integer not null,
      usn integer not null, tags text not null, flds text not null, sfld text not null,
      csum integer not null, flags integer not null, data text not null
    );
    CREATE TABLE cards (
      id integer primary key, nid integer not null, did integer not null, ord integer not null,
      mod integer not null, usn integer not null, type integer not null, queue integer not null,
      due integer not null, ivl integer not null, factor integer not null, reps integer not null,
      lapses integer not null, left integer not null, odue integer not null, odid integer not null,
      flags integer not null, data text not null
    );
    CREATE TABLE revlog (
      id integer primary key, cid integer not null, usn integer not null, ease integer not null,
      ivl integer not null, lastIvl integer not null, factor integer not null, time integer not null,
      type integer not null
    );
    CREATE TABLE graves ( usn integer not null, oid integer not null, type integer not null );
    CREATE INDEX ix_notes_usn on notes (usn);
    CREATE INDEX ix_cards_usn on cards (usn);
    CREATE INDEX ix_revlog_usn on revlog (usn);
    CREATE INDEX ix_cards_nid on cards (nid);
    CREATE INDEX ix_cards_sched on cards (did, queue, due);
    CREATE INDEX ix_revlog_cid on revlog (cid);
    CREATE INDEX ix_notes_csum on notes (csum);
  `);

  // ADDED: pull back the actual media bytes saved at import time (see importApkgFile), so real
  // image/audio files can be bundled into this .apkg instead of leaving dead blob: URLs in the HTML.
  let mediaRecords = [];
  if(resourceId){
    try{ mediaRecords = await idbGetByIndex('media', 'resourceId', resourceId); }catch(e){ mediaRecords = []; }
  }
  const mediaManifest = {};
  mediaRecords.forEach((rec, i)=>{ mediaManifest[String(i)] = rec.filename; });

  // Deck hierarchy: "deckLabel::Subject::LessonTitle" -> deck id, built on demand per test
  let deckIdCounter = nowMs;
  const deckPathToId = {};
  // ADDED: branded deck description — shows up in Anki's deck options/browser panel,
  // matching the "Generated with QBank Center" credit used on the .pdf/.txt exports.
  // Card content/templates are left untouched (safest place to brand an .apkg).
  const deckDesc = `Exported with ${PDF_APP_NAME} — ${pdfDateStr()}`;
  const decksJson = {
    "1": { id:1, mod:nowSec, name:"Default", usn:-1, lrnToday:[0,0], revToday:[0,0], newToday:[0,0],
           timeToday:[0,0], collapsed:true, desc:'', dyn:0, conf:1, extendNew:10, extendRev:50 }
  };
  function getDeckId(path){
    if(deckPathToId[path]) return deckPathToId[path];
    const id = ++deckIdCounter;
    deckPathToId[path] = id;
    decksJson[String(id)] = { id, mod:nowSec, name:path, usn:-1, lrnToday:[0,0], revToday:[0,0], newToday:[0,0],
      timeToday:[0,0], collapsed:true, desc:deckDesc, dyn:0, conf:1, extendNew:10, extendRev:50 };
    return id;
  }

  const defaultCss = ".card { font-family: arial; font-size: 20px; text-align: center; color: black; background-color: white; }";
  const latexPre = "\\documentclass[12pt]{article}\n\\special{papersize=3in,5in}\n\\usepackage[utf8]{inputenc}\n\\usepackage{amssymb,amsmath}\n\\pagestyle{empty}\n\\setlength{\\parindent}{0in}\n\\begin{document}\n";
  const latexPost = "\\end{document}";
  const modelsJson = {};
  let nextModelId = nowMs + 1;

  // Fallback model — used only for cards that have no captured original note-type info
  // (e.g. flashcards authored directly in this app, or decks imported before this fix).
  const genericModelId = nextModelId++;
  let genericModelUsed = false;
  function ensureGenericModel(){
    if(!genericModelUsed){
      modelsJson[String(genericModelId)] = {
        id: genericModelId, name: "QBank Export (Basic)", type:0, mod: nowSec, usn:-1, sortf:0, did:1,
        tmpls: [{ name:"Card 1", ord:0, qfmt:"{{Front}}", afmt:"{{FrontSide}}<hr id=answer>{{Back}}", did:null, bafmt:"", bqfmt:"", bfont:"", bsize:0 }],
        flds: [
          { name:"Front", ord:0, sticky:false, rtl:false, font:"Arial", size:20, media:[] },
          { name:"Back", ord:1, sticky:false, rtl:false, font:"Arial", size:20, media:[] }
        ],
        css: defaultCss, latexPre, latexPost, req: [[0,"any",[0]]]
      };
      genericModelUsed = true;
    }
    return genericModelId;
  }

  // ADDED: dynamically-built models that reuse each ORIGINAL note type's real css/qfmt/afmt —
  // one synthetic single-template model per (original note type, original template ord) pair, so
  // every re-exported card keeps its exact original layout instead of the generic template above.
  const builtModelIdByKey = {};
  function ensureOriginalModel(ntid, ord, nt){
    const key = ntid + '::' + ord;
    if(builtModelIdByKey[key]) return builtModelIdByKey[key];
    const tmpl = (nt.tmpls && (nt.tmpls[ord] || nt.tmpls.find(Boolean))) || null;
    const fields = (nt.fields && nt.fields.length) ? nt.fields : ['Front','Back'];
    const id = nextModelId++;
    modelsJson[String(id)] = {
      id, name: (nt.name || 'Imported') + (tmpl && tmpl.name ? ' - ' + tmpl.name : ''), type: nt.isCloze ? 1 : 0,
      mod: nowSec, usn:-1, sortf:0, did:1,
      tmpls: [{
        name: (tmpl && tmpl.name) || 'Card 1', ord: 0,
        qfmt: (tmpl && tmpl.qfmt) || ('{{'+fields[0]+'}}'),
        afmt: (tmpl && tmpl.afmt) || ('{{FrontSide}}<hr id=answer>{{'+(fields[1]||fields[0])+'}}'),
        did:null, bafmt:"", bqfmt:"", bfont:"", bsize:0
      }],
      flds: fields.map((fn,i)=>({ name: fn || ('Field'+(i+1)), ord:i, sticky:false, rtl:false, font:"Arial", size:20, media:[] })),
      css: nt.css || defaultCss,
      latexPre, latexPost, req: [[0,"any",[0]]]
    };
    builtModelIdByKey[key] = id;
    return id;
  }

  const dconfJson = { "1": { id:1, mod:nowSec, name:"Default", usn:-1, maxTaken:60, autoplay:true, timer:0, replayq:true,
    new:{bury:false,delays:[1,10],initialFactor:2500,ints:[1,4,7],order:1,perDay:20},
    rev:{bury:false,ease4:1.3,fuzz:0.05,ivlFct:1,maxIvl:36500,perDay:200,hardFactor:1.2},
    lapse:{delays:[10],leechAction:1,leechFails:8,minInt:1,mult:0}, dyn:false } };

  // ADDED: look up this resource's captured original note-type/template/css map (saved on the
  // resource at import time — see importApkgFile) so cards from an imported .apkg can be rebuilt
  // with their exact original layout below.
  const res = resourceId ? APP.resources.find(r=>r.id===resourceId) : null;
  const noteTypeMap = (res && res.apkgNoteTypes) || {};

  let noteId = nowMs;
  let cardId = nowMs + 5000000;
  let duePos = 1;
  const insertNote = db.prepare("INSERT INTO notes VALUES (?,?,?,?,?,?,?,?,?,?,?)");
  const insertCard = db.prepare("INSERT INTO cards VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)");

  for(const t of tests){
    // Prefer the original "::"-nested deck path captured at import (test.apkgDeckPath), so
    // re-exported decks keep the exact same folder/subfolder structure Anki originally had.
    // Otherwise build the path straight from the test's own structured subjectPath/lessonName
    // fields (real data, not re-parsed text) — this restores full nesting for older decks too,
    // with no re-import needed, and unlike the old title-splitting fallback it can't be thrown
    // off by a lesson name that happens to contain " - " or "::".
    const path = t.apkgDeckPath
      ? [deckLabel, ...String(t.apkgDeckPath).split('::')].filter(Boolean).join('::')
      : [deckLabel, ...ensureSubjectPath(t), lessonNameOf(t)].filter(Boolean).join('::');
    const did = getDeckId(path);
    for(const q of (t.questions||[])){
      let mid, flds, sfld;
      const nt = q.apkgNtid != null ? noteTypeMap[q.apkgNtid] : null;
      if(nt && Array.isArray(q.apkgFieldValues) && q.apkgFieldValues.length){
        // Faithful path: rebuild the note using its ORIGINAL fields + original note type/template.
        mid = ensureOriginalModel(q.apkgNtid, q.apkgOrd || 0, nt);
        const vals = q.apkgFieldValues.map(v => String(v||''));
        flds = vals.join('\x1f');
        sfld = apkgStripTags(vals[0]) || 'Untitled';
      } else {
        // ADDED: prefer the original-filename HTML (raw_text_orig/explanation_orig) saved at import
        // time, since it still references real media filenames rather than session-only blob: URLs.
        // Falls back to the display HTML for resources imported before this fix, or non-apkg cards.
        const front = q.raw_text_orig || q.raw_text || q.text || '';
        const back = q.explanation_orig || q.explanation || q.correct_answer || '';
        mid = ensureGenericModel();
        flds = front + '\x1f' + back;
        sfld = apkgStripTags(front) || 'Untitled';
      }
      const guid = 'qh_' + (q.id || uid('q'));
      noteId++;
      insertNote.run([noteId, guid, mid, nowSec, -1, '', flds, sfld, apkgFieldChecksum(sfld), 0, '']);
      cardId++;
      insertCard.run([cardId, noteId, did, 0, nowSec, -1, 0, 0, duePos++, 0, 0, 0, 0, 0, 0, 0, 0, '']);
    }
  }
  insertNote.free();
  insertCard.free();

  // ADDED: pick any model actually created as the "current" one (col.conf just needs a valid id).
  const curModelId = Object.keys(modelsJson)[0] || String(genericModelId);
  const confJson = { curDeck:1, curModel:curModelId, nextPos:1, estTimes:true, activeDecks:[1],
    sortType:"noteFld", timeLim:0, sortBackwards:false, addToCur:true, newBury:true, dueCounts:true, collapseTime:1200 };

  db.run("INSERT INTO col VALUES (1,?,?,?,11,0,0,0,?,?,?,?,?)", [
    nowSec, nowMs, nowMs,
    JSON.stringify(confJson), JSON.stringify(modelsJson), JSON.stringify(decksJson), JSON.stringify(dconfJson), JSON.stringify({})
  ]);

  const sqliteBytes = db.export();
  db.close();

  const zip = new JSZip();
  zip.file('collection.anki2', sqliteBytes);
  zip.file('media', JSON.stringify(mediaManifest)); // ADDED: real manifest (was '{}' before)
  mediaRecords.forEach((rec, i)=>{ zip.file(String(i), rec.blob); }); // ADDED: bundle the actual media files
  return await zip.generateAsync({ type: 'uint8array' });
}
async function downloadTestsListApkg(tests, label, resourceId){
  if(!tests || !tests.length){ showMiniToast('Nothing to download', 'error'); return; }
  showMiniToast('Building .apkg file…', 'success');
  try{
    const bytes = await buildApkgBytes(tests, label, resourceId);
    const blob = new Blob([bytes], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const safeFileName = (label || 'flashcards').replace(/[\\/:*?"<>|]+/g, '-').trim() || 'flashcards';
    const a = document.createElement('a');
    a.href = url;
    a.download = `${PDF_APP_NAME.replace(/\s+/g,'_')}_${safeFileName}.apkg`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showMiniToast(`.apkg downloaded via ${PDF_APP_NAME} — import it into Anki anytime`, 'success');
  }catch(e){
    console.error('apkg build failed', e);
    showMiniToast('Could not build the .apkg file', 'error');
  }
}

// ADDED: export a Flashcard Deck as a plain-text file of Q:/A: pairs — the exact
// format "Import from Text" reads back in, so a deck can round-trip out to be
// edited/backed up, or pasted as typed text into an app like GoodNotes, and
// imported again later without needing the .apkg/Anki toolchain at all.
function buildTestsListAsTextLines(tests){
  const lines = [];
  for(const t of (tests||[])){
    for(const q of (t.questions||[])){
      const front = apkgStripTags(q.raw_text || q.text || '').trim();
      const back = apkgStripTags(q.explanation || (q.options && q.options[0] && q.options[0].text) || '').trim();
      if(!front && !back) continue;
      lines.push('Q: ' + front);
      lines.push('A: ' + back);
      lines.push('');
    }
  }
  return lines;
}
// Shared helper: downloads any tests[] list as a GoodNotes-friendly .txt file (Q:/A: pairs).
// CHANGED: wraps the Q:/A: pairs with a single-line branded header + footer
// ("— QBank Center · Question Bank Export · <date> —") to match the PDF export's
// look. Each is kept to exactly ONE line on purpose: parseFlashcardTextInput()
// treats a blank-line-separated block as a real card only when it has 2+ lines,
// so these one-line credit lines are safely ignored if the file is ever
// re-imported via "Import from Text" — they can't turn into a bogus card.
function downloadTestsListAsText(tests, label){
  const lines = buildTestsListAsTextLines(tests);
  if(!lines.length){ showMiniToast('Nothing to export', 'error'); return; }
  const safeFileName = (label || 'flashcards').replace(/[\\/:*?"<>|]/g, '_').trim() || 'flashcards';
  const header = `— ${PDF_APP_NAME} · Question Bank Export · ${(label || 'Untitled').trim()} · ${pdfDateStr()} —`;
  const footer = `— Generated with ${PDF_APP_NAME} —`;
  const body = [header, '', ...lines].join('\n').trim();
  downloadTextAsFile(body + '\n\n' + footer + '\n', `${safeFileName}.txt`, 'text/plain');
  showMiniToast('Exported as GoodNotes-style .txt (Q:/A: pairs)', 'success');
}

/* ============================================================
   ADDED: GoodNotes Study Set / Flashcards export — real .csv file
   ------------------------------------------------------------
   GoodNotes' native .goodnotes format is a closed, undocumented container
   (confirmed in GoodNotes' own support docs and by reverse-engineering
   attempts elsewhere in this codebase) — there is no reliable way to
   hand-build one from scratch, so we don't try.
   Instead, GoodNotes officially supports importing a plain .csv or .tsv file
   straight into a Study Set / Flashcards deck (Settings > Study Set > Import),
   with ONE required layout: question in column 1, answer in column 2, no
   header row, no other columns. This produces a file GoodNotes actually
   accepts, unlike a fake .goodnotes container would.
   Source: https://support.goodnotes.com/hc/en-us/articles/7353717960207
   ============================================================ */
// Escapes a single CSV field per RFC 4180: wrap in quotes (doubling any inner
// quotes) whenever the value contains a comma, quote, or line break.
function csvEscapeField(value){
  const s = String(value == null ? '' : value);
  if(/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
// Builds the raw CSV text (no header row) from a tests[] list — one row per
// card: question,answer.
function buildTestsListAsGoodnotesCsv(tests){
  const rows = [];
  for(const t of (tests||[])){
    for(const q of (t.questions||[])){
      const front = apkgStripTags(q.raw_text || q.text || '').trim();
      const back = apkgStripTags(q.explanation || (q.options && q.options[0] && q.options[0].text) || '').trim();
      if(!front && !back) continue;
      rows.push(csvEscapeField(front) + ',' + csvEscapeField(back));
    }
  }
  return rows;
}
// Shared helper: downloads any tests[] list as a GoodNotes-importable .csv file.
// NOTE: unlike the .pdf/.txt exports, we deliberately do NOT inject any branding
// row/column into the CSV data itself — GoodNotes' importer requires exactly
// "question,answer" with no header row and no extra columns (see comment block
// above), so a branding row would either get imported as a bogus card or break
// the import outright. Branding is applied at the filename level instead.
function downloadTestsListAsGoodnotesCsv(tests, label){
  const rows = buildTestsListAsGoodnotesCsv(tests);
  if(!rows.length){ showMiniToast('Nothing to export', 'error'); return; }
  const safeFileName = (label || 'flashcards').replace(/[\\/:*?"<>|]/g, '_').trim() || 'flashcards';
  downloadTextAsFile(rows.join('\r\n') + '\r\n', `${PDF_APP_NAME.replace(/\s+/g,'_')}_${safeFileName}.csv`, 'text/csv');
  showMiniToast(`Exported as .csv via ${PDF_APP_NAME} — in GoodNotes: New Study Set > Import`, 'success');
}
