/* ============================================================
   boot / seed bootstrap
   ============================================================ */
async function bootstrapSeedIfNeeded(){
  const seedEl = document.getElementById('seed-data');
  if(!seedEl) return;
  let seed = null;
  try{ seed = JSON.parse(seedEl.textContent); }catch(e){ seed = null; }
  if(!seed) return;
  // FIXED: this used to key off "does the resources store currently have
  // anything in it" — which meant that on any boot where the question bank
  // was empty (fresh install, or everything deleted), it would treat that as
  // "first launch" all over again and re-apply seed.settings, silently
  // stomping the person's chosen theme (and their streak) back to the seed
  // defaults on every single reload. A one-time flag, set the first time
  // seeding actually runs and never cleared, is what "only seed once" needs.
  if(lsGet(LS_SEED_APPLIED, false)) return;
  lsSet(LS_SEED_APPLIED, true);
  const existing = await idbGetAll('resources');
  if(existing.length > 0) return; // don't clobber existing local data
  if(Array.isArray(seed.resources)){
    for(const r of seed.resources) await idbPut('resources', r);
  }
  if(seed.history){
    for(const k in seed.history) await idbPut('history', seed.history[k]);
  }
  if(Array.isArray(seed.sessions)){
    for(const s of seed.sessions) await idbPut('sessions', s);
  }
  if(seed.streak){ APP.streak = seed.streak; lsSet(LS_STREAK, APP.streak); }
  if(seed.settings){ APP.settings = sanitizeSettings(seed.settings); lsSet(LS_SETTINGS, APP.settings); }
  showMiniToast('Loaded shared question bank & progress', 'success');
}

async function loadAllFromDB(){
  const [resources, historyList, sessions] = await Promise.all([
    idbGetAll('resources'), idbGetAll('history'), idbGetAll('sessions')
  ]);
  APP.resources = resources;
  APP.historyMap = {};
  for(const h of historyList) APP.historyMap[h.qid] = h;
  APP.sessions = sessions.sort((a,b)=>b.ts-a.ts);
  rebuildFlatIndex();
}

function getFolderPath() {
  return window.CURRENT_FOLDER_PATH || [];
}

function getCurrentFolder() {
  let folder = FOLDER_HIERARCHY.root;
  for (let folderId of getFolderPath()) {
    if (folder.folders && folder.folders[folderId]) {
      folder = folder.folders[folderId];
    } else {
      return FOLDER_HIERARCHY.root;
    }
  }
  return folder;
}

function navigateToFolder(folderId) {
  window.CURRENT_FOLDER_PATH.push(folderId);
  renderResourcesList();
}

function goBackFolder() {
  if (window.CURRENT_FOLDER_PATH.length > 0) {
    window.CURRENT_FOLDER_PATH.pop();
  }
  renderResourcesList();
}

function renameFolder(folderId, oldName) {
  const newName = prompt('Rename folder:', oldName);
  if (newName && newName.trim()) {
    let folder = FOLDER_HIERARCHY.root;
    const path = getFolderPath();
    for (let id of path) {
      folder = folder.folders[id];
    }
    if (folder.folders && folder.folders[folderId]) {
      folder.folders[folderId].name = newName.trim();
      saveFolderHierarchy(); // CHANGED: persist the rename so it survives a reload
      renderResourcesList();
    }
  }
}

// ADDED: a resource's folder id, defaulting to 'root' — resources created before this system
// existed (or simply never moved) have no folderId set, which is exactly equivalent to being in Root.
function resourceFolderId(res){ return res.folderId || 'root'; }

// ADDED: flattens the folder tree into a flat, indented list for the "move to folder" picker —
// e.g. "Root", "Root / Anatomy", "Root / Anatomy / Upper Limb".
// FIXED: also carries `segments`, the real array of individual folder names collected while
// recursing (["Anatomy","Upper Limb"]), alongside the display `label` string. Anything that needs
// per-level folder names should read `segments` instead of
// splitting `label` on '/' — a folder can legally be renamed to contain a literal "/" character
// (renameFolder() below has no character restriction), which would silently corrupt a split-on-'/'
// reconstruction and misattribute folder-name segments.
function flattenFolderTree(folder, path, out, segments){
  out = out || [];
  segments = segments || [];
  out.push({ id: folder.id, label: path, segments: segments.slice() });
  Object.values(folder.folders || {}).forEach(sub=>{
    flattenFolderTree(sub, path + ' / ' + sub.name, out, segments.concat([sub.name]));
  });
  return out;
}

// ADDED: moves a resource into a (possibly different) folder — the actual "put this item inside
// this folder" primitive the file-explorer-style arrangement needs; persists to IndexedDB like
// every other resource-field edit (see renameResource() for the identical pattern).
async function moveResourceToFolder(resId, folderId){
  const res = APP.resources.find(r=>r.id===resId);
  if(!res) return;
  res.folderId = (folderId==='root') ? null : folderId;
  await idbPut('resources', res);
  showMiniToast('Moved', 'success');
  renderResourcesList();
}


function deleteFolder(folderId) {
  let parentFolder = FOLDER_HIERARCHY.root;
  const path = getFolderPath();
  for (let id of path) {
    parentFolder = parentFolder.folders[id];
  }
  const folder = parentFolder.folders && parentFolder.folders[folderId];
  if (!folder) return;

  // CHANGED: deleting a folder used to just `delete` it from its parent — harmless back when
  // resources weren't actually linked to folders, but now that they are, that would have silently
  // stranded (and, from the user's point of view, "deleted") any real resource data inside it.
  // Instead, anything directly inside the folder — resources and subfolders alike — is moved up
  // to the parent folder first, so nothing is ever lost; only the empty folder itself goes away.
  const resInside = APP.resources.filter(r=>!r.isFlashcardDeck && resourceFolderId(r)===folderId);
  const subCount = Object.keys(folder.folders || {}).length;
  const msg = (resInside.length || subCount)
    ? `Delete "${folder.name}"? ${resInside.length} resource${resInside.length===1?'':'s'} and ${subCount} subfolder${subCount===1?'':'s'} inside will be moved back to "${parentFolder.name}" — nothing will be deleted except this now-empty folder.`
    : `Delete empty folder "${folder.name}"?`;
  if (!confirm(msg)) return;

  const parentId = parentFolder.id;
  Promise.all(resInside.map(r=>{
    r.folderId = (parentId==='root') ? null : parentId;
    return idbPut('resources', r);
  })).then(()=>{
    if (folder.folders && Object.keys(folder.folders).length){
      if (!parentFolder.folders) parentFolder.folders = {};
      Object.assign(parentFolder.folders, folder.folders);
    }
    delete parentFolder.folders[folderId];
    saveFolderHierarchy();
    renderResourcesList();
  });
}

async function deleteResourceById(id){
  const res = APP.resources.find(r=>r.id===id);
  if(!confirm(`Delete "${res ? res.name : 'this resource'}" from this device? Your practice history for it will be kept unless you also clear history.`)) return;
  if(res) addToRecycleBin('resource', res.name, res); // ADDED: keep a copy in the recycle bin
  await idbDelete('resources', id);
  if(res && res.isFlashcardDeck) idbDeleteByIndex('media', 'resourceId', id).catch(()=>{}); // ADDED: drop this deck's saved media bytes too
  APP.resources = APP.resources.filter(r=>r.id!==id);
  rebuildFlatIndex();
  updateRecycleBinBadge(); // ADDED
  if(APP.currentTab==='resource') setTab(APP.resourceDetailFrom || 'home');
  else if(APP.currentTab==='resources') renderResourcesList();
  else renderHome();
  showMiniToast('Resource removed', 'success');
}

async function handleFiles(fileList, statusElId, folderId){
  const status = document.getElementById(statusElId || 'import-status');
  const files = Array.from(fileList);
  // ADDED: track totals so we can show a clear success/fail summary + new-question count
  let successCount = 0, failCount = 0, newQuestions = 0;
  for(const f of files){
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:.8rem;padding:6px 0;';
    row.innerHTML = `<div class="spinner"></div><span>Parsing ${escapeHtml(f.name)}…</span>`;
    if(status) status.appendChild(row);
    await new Promise(r=>setTimeout(r, 30)); // let spinner paint
    try{
      const res = await importFile(f, folderId);
      if(res){
        row.innerHTML = `<span style="color:var(--green-status);">✓</span><span>${escapeHtml(f.name)} — ${res.stats.tests} tests, ${res.stats.questions.toLocaleString()} questions</span>`;
        successCount++;
        newQuestions += res.stats.questions;
      } else {
        row.innerHTML = `<span style="color:var(--red-status);">✗</span><span>${escapeHtml(f.name)} — no question data found</span>`;
        failCount++;
      }
    }catch(e){
      console.error(e);
      row.innerHTML = `<span style="color:var(--red-status);">✗</span><span>${escapeHtml(f.name)} — failed to parse</span>`;
      failCount++;
    }
  }
  // ADDED: Show centered import notification modal with stats
  const newTests = files.length - failCount;
  showImportNotification(successCount, failCount, newQuestions, newTests);
  // ADDED: give the per-file ✓/✗ rows a moment on screen before the view re-renders and clears them
  const refresh = ()=>{
    renderHome();
    if(APP.currentTab==='resources') renderResourcesList();
  };
  if(successCount) checkAchievements(); // ADDED: resource-count (Collector) achievement may now be met
  if(successCount || failCount) setTimeout(refresh, 1100); else refresh();
}

   ============================================================ */
function seededIndex(seedStr, n){
  let h = 0;
  for(let i=0;i<seedStr.length;i++){ h = (h*31 + seedStr.charCodeAt(i)) >>> 0; }
  return n ? (h % n) : 0;
}
function getDailyQuizEntry(){
  if(!APP.flatIndex.length) return null;
  const t = todayStr();
  let rec = APP.daily[t];
  if(!rec){
    const idx = seededIndex(t, APP.flatIndex.length);
    rec = { cid: APP.flatIndex[idx].compositeId, chosen:null, correct:null, completed:false };
    APP.daily[t] = rec;
    lsSet(LS_DAILY, APP.daily);
  }
  const fq = flatByCompositeId(rec.cid) || APP.flatIndex[seededIndex(t, APP.flatIndex.length)];
  return { rec, fq };
}
// ADDED: small curated set of short, widely-known/public-domain quotes used the instant the app
// renders (so the greeting never waits on the network) and as the permanent fallback if the
// device is offline or every quote API below is unreachable. Picked deterministically by
// day-of-year so it still reads as a stable "quote of the day" even without a connection.
const OFFLINE_QUOTES = [
  { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
  { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
  { text: "Well done is better than well said.", author: "Benjamin Franklin" },

  { text: "Success is the sum of small efforts, repeated day in and day out.", author: "Robert Collier" },
  { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
  { text: "Discipline is the bridge between goals and accomplishment.", author: "Jim Rohn" },
  { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
  { text: "The future depends on what you do today.", author: "Mahatma Gandhi" },
  { text: "Learning never exhausts the mind.", author: "Leonardo da Vinci" },
  { text: "Small daily improvements are the key to staggering long-term results.", author: "Anonymous" },
  { text: "Push yourself, because no one else is going to do it for you.", author: "Anonymous" },
  { text: "A little progress each day adds up to big results.", author: "Anonymous" },
  { text: "Knowledge is power.", author: "Francis Bacon" },
  { text: "The expert in anything was once a beginner.", author: "Helen Hayes" },
  { text: "Study while others are sleeping; work while others are loafing.", author: "William A. Ward" },
  { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
  { text: "Do something today that your future self will thank you for.", author: "Anonymous" },
  { text: "Motivation gets you going, but discipline keeps you growing.", author: "John C. Maxwell" },
  { text: "There are no shortcuts to any place worth going.", author: "Beverly Sills" }
];
function offlineQuoteOfTheDay(){
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / 86400000);
  return OFFLINE_QUOTES[((dayOfYear % OFFLINE_QUOTES.length) + OFFLINE_QUOTES.length) % OFFLINE_QUOTES.length];
}

// ADDED: renders the daily quote shown above the Home greeting, and — once per calendar day —
// tries to refresh it from a couple of free, no-key, CORS-enabled quote APIs. The offline
// fallback above paints instantly so the greeting is never blocked on the network; if a fetch
// succeeds it's swapped in and cached for the rest of the day, and if every endpoint fails
// (no internet, blocked, etc.) today's offline fallback is cached instead so we don't keep
// retrying the network on every Home render.
async function renderDailyQuoteCard(){
  const slot = document.getElementById('daily-quote-slot');
  if(!slot) return;
  const today = todayStr();
  const cached = lsGet(LS_DAILY_QUOTE, null);
  const paint = (q)=>{
    slot.innerHTML = `<div class="muted" style="font-size:.86rem;font-style:italic;margin-bottom:10px;">
      “${escapeHtml(q.text)}” <span style="font-style:normal;">— ${escapeHtml(q.author||'Unknown')}</span>
    </div>`;
  };
  if(cached && cached.date === today){ paint(cached); return; } // already refreshed (or already fell back) today

  const fallback = offlineQuoteOfTheDay();
  paint(fallback); // instant, never waits on the network

  const endpoints = [
    { url: 'https://dummyjson.com/quotes/random', parse: d => ({ text: d && d.quote, author: d && d.author }) },
    { url: 'https://api.quotable.io/random', parse: d => ({ text: d && d.content, author: d && d.author }) }
  ];
  for(const ep of endpoints){
    try{
      const res = await fetch(ep.url, { cache: 'no-store' });
      if(!res.ok) continue;
      const data = await res.json();
      const q = ep.parse(data);
      if(q && q.text){
        const record = { date: today, text: q.text, author: q.author || 'Unknown' };
        lsSet(LS_DAILY_QUOTE, record);
        paint(record);
        return;
      }
    }catch(e){ /* offline or blocked — try the next endpoint */ }
  }
  // ADDED: every endpoint failed — cache today's offline fallback so we stop retrying until tomorrow
  lsSet(LS_DAILY_QUOTE, { date: today, text: fallback.text, author: fallback.author });
}
function renderDailyQuizCard(){
  const slot = document.getElementById('daily-quiz-slot');
  if(!slot) return;
  if(!APP.flatIndex.length){ slot.innerHTML=''; return; }
  const entry = getDailyQuizEntry();
  if(!entry || !entry.fq){ slot.innerHTML=''; return; }
  const { rec, fq } = entry;
  const q = fq.q;
  const correctLabel = correctLabelOf(q);
  const done = rec.completed;

  slot.innerHTML = `<div class="card daily-quiz-card">
    <div class="daily-quiz-head">
      <div style="font-weight:800;font-size:.95rem;">🗓️ Daily Quiz</div>
      <span class="daily-quiz-badge ${done?'done':''}">${done ? '✓ Completed today' : 'New question today'}</span>
    </div>
    <div class="qtags">
      <span class="tag tag-accent">${escapeHtml(fq.subject)}</span>
      <span class="tag">${escapeHtml(fq.resourceName)}</span>
    </div>
    <div class="qtext" style="font-size:.9rem;">${sanitizeHtml(q.raw_text || escapeHtml(q.text||''))}</div>
    <div class="daily-opt-list" id="daily-opt-list">
      ${(q.options||[]).map(o=>{
        let cls='opt-btn';
        if(done){
          if(o.label===correctLabel) cls='opt-btn correct';
          else if(rec.chosen===o.label) cls='opt-btn incorrect';
        }
        return `<button class="${cls}" data-daily-opt="${escapeHtml(o.label)}" ${done?'disabled':''}>
          <span class="opt-letter">${escapeHtml(o.label)}</span><span>${escapeHtml(o.text||'')}</span>
        </button>`;
      }).join('')}
    </div>
    ${done ? `
      <div class="${rec.correct ? 'badge-pill b-correct' : 'badge-pill b-incorrect'}" style="margin:12px 0;">
        ${rec.correct ? '✓ Correct!' : `✗ Incorrect — correct answer: ${escapeHtml(correctLabel||'?')}`}
      </div>
      <div class="explain-box">
        <div style="font-weight:700;margin-bottom:6px;">Explanation</div>
        ${sanitizeHtml(q.explanation||'No explanation provided.')}
      </div>
    ` : `<button class="btn btn-accent btn-sm" id="daily-submit" disabled>Submit answer</button>`}
  </div>`;

  wireImageZoom(slot); // ADDED: wire zoom for both the pre-answer and post-answer (explanation) states
  if(done) return;
  let picked = null;
  const optBtns = slot.querySelectorAll('[data-daily-opt]');
  const submitBtn = document.getElementById('daily-submit');
  optBtns.forEach(btn=>{
    btn.onclick = ()=>{
      picked = btn.dataset.dailyOpt;
      optBtns.forEach(b=>b.classList.toggle('selected', b===btn));
      submitBtn.disabled = false;
    };
  });
  submitBtn.onclick = ()=>{
    if(!picked) return;
    const isCorrect = picked === correctLabel;
    rec.chosen = picked; rec.correct = isCorrect; rec.completed = true;
    APP.daily[todayStr()] = rec;
    lsSet(LS_DAILY, APP.daily);
    // ADDED FIX: render immediately from local state so the explanation always
    // shows, even if the async history/streak writes below fail or are slow.
    renderDailyQuizCard();
    showAnswerMotivationToast(isCorrect);
    Promise.resolve()
      .then(()=>recordAnswer(fq.compositeId, picked, isCorrect))
      .then(()=>bumpStreak(1))
      .catch(err=>console.error('Daily quiz: failed to persist answer', err));
  };
}

/* ============================================================
   ADDED: RECENT QUESTIONS TILE — Shows new questions added in last 7 and 30 days
   ============================================================ */
function renderRecentQuestionsTile(){
  const slot = document.getElementById('recent-questions-tile');
  if(!slot) return;
  
  const stats = getRecentQuestionsStats();
  const { last7Days, last30Days, lastImportTime } = stats;
  
  // Format last import time
  let timeAgo = 'Never';
  if(lastImportTime){
    const diff = Date.now() - lastImportTime;
    const mins = Math.floor(diff / 60000);
    const hrs = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    
    if(mins < 1) timeAgo = 'Just now';
    else if(mins < 60) timeAgo = mins + ' min' + (mins === 1 ? '' : 's') + ' ago';
    else if(hrs < 24) timeAgo = hrs + ' hr' + (hrs === 1 ? '' : 's') + ' ago';
    else if(days < 30) timeAgo = days + ' day' + (days === 1 ? '' : 's') + ' ago';
    else timeAgo = Math.floor(days/30) + ' mo' + (Math.floor(days/30) === 1 ? '' : 's') + ' ago';
  }
  
  slot.innerHTML = `
    <div class="recent-questions-header">
      <div class="recent-questions-icon">📝</div>
      <div>
        <div class="recent-questions-title">New & Recent</div>
        <div class="recent-questions-subtitle">Last import: ${escapeHtml(timeAgo)}</div>
      </div>
    </div>
    <div class="recent-questions-stats">
      <div class="recent-stat-box">
        <span class="recent-stat-num">${last7Days.toLocaleString()}</span>
        <span class="recent-stat-label">Added this week</span>
      </div>
      <div class="recent-stat-box">
        <span class="recent-stat-num">${last30Days.toLocaleString()}</span>
        <span class="recent-stat-label">Added this month</span>
      </div>
    </div>
    <div class="recent-questions-cta" id="recent-qbank-btn">
      📚 Practice recent → 
    </div>
  `;
  
  // Wire up the practice button
  const practiceBtn = document.getElementById('recent-qbank-btn');
  if(practiceBtn && last7Days > 0){
    practiceBtn.style.cursor = 'pointer';
    practiceBtn.onclick = ()=>{
      // Filter to show only recent resources (last 30 days)
      const thirtyDaysAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);
      const recentResourceIds = new Set(
        APP.resources
          .filter(r => (r.addedAt || 0) > thirtyDaysAgo)
          .map(r => r.id)
      );
      practiceSetupState.resourceIds = recentResourceIds;
      practiceSetupState.subjects = new Set();
      practiceSetupState.testIds = new Set();
      setTab('practice');
    };
  } else if(practiceBtn){
    practiceBtn.style.opacity = '0.5';
    practiceBtn.style.cursor = 'default';
  }
}

function renderResourceDetail(resId){
  const el = document.getElementById('view-resource');
  const res = APP.resources.find(r=>r.id===resId);
  if(!res){ closeResourceDetail(); return; }

  const resQs = APP.flatIndex.filter(f=>f.resourceId===resId);
  const attempted = resQs.filter(f=>{ const h=APP.historyMap[f.compositeId]; return h && h.attempts && h.attempts.length; }).length;
  const pct = resQs.length ? Math.round(attempted/resQs.length*100) : 0;

  // group into folder(subject) -> lesson(test) tree with question counts
  const bySubject = {};
  for(const t of res.tests){
    const subj = subjectOf(t);
    (bySubject[subj] = bySubject[subj] || []).push(t);
  }
  // ADDED: seed in any empty subject folders (created via "Add Subject" with no tests yet)
  // so they still show up in the tree with zero lessons inside.
  (res.emptySubjects||[]).forEach(s=>{ if(!bySubject[s]) bySubject[s] = []; });
  const defaultOrder = Object.keys(bySubject).sort();
  // ADDED: respect saved custom subject order (res.subjectOrder); fall back to A-Z; drop stale names, append new ones
  const savedOrder = Array.isArray(res.subjectOrder) ? res.subjectOrder.filter(s=>bySubject[s]) : [];
  defaultOrder.slice().reverse().forEach(s=>{ if(!savedOrder.includes(s)) savedOrder.unshift(s); }); // CHANGED: newly created subject folders are placed at the top instead of appended at the bottom
  const baseOrder = savedOrder.length ? savedOrder : defaultOrder;
  const subjSortMode = (APP.settings && APP.settings.subjectSortMode) || 'custom'; // ADDED: folder-level sort choice
  // ADDED: while editing, use the in-progress working order so arrow clicks reorder instantly without saving
  // (only meaningful in 'custom' mode — a name sort recomputes fresh every render regardless of edits)
  if(resDetailEditMode && subjSortMode==='custom'){
    if(!resDetailWorkingOrder) resDetailWorkingOrder = baseOrder.slice();
    resDetailWorkingOrder = resDetailWorkingOrder.filter(s=>bySubject[s]);
    baseOrder.forEach(s=>{ if(!resDetailWorkingOrder.includes(s)) resDetailWorkingOrder.push(s); });
  }
  let subjects;
  if(subjSortMode === 'name-asc') subjects = baseOrder.slice().sort((a,b)=>a.localeCompare(b));
  else if(subjSortMode === 'name-desc') subjects = baseOrder.slice().sort((a,b)=>b.localeCompare(a));
  else if(subjSortMode === 'number') subjects = baseOrder.slice().sort(naturalCompare); // ADDED: numeric-aware sort, e.g. "Lesson 2" before "Lesson 10"
  else if(subjSortMode === 'created-desc') subjects = baseOrder.slice().sort((a,b)=>((res.subjectCreatedAt&&res.subjectCreatedAt[b])||0)-((res.subjectCreatedAt&&res.subjectCreatedAt[a])||0)); // ADDED: newest-created folder first; unstamped (legacy) folders sort last

        <button class="btn btn-accent btn-sm" id="res-add-btn"><i class="fa-solid fa-plus" style="margin-right:6px;"></i>Add</button>
        <button class="btn btn-outline btn-sm" id="res-edit-btn"><i class="fa-solid ${resDetailEditMode?'fa-xmark':'fa-pen'}" style="margin-right:6px;"></i>${resDetailEditMode?'Cancel':'Edit'}</button>
        ${saveOrderBtnHtml}
        ${pasteSubjectBtnHtml}
      </div>
    </div>
    ${resZoomBreadcrumbHtml}
    ${resZoomFolderActionsHtml}
    <div id="res-detail-tree"></div>
  `;

  // CHANGED: wire the folder-sort dropdown — persists to subjectSortMode, this Resources screen's
  // OWN setting. The Flashcard Deck detail screen has its own fully separate fcDeckSubjectSortMode,
  // so sorting folders here never affects deck folder sorting and vice versa.
  const resSubjSortSel = document.getElementById('res-subject-sort-select');
  if(resSubjSortSel) resSubjSortSel.onchange = ()=>{
    APP.settings.subjectSortMode = resSubjSortSel.value;
    lsSet(LS_SETTINGS, APP.settings);
    renderResourceDetail(resId);
  };

  const treeWrap = document.getElementById('res-detail-tree');
  // ADDED: builds the standalone "folder page" shown after tapping a folder — just a flat list of
  // lesson cards. The folder's own name/count is already shown via the breadcrumb above, and its
  // actions (Practice folder, +Test, etc.) live in the compact row next to that breadcrumb, so no
  // redundant header card repeating the folder name is rendered here.
  function buildResFolderPageHtml(subj){
    const rawTests = bySubject[subj] || [];
    // FIXED: lessons previously always used the saved custom order and completely ignored the
    // folder-sort dropdown (Custom order / Name A-Z / Name Z-A) — picking a different option there
    // had zero effect once you were looking at a leaf folder's lesson list. Now lessons follow the
    // same subjSortMode as subject folders: alphabetical when a name sort is active, saved custom
    // order (with reorder arrows) only when "Custom order" is selected.
    let tests;
    if(subjSortMode === 'name-asc') tests = rawTests.slice().sort((a,b)=>lessonNameOf(a).localeCompare(lessonNameOf(b)));
    else if(subjSortMode === 'name-desc') tests = rawTests.slice().sort((a,b)=>lessonNameOf(b).localeCompare(lessonNameOf(a)));
    else if(subjSortMode === 'number') tests = rawTests.slice().sort((a,b)=>naturalCompare(lessonNameOf(a), lessonNameOf(b))); // ADDED: numeric-aware lesson-name sort
    else if(subjSortMode === 'created-desc') tests = rawTests.slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); // ADDED: newest-created lesson first
    else tests = orderedTestsFor(res, subj, rawTests); // 'custom' — respect saved lesson order
    const lessons = tests.map((t, idx)=>{
      // CHANGED: reorder arrows now also require subjSortMode==='custom' — same gating as the
      // subject-folder arrows — since a name sort recomputes lesson order fresh every render and
      // manually nudging one lesson up/down would just get overwritten on the next render anyway.
      const arrowsHtml = (resDetailEditMode && subjSortMode==='custom' && tests.length > 1) ? `<div class="lesson-arrows">
        <button class="tree-arrow-btn" data-move-test-up="${escapeHtml(t.id)}" data-res="${res.id}" data-subject="${escapeHtml(subj)}" title="Move up" ${idx===0?'disabled':''}><i class="fa-solid fa-arrow-up"></i></button>
        <button class="tree-arrow-btn" data-move-test-down="${escapeHtml(t.id)}" data-res="${res.id}" data-subject="${escapeHtml(subj)}" title="Move down" ${idx===tests.length-1?'disabled':''}><i class="fa-solid fa-arrow-down"></i></button>
      </div>` : '';
      return `<div class="card lesson-card">
      <i class="fa-solid fa-file-lines" style="color:var(--muted);"></i>
      <span class="lesson-name-text">${escapeHtml(lessonNameOf(t))}</span>
      ${arrowsHtml}
      <button class="rename-icon-btn" data-rename-test="${escapeHtml(t.id)}" data-res="${res.id}" data-subject="${escapeHtml(subj)}" title="Rename lesson" style="${resDetailEditMode?'':'display:none;'}"><i class="fa-solid fa-pen"></i></button>
      <span class="tree-lesson-count">${(t.questions||[]).length} questions</span>
      <button class="btn btn-outline btn-sm" data-add-question="${escapeHtml(t.id)}" data-res="${res.id}" title="Add a new question to this test" style="${resDetailEditMode?'':'display:none;'}"><i class="fa-solid fa-plus"></i></button>
      <button class="btn btn-outline btn-sm" data-practice-lesson="${escapeHtml(t.id)}" data-res="${res.id}">Practice</button>
      <button class="btn btn-outline btn-sm" data-download-test-pdf="${escapeHtml(t.id)}" data-res="${res.id}" title="Download this lesson/test as a PDF" style="${resDetailEditMode?'':'display:none;'}"><i class="fa-solid fa-file-pdf"></i></button>
      ${resDetailEditMode?`<button class="btn btn-outline btn-sm" data-copy-test="${escapeHtml(t.id)}" data-res="${res.id}" title="Copy this test/lesson"><i class="fa-solid fa-copy"></i></button>
      <button class="btn btn-outline btn-sm" data-move-test="${escapeHtml(t.id)}" data-res="${res.id}" title="Cut this test/lesson (paste it into another subject folder/resource)"><i class="fa-solid fa-scissors"></i></button>`:''}
      <button class="btn btn-danger btn-sm" data-delete-test="${escapeHtml(t.id)}" data-res="${res.id}" title="Delete this test/lesson" style="margin-left:auto;${resDetailEditMode?'':'display:none;'}"><i class="fa-solid fa-trash"></i></button>
    </div>`;
    }).join('');
    return lessons || `<div class="card" style="padding:30px;text-align:center;"><span class="muted">No lessons in this folder yet.</span></div>`;
  }
  // SIMPLIFIED: show only the CURRENT level's direct subfolders (clean single-segment names, one
  // consistent row style, no recursive inline nesting) followed by any lessons this exact folder
  // owns directly. This replaces the old recursive tree, which was what produced odd-looking
  // duplicate/mismatched rows — a folder that both had its own entry and had children used to be
  // rendered twice (once showing its full "A::B::C" path as the label). Clicking a folder here
  // navigates one level deeper via resDetailZoomTo, same as a normal file explorer.
  const resOwnLessonsHtml = (resDetailZoomPath && bySubject[resDetailZoomPath] && bySubject[resDetailZoomPath].length)
    ? buildResFolderPageHtml(resDetailZoomPath) : '';
  const resFolderRowsHtml = buildFolderChildrenHtml(subjects, resDetailZoomPath, 'questions', 'resDetailZoomTo', resDetailEditMode && subjSortMode==='custom');
  const resIsPureLeaf = resDetailZoomPath && !resFolderRowsHtml; // zoomed folder has no subfolders of its own
  treeWrap.innerHTML = resIsPureLeaf
    ? buildResFolderPageHtml(resDetailZoomPath)
    : ((resFolderRowsHtml + resOwnLessonsHtml) || `<div class="card" style="padding:30px;text-align:center;" class="muted">No lessons found${resDetailZoomPath?' in this subfolder':' in this resource'}.</div>`);

  document.getElementById('res-detail-back').onclick = closeResourceDetail;
  document.getElementById('res-detail-download').onclick = ()=>downloadResourceExport(res.id);
  document.getElementById('res-detail-download-pdf').onclick = ()=>downloadTestsListAsPdf(res.tests, res.name);
  document.getElementById('res-detail-delete').onclick = ()=>deleteResourceById(res.id);
  // ADDED: "Update" — pick one or more new files and merge their tests/questions into
  // this same resource (existing tests + everyone's answer history for them are untouched).
  const updateBtn = document.getElementById('res-detail-update');
  const updateInput = document.getElementById('res-detail-update-input');
  if(updateBtn && updateInput){
    updateBtn.onclick = ()=>updateInput.click();
    updateInput.addEventListener('change', ()=>{
      if(updateInput.files && updateInput.files.length) handleResourceUpdateFiles(res.id, updateInput.files, 'res-detail-update-status');
      updateInput.value = '';
    });
  }
  // ADDED: rename the resource inline from the detail-page title
  const resDetailRenameBtn = document.getElementById('res-detail-rename-btn');
  if(resDetailRenameBtn) resDetailRenameBtn.onclick = (e)=>{
    e.stopPropagation();
    const nameEl = document.getElementById('res-detail-name');
    startInlineRename(nameEl, res.name, (newName)=>renameResource(res.id, newName));
  };
  document.getElementById('res-detail-practice-all').onclick = ()=>{
    practiceSetupState.resourceIds = new Set([res.id]);
    practiceSetupState.subjects = new Set();
    practiceSetupState.testIds = new Set();
    setTab('practice');
  };

  el.querySelectorAll('[data-folder-toggle]').forEach(head=>{
    head.addEventListener('click', (e)=>{
      if(e.target.closest('[data-practice-folder]')) return; // let the launcher handle its own click
      if(e.target.closest('[data-download-subject-pdf]')) return; // let the PDF download button handle its own click
      if(e.target.closest('[data-add-test-to-subject]')) return; // let the add-test button handle its own click
      if(e.target.closest('[data-delete-subject]')) return; // let the delete-subject button handle its own click
      if(e.target.closest('[data-move-subject-up]') || e.target.closest('[data-move-subject-down]')) return; // ADDED: let the reorder arrows handle their own click
      if(e.target.closest('[data-copy-subject]') || e.target.closest('[data-move-subject]') || e.target.closest('[data-paste-test-into]')) return; // ADDED: let copy/cut/paste buttons handle their own click
      if(e.target.closest('[data-rename-subject]')) return; // ADDED: let the rename button handle its own click
      resDetailZoomTo(head.dataset.folderSubject); // CHANGED: open this folder into its own page instead of expanding it inline
    });
  });
  el.querySelectorAll('[data-practice-folder]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      practiceSetupState.resourceIds = new Set([btn.dataset.res]);
      practiceSetupState.subjects = new Set([btn.dataset.practiceFolder]);
      practiceSetupState.testIds = new Set();
      showQuickModeModal(); // ADDED: folder practice now just asks Study/Exam and jumps straight in
    };
  });
  // ADDED: download a single subject/folder (within a regular Resource) as a PDF
  el.querySelectorAll('[data-download-subject-pdf]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      const subjName = btn.dataset.downloadSubjectPdf;
      const r = APP.resources.find(x=>x.id===btn.dataset.res);
      if(!r){ showMiniToast('Resource not found', 'error'); return; }
      const tests = r.tests.filter(t=>subjectOf(t)===subjName);
      downloadTestsListAsPdf(tests, `${r.name} - ${subjName}`);
    };
  });
  // ADDED: single header "Add" button — opens a chooser to pick Subject (folder) or Test/Lesson, then create
  const addBtn = document.getElementById('res-add-btn');
  // FIXED: this used to gate on resZoomedToLeaf, so once a folder gained its first subfolder,
  // "Add" while still inside it would pass null as the parent and silently create the next
  // subfolder at the root instead of nesting it — looking exactly like "nothing happened" or
  // like nesting past one level didn't work. Whenever we're zoomed into ANY folder (leaf or
  // one that already has subfolders), new items belong inside that folder.
  if(addBtn) addBtn.onclick = ()=>openAddChooserModal(res.id, subjects, resDetailZoomPath || null);

  // ADDED: Edit toggle — reveals delete buttons + reorder arrows + Save changes button; clicking again (now "Cancel") discards any unsaved reorder
  const editBtn = document.getElementById('res-edit-btn');
  if(editBtn) editBtn.onclick = ()=>{
    resDetailEditMode = !resDetailEditMode;
    if(!resDetailEditMode) resDetailWorkingOrder = null; // discard unsaved reorder on cancel
    renderResourceDetail(res.id);
  };
  // ADDED: Save changes — persists the reordered subject list to storage and exits edit mode
  const saveOrderBtn = document.getElementById('res-save-order-btn');
  if(saveOrderBtn) saveOrderBtn.onclick = async ()=>{
    res.subjectOrder = (resDetailWorkingOrder || subjects).slice();
    await idbPut('resources', res);
    resDetailEditMode = false;
    resDetailWorkingOrder = null;
    showMiniToast('Changes saved', 'success');
    renderResourceDetail(res.id);
  };
  // FIXED: reorder arrows — move a subject folder up/down among its true siblings only (same
  // parent), at any nesting level, via the shared moveSubjectInOrder() helper — see the matching
  // comment in renderFlashcardDeckDetail for why this replaced the old flat-index swap.
  el.querySelectorAll('[data-move-subject-up]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      if(moveSubjectInOrder(resDetailWorkingOrder, btn.dataset.moveSubjectUp, -1)) renderResourceDetail(res.id);
    };
  });
  el.querySelectorAll('[data-move-subject-down]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      if(moveSubjectInOrder(resDetailWorkingOrder, btn.dataset.moveSubjectDown, 1)) renderResourceDetail(res.id);
    };
  });

  // ADDED: header "Paste" button — pastes a copied/cut subject folder into this resource
  const pasteSubjectBtn = document.getElementById('res-paste-subject-btn');
  if(pasteSubjectBtn) pasteSubjectBtn.onclick = ()=>openPasteSubjectModal(res.id);

  // ADDED: copy an entire subject folder to the clipboard
  el.querySelectorAll('[data-copy-subject]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      copySubjectToClipboard(btn.dataset.res, btn.dataset.copySubject, 'copy');
      renderResourceDetail(res.id);
    };
  });
  // ADDED: cut an entire subject folder to the clipboard (only removed from source once pasted elsewhere)
  el.querySelectorAll('[data-move-subject]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      copySubjectToClipboard(btn.dataset.res, btn.dataset.moveSubject, 'move');
      renderResourceDetail(res.id);
    };
  });
  // ADDED: paste a copied/cut test/lesson straight into this subject folder
  el.querySelectorAll('[data-paste-test-into]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      openPasteTestModal(btn.dataset.res, btn.dataset.pasteTestInto);
    };
  });
  // ADDED: lesson-level reorder arrows — move a lesson up/down within its subject folder,
  // persisting immediately (no separate "Save changes" step, since lesson order has no
  // alternate sort mode to switch away from — it's always manually ordered).
  el.querySelectorAll('[data-move-test-up]').forEach(btn=>{
    btn.onclick = async (e)=>{
      e.stopPropagation();
      if(await moveTestInOrder(res, btn.dataset.subject, btn.dataset.moveTestUp, -1)) renderResourceDetail(res.id);
    };
  });
  el.querySelectorAll('[data-move-test-down]').forEach(btn=>{
    btn.onclick = async (e)=>{
      e.stopPropagation();
      if(await moveTestInOrder(res, btn.dataset.subject, btn.dataset.moveTestDown, 1)) renderResourceDetail(res.id);
    };
  });
  // ADDED: copy a single test/lesson to the clipboard
  el.querySelectorAll('[data-copy-test]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      copyTestToClipboard(btn.dataset.res, btn.dataset.copyTest, 'copy');
      renderResourceDetail(res.id);
    };
  });
  // ADDED: cut a single test/lesson to the clipboard (only removed from source once pasted elsewhere)
  el.querySelectorAll('[data-move-test]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      copyTestToClipboard(btn.dataset.res, btn.dataset.moveTest, 'move');
      renderResourceDetail(res.id);
    };
  });

  // ADDED: per-subject-folder "+ Test" button — adds test(s) straight into that subject, no picking needed
  el.querySelectorAll('[data-add-test-to-subject]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      openAddTestModal(btn.dataset.res, subjects, btn.dataset.addTestToSubject);
    };
  });

  // ADDED: delete an entire subject (removes every test/lesson under it)
  el.querySelectorAll('[data-delete-subject]').forEach(btn=>{
    btn.onclick = async (e)=>{
      e.stopPropagation();
      const subj = btn.dataset.deleteSubject;
      const count = res.tests.filter(t=>testInSubjectOrDescendant(t,subj)).length; // FIXED: was (bySubject[subj]||[]).length, which only counted this folder's own direct lessons and undercounted whenever it also had nested subfolders
      if(!confirm(`Delete the subject "${subj}" and all ${count} test${count===1?'':'s'} under it? This cannot be undone.`)) return;
      await deleteSubjectFromResource(btn.dataset.res, subj);
      showMiniToast('Subject deleted', 'success');
      renderResourceDetail(btn.dataset.res);
    };
  });

  // ADDED: delete a single test/lesson
  el.querySelectorAll('[data-delete-test]').forEach(btn=>{
    btn.onclick = async (e)=>{
      e.stopPropagation();
      if(!confirm('Delete this test/lesson and all its questions? This cannot be undone.')) return;
      await deleteTestFromResource(btn.dataset.res, btn.dataset.deleteTest);
      showMiniToast('Test/lesson deleted', 'success');
      renderResourceDetail(btn.dataset.res);
    };
  });

  // ADDED: rename an entire subject folder inline — renames the "Subject - " prefix on every test under it
  el.querySelectorAll('[data-rename-subject]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      const oldSubj = btn.dataset.renameSubject;
      const nameEl = btn.previousElementSibling; // the span.subj-name-text right before this button
      startInlineRename(nameEl, oldSubj, (newName)=>renameSubject(btn.dataset.res, oldSubj, newName));
    };
  });

  // ADDED: rename a single test/lesson inline — keeps the subject prefix, only edits the lesson part
  el.querySelectorAll('[data-rename-test]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      const testId = btn.dataset.renameTest;
      const subj = btn.dataset.subject;
      const test = res.tests.find(x=>x.id===testId);
      if(!test) return;
      const nameEl = btn.previousElementSibling; // the span.lesson-name-text right before this button
      const currentLesson = lessonNameOf(test);
      startInlineRename(nameEl, currentLesson, (newName)=>renameTest(btn.dataset.res, testId, newName));
    };
  });

  el.querySelectorAll('[data-add-question]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      openAddQuestionModal(btn.dataset.res, btn.dataset.addQuestion);
    };
  });

  el.querySelectorAll('[data-practice-lesson]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      practiceSetupState.resourceIds = new Set([btn.dataset.res]);
      practiceSetupState.testIds = new Set([btn.dataset.practiceLesson]);
      showQuickModeModal(); // ADDED: lesson practice now just asks Study/Exam and jumps straight in
    };
  });
  // ADDED: download a single lesson/test (within a regular Resource) as a PDF
  el.querySelectorAll('[data-download-test-pdf]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      const testId = btn.dataset.downloadTestPdf;
      const r = APP.resources.find(x=>x.id===btn.dataset.res);
      if(!r){ showMiniToast('Resource not found', 'error'); return; }
      const test = r.tests.find(t=>t.id===testId);
      if(!test){ showMiniToast('Lesson not found', 'error'); return; }
      downloadTestsListAsPdf([test], `${r.name} - ${test.title}`);
    };
  });
}

/* ============================================================
   ADDED: CUSTOM RESOURCE / TEST / QUESTION CREATION
   Lets a user build a resource entirely inside the app (no import needed):
   Create Resource -> Add Test/Subject under it -> Add Questions under that test.
   Reuses the exact same data shapes (resource/test/question) the importer produces,
   so anything created here works seamlessly with practice, analytics, bookmarks, etc.
   ============================================================ */
function openCreateResourceModal(folderId){
  showModal(`
    <h3 style="margin:0 0 4px;font-size:1.05rem;">🗂️ Create Resource</h3>
    <div class="muted" style="font-size:.78rem;margin-bottom:16px;">Start a blank resource, then add tests/subjects and questions to it.</div>
    <div style="margin-bottom:16px;">
      <label style="display:block;font-weight:700;font-size:.82rem;margin-bottom:6px;">Resource name</label>
      <input id="create-res-name-input" type="text" placeholder="e.g. My Custom Question Bank"
        style="width:100%;padding:10px 12px;border:1.5px solid var(--card-border);border-radius:10px;font-size:.95rem;background:var(--bg);color:var(--text);outline:none;"
        maxlength="80"/>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn btn-ghost" id="create-res-cancel">Cancel</button>
      <button class="btn btn-accent" id="create-res-save">Create</button>
    </div>
  `);
  const inp = document.getElementById('create-res-name-input');
  inp.focus();
  document.getElementById('create-res-cancel').onclick = closeModal;
  const doCreate = async ()=>{
    const name = inp.value.trim();
    if(!name){ showMiniToast('Please enter a resource name', 'error'); return; }
    const fromTab = APP.currentTab==='resources' ? 'resources' : 'home';
    const resource = await createCustomResource(name, folderId);
    closeModal();
    showMiniToast('Resource created — now add a Test/Subject', 'success');
    openResourceDetail(resource.id, fromTab);
  };
  document.getElementById('create-res-save').onclick = doCreate;
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') doCreate(); });
}
async function createCustomResource(name, folderId){
  const resource = {
    id: uid('res'),
    name: name,
    addedAt: Date.now(),
    folderId: folderId || null, // ADDED: created-in-place inside whichever folder was open (see openCreateResourceModal())
    tests: [],
    stats: { tests: 0, questions: 0 },
    custom: true // ADDED: marks resources built manually inside the app
  };
  await idbPut('resources', resource);
  APP.resources.unshift(resource); // CHANGED: new resource appears at the top of the list
  rebuildFlatIndex();
  return resource;
}

/* ADDED: single-entry chooser — pick "Subject (folder)" or "Test/Lesson", then jump into the matching create modal.
   CHANGED: now accepts parentPath (the folder you're currently zoomed into, if any) and threads it through,
   so "Add" while inside a folder creates the new subject/test *inside* that folder instead of at the root —
   this is what makes "folder inside folder inside folder" nesting actually work from wherever you are. */
function openAddChooserModal(resId, subjects, parentPath){
  const parentNote = parentPath
    ? `<div class="muted" style="font-size:.78rem;margin-bottom:16px;">Creating inside <b style="color:var(--text);">${escapeHtml(parentPath)}</b>.</div>`
    : `<div class="muted" style="font-size:.78rem;margin-bottom:16px;">What would you like to create?</div>`;
  showModal(`
    <h3 style="margin:0 0 4px;font-size:1.05rem;">➕ Add</h3>
    ${parentNote}
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-outline" id="add-choose-subject" style="justify-content:flex-start;padding:14px 16px;">
        <i class="fa-solid fa-folder-plus" style="margin-right:10px;color:var(--accent);"></i>
        <span style="text-align:left;">
          <div style="font-weight:700;">Subject (folder)</div>
          <div class="muted" style="font-size:.74rem;font-weight:400;">${parentPath?'Create a new subfolder here':'Create a new subject folder'}</div>
        </span>
      </button>
      <button class="btn btn-outline" id="add-choose-test" style="justify-content:flex-start;padding:14px 16px;">
        <i class="fa-solid fa-file-circle-plus" style="margin-right:10px;color:var(--accent);"></i>
        <span style="text-align:left;">
          <div style="font-weight:700;">Test / Lesson</div>
          <div class="muted" style="font-size:.74rem;font-weight:400;">Add a test/lesson under an existing subject</div>
        </span>
      </button>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px;">
      <button class="btn btn-ghost" id="add-choose-cancel">Cancel</button>
    </div>
  `);
  document.getElementById('add-choose-cancel').onclick = closeModal;
  document.getElementById('add-choose-subject').onclick = ()=>openAddSubjectModal(resId, parentPath);
  document.getElementById('add-choose-test').onclick = ()=>openAddTestModal(resId, subjects);
}

/* ADDED: creates a brand-new subject (folder) with its first test/lesson(s) under it.
   CHANGED: accepts parentPath — when set (i.e. this was opened from inside an already-zoomed-in
   folder), the name typed here is treated as a relative subfolder name and is automatically
   prefixed with "parentPath::" before saving, so folder-in-folder-in-folder nesting works without
   the user having to retype the whole ancestor chain by hand each time (retyping it, or getting a
   "::" segment slightly wrong, silently created a same-named sibling at the root instead — which is
   why it could look like "nothing happened"). 
   IMPROVED: Enhanced modal UI with dynamic test/lesson input fields and better UX. */
function openAddSubjectModal(resId, parentPath){
  showModal(`
    <h3 style="margin:0 0 4px;font-size:1.05rem;">🗂️ Add Folder</h3>
    ${parentPath
      ? `<div class="muted" style="font-size:.78rem;margin-bottom:16px;">📁 Creating a subfolder inside <b style="color:var(--text);">${escapeHtml(parentPath)}</b></div>`

   subject folder's own "+ Test" button), the subject is fixed and not shown as a picker.

         <div style="margin-bottom:16px;">
           <label style="display:block;font-weight:700;font-size:.82rem;margin-bottom:6px;">Folder</label>
           <select id="add-test-subject-select"
             style="width:100%;padding:10px 12px;border:1.5px solid var(--card-border);border-radius:10px;font-size:.95rem;background:var(--bg);color:var(--text);outline:none;">
             ${existingSubjects.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('')}

      <div style="display:flex;gap:8px;align-items:center;" class="test-field">

      </div>
    `;
    const div = document.createElement('div');
    div.innerHTML = fieldHtml;
    testsContainer.appendChild(div);
    const removeBtn = div.querySelector('.remove-test-btn');
    removeBtn.onclick = () => div.remove();
    const input = div.querySelector('.test-input');
    input.focus();
    return input;
  };

  addTestBtn.onclick = addTestField;

  // Add initial field
  const firstInput = addTestField();

async function addTestToResource(resId, subject, testTitle){
  const res = APP.resources.find(r=>r.id===resId);
  if(!res) return null;
  const test = { id: uid('test'), questions: [], createdAt: Date.now() }; // ADDED: createdAt backs the lesson-list 'created-desc' sort option
  test.subjectPath = String(subject||'General').split('::').map(p=>p.trim()).filter(Boolean);
  if(!test.subjectPath.length) test.subjectPath = ['General'];
  test.lessonName = (testTitle||'').trim() || 'Untitled';
  syncTestTitle(test);
  stampSubjectCreated(res, subjectOf(test)); // ADDED: backs the 'created-desc' folder-sort option — covers subjects that come into existence via "+ Test" rather than "Add Folder"
  res.tests.push(test);
  res.stats.tests = res.tests.length;
  res.stats.questions = res.tests.reduce((s,t)=>s+(t.questions||[]).length,0);
  // ADDED: this subject now has a real lesson, so drop it from the "empty folder" tracker if present
  if(Array.isArray(res.emptySubjects) && res.emptySubjects.includes(subject)){
    res.emptySubjects = res.emptySubjects.filter(s=>s!==subject);
  }
  await idbPut('resources', res);
  rebuildFlatIndex();
  return test;
}

// ADDED: records when a subject/folder path was first created, so the folder-sort dropdown's
// 'created-desc' option ("Date created, newest first") has something real to sort by. Safe to call
// repeatedly — only the FIRST call for a given path actually stamps it, later calls are no-ops.
// Subjects that existed before this feature shipped (no stamp yet) simply have no entry and sort
// to the back of a 'created-desc' sort, same as any other "unknown creation time" case.
function stampSubjectCreated(res, subject, ts){
  if(!res || !subject) return;
  if(!res.subjectCreatedAt) res.subjectCreatedAt = {};
  if(res.subjectCreatedAt[subject] == null) res.subjectCreatedAt[subject] = ts || Date.now();
}
// ADDED: creates a subject/branch folder with NO tests/lessons yet (and therefore no cards).
// Since a subject only exists implicitly as a grouping of test titles, empty folders are tracked
// explicitly in res.emptySubjects (an array of subject-path strings, "::" nesting supported the
// same way real subjects are) so they still show up in the folder tree with zero lessons inside.
async function addEmptySubjectToResource(resId, subject){
  const res = APP.resources.find(r=>r.id===resId);
  if(!res) return null;
  subject = normalizeSubjectString(subject); // FIXED: defense-in-depth — guarantees this is always stored in the same canonical form real tests use, no matter what the caller passes in
  if(!subject) return null;
  if(!Array.isArray(res.emptySubjects)) res.emptySubjects = [];
  if(!res.emptySubjects.includes(subject)) res.emptySubjects.push(subject);
  stampSubjectCreated(res, subject); // ADDED: backs the 'created-desc' folder-sort option
  await idbPut('resources', res);
  return subject;
}

/* ADDED: delete a single test/lesson from a resource */
async function deleteTestFromResource(resId, testId){
  const res = APP.resources.find(r=>r.id===resId);
  if(!res) return;
  const removedTest = res.tests.find(t=>t.id===testId); // ADDED: keep a copy for the recycle bin
  res.tests = res.tests.filter(t=>t.id!==testId);
  res.stats.tests = res.tests.length;
  res.stats.questions = res.tests.reduce((s,t)=>s+(t.questions||[]).length,0);
  await idbPut('resources', res);
  rebuildFlatIndex();
  if(removedTest){ addToRecycleBin('test', removedTest.title || 'Untitled test', removedTest, resId); updateRecycleBinBadge(); } // ADDED
}

/* ADDED: delete an entire subject — removes every test/lesson whose subjectOf(t) matches
   FIXED: now also removes every test in a nested subfolder underneath it (see
   testInSubjectOrDescendant above) — previously a folder that had both its own direct lessons
   AND subfolders only lost the direct ones, leaving the subfolders behind under a "deleted"
   name even though the confirm dialog promised "all N lessons under it". */
async function deleteSubjectFromResource(resId, subject){
  const res = APP.resources.find(r=>r.id===resId);
  if(!res) return;
  const removedTests = res.tests.filter(t=>testInSubjectOrDescendant(t,subject)); // ADDED: keep copies for the recycle bin
  res.tests = res.tests.filter(t=>!testInSubjectOrDescendant(t,subject));
  res.stats.tests = res.tests.length;
  res.stats.questions = res.tests.reduce((s,t)=>s+(t.questions||[]).length,0);
  res.emptySubjects = (res.emptySubjects||[]).filter(s=>!pathIsSubjectOrDescendant(s,subject)); // FIXED: also drop nested empty subfolders, not just the exact folder
  if(res.testOrder){ Object.keys(res.testOrder).forEach(k=>{ if(pathIsSubjectOrDescendant(k,subject)) delete res.testOrder[k]; }); } // FIXED: drop saved lesson order for every nested subfolder too
  if(Array.isArray(res.subjectOrder)) res.subjectOrder = res.subjectOrder.filter(s=>!pathIsSubjectOrDescendant(s,subject)); // ADDED: also drop nested subfolders from the saved folder order
  await idbPut('resources', res);
  rebuildFlatIndex();
  if(removedTests.length){ addToRecycleBin('subject', subject, removedTests, resId); updateRecycleBinBadge(); } // ADDED
}

/* ============================================================
   ADDED: RENAME / EDIT NAME feature for resource, subject, and test/lesson.
   A small pencil icon sits next to each name; the editable input is only
   shown after that pencil is clicked (click-to-reveal), and it swaps back
   to plain text on save/cancel/blur/Escape without touching anything else.
   ============================================================ */
function startInlineRename(nameEl, currentName, onSave){
  if(!nameEl || nameEl.querySelector('.inline-rename-input')) return; // already editing
  const original = nameEl.innerHTML;
  nameEl.innerHTML = '';
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'inline-rename-input';
  input.value = currentName || '';
  input.maxLength = 120;
  const actions = document.createElement('span');
  actions.className = 'inline-rename-actions';
  const saveBtn = document.createElement('button');
  saveBtn.type = 'button';
  saveBtn.className = 'rename-icon-btn';
  saveBtn.title = 'Save';
  saveBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
  const cancelBtn = document.createElement('button');
  cancelBtn.type = 'button';
  cancelBtn.className = 'rename-icon-btn';
  cancelBtn.title = 'Cancel';
  cancelBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
  actions.appendChild(saveBtn);
  actions.appendChild(cancelBtn);
  nameEl.appendChild(input);
  nameEl.appendChild(actions);
  input.focus();
  input.select();
  let done = false;
  const finish = (save)=>{
    if(done) return;
    done = true;
    const val = input.value.trim();
    if(save && val && val !== currentName){
      onSave(val);
    } else {
      nameEl.innerHTML = original;
    }
  };
  saveBtn.onclick = (e)=>{ e.stopPropagation(); finish(true); };
  cancelBtn.onclick = (e)=>{ e.stopPropagation(); finish(false); };
  input.addEventListener('click', e=>e.stopPropagation());
  input.addEventListener('keydown', e=>{
    e.stopPropagation();
    if(e.key==='Enter'){ finish(true); }
    else if(e.key==='Escape'){ finish(false); }
  });
  input.addEventListener('blur', ()=>{ setTimeout(()=>finish(false), 150); });
}

/* ADDED: rename an entire subject folder — updates the "Subject - " prefix on every test/lesson under it
   FIXED: a folder that has both its own direct lessons AND nested subfolders (e.g. "Anatomy" holds
   some lessons directly and also has "Anatomy::Upper Limb" underneath) used to only rename the
   direct-lesson tests (subjectOf(t)===oldSubject) — every nested subfolder was left stranded under
   the old, now-nonexistent name. Now every descendant test gets its oldSubject prefix swapped for
   the new one while its own deeper segments (e.g. "Upper Limb") are preserved, so the whole subtree
   moves together. Also normalizes the new name the same way test subjectPaths are (falling back to
   "General" if left blank) before storing it anywhere else, so a folder's path in res.subjectOrder /
   res.emptySubjects / res.testOrder can never end up spelled differently than what subjectOf(t)
   actually produces for its tests. */
async function renameSubject(resId, oldSubject, newSubject){
  const res = APP.resources.find(r=>r.id===resId);
  if(!res) return;
  let changed = false;
  const newParts = String(newSubject||'').split('::').map(p=>p.trim()).filter(Boolean);
  const newSubjectStr = newParts.length ? newParts.join('::') : 'General'; // FIXED: normalized so every place this new name is stored agrees with subjectOf(t)
  const oldPartsCount = oldSubject.split('::').length;
  // FIXED: rewrite a folder-path string that is `oldSubject` itself or nested under it (e.g.
  // "Anatomy::Upper Limb" under old subject "Anatomy") to live under the new name instead,
  // keeping any deeper segments intact. Used below for subjectOrder/emptySubjects/testOrder too,
  // so every place a folder path is tracked stays consistent with the tests themselves.
  const renamePath = (path)=> path === oldSubject ? newSubjectStr : (newSubjectStr + path.slice(oldSubject.length));
  res.tests.forEach(t=>{
    const s = subjectOf(t);
    if(s === oldSubject){
      t.subjectPath = newParts.length ? newParts.slice() : ['General'];
      syncTestTitle(t);
      changed = true;
    } else if(s.startsWith(oldSubject + '::')){
      const newPrefix = newParts.length ? newParts.slice() : ['General']; // FIXED: match the exact-match branch's blank-rename fallback instead of dropping the prefix entirely
      t.subjectPath = newPrefix.concat(t.subjectPath.slice(oldPartsCount)); // ADDED: keep this descendant's own deeper segments, only swap the renamed prefix
      syncTestTitle(t);
      changed = true;
    }
  });
  if(Array.isArray(res.subjectOrder)){
    res.subjectOrder = res.subjectOrder.map(s=> pathIsSubjectOrDescendant(s,oldSubject) ? renamePath(s) : s); // FIXED: was exact-match only
  }
  // ADDED: also rename an empty subject folder (no tests yet) tracked in res.emptySubjects
  // FIXED: now also renames nested empty subfolders, not just an exact-match empty folder
  if(Array.isArray(res.emptySubjects) && res.emptySubjects.some(s=>pathIsSubjectOrDescendant(s,oldSubject))){
    res.emptySubjects = res.emptySubjects.map(s=> pathIsSubjectOrDescendant(s,oldSubject) ? renamePath(s) : s);
    changed = true;
  }
  // ADDED: carry the saved lesson order over to the new name too, so renaming a folder doesn't
  // silently reset its lessons back to default order
  // FIXED: now carries over every nested subfolder's saved order too, not just an exact-match key
  if(res.testOrder){
    Object.keys(res.testOrder).forEach(k=>{
      if(!pathIsSubjectOrDescendant(k,oldSubject)) return;
      res.testOrder[renamePath(k)] = res.testOrder[k];
      delete res.testOrder[k];
      changed = true;
    });
  }
  if(changed){
    await idbPut('resources', res);
    rebuildFlatIndex();
    showMiniToast('Subject renamed', 'success');
  }
  refreshResourceOrDeckDetail(resId); // ADDED: renders Resource Detail or Flashcard Deck Detail, whichever this resource belongs to
}

/* ADDED: rename a single test/lesson — keeps the subject prefix intact, only edits the lesson part */
async function renameTest(resId, testId, newLessonName){

/* ============================================================
   ADDED: RECYCLE BIN — deleted resources/subjects/tests/sessions are kept
   here (in localStorage) so they can be restored or permanently purged.
   ============================================================ */
function saveRecycleBin(){ lsSet(LS_RECYCLE_BIN, APP.recycleBin); }
function addToRecycleBin(type, label, payload, resId){
  APP.recycleBin.unshift({ id: uid('rb'), type, label, deletedAt: Date.now(), resId: resId || null, payload });
  saveRecycleBin();
}
function updateRecycleBinBadge(){
  const btn = document.getElementById('btn-recycle-bin');
  if(!btn) return;
  const n = APP.recycleBin.length;
  let dot = btn.querySelector('.rb-count');
  if(n>0){
    if(!dot){
      dot = document.createElement('span');
      dot.className = 'rb-count';
      dot.style.cssText = 'position:absolute;top:2px;right:2px;min-width:15px;height:15px;padding:0 3px;border-radius:8px;background:var(--red-status, #e5484d);color:#fff;font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;';
      btn.style.position = 'relative';
      btn.appendChild(dot);
    }
    dot.textContent = n>99 ? '99+' : n;
  } else if(dot){
    dot.remove();
  }
}
async function restoreRecycleItem(id){
  const item = APP.recycleBin.find(r=>r.id===id);
  if(!item) return;
  if(item.type==='resource'){
    APP.resources.push(item.payload);
    await idbPut('resources', item.payload);
    rebuildFlatIndex();
  } else if(item.type==='test'){
    const res = APP.resources.find(r=>r.id===item.resId);
    if(!res){ showMiniToast('Original resource no longer exists', 'error'); return; }
    res.tests.push(item.payload);
    res.stats.tests = res.tests.length;
    res.stats.questions = res.tests.reduce((s,t)=>s+(t.questions||[]).length,0);
    await idbPut('resources', res);
    rebuildFlatIndex();
  } else if(item.type==='subject'){
    const res = APP.resources.find(r=>r.id===item.resId);
    if(!res){ showMiniToast('Original resource no longer exists', 'error'); return; }
    res.tests.push(...item.payload);
    res.stats.tests = res.tests.length;
    res.stats.questions = res.tests.reduce((s,t)=>s+(t.questions||[]).length,0);
    await idbPut('resources', res);
    rebuildFlatIndex();
  } else if(item.type==='session'){
    APP.sessions.unshift(item.payload);
    await idbPut('sessions', item.payload);
  }
  APP.recycleBin = APP.recycleBin.filter(r=>r.id!==id);
  saveRecycleBin();
  updateRecycleBinBadge();
  showMiniToast('Restored', 'success');
  renderRecycleBinModal();
  if(APP.currentTab==='resources') renderResourcesList();
  else if(APP.currentTab==='home') renderHome();
  else if(APP.currentTab==='analytics') renderAnalytics();
  else if((APP.currentTab==='resource' || APP.currentTab==='flashcarddeck') && item.resId) refreshResourceOrDeckDetail(item.resId); // ADDED: also handle restoring into a Flashcard Deck
  else if(APP.currentTab==='flashcarddecks') renderFlashcardDecksPage(); // ADDED
}
function purgeRecycleItem(id){
  APP.recycleBin = APP.recycleBin.filter(r=>r.id!==id);
  saveRecycleBin();
  updateRecycleBinBadge();
  renderRecycleBinModal();
}
function emptyRecycleBin(){
  if(!APP.recycleBin.length) return;
  if(!confirm('Permanently delete all items in the recycle bin? This cannot be undone.')) return;
  APP.recycleBin = [];
  saveRecycleBin();
  updateRecycleBinBadge();
  renderRecycleBinModal();
}

      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(item.label)}</div>
        <div style="font-size:.72rem;color:var(--muted);">${typeName[item.type]||'Item'} · deleted ${new Date(item.deletedAt).toLocaleString()}</div>
      </div>
      <button class="btn btn-sm" data-rb-restore="${item.id}" title="Restore"><i class="fa-solid fa-rotate-left" style="margin-right:6px;"></i>Restore</button>
      <button class="btn btn-danger btn-sm" data-rb-purge="${item.id}" title="Delete permanently"><i class="fa-solid fa-trash"></i></button>

  showModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <h3 style="margin:0;"><i class="fa-solid fa-trash-can" style="margin-right:8px;"></i>Recycle bin</h3>

/* ============================================================
   ADDED: COPY / CUT / PASTE — move or duplicate a subject folder or a single
   test/lesson to a different subject and/or a different resource entirely.
   Uses a simple module-level clipboard (treeClipboard); "cut" only removes
   the original once the paste actually completes, so nothing is lost if the
   user backs out.
   ============================================================ */
/* FIXED: "Copy/Cut this subject folder" used to only grab tests whose subjectOf(t) matched the
   folder's own exact path, silently dropping every test that lived in a nested subfolder
   underneath it. Now every descendant test is included too, and each snapshot item carries
   relPath — its subfolder path RELATIVE to the folder being copied (e.g. copying "Anatomy" with a
   lesson in "Anatomy::Upper Limb::Nerves" stores relPath ["Upper Limb"]) — so pasteSubjectHere can
   rebuild the same nested structure under whatever destination name the user picks, instead of
   flattening every lesson into one folder. */
function copySubjectToClipboard(resId, subject, mode){
  const res = APP.resources.find(r=>r.id===resId);
  if(!res) return;
  const oldPartsCount = subject.split('::').length;
  const tests = res.tests.filter(t=>testInSubjectOrDescendant(t,subject));
  const snapshot = tests.map(t=>({
    lessonTitle: lessonNameOf(t),
    relPath: ensureSubjectPath(t).slice(oldPartsCount), // ADDED: this test's subfolder segments below `subject` itself (empty array for a direct lesson)
    questions: JSON.parse(JSON.stringify(t.questions||[]))
  }));
  treeClipboard = { type:'subject', mode, sourceResId:resId, sourceSubject:subject, snapshot };
  openDestinationPickerModal(); // ADDED: immediately show a "where to save" popup with the destination path
}

function copyTestToClipboard(resId, testId, mode){
  const res = APP.resources.find(r=>r.id===resId);
  const test = res ? res.tests.find(t=>t.id===testId) : null;
  if(!res || !test) return;
  const subject = subjectOf(test);
  treeClipboard = {
    type:'test', mode, sourceResId:resId, sourceSubject:subject, sourceTestId:testId,
    snapshot: { lessonTitle: lessonNameOf(test), questions: JSON.parse(JSON.stringify(test.questions||[])) }
  };
  openDestinationPickerModal(); // ADDED: immediately show a "where to save" popup with the destination path
}

/* ADDED: writes the clipboard subject into the target resource; on "move" removes the original afterward
   FIXED: now appends each item's relPath (its subfolder segments below the copied folder, from
   copySubjectToClipboard) after the destination path, so a copied/moved folder's own nested
   subfolders land at the same relative depth under the new name instead of every lesson being
   flattened straight into the destination folder. */
async function pasteSubjectHere(targetResId, subjectName){
  const targetRes = APP.resources.find(r=>r.id===targetResId);
  if(!targetRes || !treeClipboard || treeClipboard.type!=='subject') return;
  const destParts = String(subjectName||'').split('::').map(p=>p.trim()).filter(Boolean);
  for(const item of treeClipboard.snapshot){
    const clonedQuestions = (item.questions||[]).map(q=>({ ...JSON.parse(JSON.stringify(q)), id: uid('q') }));
    const basePath = destParts.length ? destParts.slice() : ['General'];
    const subjectPath = basePath.concat(Array.isArray(item.relPath) ? item.relPath : []); // FIXED: was always basePath alone, dropping nested subfolder structure
    const newTest = { id: uid('test'), questions: clonedQuestions,
      subjectPath, lessonName: item.lessonTitle || 'Untitled' };
    syncTestTitle(newTest);
    targetRes.tests.push(newTest);
  }
  targetRes.stats.tests = targetRes.tests.length;
  targetRes.stats.questions = targetRes.tests.reduce((s,t)=>s+(t.questions||[]).length,0);
  await idbPut('resources', targetRes);
  if(treeClipboard.mode==='move'){
    await deleteSubjectFromResource(treeClipboard.sourceResId, treeClipboard.sourceSubject);
  }
  rebuildFlatIndex();
  treeClipboard = null;
}

/* ADDED: writes the clipboard test/lesson into the target resource/subject; on "move" removes the original afterward */

  document.getElementById('add-q-text-input').focus();
  document.getElementById('add-q-cancel').onclick = closeModal;
  // ADDED: local, per-open-of-the-modal image lists — cleared automatically each time
  // the modal re-opens (Save re-invokes openAddQuestionModal), so images never leak
  // between separately-saved questions.
  const addQQuestionImages = [];
  const addQExplainImages = [];
  wireAddQuestionImagePicker('add-q-img-preview', 'add-q-img-btn', 'add-q-img-input', addQQuestionImages);
  wireAddQuestionImagePicker('add-q-eimg-preview', 'add-q-eimg-btn', 'add-q-eimg-input', addQExplainImages);
  document.getElementById('add-q-save').onclick = async ()=>{
    const text = document.getElementById('add-q-text-input').value.trim();
    const options = ['A','B','C','D'].map(l=>({
      label: l,
      text: document.getElementById(`add-q-opt-${l}`).value.trim(),
      correct: (document.querySelector('input[name="add-q-correct"]:checked')||{}).value === l
    }));
    const explanation = document.getElementById('add-q-explain-input').value.trim();
    if(!text){ showMiniToast('Please enter the question text', 'error'); return; }
    if(options.some(o=>!o.text)){ showMiniToast('Please fill in all 4 options', 'error'); return; }
    if(!options.some(o=>o.correct)){ showMiniToast('Please mark the correct option', 'error'); return; }
    await addQuestionToTest(resId, testId, {
      text, options, explanation,
      question_images: addQQuestionImages.slice(),
      explanation_images: addQExplainImages.slice()
    });
    showMiniToast('Question added', 'success');
    // ADDED: keep the modal open with cleared fields so several questions can be added in a row
    openAddQuestionModal(resId, testId);
    renderResourceDetail(resId);
  };
}
// ADDED: wires an "Insert image" button + hidden file input to read chosen image
// file(s) as base64 data URLs, pushing each into `arr` (in-memory, per-modal list)
// and re-rendering a small thumbnail strip with a remove (×) button on each thumb.
// Reused for both the question-image picker and the explanation-image picker.
const ADD_Q_IMAGE_MAX_BYTES = 3 * 1024 * 1024; // 3MB per image — stored as a data URL alongside the question
function wireAddQuestionImagePicker(previewId, btnId, inputId, arr){
  function refresh(){
    const c = document.getElementById(previewId);
    if(!c) return;
    c.innerHTML = arr.map((src,i)=>`
      <div style="position:relative;">
        <img src="${src}" alt="Uploaded question image ${i+1}" loading="lazy" style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:1.5px solid var(--card-border);display:block;"/>
        <button type="button" data-idx="${i}" title="Remove image"
          style="position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;border:none;background:#dc2626;color:#fff;font-size:.7rem;line-height:1;cursor:pointer;">✕</button>
      </div>`).join('');
    c.querySelectorAll('button[data-idx]').forEach(btn=>{
      btn.onclick = ()=>{ arr.splice(Number(btn.dataset.idx), 1); refresh(); };
    });
  }
  const btn = document.getElementById(btnId);
  const input = document.getElementById(inputId);
  if(!btn || !input) return;
  btn.onclick = ()=> input.click();
  input.onchange = ()=>{
    const files = Array.from(input.files || []);
    files.forEach(file=>{
      if(!/^image\//.test(file.type)){ showMiniToast('Please choose an image file', 'error'); return; }
      if(file.size > ADD_Q_IMAGE_MAX_BYTES){ showMiniToast(`Image is too big — please pick one under ${Math.round(ADD_Q_IMAGE_MAX_BYTES/1024/1024)}MB`, 'error'); return; }
      const reader = new FileReader();
      reader.onload = ()=>{ arr.push(reader.result); refresh(); };
      reader.onerror = ()=> showMiniToast('Could not read that image', 'error');
      reader.readAsDataURL(file);
    });
    input.value = ''; // allow re-selecting the same file again later
  };
  refresh();
}
async function addQuestionToTest(resId, testId, data){
  const res = APP.resources.find(r=>r.id===resId);
  if(!res) return null;
  const test = res.tests.find(t=>t.id===testId);
  if(!test) return null;
  const q = {
    id: uid('q'),
    text: data.text,
    question_images: data.question_images || [],
    options: data.options,
    explanation: data.explanation || '',
    explanation_images: data.explanation_images || []
  };
  test.questions = test.questions || [];
  test.questions.push(q);
  res.stats.tests = res.tests.length;
  res.stats.questions = res.tests.reduce((s,t)=>s+(t.questions||[]).length,0);
  await idbPut('resources', res);
  rebuildFlatIndex();
  return q;
}
