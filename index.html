        practiceSetupState.pyqYears = (activeSet.size === allYearVals.length) ? new Set() : activeSet;
        yearWrap.querySelectorAll('.year-chip').forEach(c=>{
          const isActive = practiceSetupState.pyqYears.size===0 || practiceSetupState.pyqYears.has(c.dataset.year);
          c.classList.toggle('active', isActive);
        });
        practiceSetupState.testIds = new Set();
        renderTopicList();
        updatePoolSummary();
      };
    });
    const yearAll = document.getElementById('year-sel-all');
    if(yearAll) yearAll.onclick = ()=>{
      practiceSetupState.pyqYears = new Set(); // empty = all (no year filter)
      practiceSetupState.testIds = new Set();
      renderPractice();
    };
    const yearNone = document.getElementById('year-sel-none');
    if(yearNone) yearNone.onclick = ()=>{
      // FIXED: use a sentinel value that never matches a real year, so ALL chips
      // render unchecked and the question pool correctly becomes empty — instead
      // of the previous behavior which silently kept the first year selected.
      practiceSetupState.pyqYears = new Set(['__none__']);
      practiceSetupState.testIds = new Set();
      renderPractice();
    };
  }
}

function currentResourceScope(){
  return practiceSetupState.resourceIds.size ? practiceSetupState.resourceIds : new Set(nonFcResources().map(r=>r.id));
}
function currentSubjectScope(){
  return practiceSetupState.subjects; // empty = all
}

function renderTopicList(){
  const wrap = document.getElementById('topic-list');
  if(!wrap) return;
  const resScope = currentResourceScope();
  const subjScope = currentSubjectScope();
  const search = (document.getElementById('topic-search')?.value || '').toLowerCase();

  // group tests by subject
  const bySubject = {};
  for(const res of APP.resources){
    if(!resScope.has(res.id)) continue;
    for(const t of res.tests){
      const subj = subjectOf(t);
      if(subjScope.size && !subjScope.has(subj)) continue;
      if(search && !t.title.toLowerCase().includes(search)) continue;
      (bySubject[subj] = bySubject[subj]||[]).push({resId:res.id, test:t});
    }
  }
  const subjects = Object.keys(bySubject).sort();
  if(subjects.length===0){ wrap.innerHTML = `<div class="muted" style="padding:8px;font-size:.78rem;">No topics match.</div>`; return; }

  wrap.innerHTML = subjects.map(s=>`
    <details class="subject-group">
      <summary>${escapeHtml(s)} <span class="muted" style="font-weight:400;">(${bySubject[s].length})</span></summary>
      ${bySubject[s].map(({resId,test})=>{
        const checked = practiceSetupState.testIds.size===0 || practiceSetupState.testIds.has(test.id);
        return `<label class="testrow"><input type="checkbox" data-testid="${test.id}" ${checked?'checked':''}/>${escapeHtml(test.title)}<span class="cnt">${(test.questions||[]).length}</span></label>`;
      }).join('')}
    </details>
  `).join('');

  wrap.querySelectorAll('input[data-testid]').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const allBoxes = wrap.querySelectorAll('input[data-testid]');
      const checkedBoxes = wrap.querySelectorAll('input[data-testid]:checked');
      if(checkedBoxes.length === allBoxes.length){
        practiceSetupState.testIds = new Set(); // all selected = no filter
      } else {
        // build explicit set from ALL currently-visible+other previously selected ids
        const cur = new Set(practiceSetupState.testIds.size ? practiceSetupState.testIds : [...allBoxes].map(b=>b.dataset.testid));
        cur.delete('__none__'); // clear the "None" sentinel once the user picks real tests
        allBoxes.forEach(b=>{
          if(b.checked) cur.add(b.dataset.testid); else cur.delete(b.dataset.testid);
        });
        practiceSetupState.testIds = cur;
      }
      updatePoolSummary();
    });
  });
  updatePoolSummary();
}

function buildFilteredPool(){
  const resScope = currentResourceScope();
  const subjScope = currentSubjectScope();
  const testScope = practiceSetupState.testIds;
  const yearScope = practiceSetupState.pyqYears; // ADDED
  return APP.flatIndex.filter(fq=>{
    if(!resScope.has(fq.resourceId)) return false;
    if(subjScope.size && !subjScope.has(fq.subject)) return false;
    if(testScope.size && !testScope.has(fq.testId)) return false;
    // ADDED: PYQ year filter
    if(yearScope.size){
      const titleYears = (fq.testTitle||'').match(/\b(19|20)\d{2}\b/g)||[];
      if(!titleYears.some(y=>yearScope.has(y))) return false;
    }
    const h = APP.historyMap[fq.compositeId];
    if(practiceSetupState.historyFilter==='unattempted' && h && h.attempts && h.attempts.length) return false;
    if(practiceSetupState.historyFilter==='incorrect' && !(h && h.lastCorrect===false)) return false;
    if(practiceSetupState.historyFilter==='bookmarked' && !(h && h.bookmarked)) return false;
    // ADDED: further narrow to a single bookmark category list (Easy/Difficult/Hard/Silly Mistake/custom) when one is chosen
    if(practiceSetupState.historyFilter==='bookmarked' && practiceSetupState.bookmarkListFilter && !(h && h.lists && h.lists.includes(practiceSetupState.bookmarkListFilter))) return false;
    return true;
  });
}

function updatePoolSummary(){
  const summary = document.getElementById('pool-summary');
  if(!summary) return;
  const pool = buildFilteredPool();
  const wanted = Math.max(1, practiceSetupState.count||1);
  summary.innerHTML = `<b>${pool.length.toLocaleString()}</b> questions match your filters. This session will use <b>${Math.min(wanted,pool.length)}</b>.`;
}

async function startPracticeSession(){
  const pool = buildFilteredPool();
  if(pool.length === 0){ showMiniToast('No questions match these filters', 'error'); return; }
  const wanted = Math.max(1, practiceSetupState.count||1);
  const chosen = shuffle(pool).slice(0, Math.min(wanted, pool.length));

  // ADDED: a half-finished session no longer blocks starting a new one — just
  // stash it in the resumable "Continue a test" list first so it isn't lost.
  if(APP.activeSession && !APP.activeSession.submitted){
    saveIncompleteSession(APP.activeSession);
  }

  let timerTotalSec = null;
  if(practiceSetupState.pacing==='perq'){
    // CHANGED: a combined countdown for the whole test only applies to Timed
    // exam mode now (unchanged from before). Study mode + 60s/question instead
    // runs a fresh 60s countdown per question — see startQuizTimer().
    if(practiceSetupState.mode==='exam') timerTotalSec = chosen.length * 60;
  } else if(practiceSetupState.pacing==='custom'){
    timerTotalSec = Math.max(1,practiceSetupState.pacingCustomMin) * 60;
  }

  const session = {
    id: uid('sess'),
    ts: Date.now(),
    mode: practiceSetupState.mode,
    pacing: practiceSetupState.pacing,
    timerTotalSec,
    hideClues: practiceSetupState.hideClues,
    compositeIds: chosen.map(c=>c.compositeId),
    answers: {},          // compositeId -> {chosen, correct, skipped, ts, timeSpentSec}
    bookmarks: {},         // compositeId -> bool (session-local mirror of the persistent bookmark)
    reviews: {},           // ADDED: compositeId -> bool, session-local "flag for review" — separate from bookmarks, never persisted to history
    current: 0,
    submitted: false,
    elapsedSec: 0,
    questionStartTs: Date.now(),
  };
  APP.activeSession = session;
  lsSet(LS_ACTIVE_SESSION, session);
  renderQuizRunner();
}

function flatByCompositeId(cid){
  // small map cache
  if(!flatByCompositeId._map || flatByCompositeId._dirty){
    flatByCompositeId._map = {};
    for(const f of APP.flatIndex) flatByCompositeId._map[f.compositeId] = f;
    flatByCompositeId._dirty = false;
  }
  return flatByCompositeId._map[cid];
}
function invalidateFlatMap(){ flatByCompositeId._dirty = true; }

/* ADDED: shared status-class logic for both the running strip and the full-map modal.
   Study mode (instant feedback) shows right/wrong once a question is answered;
   Exam mode keeps the original neutral "answered" (blue) / skip / review / bookmark states. */
function navItemClass(s, cid, i){
  const ans = s.answers[cid];
  const bm = s.bookmarks[cid];
  const rv = s.reviews[cid];
  let cls = 'navnum';
  if(ans && ans.skipped) cls += ' st-skipped';
  else if(ans && ans.chosen){
    cls += (s.mode==='study') ? (ans.correct ? ' st-correct' : ' st-incorrect') : ' st-answered';
  }
  if(rv) cls += ' st-review';       // small corner dot, layers on top of the base status
  if(bm) cls += ' st-bookmarked';   // small corner dot, layers on top of the base status
  if(i===s.current) cls += ' st-active';
  return cls;
}

function goToQuestion(idx){
  const s = APP.activeSession;
  if(idx<0 || idx>=s.compositeIds.length) return;
  s.current = idx;
  s.questionStartTs = Date.now();
  lsSet(LS_ACTIVE_SESSION, s);
  renderQuizQuestion();
  updateProgressBar();
}

function selectOption(label){
  const s = APP.activeSession;
  const fq = currentFlatQ();
  const q = fq.q;
  const cid = fq.compositeId;
  const correctLabel = correctLabelOf(q);
  const timeSpent = Math.round((Date.now() - s.questionStartTs)/1000);
  const isCorrect = label===correctLabel;
  s.answers[cid] = { chosen: label, correct: isCorrect, skipped:false, ts: Date.now(), timeSpentSec: (s.answers[cid]?.timeSpentSec||0)+timeSpent };
  s.questionStartTs = Date.now();
  lsSet(LS_ACTIVE_SESSION, s);
  renderQuizQuestion();
  renderNavGrid();
  updateProgressBar();
  renderStreakStrip(); // ADDED: reflect the new correct/incorrect answer in the streak strip immediately
  // ADDED: Study mode reveals correctness immediately, so pair it with a quick motivating/funny
  // mini-toast — Exam mode stays silent here since it intentionally hides correctness until submit.
  if(s.mode==='study') showAnswerMotivationToast(isCorrect);
}

function doSkip(){
  const s = APP.activeSession;
  const cid = currentFlatQ().compositeId;
  if(!s.answers[cid]) s.answers[cid] = { chosen:null, correct:false, skipped:true, ts:Date.now(), timeSpentSec:0 };
  else s.answers[cid].skipped = true;
  lsSet(LS_ACTIVE_SESSION, s);
  renderNavGrid();
  updateProgressBar();
  if(s.current < s.compositeIds.length-1) goToQuestion(s.current+1);
}

async function doBookmarkToggle(){
  const s = APP.activeSession;

  // ADDED: tapping the star opens the list picker (Easy/Difficult/Hard/Silly Mistake/custom)

// ADDED: "Review" is a session-only flag (flag this question to revisit before submitting).
// Unlike a bookmark, it is NOT saved to APP.historyMap and does not appear in Home stats

function doReviewToggle(){

function updateProgressBar(){
  const s = APP.activeSession;
  const total = s.compositeIds.length;
  const answered = Object.values(s.answers).filter(a=>a && a.chosen).length;
  const track = document.getElementById('progress-track');
  const fill = document.getElementById('progress-fill');

/* ============================================================
   ADDED: correct-answer streak strip — how many correct answers in a row, most-recent-first.
   Chronological (by when each question was actually answered), not by question order, so
   jumping around the question map still tracks "in a row" the way the person experienced it.
   Skipped questions are simply left out of the sequence rather than breaking the streak, since
   skipping isn't a wrong answer. Only meaningful in Study mode, where correctness is revealed
   immediately — Exam mode hides correctness until submit, so the strip stays hidden there.
   ============================================================ */
function currentSessionCorrectStreak(s){
  const answered = Object.values(s.answers)
    .filter(a=>a && a.chosen && !a.skipped)
    .sort((a,b)=>a.ts-b.ts);
  let streak = 0;
  for(let i=answered.length-1; i>=0; i--){
    if(answered[i].correct) streak++;
    else break;
  }
  return streak;
}

// ADDED: up to 5 boxes light up one-by-one for the first 5 correct answers in a row; past
// that, the boxes stay maxed out (all lit) and a plain running number takes over — 6, 7, 8…
function streakStripInnerHtml(streak){
  let boxes = '';
  for(let i=1; i<=5; i++){
    const lit = streak >= i;
    boxes += `<span class="streak-box${lit?' lit':''}">${lit?'<i class="fa-solid fa-fire"></i>':''}</span>`;
  }
  const counter = streak > 5 ? `<span class="streak-count">${streak}<i class="fa-solid fa-fire" style="margin-left:4px;"></i></span>` : '';
  const label = streak > 0 ? `${streak} correct in a row` : 'Streak';
  return `<span class="streak-strip-label">${label}</span><span class="streak-boxes">${boxes}</span>${counter}`;
}

function renderStreakStrip(){
  const s = APP.activeSession;
  const row = document.getElementById('streak-strip-row');
  if(!row || !s || s.mode !== 'study') return; // ADDED: only exists in the DOM for study-mode sessions
  row.innerHTML = streakStripInnerHtml(currentSessionCorrectStreak(s));
}

/* ---------------- timer ---------------- */
function startQuizTimer(){
  stopQuizTimer();
  quizTimerHandle = setInterval(()=>{
    const s = APP.activeSession;
    if(!s || s.submitted) return;
    s.elapsedSec = (s.elapsedSec||0) + 1;
    const pill = document.getElementById('timer-pill');
    if(!pill) return;
    if(s.mode==='study' && s.pacing==='perq'){
      // ADDED: Study mode + 60s/question now runs a fresh 60s countdown for
      // whichever question is on screen, instead of one combined countdown
      // for the whole test. Running out reveals that question's answer
      // (rather than submitting the whole session), and moving to the next
      // question (goToQuestion resets questionStartTs) restarts the 60s.
      const fq = currentFlatQ();
      const cid = fq && fq.compositeId;
      const spentOnQ = Math.floor((Date.now() - s.questionStartTs)/1000);
      const remaining = 60 - spentOnQ;
      pill.textContent = fmtTime(Math.max(0, remaining));
      pill.classList.toggle('warn', remaining <= 10);
      if(remaining <= 0 && cid && !s.answers[cid]){
        s.answers[cid] = { chosen:null, correct:false, skipped:true, ts:Date.now(), timeSpentSec:60 };
        lsSet(LS_ACTIVE_SESSION, s);
        renderQuizQuestion();
        renderNavGrid();
        updateProgressBar();
        showMiniToast("Time's up — answer revealed", 'error');
      }
    } else if(s.pacing==='untimed'){
      pill.textContent = fmtTime(s.elapsedSec);
      pill.classList.remove('warn');
    } else {
      const remaining = (s.timerTotalSec||0) - s.elapsedSec;
      pill.textContent = fmtTime(Math.max(0,remaining));
      pill.classList.toggle('warn', remaining <= 30);
      if(remaining <= 0){
        showMiniToast('Time is up — submitting your session', 'success');
        finalizeSubmit();
        return;
      }
    }
    if(s.elapsedSec % 5 === 0) lsSet(LS_ACTIVE_SESSION, s);
  }, 1000);
}
function stopQuizTimer(){ if(quizTimerHandle){ clearInterval(quizTimerHandle); quizTimerHandle=null; } }

/* ---------------- submit flow ---------------- */
function openSubmitModal(){
  const s = APP.activeSession;
  const total = s.compositeIds.length;
  const answered = Object.values(s.answers).filter(a=>a && a.chosen).length;
  const skipped = Object.values(s.answers).filter(a=>a && a.skipped && !a.chosen).length;
  const bookmarked = Object.keys(s.bookmarks).filter(k=>s.bookmarks[k]).length;
  const unattempted = total - answered - skipped;

  showModal(`
    <h3 style="margin:0 0 12px;">Submit this session?</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:.85rem;margin-bottom:18px;">
      <div>✅ Answered: <b>${answered}</b></div>
      <div>⏩ Skipped: <b>${skipped}</b></div>
      <div>⭐ Bookmarked: <b>${bookmarked}</b></div>
      <div>⬜ Unattempted: <b>${unattempted}</b></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-outline" id="modal-cancel">Keep going</button>
      <button class="btn btn-danger" id="modal-confirm-submit">Submit now</button>
    </div>
  `);
  document.getElementById('modal-cancel').onclick = closeModal;
  document.getElementById('modal-confirm-submit').onclick = ()=>{ closeModal(); finalizeSubmit(); };
}

async function finalizeSubmit(){
  stopQuizTimer();
  const s = APP.activeSession;
  s.submitted = true;
  removeIncompleteSession(s.id); // ADDED: no longer resumable once submitted
  let correctCount = 0, attemptedCount = 0;
  for(const cid of s.compositeIds){
    const a = s.answers[cid];
    if(a && a.chosen){
      attemptedCount++;
      if(a.correct) correctCount++;
      await recordAnswer(cid, a.chosen, a.correct);
    }
  }
  bumpStreak(attemptedCount);
  if(attemptedCount > 0) bumpGoalProgress('questions', attemptedCount); // ADDED: today's questions goal

  const sessionRecord = {
    id: s.id, ts: s.ts, mode: s.mode, pacing: s.pacing,
    total: s.compositeIds.length, attempted: attemptedCount, correct: correctCount,
    accuracy: attemptedCount ? Math.round(correctCount/attemptedCount*100) : 0,
    elapsedSec: s.elapsedSec,
    compositeIds: s.compositeIds,
    answers: s.answers,
    bookmarks: s.bookmarks,
  };
  await idbPut('sessions', sessionRecord);
  APP.sessions.unshift(sessionRecord);
  APP.selectedSessionId = sessionRecord.id;

  APP.activeSession = null;
  localStorage.removeItem(LS_ACTIVE_SESSION);

  checkAchievements(); // ADDED: session-count/accuracy/streak/time-of-day achievements may now be met

  showMiniToast('Session submitted — nice work!', 'success');

  // ADDED: open the full-screen review page immediately after submit so
  // results/answers are front-and-center instead of requiring a trip to Analytics.
  openReviewPage(sessionRecord, 'analytics', true); // ADDED: trailing `true` = fresh submit, so the companion reacts to the score (see spawnSessionResultCompanion())
}

function openZoom(src){
  const root = document.getElementById('modal-root');
  const ov = document.createElement('div');
  ov.className = 'zoom-overlay';
  ov.innerHTML = `
    <button class="zoom-download-btn" id="zoom-download-btn" title="Download image as JPG"><i class="fa-solid fa-download"></i> <span class="hide-xs2">Download</span></button>
    <img src="${escapeHtml(src)}" alt="Zoomed image"/>
  `;
  ov.onclick = (e)=>{ if(!e.target.closest('#zoom-download-btn')) ov.remove(); }; // click anywhere except the download button to close
  root.appendChild(ov);
  document.getElementById('zoom-download-btn').onclick = ()=>downloadImageAsJpg(src);
}

// ADDED: converts the zoomed image to a JPG and downloads it. Falls back to opening
// the original in a new tab if canvas conversion is blocked (e.g. a remote host
// without CORS headers, which taints the canvas and prevents export).
function downloadImageAsJpg(src){
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = ()=>{
    try{
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth || img.width;
      canvas.height = img.naturalHeight || img.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff'; // JPG has no alpha channel — flatten transparency onto white first
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0);
      canvas.toBlob(blob=>{
        if(!blob){ window.open(src,'_blank'); return; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `question-image-${Date.now()}.jpg`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(()=>URL.revokeObjectURL(url), 4000);
      }, 'image/jpeg', 0.92);
    }catch(err){
      console.warn('Image download conversion failed, opening original instead', err);
      window.open(src,'_blank');
    }
  };
  img.onerror = ()=>{ showMiniToast('Could not load image for download', 'error'); };
  img.src = src;
}

// ADDED: wires every <img> inside a container (whether it's a .qimg from the
// question_images/explanation_images arrays, or a raw <img> pasted straight into
// question/explanation/option HTML) to open in the zoom-and-download lightbox.
function wireImageZoom(container){
  if(!container) return;
  container.querySelectorAll('img').forEach(img=>{
    img.style.cursor = 'zoom-in';
    img.onclick = (e)=>{ e.stopPropagation(); openZoom(img.getAttribute('src')); };
  });
}

  const subjAccBody = document.getElementById('subjacc-body');

      prevTestsBody.classList.toggle('hidden', prevTestsCollapsed);

  }

  // ADDED: Historical review collapse/expand (whole header row is clickable)
  const histToggleBtn = document.getElementById('sec-toggle-histreview');
  const histHeader = document.getElementById('histreview-header');
  const histBody = document.getElementById('histreview-body');
  if(histHeader && histToggleBtn && histBody){

      histBody.classList.toggle('hidden', histReviewCollapsed);
    };
  }

  el.querySelectorAll('[data-view-session]').forEach(btn=>{
    btn.onclick = ()=>{
      const session = APP.sessions.find(s=>s.id===btn.dataset.viewSession);
      if(session) openReviewPage(session, 'analytics');
    };
  });

  // ADDED: download a single previous test as a PDF, straight from the Analytics list
  el.querySelectorAll('[data-download-session-pdf]').forEach(btn=>{
    btn.onclick = ()=>{
      const session = APP.sessions.find(s=>s.id===btn.dataset.downloadSessionPdf);
      if(!session){ showMiniToast('Test not found', 'error'); return; }
      const label = `Test — ${new Date(session.ts).toLocaleDateString()} ${new Date(session.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
      downloadSessionAsPdf(session, label);
    };
  });

  // ADDED: delete a single previous test from the analytics list
  el.querySelectorAll('[data-delete-session]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.deleteSession;
      if(!confirm('Delete this test from your history? This cannot be undone.')) return;
      const removedSession = APP.sessions.find(s=>s.id===id); // ADDED: keep a copy for the recycle bin
      await idbDelete('sessions', id);
      APP.sessions = APP.sessions.filter(s=>s.id!==id);
      if(APP.selectedSessionId===id) APP.selectedSessionId = null;
      if(removedSession){ addToRecycleBin('session', 'Test — ' + new Date(removedSession.startedAt||removedSession.ts||Date.now()).toLocaleDateString(), removedSession); updateRecycleBinBadge(); } // ADDED
      showMiniToast('Test deleted', 'success');
      renderAnalytics();
    };
  });
}

/* ============================================================
   ADDED: 14-day activity bar chart
   ============================================================ */
function renderBar14(){
  const wrap = document.getElementById('bar14');
  if(!wrap) return;
  const days = 14;
  const today = new Date();
  const counts = [];
  for(let i=days-1;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    counts.push({ label: d.toLocaleDateString(undefined,{weekday:'narrow'}), count: APP.streak[key]||0 });
  }
  const max = Math.max(1, ...counts.map(c=>c.count));
  wrap.innerHTML = counts.map(c=>{
    const h = Math.round((c.count/max)*100);
    return `<div class="bar14-col">
      <div class="muted" style="font-size:.62rem;">${c.count||''}</div>
      <div class="bar14-bar" style="height:${Math.max(h,c.count?4:2)}%;"></div>
      <div class="bar14-label">${c.label}</div>
    </div>`;
  }).join('');
}

/* ============================================================
   ADDED: flattened, filterable historical review list (across all sessions)
   ============================================================ */
function renderHistoricalReviewList(filter){
  const wrap = document.getElementById('hist-review-list');
  if(!wrap) return;
  const rows = [];
  for(const s of APP.sessions){
    (s.compositeIds||[]).forEach(cid=>{
      const fq = flatByCompositeId(cid);
      if(!fq) return;
      const a = s.answers ? s.answers[cid] : null;
      let status;
      if(!a || (!a.chosen)) status = 'skipped';
      else if(a.correct) status = 'correct';
      else status = 'incorrect';
      rows.push({ s, cid, fq, a, status });
    });
  }
  const filtered = filter==='all' ? rows : rows.filter(r=>r.status===filter);
  if(!filtered.length){
    wrap.innerHTML = `<div class="muted" style="padding:20px;text-align:center;font-size:.82rem;">No questions in this filter yet.</div>`;
    return;
  }
  wrap.innerHTML = filtered.slice(0,300).map((r,i)=>{
    const q = r.fq.q;
    const correctLabel = correctLabelOf(q);
    let statusHtml;
    if(r.status==='skipped') statusHtml = `<span class="pill-skip">— skipped</span>`;
    else if(r.status==='correct') statusHtml = `<span class="pill-correct">✓ correct</span>`;
    else statusHtml = `<span class="pill-wrong">✗ wrong${r.a && r.a.chosen ? ' (chose '+escapeHtml(r.a.chosen)+')' : ''}</span>`;
    return `<div class="review-row">
      <div class="review-summary" data-hist-toggle="hist-${i}">
        <span class="muted" style="width:26px;">#${i+1}</span>
        <span style="flex:1;">${escapeHtml((q.text||'').slice(0,90))}${(q.text||'').length>90?'…':''}</span>
        ${statusHtml}
        <span class="muted">▾</span>
      </div>
      <div class="review-detail hidden" id="hist-${i}">
        <div class="qtext">${sanitizeHtml(q.raw_text || escapeHtml(q.text||''))}</div>
        <div class="muted" style="margin-bottom:4px;">Your answer: <b>${r.a && r.a.chosen ? escapeHtml(r.a.chosen) : '—'}</b></div>
        <div class="muted" style="margin-bottom:8px;">Correct answer: <b>${escapeHtml(correctLabel||'?')}</b> — ${escapeHtml(correctAnswerTextOnly(q, correctLabel))}</div>
        <div class="explain-box">${sanitizeHtml(q.explanation||'')}</div>
      </div>
    </div>`;
  }).join('');
  wrap.querySelectorAll('[data-hist-toggle]').forEach(row=>{
    row.onclick = (e)=>{
      if(e.target.closest('img')) return; // ADDED: image tap opens zoom instead of toggling
      const target = document.getElementById(row.dataset.histToggle);
      if(target) target.classList.toggle('hidden');
    };
  });
  wireImageZoom(wrap); // ADDED
}

function renderHeatgrid(){
  const grid = document.getElementById('heatgrid');
  if(!grid) return;
  const days = 84;
  const today = new Date();
  const cells = [];
  for(let i=days-1;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const count = APP.streak[key]||0;
    let bg = 'var(--track)';
    if(count>0 && count<5) bg='color-mix(in srgb, var(--accent) 30%, var(--track))';
    else if(count>=5 && count<15) bg='color-mix(in srgb, var(--accent) 60%, var(--track))';
    else if(count>=15) bg='var(--accent)';
    cells.push(`<div class="heatcell" style="background:${bg};" title="${key}: ${count} questions"></div>`);
  }
  grid.innerHTML = cells.join('');
}

/* ============================================================
   ADDED: FULL-SCREEN SESSION REVIEW PAGE
   Opened automatically right after a session is submitted, and also
   from Analytics ("Open" on any previous test). Mirrors the
   resource-detail pattern: its own dedicated view outside the main
   nav, with a Back button that returns to wherever it was opened from.

   Features over the old popup:
   - Score ring + correct/incorrect/skipped/time badges up top
   - Filter tabs (All/Correct/Incorrect/Skipped/Bookmarked) with live counts
   - Free-text search across question text
   - Per-question bookmark star (persists to the same bookmark used
     everywhere else in the app — Bookmarks tab, flashcards, etc.)
   - "Retry missed" — instantly launches a new Study-mode session built
     only from this session's incorrect + skipped questions
   - "Share summary" — copies/share-sheets a plain-text score summary
   ============================================================ */
let reviewPageSession = null;     // session object currently being reviewed
let reviewPageFilter = 'all';     // all | correct | incorrect | skipped | bookmarked
let reviewPageSearch = '';        // free-text filter
let reviewPageFrom = 'analytics'; // tab to return to on Back

// ADDED: dedicated "Review all questions" page — a full separate screen styled like the
// actual quiz-taking screen, opened via openQuizReviewPage() instead of an inline mode.
let quizReviewIndex = 0;          // current question index while on the quiz-style review page

function openReviewPage(session, fromTab, freshSubmit){
  if(!session) return;
  reviewPageSession = session;
  reviewPageFilter = 'all';
  reviewPageSearch = '';
  reviewPageFrom = fromTab || APP.currentTab || 'analytics';
  APP.currentTab = 'review';
  document.querySelectorAll('.navtab').forEach(b=>b.classList.remove('active'));
  ['view-home','view-resources','view-practice','view-analytics','view-resource','view-bookmarks','view-flashcards','view-flashcarddecks','view-flashcarddeck','view-topics','view-quizreview']
    .forEach(id=>{ const e=document.getElementById(id); if(e) e.classList.add('hidden'); });
  document.getElementById('view-review').classList.remove('hidden');
  renderReviewPage(freshSubmit); // ADDED: pass through so the companion only reacts right after a real submit, not every time an old session is reopened from Analytics
  window.scrollTo({top:0});
}
function closeReviewPage(){ reviewPageSession = null; setTab(reviewPageFrom || 'analytics'); }

function reviewPageRows(){
  const s = reviewPageSession;
  if(!s) return [];
  return (s.compositeIds||[]).map((cid,i)=>{
    const fq = flatByCompositeId(cid);
    if(!fq) return null;
    const q = fq.q;
    const a = s.answers ? s.answers[cid] : null;
    let status;
    if(!a || !a.chosen) status = 'skipped';
    else if(a.correct) status = 'correct';
    else status = 'incorrect';
    const h = APP.historyMap[cid];
    const bookmarked = !!(h && h.bookmarked);
    return { i, cid, fq, q, a, status, bookmarked };
  }).filter(Boolean);
}

function reviewPageFilteredRows(){
  let rows = reviewPageRows();
  if(reviewPageFilter!=='all'){
    rows = rows.filter(r=> reviewPageFilter==='bookmarked' ? r.bookmarked : r.status===reviewPageFilter);
  }
  if(reviewPageSearch.trim()){
    const needle = reviewPageSearch.trim().toLowerCase();
    rows = rows.filter(r=>(r.q.text||'').toLowerCase().includes(needle));
  }
  return rows;
}

function renderReviewPage(freshSubmit){
  const el = document.getElementById('view-review');
  const s = reviewPageSession;
  if(!s || !el){ closeReviewPage(); return; }

  const allRows = reviewPageRows();
  const correctCount = allRows.filter(r=>r.status==='correct').length;
  const incorrectCount = allRows.filter(r=>r.status==='incorrect').length;
  const skippedCount = allRows.filter(r=>r.status==='skipped').length;
  const bookmarkedCount = allRows.filter(r=>r.bookmarked).length;
  const total = allRows.length;
  const accuracy = (correctCount+incorrectCount) ? Math.round(correctCount/(correctCount+incorrectCount)*100) : 0;
  const retryCount = incorrectCount + skippedCount;

  const filters = [
    {key:'all', label:'All', count: total},
    {key:'correct', label:'Correct', count: correctCount},
    {key:'incorrect', label:'Incorrect', count: incorrectCount},
    {key:'skipped', label:'Skipped', count: skippedCount},
    {key:'bookmarked', label:'Bookmarked', count: bookmarkedCount},
  ];

  el.innerHTML = `
    <button class="btn btn-outline btn-sm" id="review-page-back" style="margin-bottom:16px;"><i class="fa-solid fa-arrow-left" style="margin-right:6px;"></i>Back</button>

    <div class="card" style="padding:20px;margin-bottom:18px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;">
      <div class="score-ring-lg" style="--pct:${accuracy};">
        <div class="score-ring-lg-inner"><b>${accuracy}%</b><span>accuracy</span></div>
      </div>
      <div style="flex:1;min-width:220px;">
        <h1 style="font-size:1.25rem;font-weight:800;margin:0 0 4px;">Session review</h1>
        <div class="muted" style="font-size:.8rem;text-transform:capitalize;margin-bottom:10px;">${new Date(s.ts).toLocaleString()} · ${escapeHtml(s.mode||'')} mode · ${s.correct}/${s.total} correct</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <span class="badge-pill b-correct"><i class="fa-solid fa-check"></i> ${correctCount} correct</span>
          <span class="badge-pill b-incorrect"><i class="fa-solid fa-xmark"></i> ${incorrectCount} incorrect</span>
          <span class="badge-pill b-skipped"><i class="fa-solid fa-forward"></i> ${skippedCount} skipped</span>
          <span class="badge-pill b-time"><i class="fa-solid fa-clock"></i> ${fmtTime(s.elapsedSec||0)} elapsed</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-accent btn-sm" id="review-page-onebyone"><i class="fa-solid fa-forward-step" style="margin-right:6px;"></i>Review all questions</button>
        ${retryCount>0 ? `<button class="btn btn-outline btn-sm" id="review-page-retry"><i class="fa-solid fa-rotate-right" style="margin-right:6px;"></i>Retry ${retryCount} missed</button>` : ''}
        <button class="btn btn-outline btn-sm" id="review-page-share"><i class="fa-solid fa-share-nodes" style="margin-right:6px;"></i>Share summary</button>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-outline btn-sm" id="review-page-download-pdf"><i class="fa-solid fa-file-pdf" style="margin-right:6px;"></i>PDF</button>
          <button class="btn btn-outline btn-sm" id="review-page-download-txt"><i class="fa-solid fa-file-lines" style="margin-right:6px;"></i>TXT</button>
        </div>
      </div>
    </div>

    <div class="card" style="padding:16px;margin-bottom:20px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div class="review-tabs" id="review-page-tabs">
          ${filters.map(f=>`<button class="review-tab-btn ${reviewPageFilter===f.key?'active':''}" data-filter="${f.key}">${f.label} (${f.count})</button>`).join('')}
        </div>
        <input type="text" class="search-input" id="review-page-search" placeholder="Search questions…" value="${escapeHtml(reviewPageSearch)}" style="max-width:220px;">
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
        <div class="muted" style="font-size:.72rem;">Tap a question to expand it · tap ☆ to bookmark it for later.</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <label for="review-page-showans" style="font-size:.75rem;font-weight:600;cursor:pointer;">Show answers</label>
          <button class="settings-toggle ${APP.settings.reviewShowAnswers!==false?'on':''}" id="review-page-showans" role="switch" aria-checked="${APP.settings.reviewShowAnswers!==false}" aria-label="Toggle showing your answer and the correct answer"></button>
        </div>
      </div>
      <div id="review-page-list" class="scroll-thin"></div>
    </div>
  `;

  document.getElementById('review-page-back').onclick = closeReviewPage;
  document.getElementById('review-page-onebyone').onclick = ()=>openQuizReviewPage(s);
  const retryBtn = document.getElementById('review-page-retry');
  if(retryBtn) retryBtn.onclick = retryMissedFromReview;
  document.getElementById('review-page-share').onclick = shareReviewSummary;
  document.getElementById('review-page-download-pdf').onclick = ()=>{
    const label = `Test — ${new Date(s.ts).toLocaleDateString()} ${new Date(s.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
    downloadSessionAsPdf(s, label);
  };
  document.getElementById('review-page-download-txt').onclick = ()=>{
    const label = `Test — ${new Date(s.ts).toLocaleDateString()} ${new Date(s.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
    downloadSessionAsTxt(s, label);
  };

  document.getElementById('review-page-tabs').onclick = e=>{
    const b = e.target.closest('.review-tab-btn'); if(!b) return;
    reviewPageFilter = b.dataset.filter;
    document.querySelectorAll('#review-page-tabs .review-tab-btn').forEach(x=>x.classList.toggle('active', x===b));
    renderReviewList();
  };
  const searchInput = document.getElementById('review-page-search');
  searchInput.oninput = debounce(()=>{ reviewPageSearch = searchInput.value; renderReviewList(); }, 150);
  document.getElementById('review-page-showans').onclick = ()=>{
    APP.settings.reviewShowAnswers = !(APP.settings.reviewShowAnswers !== false);
    lsSet(LS_SETTINGS, APP.settings);
    renderReviewPage();
  };

  renderReviewList();

  // ADDED: right after a fresh submit, the companion pops in beside the score ring reacting
  // to how the session went — not shown when just reopening an old session from Analytics.
  if(freshSubmit){
    const anchor = el.querySelector('.score-ring-lg');
    spawnSessionResultCompanion(anchor, accuracy);
  }
}

/* ============================================================
   ADDED: "Review all questions" — a dedicated full-screen page, styled
   just like the real quiz-taking screen (same tags/qtext/option-button
   layout), that pages through every question in a completed session
   one at a time with its explanation. Opened as its own view (not
   nested inside the session-review page) via openQuizReviewPage().
   ============================================================ */
function openQuizReviewPage(session){
  if(!session) return;
  reviewPageSession = session; // reuse the same session pointer reviewPageRows() reads from
  quizReviewIndex = 0;
  document.querySelectorAll('.navtab').forEach(b=>b.classList.remove('active'));
  ['view-home','view-resources','view-practice','view-analytics','view-resource','view-bookmarks','view-flashcards','view-flashcarddecks','view-flashcarddeck','view-topics','view-review']
    .forEach(id=>{ const e=document.getElementById(id); if(e) e.classList.add('hidden'); });
  document.getElementById('view-quizreview').classList.remove('hidden');
  renderQuizReviewLayout();
  window.scrollTo({top:0});
}
function closeQuizReviewPage(){
  document.getElementById('view-quizreview').classList.add('hidden');
  document.getElementById('view-review').classList.remove('hidden');
  renderReviewPage(); // back to the session summary + list
  window.scrollTo({top:0});
}

function renderQuizReviewLayout(){
  const el = document.getElementById('view-quizreview');
  const s = reviewPageSession;
  if(!s || !el){ closeQuizReviewPage(); return; }
  const showAns = APP.settings.reviewShowAnswers !== false;

  el.innerHTML = `
    <div class="quiznav">
      <div class="quiznav-inner">
        <button class="btn btn-outline btn-sm" id="qrev-back"><i class="fa-solid fa-arrow-left" style="margin-right:6px;"></i>Back</button>
        <div class="muted" style="font-size:.78rem;white-space:nowrap;flex:1;text-align:center;">Reviewing all questions</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <label for="qrev-showans" style="font-size:.72rem;font-weight:600;cursor:pointer;white-space:nowrap;">Show answers</label>
          <button class="settings-toggle ${showAns?'on':''}" id="qrev-showans" role="switch" aria-checked="${showAns}" aria-label="Toggle showing your answer and the correct answer"></button>
        </div>
      </div>
    </div>
    <div class="quiz-layout" id="quizreview-layout"></div>
  `;

  document.getElementById('qrev-back').onclick = closeQuizReviewPage;
  document.getElementById('qrev-showans').onclick = ()=>{
    APP.settings.reviewShowAnswers = !showAns;
    lsSet(LS_SETTINGS, APP.settings);
    renderQuizReviewLayout();
  };

  renderQuizReviewQuestion();
}

function renderQuizReviewQuestion(){
  const layout = document.getElementById('quizreview-layout');
  if(!layout) return;
  const rows = reviewPageRows();
  if(!rows.length){ layout.innerHTML = `<div class="review-empty">No questions in this session.</div>`; return; }
  if(quizReviewIndex < 0) quizReviewIndex = 0;
  if(quizReviewIndex > rows.length-1) quizReviewIndex = rows.length-1;
  const r = rows[quizReviewIndex];
  const fq = r.fq;
  const q = r.q;
  const total = rows.length;
  const correctLabel = correctLabelOf(q);
  const showAns = APP.settings.reviewShowAnswers !== false;

  const imgHtml = (arr)=>(arr||[]).map(u=>`<img class="qimg" src="${escapeHtml(u)}" data-zoom="${escapeHtml(u)}" alt="Question image" loading="lazy"/>`).join('');

  let statusHtml;
  if(r.status==='skipped') statusHtml = `<span class="pill-skip">— skipped</span>`;
  else if(r.status==='correct') statusHtml = `<span class="pill-correct">✓ correct</span>`;
  else statusHtml = `<span class="pill-wrong">✗ wrong${r.a && r.a.chosen ? ' (chose '+escapeHtml(r.a.chosen)+')' : ''}</span>`;

  layout.innerHTML = `
    <div class="qnav-bar">
      <span class="qnav-bar-label">Question ${quizReviewIndex+1} of ${total}</span>
      ${showAns ? statusHtml : ''}
    </div>
    <div class="card navstrip-wrap" style="padding:12px 14px;">
      <div class="navstrip" id="qrev-strip">
        ${rows.map((rr,idx)=>{
          let cls = 'navnum';
          let mark = '–';
          if(rr.status==='correct'){ cls += ' st-correct'; mark = '✓'; }
          else if(rr.status==='incorrect'){ cls += ' st-incorrect'; mark = '✗'; }
          else{ cls += ' st-skipped'; }
          if(rr.bookmarked) cls += ' st-bookmarked';
          if(idx===quizReviewIndex) cls += ' st-active';
          return `<div class="${cls}" data-goto="${idx}" title="Question ${idx+1} — ${rr.status}">

          </div>`;
        }).join('')}

      <button class="qbookmark-corner ${r.bookmarked?'active':''}" id="qrev-bookmark-corner" title="${r.bookmarked?'Remove bookmark':'Bookmark this question'}">${r.bookmarked?'★':'☆'}</button>
      <div class="qtags">

        ${(q.options||[]).map(o=>{
          let cls='opt-btn locked';

            else if(r.a && r.a.chosen===o.label) cls='opt-btn incorrect locked';
          } else if(r.a && r.a.chosen===o.label){
            cls='opt-btn selected locked';
          }
          return `<button class="${cls}" disabled>
            <span class="opt-letter">${escapeHtml(o.label)}</span>
            <span>${escapeHtml(o.text||'')}</span>
          </button>`;
        }).join('')}

        <button class="btn actionbar-btn nav-arrow-btn" id="qrev-next" ${quizReviewIndex===total-1?'disabled':''} aria-label="Next question"><span class="nav-arrow-label">Next</span> →</button>

        </div>
      </div>
    </div>
  `;

  applyFontScale();

  wireImageZoom(layout); // ADDED: also catches raw <img> tags embedded directly in question/option/explanation HTML

  const goPrev = ()=>{ if(quizReviewIndex>0){ quizReviewIndex--; renderQuizReviewQuestion(); } };
  const goNext = ()=>{ if(quizReviewIndex<total-1){ quizReviewIndex++; renderQuizReviewQuestion(); } };
  document.getElementById('qrev-prev').onclick = goPrev;
  document.getElementById('qrev-next').onclick = goNext;
  layout.querySelectorAll('#qrev-strip [data-goto]').forEach(n=>{

  document.getElementById('qrev-bookmark-corner').onclick = ()=>{
    openBookmarkListPicker(r.cid, ()=>{ renderQuizReviewQuestion(); });
  };

function renderReviewList(){
  const wrap = document.getElementById('review-page-list');
  if(!wrap) return;
  const rows = reviewPageFilteredRows();
  if(!rows.length){
    wrap.innerHTML = `<div class="review-empty">No questions match this filter.</div>`;
    return;
  }
  const showAns = APP.settings.reviewShowAnswers !== false; // ADDED: respects the Show answers setting (default ON)
  wrap.innerHTML = rows.map(r=>{
    const q = r.q;
    const correctLabel = correctLabelOf(q);
    let statusHtml;
    if(r.status==='skipped') statusHtml = `<span class="pill-skip">— skipped</span>`;
    else if(r.status==='correct') statusHtml = `<span class="pill-correct">✓ correct</span>`;
    else statusHtml = `<span class="pill-wrong">✗ wrong${r.a && r.a.chosen ? ' (chose '+escapeHtml(r.a.chosen)+')' : ''}</span>`;
    return `<div class="review-row">
      <div class="review-summary" data-toggle="revpg-${r.i}">
        <span class="muted" style="width:26px;">#${r.i+1}</span>
        <span style="flex:1;">${escapeHtml((q.text||'').slice(0,90))}${(q.text||'').length>90?'…':''}</span>
        ${showAns ? statusHtml : ''}
        <button class="review-star-btn ${r.bookmarked?'active':''}" data-star="${r.cid}" title="${r.bookmarked?'Remove bookmark':'Bookmark this question'}">${r.bookmarked?'★':'☆'}</button>
        <span class="muted">▾</span>
      </div>
      <div class="review-detail hidden" id="revpg-${r.i}">
        <div class="qtext">${sanitizeHtml(q.raw_text || escapeHtml(q.text||''))}</div>
        ${showAns ? `
        <div class="muted" style="margin-bottom:4px;">Your answer: <b>${r.a && r.a.chosen ? escapeHtml(r.a.chosen) : '—'}</b></div>
        <div class="muted" style="margin-bottom:8px;">Correct answer: <b>${escapeHtml(correctLabel||'?')}</b> — ${escapeHtml(correctAnswerTextOnly(q, correctLabel))}</div>
        ` : `<div class="muted" style="margin:6px 0;font-style:italic;">Answers hidden — turn on "Show answers" above to reveal.</div>`}
        <div class="explain-box">${sanitizeHtml(q.explanation||'')}</div>
      </div>
    </div>`;
  }).join('');

  wrap.querySelectorAll('[data-toggle]').forEach(row=>{
    row.onclick = (e)=>{
      if(e.target.closest('[data-star]')) return; // ADDED: don't toggle expand when tapping the star
      if(e.target.closest('img')) return; // ADDED: don't toggle expand when tapping an embedded image (it opens the zoom lightbox instead)
      const target = document.getElementById(row.dataset.toggle);
      if(target) target.classList.toggle('hidden');
    };
  });
  wireImageZoom(wrap); // ADDED: makes embedded question/explanation images in each row zoomable & downloadable
  wrap.querySelectorAll('[data-star]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      openBookmarkListPicker(btn.dataset.star, (bookmarked)=>{
        btn.classList.toggle('active', bookmarked);
        btn.textContent = bookmarked ? '★' : '☆';
        btn.title = bookmarked ? 'Remove bookmark' : 'Bookmark this question';
      });
    };
  });
}

// ADDED: launches a fresh Study-mode session containing only this session's
// incorrect + skipped questions, so mistakes can be immediately re-attempted.
function retryMissedFromReview(){
  const s = reviewPageSession;
  if(!s) return;
  const missedIds = reviewPageRows().filter(r=>r.status==='incorrect' || r.status==='skipped').map(r=>r.cid);
  if(!missedIds.length){ showMiniToast('Nothing to retry — great job!', 'success'); return; }

  const session = {
    id: uid('sess'),
    ts: Date.now(),
    mode: 'study',
    pacing: 'untimed',
    timerTotalSec: null,
    hideClues: false,
    compositeIds: missedIds,
    answers: {},
    bookmarks: {},
    reviews: {},
    current: 0,
    submitted: false,
    elapsedSec: 0,
    questionStartTs: Date.now(),
  };
  APP.activeSession = session;
  lsSet(LS_ACTIVE_SESSION, session);
  reviewPageSession = null;

  APP.currentTab = 'practice';
  document.querySelectorAll('.navtab').forEach(b=>b.classList.toggle('active', b.dataset.tab==='practice'));
  ['view-home','view-resources','view-analytics','view-resource','view-bookmarks','view-flashcards','view-flashcarddecks','view-flashcarddeck','view-topics','view-review','view-quizreview']
    .forEach(id=>{ const e=document.getElementById(id); if(e) e.classList.add('hidden'); });
  document.getElementById('view-practice').classList.remove('hidden');
  window.scrollTo({top:0});
  renderQuizRunner();
  showMiniToast(`Retrying ${missedIds.length} missed question${missedIds.length===1?'':'s'} in Study mode`, 'success');
}

// ADDED: builds a short plain-text summary of this session and shares it via the
// native share sheet where available, otherwise copies it to the clipboard.
async function shareReviewSummary(){
  const s = reviewPageSession;
  if(!s) return;
  const rows = reviewPageRows();
  const skipped = rows.filter(r=>r.status==='skipped').length;
  const text = `QBank session — ${new Date(s.ts).toLocaleDateString()}\n`+
    `Mode: ${s.mode}\n`+
    `Score: ${s.correct}/${s.total} correct (${s.accuracy}% accuracy)\n`+
    `Skipped: ${skipped} · Time: ${fmtTime(s.elapsedSec||0)}`;

  try{
    if(navigator.share){
      await navigator.share({ title:'QBank Center — session results', text });
      return;
    }
  }catch(e){ /* user cancelled share sheet — fall through to clipboard */ }

  try{
    await navigator.clipboard.writeText(text);
    showMiniToast('Summary copied to clipboard', 'success');
  }catch(e){
    showMiniToast('Could not copy — try again', 'error');
  }
}

/* ADDED: builds the exported HTML string for the currently-selected share mode/options */
function buildExportHtml(){
  const mode = document.querySelector('[name="share-mode"]:checked').value;
  let seed = { resources: [], history: {}, sessions: [], streak: {}, settings: APP.settings };
  if(mode==='full'){
    seed.resources = APP.resources; seed.history = APP.historyMap; seed.sessions = APP.sessions; seed.streak = APP.streak;
  } else if(mode==='select'){
    const ids = new Set([...document.querySelectorAll('#share-res-chips input:checked')].map(i=>i.value));
    seed.resources = APP.resources.filter(r=>ids.has(r.id));
    const includeProgress = document.getElementById('share-include-progress').checked;
    if(includeProgress){ seed.history = APP.historyMap; seed.sessions = APP.sessions; seed.streak = APP.streak; }
  }
  // mode 'clean' leaves seed empty

  const parser = new DOMParser();
  const doc = parser.parseFromString(PRISTINE_HTML, 'text/html');
  const seedEl = doc.getElementById('seed-data');
  if(seedEl) seedEl.textContent = JSON.stringify(seed);
  const finalHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
  const stamp = new Date().toISOString().slice(0,10);
  const filename = `qbank-${mode}-${stamp}.html`;
  return { html: finalHtml, filename };
}

function doExport(){
  const { html: finalHtml, filename } = buildExportHtml();
  const blob = new Blob([finalHtml], {type:'text/html'});
  const url = URL.createObjectURL(blob);

  // iOS/iPadOS Safari ignores the <a download> attribute (it just navigates/opens the
  // blob instead of saving a file), so give those users a new tab + Share-sheet instructions
  // instead of relying on a programmatic .click() download.
  if(IS_IOS){
    window.open(url, '_blank');
    closeModal();
    showMiniToast('Opened in a new tab — tap the Share icon, then "Save to Files" to keep it', 'success');
  }else{
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    closeModal();
    showMiniToast('Exported — check your downloads', 'success');
  }
  setTimeout(()=>URL.revokeObjectURL(url), 60000);
}

/* ADDED: shares the exported file directly through the device's native share sheet
   (AirDrop, Messages, Mail, WhatsApp, Drive, etc). A static offline HTML file has no
   server of its own, so there's no live "web link" to hand out — this is the closest
   real equivalent: the actual app file goes straight to whichever app the person picks. */
async function doShareNative(){
  const { html: finalHtml, filename } = buildExportHtml();
  try{
    const file = new File([finalHtml], filename, {type:'text/html'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:'QBank Center', text:'QBank Center — practice question bank'});
      closeModal();
      return;
    }
  }catch(err){
    if(err && err.name === 'AbortError') return; // user cancelled the native share sheet
    console.warn('Native share failed, falling back to download', err);
  }
  // Not supported (most desktop browsers) or failed — fall back to the normal download flow
  doExport();
}

    APP.settings.companionName = companionName;
    lsSet(LS_SETTINGS, APP.settings);
    applyUserProfile();
    closeModal();
    showMiniToast(name ? `Welcome, ${name}! Your companion is ${companionName}.` : 'Profile cleared', 'success');

// ADDED: search filter state — persists only for the lifetime of the modal (reset each time it opens)
let searchFilterState = { resourceId:'all', subject:'all', status:'all' };

function openSearchModal(){
  searchFilterState = { resourceId:'all', subject:'all', status:'all' };
  const resources = APP.resources.map(r=>({id:r.id, name:r.name})).sort((a,b)=>a.name.localeCompare(b.name));
  const subjects = [...new Set(APP.flatIndex.map(f=>f.subject))].filter(Boolean).sort();

  showModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <h3 style="margin:0;font-size:1.05rem;">Search Questions</h3>
      <button class="btn btn-ghost btn-sm" id="search-close">✕</button>
    </div>
    <div class="search-field">
      <span style="color:var(--muted);">🔍</span>
      <input id="search-input-modal" type="text" placeholder="Topic, disease, drug, keyword, resource…" autocomplete="off"/>
    </div>
    <div class="muted" style="font-size:.74rem;margin-bottom:10px;">Searches across all imported resources — question text, test title, subject, resource name.</div>

    <div id="search-filter-row" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;">
      <select id="search-filter-resource" style="padding:7px 8px;border-radius:8px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);font-size:.78rem;">
        <option value="all">All resources</option>
        ${resources.map(r=>`<option value="${escapeHtml(r.id)}">${escapeHtml(r.name)}</option>`).join('')}
      </select>
      <select id="search-filter-subject" style="padding:7px 8px;border-radius:8px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);font-size:.78rem;">
        <option value="all">All subjects</option>
        ${subjects.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('')}
      </select>
      <select id="search-filter-status" style="padding:7px 8px;border-radius:8px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);font-size:.78rem;">
        <option value="all">Any status</option>
        <option value="bookmarked">⭐ Bookmarked</option>
        <option value="incorrect">✗ Answered wrong (last time)</option>
        <option value="correct">✓ Answered right (last time)</option>
        <option value="unattempted">Never attempted</option>
      </select>
    </div>

    <div class="search-results-wrap scroll-thin" id="search-results-wrap">
      <div class="muted" style="text-align:center;padding:28px 0;font-size:.85rem;">Type to search, or pick a filter…</div>
    </div>
  `);
  document.getElementById('search-close').onclick = closeModal;
  const inp = document.getElementById('search-input-modal');
  inp.focus();
  let debounce;
  inp.oninput = ()=>{
    clearTimeout(debounce);
    debounce = setTimeout(()=>runSearch(inp.value), 220);
  };
  inp.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

  document.getElementById('search-filter-resource').onchange = e=>{ searchFilterState.resourceId = e.target.value; runSearch(inp.value); };
  document.getElementById('search-filter-subject').onchange = e=>{ searchFilterState.subject = e.target.value; runSearch(inp.value); };
  document.getElementById('search-filter-status').onchange = e=>{ searchFilterState.status = e.target.value; runSearch(inp.value); };
}

function runSearch(raw){
  const wrap = document.getElementById('search-results-wrap');
  if(!wrap) return;
  const q = (raw||'').trim().toLowerCase();
  const filtersActive = searchFilterState.resourceId!=='all' || searchFilterState.subject!=='all' || searchFilterState.status!=='all';

  if(q.length < 2 && !filtersActive){
    wrap.innerHTML = '<div class="muted" style="text-align:center;padding:28px 0;font-size:.85rem;">Type at least 2 characters, or pick a filter…</div>';
    return;
  }

  const hits = [];
  for(const fq of APP.flatIndex){
    if(searchFilterState.resourceId!=='all' && fq.resourceId!==searchFilterState.resourceId) continue;
    if(searchFilterState.subject!=='all' && fq.subject!==searchFilterState.subject) continue;
    if(searchFilterState.status!=='all'){
      const h = APP.historyMap[fq.compositeId];
      if(searchFilterState.status==='bookmarked' && !(h && h.bookmarked)) continue;
      if(searchFilterState.status==='unattempted' && (h && h.timesSeen)) continue;
      if(searchFilterState.status==='incorrect' && !(h && h.timesSeen && h.lastCorrect===false)) continue;
      if(searchFilterState.status==='correct' && !(h && h.timesSeen && h.lastCorrect===true)) continue;
    }
    if(q.length >= 2){
      const haystack = [
        fq.q.text||'',
        fq.testTitle||'',
        fq.subject||'',
        fq.resourceName||'',
        fq.q.explanation||''
      ].join(' ').toLowerCase();
      if(!haystack.includes(q)) continue;
    }
    hits.push(fq);
    if(hits.length >= 80) break;
  }

  if(hits.length === 0){
    const label = q.length ? `"<b>${escapeHtml(raw)}</b>"` : 'these filters';
    wrap.innerHTML = `<div class="muted" style="text-align:center;padding:28px 0;font-size:.85rem;">No results for ${label}</div>`;
    return;
  }

  function highlight(text, kw){
    if(!kw) return escapeHtml(text);
    const esc = kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return escapeHtml(text).replace(new RegExp(esc,'gi'), m=>`<mark style="background:var(--yellow-status);color:#3f2d00;border-radius:3px;padding:0 2px;">${m}</mark>`);
  }

  wrap.innerHTML = `<div class="muted" style="font-size:.76rem;margin-bottom:8px;">${hits.length}${hits.length>=80?'+':''} results</div>`
    + hits.slice(0,50).map((fq,i)=>{
      const snippet = (fq.q.text||'').slice(0,130);
      const h = APP.historyMap[fq.compositeId];
      const statusDot = !h || !h.timesSeen ? '' :
        h.lastCorrect ? '<span style="color:var(--green-status);font-size:.7rem;">✓</span>' :
        '<span style="color:var(--red-status);font-size:.7rem;">✗</span>';
      return `<div class="search-result-row" data-search-idx="${i}">
        <div class="search-result-qtext">${statusDot} ${highlight(snippet, raw)}${snippet.length===130?'…':''}</div>
        <div class="search-result-meta">
          <span>📚 ${escapeHtml(fq.resourceName)}</span>
          <span>🧠 ${escapeHtml(fq.subject)}</span>
          <span>📖 ${escapeHtml(fq.testTitle)}</span>
          ${h && h.timesSeen ? `<span>Seen ${h.timesSeen}×</span>` : '<span>Never attempted</span>'}
        </div>
      </div>`;
    }).join('');

  // Store hits for click handler
  wrap._hits = hits;
  wrap.querySelectorAll('.search-result-row').forEach(row=>{
    row.onclick = ()=>{
      const fq = wrap._hits[parseInt(row.dataset.searchIdx,10)];
      if(!fq) return;
      // Pre-select this resource and navigate to practice
      practiceSetupState.resourceIds = new Set([fq.resourceId]);
      practiceSetupState.testIds = new Set([fq.testId]);
      practiceSetupState.subjects = new Set();
      practiceSetupState.pyqYears = new Set();
      closeModal();
      setTab('practice');
      showMiniToast('Filtered to that test — start practice!', 'success');
    };
  });
}

function openResetModal(){
  // Collect unique subjects & resources
  const subjects = [...new Set(APP.flatIndex.map(f=>f.subject))].sort();
  const resources = APP.resources.map(r=>({id:r.id, name:r.name}));

  const attempted = Object.keys(APP.historyMap).length;
  const sessions = APP.sessions.length;

  showModal(`
    <button class="settings-row" id="settings-back-row" style="margin-bottom:8px;">
      <span class="settings-row-icon"><i class="fa-solid fa-arrow-left"></i></span>
      <span class="settings-row-text"><b>Back to Settings</b></span>
    </button>
    <h3 style="margin:0 0 12px;">↺ Reset Progress</h3>
    <div class="danger-note">⚠ This deletes your practice history from this device. Questions are never removed.</div>

    <div style="font-size:.82rem;color:var(--muted);margin-bottom:14px;">
      ${attempted.toLocaleString()} question attempts · ${sessions} sessions on record
    </div>

    <div class="segmented" id="reset-scope-seg" style="margin-bottom:16px;">
      <button data-v="all" class="active">All progress</button>
      <button data-v="subject">By subject</button>
      <button data-v="resource">By resource</button>
    </div>

    <div id="reset-all-note" style="font-size:.85rem;margin-bottom:16px;">
      Clears <b>all</b> question history, session logs, and streak data.
    </div>

    <div id="reset-subject-wrap" class="hidden">
      <div style="font-size:.8rem;font-weight:600;margin-bottom:6px;">Select subjects to reset:</div>
      <div class="reset-subject-list">
        ${subjects.map(s=>`<label class="reset-subject-row"><input type="checkbox" value="${escapeHtml(s)}" style="accent-color:var(--red-status);"/> ${escapeHtml(s)}</label>`).join('')}
      </div>
    </div>

    <div id="reset-resource-wrap" class="hidden">
      <div style="font-size:.8rem;font-weight:600;margin-bottom:6px;">Select resources to reset:</div>
      <div class="reset-subject-list">
        ${resources.map(r=>`<label class="reset-subject-row"><input type="checkbox" value="${escapeHtml(r.id)}" style="accent-color:var(--red-status);"/> ${escapeHtml(r.name)}</label>`).join('')}
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px;">
      <button class="btn btn-ghost" id="reset-cancel">Cancel</button>
      <button class="btn btn-danger" id="reset-confirm">Reset</button>
    </div>
  `);

  document.getElementById('settings-back-row').onclick = ()=>openSettingsModal();
  document.getElementById('reset-cancel').onclick = closeModal;

  // Scope segmented
  let currentScope = 'all';
  document.getElementById('reset-scope-seg').onclick = e=>{
    const b = e.target.closest('button'); if(!b) return;
    currentScope = b.dataset.v;
    document.querySelectorAll('#reset-scope-seg button').forEach(btn=>btn.classList.toggle('active', btn.dataset.v===currentScope));
    document.getElementById('reset-all-note').classList.toggle('hidden', currentScope!=='all');
    document.getElementById('reset-subject-wrap').classList.toggle('hidden', currentScope!=='subject');
    document.getElementById('reset-resource-wrap').classList.toggle('hidden', currentScope!=='resource');
  };

  // ADDED: re-renders whatever's currently on screen after a reset (or its undo) so counts/charts
  // don't look stale.
  function refreshAfterReset(){
    if(APP.currentTab==='analytics') renderAnalytics();
    if(APP.currentTab==='home') renderHome();
    if(APP.currentTab==='bookmarks') renderBookmarksPage();
  }

  document.getElementById('reset-confirm').onclick = async ()=>{
    if(currentScope==='all'){
      if(!confirm('Delete ALL practice history? You will get a short window to undo right after.')) return;
      // ADDED: snapshot everything this scope touches, so it can be handed straight back to
      // showUndoToast() if the person taps Undo.
      const snapshot = {
        historyMap: JSON.parse(JSON.stringify(APP.historyMap)),
        sessions: JSON.parse(JSON.stringify(APP.sessions)),
        streak: JSON.parse(JSON.stringify(APP.streak)),
        activeSession: APP.activeSession ? JSON.parse(JSON.stringify(APP.activeSession)) : null
      };
      await idbClearStore('history');
      await idbClearStore('sessions');
      APP.historyMap = {};
      APP.sessions = [];
      APP.streak = {};
      lsSet(LS_STREAK, {});
      localStorage.removeItem(LS_ACTIVE_SESSION);
      APP.activeSession = null;
      closeModal();
      refreshAfterReset();
      showUndoToast('All progress cleared', async ()=>{
        for(const cid of Object.keys(snapshot.historyMap)) await idbPut('history', snapshot.historyMap[cid]);
        for(const s of snapshot.sessions) await idbPut('sessions', s);
        APP.historyMap = snapshot.historyMap;
        APP.sessions = snapshot.sessions;
        APP.streak = snapshot.streak;
        lsSet(LS_STREAK, snapshot.streak);
        APP.activeSession = snapshot.activeSession;
        if(snapshot.activeSession) lsSet(LS_ACTIVE_SESSION, snapshot.activeSession);
        else localStorage.removeItem(LS_ACTIVE_SESSION);
        refreshAfterReset();
      });

    } else if(currentScope==='subject'){
      const selected = [...document.querySelectorAll('#reset-subject-wrap input:checked')].map(i=>i.value);
      if(selected.length===0){ showMiniToast('Select at least one subject', 'error'); return; }
      const toDelete = APP.flatIndex.filter(f=>selected.includes(f.subject)).map(f=>f.compositeId);
      // ADDED: only snapshot entries that actually existed, so undo doesn't recreate empty history rows
      const snapshotEntries = toDelete.filter(cid=>APP.historyMap[cid]).map(cid=>[cid, JSON.parse(JSON.stringify(APP.historyMap[cid]))]);
      for(const cid of toDelete){
        delete APP.historyMap[cid];
        await idbDelete('history', cid);
      }
      // Remove sessions that were purely from these subjects (best-effort)
      closeModal();
      refreshAfterReset();
      showUndoToast(`Cleared history for ${selected.length} subject(s)`, async ()=>{
        for(const [cid, val] of snapshotEntries){ APP.historyMap[cid] = val; await idbPut('history', val); }
        refreshAfterReset();
      });

    } else if(currentScope==='resource'){
      const selected = new Set([...document.querySelectorAll('#reset-resource-wrap input:checked')].map(i=>i.value));
      if(selected.size===0){ showMiniToast('Select at least one resource', 'error'); return; }
      const toDelete = APP.flatIndex.filter(f=>selected.has(f.resourceId)).map(f=>f.compositeId);
      const snapshotEntries = toDelete.filter(cid=>APP.historyMap[cid]).map(cid=>[cid, JSON.parse(JSON.stringify(APP.historyMap[cid]))]);
      for(const cid of toDelete){
        delete APP.historyMap[cid];
        await idbDelete('history', cid);
      }
      closeModal();
      refreshAfterReset();
      showUndoToast(`Cleared history for ${selected.size} resource(s)`, async ()=>{
        for(const [cid, val] of snapshotEntries){ APP.historyMap[cid] = val; await idbPut('history', val); }
        refreshAfterReset();
      });
    }
  };
}

    <div style="font-size:.85rem;color:var(--muted);margin-bottom:14px;">
      This clears cached/temporary app files so you always see the latest version. Your resources, questions, history, sessions, streaks, profile, and bookmarks all stay exactly as they are.
    </div>
    <div class="card" style="padding:12px 14px;margin-bottom:16px;">
      <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:4px;">What stays on this device</div>
      <div id="storage-breakdown-cache"><div class="muted" style="font-size:.82rem;padding:6px 0;"><i class="fa-solid fa-spinner fa-spin" style="margin-right:6px;"></i>Reading storage…</div></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn btn-ghost" id="cache-clear-cancel">Cancel</button>
      <button class="btn btn-danger" id="cache-clear-confirm">Clear cache</button>
    </div>
  `);
  document.getElementById('settings-back-row').onclick = ()=>openSettingsModal();
  document.getElementById('cache-clear-cancel').onclick = closeModal;
  fillStorageBreakdown('storage-breakdown-cache', true);
  document.getElementById('cache-clear-confirm').onclick = async ()=>{
    // ADDED: each cleanup step is isolated — an unsupported/blocked API (common when the
    // Cache API or Service Workers aren't available, e.g. opening the file directly rather
    // than via a server) must not stop the other steps or the final reload.
    if('caches' in window && window.caches){
      try{
        const keys = await caches.keys();
        await Promise.all(keys.map(k=>caches.delete(k).catch(()=>{})));
      }catch(e){ console.warn('Cache API clear skipped', e); }
    }
    if('serviceWorker' in navigator){
      try{
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r=>r.unregister().catch(()=>{})));
      }catch(e){ console.warn('Service worker unregister skipped', e); }
    }
    showMiniToast('Cache cleared — reloading…', 'success');
    setTimeout(()=>{ location.reload(); }, 600);
  };
}

/* ============================================================
   ADDED: COMPLETE RESET (wipes everything — resources, history,
   settings, cache — as if the app were freshly installed)
   ============================================================ */
async function openCompleteResetModal(){
  showModal(`
    <button class="settings-row" id="settings-back-row" style="margin-bottom:8px;">
      <span class="settings-row-icon"><i class="fa-solid fa-arrow-left"></i></span>
      <span class="settings-row-text"><b>Back to Settings</b></span>
    </button>
    <h3 style="margin:0 0 12px;"><i class="fa-solid fa-triangle-exclamation" style="margin-right:8px;color:var(--red-status);"></i>Complete Reset</h3>
    <div class="danger-note">⚠ This permanently erases EVERYTHING on this device — all resources, questions, history, sessions, streaks, profile, bookmarks, and cached files. The app restarts as if freshly installed. This cannot be undone.</div>
    <div class="card" style="padding:12px 14px;margin-top:14px;">
      <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--red-status);margin-bottom:4px;">Exactly what will be erased</div>
      <div id="storage-breakdown-reset"><div class="muted" style="font-size:.82rem;padding:6px 0;"><i class="fa-solid fa-spinner fa-spin" style="margin-right:6px;"></i>Reading storage…</div></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px;">
      <button class="btn btn-ghost" id="full-reset-cancel">Cancel</button>
      <button class="btn btn-danger" id="full-reset-confirm">Erase everything</button>
    </div>
  `);
  document.getElementById('settings-back-row').onclick = ()=>openSettingsModal();
  document.getElementById('full-reset-cancel').onclick = closeModal;
  fillStorageBreakdown('storage-breakdown-reset', false);
  document.getElementById('full-reset-confirm').onclick = async ()=>{
    if(!confirm('Final check: erase ALL app data and start fresh? This cannot be undone.')) return;

    // ADDED: each cleanup step is isolated in its own try/catch so a browser that doesn't
    // support one API (e.g. indexedDB.databases(), or Cache/Service Worker on a file:// page)
    // still lets every other step — and the final reload — go through.
    try{ localStorage.clear(); }catch(e){ console.warn('localStorage clear failed', e); }

    // Close our own open IndexedDB connection first — otherwise deleteDatabase() just sits
    // in a "blocked" state (waiting on this very tab) and never actually deletes anything.
    try{
      const db = await dbReady;
      if(db) db.close();
    }catch(e){ /* ignore */ }

    try{
      if(window.indexedDB && indexedDB.databases){
        const dbs = await indexedDB.databases();
        await Promise.all(dbs.map(d=>new Promise(res=>{
          if(!d.name){ res(); return; }
          const req = indexedDB.deleteDatabase(d.name);
          req.onsuccess = ()=>res(); req.onerror = ()=>res(); req.onblocked = ()=>res();
        })));
      } else {
        await new Promise(res=>{
          const req = indexedDB.deleteDatabase(DB_NAME);
          req.onsuccess = ()=>res(); req.onerror = ()=>res(); req.onblocked = ()=>res();
        });
      }
    }catch(e){ console.warn('IndexedDB delete failed', e); }

    if('caches' in window && window.caches){
      try{
        const keys = await caches.keys();
        await Promise.all(keys.map(k=>caches.delete(k).catch(()=>{})));
      }catch(e){ console.warn('Cache API clear skipped', e); }
    }
    if('serviceWorker' in navigator){
      try{
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r=>r.unregister().catch(()=>{})));
      }catch(e){ console.warn('Service worker unregister skipped', e); }
    }

    location.reload();
  };
}

/* ============================================================
   ADDED: APP UPDATE — checks whether a newer version of the app is
   available (via the PWA service worker) and, if so, activates it and
   reloads. Keeps all user data untouched; this only refreshes the app
   shell/code itself, same as Clear Cache but framed as an explicit
   "check now" action with feedback (checking / up to date / updating).
   ============================================================ */
async function checkForAppUpdate(){
  const sub = document.getElementById('settings-app-update-sub');
  const arrow = document.getElementById('settings-app-update-arrow');
  const setSub = (text)=>{ if(sub) sub.textContent = text; };
  if(arrow) arrow.className = 'fa-solid fa-spinner fa-spin settings-row-arrow';
  setSub('Checking for updates…');

  if(!('serviceWorker' in navigator)){
    // No service worker support at all (e.g. some in-app browsers) — a hard reload is
    // the only thing that can fetch newer files, so just do that.
    setSub('Reloading to fetch the latest version…');
    setTimeout(()=>location.reload(), 500);
    return;
  }

  try{
    const reg = await navigator.serviceWorker.getRegistration();
    if(!reg){
      // Not running under a registered service worker (e.g. opened directly as a file) —
      // nothing to check; a reload picks up whatever's newest on disk/server.
      setSub('Reloading to fetch the latest version…');
      setTimeout(()=>location.reload(), 500);
      return;
    }

    await reg.update(); // forces the browser to re-fetch service-worker.js and compare against the installed one

    // If an update was found, the browser starts installing it in the background as
    // reg.installing; wait for that to finish so we know whether it ended up waiting to activate.
    if(reg.installing){
      await new Promise(res=>{
        const sw = reg.installing;
        const onChange = ()=>{
          if(sw.state === 'installed' || sw.state === 'redundant'){ sw.removeEventListener('statechange', onChange); res(); }
        };
        sw.addEventListener('statechange', onChange);
        setTimeout(res, 8000); // don't hang forever if something stalls
      });
    }

    if(reg.waiting){
      setSub('Update found — installing…');
      showMiniToast('Update found — installing…', 'success');
      let reloaded = false;
      const doReload = ()=>{ if(reloaded) return; reloaded = true; location.reload(); };
      navigator.serviceWorker.addEventListener('controllerchange', doReload, { once:true });
      try{ reg.waiting.postMessage({ type:'SKIP_WAITING' }); }catch(e){ /* older service-worker.js may not listen for this — that's fine */ }
      setTimeout(doReload, 2500); // fallback in case the SW never confirms the swap
    } else {
      setSub("You're on the latest version ✓");
      showMiniToast("You're on the latest version", 'success');
      if(arrow) arrow.className = 'fa-solid fa-chevron-right settings-row-arrow';
    }
  }catch(e){
    console.warn('App update check failed', e);
    setSub('Could not check for updates — tap to try again');
    showMiniToast('Could not check for updates', 'error');
    if(arrow) arrow.className = 'fa-solid fa-chevron-right settings-row-arrow';
  }
}
