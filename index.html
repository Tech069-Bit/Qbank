/* — ADDED: Flashcard Decks entry card — replaces the old standalone navtab; sits below
   Recent sessions on the Flashcards launch screen as the way into the deck library. */
.fc-decks-card {
  width: 100%;
  max-width: 560px;
  margin: 22px auto 0;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  border-radius: 14px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);

  text-align: left;

  color: var(--text);

.fc-decks-card-icon {

  height: 44px;
  border-radius: 12px;

.fc-decks-card-text {

/* ============================================================
   ADDED: roaming "critter" easter egg — a small cat/dog/mouse that
   continuously wanders across free/blank screen space, starting 5s
   after load. Skipped automatically while an actual question is on
   screen (see JS gating).
   ============================================================ */
.critter-pet {
  position: fixed;
  z-index: 65; /* CHANGED: above the flashcard full-screen overlay (60) so the pet can still cheer during flashcard practice; still below modals (100) */
  font-size: calc(2.1rem * var(--pet-size-scale, 1) * var(--pet-item-scale, 1)); /* CHANGED: scales with the global "Pet size" slider AND (for imports) that image's own slider */
  line-height: 1;
  /* CHANGED: was 'none' — the pet is now tappable (see initCritterTapInteraction()), so taps
     land on it instead of falling through to whatever's underneath. */
  pointer-events: auto;
  cursor: pointer;
  user-select: none;
  filter: drop-shadow(0 3px 4px rgba(0,0,0,.25));
  opacity: 0;
}
.critter-pet.critter-show {
  animation: critterFadeIn .4s ease forwards;
}
.critter-pet.critter-hide {
  animation: critterFadeOut .35s ease forwards;
}
@keyframes critterFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes critterFadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}
/* Running: travels horizontally across the viewport at whatever height JS assigns via
   inline `top`, with a little vertical bob per "step" */
.critter-pet.critter-run {
  animation: critterFadeIn .4s ease forwards, critterRun var(--critter-run-dur, 8s) linear forwards, critterBob .3s ease-in-out infinite;
}
.critter-pet.critter-run.critter-run-rtl {
  animation: critterFadeIn .4s ease forwards, critterRunRtl var(--critter-run-dur, 8s) linear forwards, critterBob .3s ease-in-out infinite;
}
@keyframes critterRun {
  from { left: -48px; transform: scaleX(1); }
  to   { left: calc(100vw + 48px); transform: scaleX(1); }
}
@keyframes critterRunRtl {
  from { left: calc(100vw + 48px); transform: scaleX(-1); }
  to   { left: -48px; transform: scaleX(-1); }
}
@keyframes critterBob {
  0%, 100% { margin-top: 0; }
  50% { margin-top: -5px; }
}
/* Sitting: parks itself in a corner and does a slow idle sway */
.critter-pet.critter-sit {
  animation: critterFadeIn .4s ease forwards, critterSway 1.8s ease-in-out infinite;
}
@keyframes critterSway {
  0%, 100% { transform: rotate(-4deg); }
  50% { transform: rotate(4deg); }
}
/* ADDED: brief "happy" reaction when a sitting/cheering pet is tapped (see
   initCritterTapInteraction()) — temporarily replaces the idle sway with an excited hop,
   then the tap-happy class is removed and the normal sway resumes on its own. Placed after
   .critter-sit in the stylesheet so it wins the animation-property tie while both classes
   are present. */
.critter-pet.critter-tap-happy {
  animation: critterFadeIn .4s ease forwards, critterHappyBounce .55s ease-in-out;
}
@keyframes critterHappyBounce {
  0% { transform: scale(1) translateY(0) rotate(0); }
  25% { transform: scale(1.28) translateY(-16px) rotate(-10deg); }
  50% { transform: scale(1.12) translateY(-4px) rotate(9deg); }
  75% { transform: scale(1.2) translateY(-11px) rotate(-6deg); }
  100% { transform: scale(1) translateY(0) rotate(0); }
}
@media (max-width: 640px) {
  .critter-pet {
    font-size: calc(1.7rem * var(--pet-size-scale, 1) * var(--pet-item-scale, 1));
  }
}
/* ADDED: sizing for a user-imported custom pet image, scales with the same
   font-size the emoji critter would use (including the mobile media query above)
   since em is relative to the inherited font-size on .critter-pet. */
.critter-pet img {
  width: 1em;
  height: 1em;
  object-fit: contain;
  display: block;
  pointer-events: none;
  user-select: none;
}
/* ADDED: small motivating speech bubble that pops up above (or below, if too close
   to the top nav) a critter pet — used for the cheer-during-quiz mode and sometimes
   just when the pet is idly sitting around elsewhere in the app. */
.critter-speech {
  position: fixed;
  z-index: 66; /* CHANGED: stays just above .critter-pet (65), which now sits above the flashcard full-screen overlay (60) */
  max-width: calc(140px * var(--pet-size-scale, 1) * var(--pet-item-scale, 1)); /* CHANGED: the bubble grows/shrinks along with the pet itself */
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 5px 9px;
  font-size: calc(.72rem * var(--pet-size-scale, 1) * var(--pet-item-scale, 1)); /* CHANGED: scales with the "Pet size" slider(s) */
  font-weight: 700;
  line-height: 1.25;
  color: var(--text);
  box-shadow: var(--shadow-md);
  text-align: center;
  pointer-events: none;
  user-select: none;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity .25s ease, transform .25s ease;
}
.critter-speech.critter-speech-show {
  opacity: 1;
  transform: translateY(0);
}
@media (max-width: 640px) {
  .critter-speech {
    max-width: calc(110px * var(--pet-size-scale, 1) * var(--pet-item-scale, 1));
    font-size: calc(.68rem * var(--pet-size-scale, 1) * var(--pet-item-scale, 1));
    padding: 4px 7px;
  }
}
/* Quiz-safe "cheer" mode: while a live question is on screen, the pet is still allowed
   to show up, but only parked quietly in a corner (never running across the screen) so
   it can't ever cover the question or answer options. */
.critter-pet.critter-quiz {
  animation: critterFadeIn .4s ease forwards, critterSway 2.2s ease-in-out infinite;
  font-size: calc(1.6rem * var(--pet-size-scale, 1) * var(--pet-item-scale, 1));
}
@media (max-width: 640px) {
  .critter-pet.critter-quiz {
    font-size: calc(1.3rem * var(--pet-size-scale, 1) * var(--pet-item-scale, 1));
  }
}
/* ============================================================
   ADDED: motivating "companion" character — a small random male/female
   avatar + speech bubble that pops up right beside notifications (toasts,
   mini-toasts, import summary) so it feels like someone's there cheering
   you on, not just a bare notification.
   ============================================================ */
.companion-bubble {
  position: fixed;
  z-index: 220; /* above mini-toasts (210) and the plain toast (200) so it reads as "in front of" the notification */
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: 320px;
  pointer-events: none;
  opacity: 0;
  transform: scale(.92);
  transition: opacity .22s ease, transform .22s ease;
}
.companion-bubble.companion-show {
  opacity: 1;
  transform: scale(1);
}
.companion-bubble.companion-hide {
  opacity: 0;
  transform: scale(.92);
}
.companion-bubble.companion-tail-right {
  flex-direction: row-reverse;
}
.companion-avatar {
  width: calc(52px * var(--companion-size-scale, 1) * var(--companion-item-scale, 1)); /* CHANGED: scales with the global "Companion size" slider AND (for imports) that image's own slider */
  height: calc(52px * var(--companion-size-scale, 1) * var(--companion-item-scale, 1));
  border-radius: 50%;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(1.6rem * var(--companion-size-scale, 1) * var(--companion-item-scale, 1));
  box-shadow: var(--shadow-md);
  flex-shrink: 0;
  position: relative; /* ADDED: anchors the little name tag + lets us position floating hearts on pat */
  cursor: pointer; /* ADDED: hints the avatar is pettable */
  animation: companion-idle-3d 5s ease-in-out infinite; /* CHANGED: pseudo-3D idle (perspective tilt on two axes) instead of a flat 2D bob, so Dr.KC reads as a little floating figure rather than a sticker */
  transform-style: preserve-3d;
  pointer-events: auto; /* ADDED: bubble wrapper is pointer-events:none, but the avatar itself still needs to catch pat clicks */
  transition: transform .15s ease;
}
.companion-avatar:active {
  transform: perspective(500px) rotateX(16deg) scale(.9); /* CHANGED: "pressed into the screen" 3D squish instead of a flat scale-down */
}
/* CHANGED: pseudo-3D idle — combines a gentle float with rotateY/rotateX so the
   avatar looks like it's turning/leaning in space rather than just moving up-down.
   Real 3D would need an actual model; perspective()+rotateX/Y on a flat emoji is the
   practical way to fake that depth with zero new assets. */
@keyframes companion-idle-3d {
  0%   { transform: perspective(600px) rotateY(0deg) rotateX(0deg) translateY(0); }
  25%  { transform: perspective(600px) rotateY(10deg) rotateX(3deg) translateY(-3px); }
  50%  { transform: perspective(600px) rotateY(0deg) rotateX(-2deg) translateY(-5px); }
  75%  { transform: perspective(600px) rotateY(-10deg) rotateX(3deg) translateY(-2px); }
  100% { transform: perspective(600px) rotateY(0deg) rotateX(0deg) translateY(0); }
}
/* ADDED: temporary "pose" animations layered on top of the idle loop for activity/
   reactions — a compound selector (two classes) naturally out-specifies the plain
   .companion-avatar/.home-companion-avatar idle rule, so no !important needed; JS
   adds/removes these classes (see companionAvatarPlayPose() further down). */
@keyframes companion-pose-celebrate {
  0%   { transform: perspective(500px) rotateY(0) rotateX(0) scale(1); }
  20%  { transform: perspective(500px) rotateY(-18deg) rotateX(-8deg) scale(1.18); }
  40%  { transform: perspective(500px) rotateY(18deg) rotateX(6deg) scale(1.12); }
  60%  { transform: perspective(500px) rotateY(-10deg) rotateX(-4deg) scale(1.15); }
  80%  { transform: perspective(500px) rotateY(6deg) rotateX(2deg) scale(1.05); }
  100% { transform: perspective(500px) rotateY(0) rotateX(0) scale(1); }
}
@keyframes companion-pose-sad {
  0%   { transform: perspective(500px) rotateX(0) translateY(0); }
  30%  { transform: perspective(500px) rotateX(14deg) translateY(4px) scale(.94); }
  100% { transform: perspective(500px) rotateX(0) translateY(0); }
}
@keyframes companion-pose-think {
  0%   { transform: perspective(500px) rotateZ(0) rotateY(0); }
  50%  { transform: perspective(500px) rotateZ(-8deg) rotateY(-14deg) translateY(-2px); }
  100% { transform: perspective(500px) rotateZ(0) rotateY(0); }
}
@keyframes companion-pose-wave {
  0%   { transform: perspective(500px) rotateZ(0) rotateY(0) translateY(0); }
  20%  { transform: perspective(500px) rotateZ(8deg) rotateY(14deg) translateY(-4px); }
  40%  { transform: perspective(500px) rotateZ(-6deg) rotateY(-10deg) translateY(-3px); }
  60%  { transform: perspective(500px) rotateZ(6deg) rotateY(8deg) translateY(-4px); }
  100% { transform: perspective(500px) rotateZ(0) rotateY(0) translateY(0); }
}
.companion-avatar.companion-pose-celebrate,
.home-companion-avatar.companion-pose-celebrate {
  animation: companion-pose-celebrate 900ms ease-in-out;
}
.companion-avatar.companion-pose-sad,
.home-companion-avatar.companion-pose-sad {
  animation: companion-pose-sad 900ms ease-in-out;
  filter: saturate(.7) brightness(.95);
}
.companion-avatar.companion-pose-think,
.home-companion-avatar.companion-pose-think {
  animation: companion-pose-think 1100ms ease-in-out;
}
.companion-avatar.companion-pose-wave,
.home-companion-avatar.companion-pose-wave {
  animation: companion-pose-wave 1.3s ease-in-out;
}
/* ADDED: cute little "Dr.KC" name tag that floats on the avatar's badge corner everywhere it appears */
.companion-name-tag {
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #ff8fb1, #ff6f9c);
  color: #fff;
  font-size: .58rem;
  font-weight: 800;
  letter-spacing: .02em;
  padding: 1px 7px;
  border-radius: 999px;
  box-shadow: 0 1px 3px rgba(0,0,0,.25);
  white-space: nowrap;
  pointer-events: none;
  z-index: 1;
}
/* ADDED: floating heart burst shown briefly when the person "pets" (taps) Dr.KC's avatar */
.companion-pat-heart {
  position: fixed;
  z-index: 300;
  pointer-events: none;
  font-size: 1.1rem;
  animation: companion-heart-float 900ms ease-out forwards;
}
@keyframes companion-heart-float {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(.6); }
  15% { transform: translate(-50%, -60%) scale(1.15); }
  100% { opacity: 0; transform: translate(calc(-50% + var(--heart-drift, 0px)), -140%) scale(.9) rotate(var(--heart-spin, 12deg)); }
}
.companion-speech {
  position: relative;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 11px 16px;
  font-size: calc(.92rem * var(--companion-size-scale, 1)); /* CHANGED: the companion's message text grows/shrinks along with it (global slider only — an imported avatar's own slider only resizes that avatar, not the shared speech text) */
  font-weight: 700;
  line-height: 1.35;
  color: var(--text);
  box-shadow: var(--shadow-md);
}
/* ADDED: small "Dr.KC" signature line under the companion's speech text */
.companion-signature {
  display: block;
  margin-top: 3px;
  font-size: .7em;
  font-weight: 700;
  opacity: .6;
  letter-spacing: .01em;
}
.companion-tail-left .companion-speech::after {
  content: '';
  position: absolute;
  top: 50%;
  left: -5px;
  transform: translateY(-50%);
  border-width: 5px 5px 5px 0;
  border-style: solid;
  border-color: transparent var(--card-bg) transparent transparent;
  filter: drop-shadow(-1px 0 0 var(--card-border));
}
.companion-tail-right .companion-speech::after {
  content: '';
  position: absolute;
  top: 50%;
  right: -5px;
  transform: translateY(-50%);
  border-width: 5px 0 5px 5px;
  border-style: solid;
  border-color: transparent transparent transparent var(--card-bg);
  filter: drop-shadow(1px 0 0 var(--card-border));
}
@media (max-width: 640px) {
  .companion-bubble {
    max-width: 240px;
  }
  .companion-speech {
    font-size: calc(.85rem * var(--companion-size-scale, 1));
  }
}
/* ============================================================
   ADDED: "3D emoji reaction" — a big glossy 3D-style emoji (thumbs-up, laughing,
   angry, etc — see COMPANION_REACTIONS in JS) that pops in near the companion with a
   springy tumble-and-settle animation, hangs for a moment, then floats off. Uses real
   3D-rendered emoji PNGs from a public CDN (Microsoft Fluent 3D emoji set) with the
   plain unicode glyph as an automatic fallback (styled to still look glossy/dimensional
   via drop-shadow) if the image can't load — see spawnCompanionReaction() in JS.
   ============================================================ */
.companion-reaction {
  position: fixed;
  z-index: 310;
  pointer-events: none;
  width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.6rem;
  line-height: 1;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,.28));
  animation: companion-reaction-pop 1.9s cubic-bezier(.22,1.4,.36,1) forwards;
  transform-style: preserve-3d;
}
.companion-reaction img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  -webkit-user-drag: none;
}
/* Springy tumble in (slight 3D-ish rotation on two axes), a brief idle wobble while it
   "reacts", then a gentle float-up-and-fade exit. */
@keyframes companion-reaction-pop {
  0%   { opacity: 0; transform: translate(-50%,-40%) scale(.2) rotate(-35deg); }
  12%  { opacity: 1; transform: translate(-50%,-55%) scale(1.25) rotate(8deg); }
  20%  { transform: translate(-50%,-52%) scale(1) rotate(-6deg); }
  28%  { transform: translate(-50%,-54%) scale(1.08) rotate(4deg); }
  36%  { transform: translate(-50%,-52%) scale(1) rotate(0deg); }
  75%  { opacity: 1; transform: translate(-50%,-58%) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translate(-50%,-95%) scale(.85) rotate(6deg); }
}
@media (prefers-reduced-motion: reduce) {
  .companion-reaction { animation: none; opacity: .95; transform: translate(-50%,-70%); }
}
/* ============================================================
   ADDED: Home screen companion card — a persistent (not auto-dismissing)
   version of the companion that greets you on Home with a contextual,
   motivating tip (practice reminders, mistakes to review, due flashcards,
   bookmarks waiting, or help building your first question bank) plus a
   one-tap action button to go do it.
   ============================================================ */
.home-companion-card {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 18px 20px;
  margin-bottom: 18px;
}
.home-companion-avatar {
  width: calc(76px * var(--companion-size-scale, 1) * var(--companion-item-scale, 1)); /* CHANGED: scales with the "Companion size" slider(s) */
  height: calc(76px * var(--companion-size-scale, 1) * var(--companion-item-scale, 1));
  border-radius: 50%;
  background: color-mix(in srgb, var(--accent) 14%, transparent);
  border: 1px solid var(--card-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(2.2rem * var(--companion-size-scale, 1) * var(--companion-item-scale, 1));
  flex-shrink: 0;
  position: relative; /* ADDED: anchors the "Dr.KC" name tag + pat-heart origin */
  cursor: pointer; /* ADDED: hints the avatar is pettable */
  animation: companion-idle-3d 5s ease-in-out infinite; /* CHANGED: pseudo-3D idle (perspective tilt) instead of a flat bob */
  transform-style: preserve-3d;
  margin-bottom: 8px; /* ADDED: breathing room so the name tag badge doesn't crowd the card edge */
  transition: transform .15s ease;
}
.home-companion-avatar:active {
  transform: perspective(500px) rotateX(16deg) scale(.9); /* CHANGED: "pressed into the screen" 3D squish */
}
/* ADDED: a soft pulsing floor-shadow beneath the avatar — grows/shrinks opposite the
   idle float so the character reads as hovering above a surface rather than just
   sliding around on a flat sticker. Sits behind the avatar (z-index -1) so it never
   covers the name tag or intercepts taps. */
.home-companion-avatar::after {
  content: '';
  position: absolute;
  left: 50%;
  bottom: -12px;
  width: 60%;
  height: 9px;
  background: radial-gradient(ellipse at center, rgba(0,0,0,.3) 0%, rgba(0,0,0,0) 72%);
  transform: translateX(-50%) scaleX(1);
  border-radius: 50%;
  z-index: -1;
  pointer-events: none;
  animation: companion-shadow-pulse 5s ease-in-out infinite;
}
@keyframes companion-shadow-pulse {
  0%, 100% { transform: translateX(-50%) scaleX(1); opacity: .55; }
  50% { transform: translateX(-50%) scaleX(.7); opacity: .28; }
}
.home-companion-body {
  flex: 1;
  min-width: 0;
}
.home-companion-text {
  font-size: calc(.92rem * var(--companion-size-scale, 1)); /* CHANGED: the greeting text grows/shrinks along with the avatar */
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 10px;
}
.home-companion-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
@media (max-width: 640px) {
  .home-companion-card {
    padding: 15px 17px;
  }
  .home-companion-avatar {
    width: calc(60px * var(--companion-size-scale, 1) * var(--companion-item-scale, 1));
    height: calc(60px * var(--companion-size-scale, 1) * var(--companion-item-scale, 1));
    font-size: calc(1.7rem * var(--companion-size-scale, 1) * var(--companion-item-scale, 1));
  }
  .home-companion-text {
    font-size: calc(.86rem * var(--companion-size-scale, 1));
  }
}
/* ADDED: sizing for a user-imported custom companion avatar image — the circular
   containers (.companion-avatar / .home-companion-avatar) already have a fixed
   width/height, so the image just needs to fill that circle. */
.companion-avatar img,
.home-companion-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  display: block;
  pointer-events: none;
  user-select: none;
}
/* ADDED: shared "import a custom image" control used in both the Pet and Companion
   settings sub-modals — a file button plus a small round preview + remove button. */
.custom-img-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border: 1px dashed var(--card-border);
  border-radius: 10px;
  margin-bottom: 4px;
}
.custom-img-preview {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--card-border);
  flex-shrink: 0;
  background: var(--card-bg);
}
.custom-img-placeholder {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--card-border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted-text, #888);
  font-size: 1rem;
  background: var(--card-bg);
}
.custom-img-info {
  flex: 1;
  min-width: 0;
  font-size: .74rem;
  line-height: 1.35;
}
/* ADDED: live size preview + slider, shown in the Pet and Companion settings
   sub-modals right below the "Import my own ..." section. The preview pieces
   reuse the SAME --pet-size-scale / --companion-size-scale CSS variables as the
   real on-screen pet/companion, so dragging the slider (which updates that
   variable immediately) resizes this preview and the live pet/companion at
   the same time, with no extra JS needed to keep them in sync. */
.size-preview-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border: 1px dashed var(--card-border);
  border-radius: 10px;
  margin-bottom: 10px;
  background: var(--bg-elev);
  min-height: 76px;
}
.size-preview-stage {
  width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.size-preview-pet {
  font-size: calc(2.1rem * var(--pet-size-scale, 1));
  line-height: 1;
  filter: drop-shadow(0 3px 4px rgba(0,0,0,.25));
  user-select: none;
}
.size-preview-pet img {
  width: 1em;
  height: 1em;
  object-fit: contain;
  display: block;
}
.size-preview-bubble {
  position: relative;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 6px 11px;
  font-size: calc(.78rem * var(--pet-size-scale, 1));
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.size-preview-avatar {
  width: calc(52px * var(--companion-size-scale, 1));
  height: calc(52px * var(--companion-size-scale, 1));
  border-radius: 50%;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(1.6rem * var(--companion-size-scale, 1));
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
  user-select: none;
}
.size-preview-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  display: block;
}
.size-preview-bubble-companion {
  position: relative;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 9px 14px;
  font-size: calc(.92rem * var(--companion-size-scale, 1));
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.size-slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 10px;
}
.size-slider-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 5px;
  border-radius: 3px;
  background: var(--track);
  outline: none;
  cursor: pointer;
}
.size-slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--card-bg);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}
.size-slider-row input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--card-bg);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}
.size-slider-value {
  width: 42px;
  text-align: right;
  font-size: .78rem;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
}
.size-slider-reset {
  flex-shrink: 0;
}
/* ADDED: compact per-imported-image size row — sits directly under each imported
   pet/companion's toggle row in the "Which pets can appear" / "Avatar pool" lists,
   so every import gets its own independent size slider (on top of the global Pet
   size / Companion size sliders above). Its tiny live preview (image sized via em,
   same trick as the big preview) updates instantly as the slider is dragged. */
.custom-item-size-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px 10px 44px;
  margin-top: -6px;
  margin-bottom: 4px;
}
.custom-item-size-preview {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 1.3rem;
  line-height: 1;
  overflow: visible;
}
.custom-item-size-preview img {
  width: 1em;
  height: 1em;
  object-fit: contain;
  display: block;
  border-radius: 50%;
}
.custom-item-size-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--track);
  outline: none;
  cursor: pointer;
}
.custom-item-size-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--card-bg);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}
.custom-item-size-row input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--card-bg);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}
.custom-item-size-row .size-slider-value {
  width: 36px;
  font-size: .72rem;
}
/* ============================================================
   ADDED: new toast/mini-toast design — the character bubble now IS the
   notification (replaces the old plain grey pill / icon+text pill).
   ============================================================ */
.toast-companion-bottom {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 20px;
  z-index: 200;
  display: flex;
  justify-content: center;
  pointer-events: none;
}
.toast-companion-bottom .companion-bubble-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: min(400px, 90vw);
  opacity: 0;
  transform: scale(.9) translateY(6px);
  transition: opacity .22s ease, transform .22s ease;
}
.toast-companion-bottom.companion-show .companion-bubble-inner {
  opacity: 1;
  transform: scale(1) translateY(0);
}
.toast-companion-bottom.companion-hide .companion-bubble-inner {
  opacity: 0;
  transform: scale(.9) translateY(6px);
}
.mini-toast-companion {
  display: flex;
  align-items: center;
  gap: 8px;
  animation: miniToastIn .18s ease-out;
  pointer-events: auto;
}
.mini-toast-companion.leaving {
  animation: miniToastOut .18s ease-in forwards;
}
.mini-toast-companion .companion-speech {
  max-width: 250px;
}
.mini-toast-companion.success .companion-speech {
  border-color: color-mix(in srgb, var(--green-status) 45%, var(--card-border));
}
.mini-toast-companion.success .companion-speech::after {
  border-color: transparent color-mix(in srgb, var(--green-status) 12%, var(--card-bg)) transparent transparent;
}
.mini-toast-companion.success .companion-speech {
  background: color-mix(in srgb, var(--green-status) 12%, var(--card-bg));
  color: var(--green-status);
}
.mini-toast-companion.error .companion-speech {
  border-color: color-mix(in srgb, var(--red-status, #e5484d) 45%, var(--card-border));
  background: color-mix(in srgb, var(--red-status, #e5484d) 12%, var(--card-bg));
  color: var(--red-status, #e5484d);
}
@media (max-width: 640px) {
  .mini-toast-companion .companion-speech,
  .toast-companion-bottom .companion-speech {
    font-size: .7rem;
  }
}
</style>

<!-- ADDED: thin animated ECG line under the nav bar — a small signature touch tying the
     app back to its "vitals/qbank" identity. Purely decorative: no ids, no JS hooks. -->
<div class="ecg-strip" aria-hidden="true">
  <svg class="ecg-strip-svg" viewBox="0 0 900 28" preserveAspectRatio="none">
    <defs>
      <!-- ADDED: soft glow so the moving comet reads like a lit pulse, not a flat line -->
      <filter id="ecgGlow" x="-60%" y="-300%" width="220%" height="700%">
        <feGaussianBlur stdDeviation="1.6" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <!-- ADDED: a rounder, more concentrated glow for the tip bulb — the line's glow
           filter is stretched tall/thin for a horizontal stroke, which looks wrong on

/* ============================================================
   IndexedDB layer
   ============================================================ */
const DB_NAME = 'qbank_local_db_v1';
const DB_VERSION = 3;
let STORAGE_AVAILABLE = true;
function openDB(){
  return new Promise((resolve,reject)=>{
    if(typeof indexedDB === 'undefined'){ reject(new Error('IndexedDB not available')); return; }
    let req;
    try{ req = indexedDB.open(DB_NAME, DB_VERSION); }catch(e){ reject(e); return; }
    req.onupgradeneeded = (e)=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains('resources')) db.createObjectStore('resources',{keyPath:'id'});
      if(!db.objectStoreNames.contains('history')) db.createObjectStore('history',{keyPath:'qid'});
      if(!db.objectStoreNames.contains('sessions')) db.createObjectStore('sessions',{keyPath:'id'});
      // ADDED: stores the actual media Blob for each filename in an imported .apkg deck, so a later
      // "download as .apkg" can bundle real files instead of the session-only blob: URLs used for on-screen display.
      if(!db.objectStoreNames.contains('media')){
        const mediaStore = db.createObjectStore('media',{keyPath:'id'});
        mediaStore.createIndex('resourceId','resourceId',{unique:false});
      }
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
const dbReady = openDB().catch(err=>{
  STORAGE_AVAILABLE = false;
  console.warn('Local database unavailable — data will not persist between visits.', err);
  return null;
});
function idbPut(store,val){
  return dbReady.then(db=>{
    if(!db) return false;
    return new Promise((res)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).put(val); tx.oncomplete=()=>res(true); tx.onerror=()=>res(false); });
  });
}
function idbGetAll(store){
  return dbReady.then(db=>{
    if(!db) return [];
    return new Promise((res)=>{ const tx=db.transaction(store,'readonly'); const rq=tx.objectStore(store).getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>res([]); });
  });
}
// ADDED: fetch all records from `store` whose `indexName` field equals `value` (e.g. all media rows for one resourceId)
function idbGetByIndex(store, indexName, value){
  return dbReady.then(db=>{
    if(!db) return [];
    return new Promise((res)=>{
      try{
        const tx = db.transaction(store,'readonly');
        const idx = tx.objectStore(store).index(indexName);
        const rq = idx.getAll(value);
        rq.onsuccess = ()=>res(rq.result||[]);
        rq.onerror = ()=>res([]);
      }catch(e){ res([]); }
    });
  });
}
function idbDelete(store,key){
  return dbReady.then(db=>{
    if(!db) return false;
    return new Promise((res)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).delete(key); tx.oncomplete=()=>res(true); tx.onerror=()=>res(false); });
  });
}
// ADDED: delete every record in `store` whose `indexName` field equals `value` (used to clean up a deck's stored media on delete)
function idbDeleteByIndex(store, indexName, value){
  return dbReady.then(db=>{
    if(!db) return false;
    return new Promise((res)=>{
      try{
        const tx = db.transaction(store,'readwrite');
        const objStore = tx.objectStore(store);
        const idx = objStore.index(indexName);
        const rq = idx.openCursor(IDBKeyRange.only(value));
        rq.onsuccess = (e)=>{
          const cursor = e.target.result;
          if(cursor){ cursor.delete(); cursor.continue(); }
        };
        tx.oncomplete = ()=>res(true);
        tx.onerror = ()=>res(false);
      }catch(e){ res(false); }
    });
  });
}
function idbClearStore(store){
  return dbReady.then(db=>{
    if(!db) return false;
    return new Promise((res)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).clear(); tx.oncomplete=()=>res(true); tx.onerror=()=>res(false); });
  });
}

/* ============================================================
   ADDED: STORAGE BREAKDOWN — a plain-language inventory of what's
   actually saved on this device, and roughly how big it is. Used by
   the Clear Cache and Complete Reset screens so a user can see what
   they're keeping / erasing *before* they confirm, not just take it
   on faith from the warning text.
   ============================================================ */
function formatBytesHuman(n){
  if(!n || n < 1) return '0 KB';
  const units = ['B','KB','MB','GB'];
  let i = 0; let v = n;
  while(v >= 1024 && i < units.length-1){ v /= 1024; i++; }
  return (i===0 ? Math.round(v) : v.toFixed(v<10?2:1)) + ' ' + units[i];
}
async function computeStorageBreakdown(){
  // --- localStorage: every key this app writes, with its serialized size ---
  let lsBytes = 0, lsCount = 0;
  try{
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      const v = localStorage.getItem(k) || '';
      lsBytes += (k.length + v.length) * 2; // UTF-16 ~2 bytes/char, close enough for an estimate
      lsCount++;
    }
  }catch(e){ /* localStorage unavailable */ }

  // --- IndexedDB: record counts per store, plus actual bytes for media blobs ---
  const [resources, history, sessions, media] = await Promise.all([
    idbGetAll('resources'), idbGetAll('history'), idbGetAll('sessions'), idbGetAll('media')
  ]).catch(()=>[[],[],[],[]]);
  let mediaBytes = 0;
  (media||[]).forEach(m=>{ if(m && m.blob && typeof m.blob.size === 'number') mediaBytes += m.blob.size; });

  // --- Cache Storage (PWA offline shell files) + overall quota estimate, where supported ---
  let cacheEntryCount = 0;
  if('caches' in window && window.caches){
    try{
      const keys = await caches.keys();
      for(const k of keys){
        try{ const c = await caches.open(k); const reqs = await c.keys(); cacheEntryCount += reqs.length; }catch(e){}
      }
    }catch(e){ /* Cache API unavailable */ }
  }
  let quotaEstimate = null;
  if(navigator.storage && navigator.storage.estimate){
    try{ quotaEstimate = await navigator.storage.estimate(); }catch(e){ /* not supported here */ }
  }

  return {
    localStorage: { count: lsCount, bytes: lsBytes },
    resources: (resources||[]).length,
    history: (history||[]).length,
    sessions: (sessions||[]).length,
    media: { count: (media||[]).length, bytes: mediaBytes },
    cacheEntryCount,
    quotaEstimate // {usage, quota} in bytes, or null if the browser can't report it
  };
}
// ADDED: renders the breakdown above as a small read-only list, reused by both the
// Clear Cache and Complete Reset screens (see `kept` — true shows "stays as-is" framing,
// false shows "will be erased" framing).
function renderStorageBreakdownRows(b, kept){
  const rows = [
    ['fa-folder-open', 'Resources (question banks / decks)', `${b.resources} item${b.resources===1?'':'s'}`],
    ['fa-clock-rotate-left', 'Answered-question history', `${b.history} record${b.history===1?'':'s'}`],
    ['fa-layer-group', 'Saved quiz sessions', `${b.sessions} session${b.sessions===1?'':'s'}`],
    ['fa-photo-film', 'Imported media (images/audio)', `${b.media.count} file${b.media.count===1?'':'s'} · ${formatBytesHuman(b.media.bytes)}`],
    ['fa-sliders', 'Settings, streaks, profile, bookmarks', `${b.localStorage.count} key${b.localStorage.count===1?'':'s'} · ${formatBytesHuman(b.localStorage.bytes)}`],
  ];
  if(!kept){
    rows.push(['fa-broom', 'Cached/offline app files', `${b.cacheEntryCount} file${b.cacheEntryCount===1?'':'s'}`]);
  }
  let html = rows.map(([icon,label,val])=>`
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--card-border);font-size:.82rem;">
      <span style="display:flex;align-items:center;gap:8px;color:var(--text);"><i class="fa-solid ${icon}" style="width:16px;text-align:center;color:var(--muted);"></i>${label}</span>
      <span class="muted" style="white-space:nowrap;">${val}</span>
    </div>`).join('');
  if(b.quotaEstimate && typeof b.quotaEstimate.usage === 'number'){
    html += `<div style="margin-top:8px;font-size:.76rem;color:var(--muted);">Total on-device storage in use: ~${formatBytesHuman(b.quotaEstimate.usage)}${b.quotaEstimate.quota ? ' of ~'+formatBytesHuman(b.quotaEstimate.quota)+' available' : ''}.</div>`;
  }
  return html;
}
// ADDED: fills a placeholder element (by id) with the live breakdown once computed —
// used so the modal can render instantly with a "Loading…" row instead of blocking.
async function fillStorageBreakdown(targetId, kept){
  const el = document.getElementById(targetId);
  if(!el) return;
  try{
    const b = await computeStorageBreakdown();
    if(!document.getElementById(targetId)) return; // modal was closed/replaced before this resolved
    el.innerHTML = renderStorageBreakdownRows(b, kept);
  }catch(e){
    if(document.getElementById(targetId)) el.innerHTML = `<div class="muted" style="font-size:.8rem;">Couldn't read storage details on this device — the totals above may be incomplete.</div>`;
  }
}

const APP_VERSION = 'V1.1.0';
// ADDED: best-effort fetch of index.html's Last-Modified response header — purely
// automatic, needs no manual upkeep. Silently returns null if the server/host
// doesn't send that header (some static hosts omit it) or the app is offline.
async function fetchIndexLastUpdated(){
  try{
    const res = await fetch('./index.html', { method:'HEAD', cache:'no-store' });
    const lm = res.headers.get('last-modified');
    return lm ? new Date(lm) : null;
  }catch(e){ return null; }
}

/* ============================================================
   incomplete-session helpers
   ADDED: previously only a single "active session" slot existed, so an
   unfinished test permanently occupied the Practice tab — you could never
   reach the setup form to start a new one while it sat half-done. These
   helpers let several unfinished sessions be remembered (capped at 5,
   newest first) and picked back up individually, while the setup form
   underneath is always free to start something new.
   ============================================================ */
function saveIncompleteSession(session){
  if(!session || session.submitted) return;
  const list = APP.incompleteSessions.filter(x=>x.id!==session.id);
  list.unshift(JSON.parse(JSON.stringify(session)));
  APP.incompleteSessions = list.slice(0,5);
  lsSet(LS_INCOMPLETE_SESSIONS, APP.incompleteSessions);
}
function removeIncompleteSession(id){
  APP.incompleteSessions = APP.incompleteSessions.filter(x=>x.id!==id);
  lsSet(LS_INCOMPLETE_SESSIONS, APP.incompleteSessions);
}
function getIncompleteSessions(){
  // keep the currently-open session's saved snapshot up to date in the list too
  if(APP.activeSession && !APP.activeSession.submitted) saveIncompleteSession(APP.activeSession);
  return APP.incompleteSessions.slice(0,5);
}

/* ============================================================
   helpers
   ============================================================ */
function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function todayStr(){ const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
// ADDED: shared debounce helper — used to keep search boxes feeling instant while typing.
// Search inputs still update their underlying state on every keystroke (so nothing is lost),
// but the expensive full-list re-render they trigger is delayed until typing pauses for `wait`ms,
// instead of doing a full re-render on every single keypress. Fewer wasted renders while typing
// fast = less janky/blocked input, especially on larger lists.
function debounce(fn, wait){
  let t;
  return function(...args){
    clearTimeout(t);
    t = setTimeout(()=>fn.apply(this, args), wait);
  };
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sanitizeHtml(html){
  if(!html) return '';
  return String(html)
    .replace(/<script[\s\S]*?<\/script>/gi,'')
    .replace(/\son\w+="[^"]*"/gi,'')
    .replace(/\son\w+='[^']*'/gi,'');
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function fmtTime(sec){
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function fmtDurationLong(ms){
  let totalMin = Math.max(0, Math.floor(ms/60000));
  const days = Math.floor(totalMin/1440); totalMin -= days*1440;
  const hours = Math.floor(totalMin/60); totalMin -= hours*60;
  const mins = totalMin;
  if(days>0) return `${days}d ${hours}h`;
  if(hours>0) return `${hours}h ${mins}m`;
  return `${mins}m`;
}
/* ============================================================
   ADDED: STUDY MODE — a Pomodoro-style focus/break timer that also makes the
   app distraction-free while it's running: the roaming pet is hidden entirely
   and the companion's speech-bubble pop-ups (session milestones, home-tab
   tips, tap reactions, etc.) go quiet — see the isStudyModeActive() checks
   added into critterVisibilityMode() and companionAllowed() further up.
   Instead, the companion shrinks down to a small, static "focus buddy" badge
   (see renderStudyBadge()) showing just the current phase + countdown.

   Starting a session always asks which of two types it is (see
   openStudyModeModal()'s type-choice buttons, off by default until picked):
     - 'notes'  — Self Study: studying your own physical/external notes. Gets
       a big full-screen timer (openStudyFullscreen()) since you're looking
       away from the app, not at it. Minimizable back to the small badge
       without stopping (closeStudyFullscreen()).
     - 'screen' — Screen Study: working through Practice/Flashcards in-app.
       Just the small floating badge, since the app itself is on screen.
   Both types share the same focus/break timer, pause/resume, and — unlike
   the general quiet-mode suppression above — DO get their own companion
   messages at start/pause/resume/phase-change/finish (see studyCompanionSay()
   and the COMPANION_STUDY_* line pools below, which intentionally bypass the
   isStudyModeActive() gate). Every finished session (any real length) is
   saved to LS_STUDY_SESSIONS and surfaced in Analytics (see
   studySessionsSummary() / renderAnalytics()).

   Reachable from a standalone nav icon on real mouse-driven desktops only
   (.studymode-nav-btn, unchanged); on mobile/iPad it's instead the first
   item in the hamburger drawer, above Home (.studymode-drawer-tab /
   #navtab-study-mode). Not in Settings at all — just the one access point
   per platform.
   ============================================================ */
let APP_STUDY = { active:false, type:null, phase:'focus', phaseEndsAt:0, paused:false, pausedRemainingMs:0, cyclesCompleted:0, focusedMsTotal:0, startedAt:0 };
let studyModeTickTimer = null;

function isStudyModeActive(){ return !!APP_STUDY.active; }

function saveStudyModeState(){ lsSet(LS_STUDY_MODE, APP_STUDY); }

// ADDED: type metadata for the two Study Mode flavors — 'notes' (self-studying your own
// physical/external notes, gets the full-screen distraction-free timer) and 'screen'
// (working through Practice/Flashcards in-app, gets just the small floating badge since
// the app itself is what's on screen). Picked via a prompt shown every time Study Mode
// is started (see openStudyModeModal()).
const STUDY_TYPE_META = {
  notes:  { label: 'Self Study', sub: 'Studying your own notes', icon: 'fa-book-open' },
  screen: { label: 'Screen Study', sub: 'Quiz & flashcards in-app', icon: 'fa-display' }
};

// ADDED: read-only accessor for the saved history of finished Study Mode sessions, used by
// Analytics (see renderAnalytics()). Newest first.
function getStudySessions(){
  const list = lsGet(LS_STUDY_SESSIONS, []);
  return Array.isArray(list) ? list : [];
}
function saveStudySession(rec){
  const list = getStudySessions();
  list.unshift(rec);
  if(list.length > 200) list.length = 200; // cap so this never grows unbounded
  lsSet(LS_STUDY_SESSIONS, list);
}
// Aggregated totals used by the Analytics "Study Mode" card.
function studySessionsSummary(){
  const sessions = getStudySessions();
  let notesMs=0, screenMs=0, notesCount=0, screenCount=0;
  for(const s of sessions){
    if(s.type==='notes'){ notesMs += s.focusedMs||0; notesCount++; }
    else { screenMs += s.focusedMs||0; screenCount++; }
  }
  return { sessions, totalMs: notesMs+screenMs, notesMs, screenMs, notesCount, screenCount };
}

// ADDED: the "Study Mode" card shown in Analytics (both the normal and empty-state screens) —
// total time logged across Self Study (notes) + Screen Study sessions, plus a short list of
// the most recent finished sessions. Returns '' (renders nothing) if none have finished yet.
function renderStudySessionsCardHTML(){

  if(sessions.length===0) return '';
  const rows = sessions.slice(0, 6).map(s=>{

      <span style="width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:color-mix(in srgb, var(--indigo) 14%, transparent);color:var(--indigo);flex-shrink:0;"><i class="fa-solid ${meta.icon}" style="font-size:.72rem;"></i></span>
      <span style="flex:1;font-size:.82rem;">${meta.label}</span>
      <span class="muted" style="font-size:.74rem;">${fmtDurationLong(s.focusedMs||0)}</span>
      <span class="muted" style="font-size:.7rem;min-width:70px;text-align:right;">${d.toLocaleDateString(undefined,{month:'short',day:'numeric'})}</span>
    </div>`;
  }).join('');
  return `
    <div class="card" style="padding:18px;margin-bottom:20px;">
      <div style="font-weight:700;font-size:.9rem;margin-bottom:2px;"><i class="fa-solid fa-brain" style="margin-right:6px;color:var(--indigo);"></i>Study Mode</div>
      <div class="muted" style="font-size:.72rem;margin-bottom:14px;">Self Study (notes) + Screen Study sessions, focused time only.</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:6px;">
        <div class="card stat-card"><div class="muted" style="font-size:.72rem;">Total focused time</div><div class="stat-num">${fmtDurationLong(totalMs)}</div></div>
        <div class="card stat-card"><div class="muted" style="font-size:.72rem;"><i class="fa-solid ${STUDY_TYPE_META.notes.icon}"></i> Self Study</div><div class="stat-num">${fmtDurationLong(notesMs)}</div><div class="muted" style="font-size:.7rem;">${notesCount} session${notesCount===1?'':'s'}</div></div>
        <div class="card stat-card"><div class="muted" style="font-size:.72rem;"><i class="fa-solid ${STUDY_TYPE_META.screen.icon}"></i> Screen Study</div><div class="stat-num">${fmtDurationLong(screenMs)}</div><div class="muted" style="font-size:.7rem;">${screenCount} session${screenCount===1?'':'s'}</div></div>
      </div>
      ${rows}
    </div>`;
}
// ADDED: Study Mode's own companion touchpoints (start / pause / resume / phase-change /
// finish) intentionally bypass the general isStudyModeActive() quiet-mode gate inside
// companionAllowed() — those messages ARE the Study Mode experience talking to the user,
// not a random distraction it's supposed to suppress. Still respects the companion on/off
// and per-context toggles in Settings, and falls back to a plain (avatar-less) toast if the
// companion is turned off entirely, so there's always some feedback.
function studyCompanionAllowed(context){
  if(!companionEnabled()) return false;
  if(context === 'toasts') return APP.settings.companionOnToasts !== false;
  if(context === 'popups') return APP.settings.companionOnPopups !== false;
  return true;
}
function studyCompanionSay(msg, anchorEl){
  if(anchorEl && studyCompanionAllowed('popups')){
    spawnCompanionNear(anchorEl, { message: msg, side:'right', duration: 4200 });
    return;
  }
  if(APP.settings && APP.settings.toastsEnabled === false) return;
  const wrap = document.createElement('div');
  wrap.className = 'toast-companion-bottom';
  const avatarHtml = studyCompanionAllowed('toasts') ? pickCompanionAvatarDiv() : '';
  wrap.innerHTML = `<div class="companion-bubble-inner">${avatarHtml}<div class="companion-speech">${escapeHtml(msg)}</div></div>`;
  document.body.appendChild(wrap);
  requestAnimationFrame(()=>wrap.classList.add('companion-show'));
  setTimeout(()=>{
    wrap.classList.remove('companion-show');
    wrap.classList.add('companion-hide');
    setTimeout(()=>wrap.remove(), 250);
  }, 2600);
}
// Best available anchor to pop a companion bubble near, given whichever Study Mode UI is
// currently visible (full-screen notes overlay > small badge > settings gear).
function studyModeAnchorEl(){
  return document.getElementById('studyfs-companion-anchor')
    || document.getElementById('study-mode-badge')
    || document.getElementById('btn-settings');
}
const COMPANION_STUDY_NOTES_START_LINES = [
  "Notes mode on — I'll stay quiet and just watch the clock. You've got this!",
  "Books open, phone away — let's make this session count!",
  "Full-screen focus, starting now. Tap me any time to pause."
];
const COMPANION_STUDY_SCREEN_START_LINES = [
  "Screen study time — let's turn those questions into wins!",
  "Quiz mode engaged. I'll cheer quietly in the background.",
  "Let's rack up some good practice reps!"
];
const COMPANION_STUDY_BREAK_LINES = [
  "Break time! Stretch, hydrate, breathe. 🌿",
  "Nice focus stretch — go recharge for a bit.",
  "Well-earned break — back at it soon!"
];
const COMPANION_STUDY_FOCUS_RESUME_LINES = [
  "Break's over — let's dive back in!",
  "Refreshed and ready? Let's go again.",
  "Back to focus — you're doing great."
];
const COMPANION_STUDY_PAUSE_LINES = [
  "Paused — take your time, I'll hold the clock right here.",
  "All good, resume whenever you're ready."
];
const COMPANION_STUDY_RESUME_LINES = [
  "Back at it — let's keep the momentum!",
  "Resumed! Let's finish strong."
];

function studyPhaseLenMs(phase){
  const mins = phase === 'break' ? (APP.settings.studyModeBreakMin || 5) : (APP.settings.studyModeFocusMin || 25);
  return mins * 60000;
}

// Icon + label shown on the badge and in the modal for the current phase.
function studyPhaseMeta(phase){
  return phase === 'break'
    ? { icon: 'fa-mug-hot', label: 'Break' }
    : { icon: 'fa-brain', label: 'Focus' };
}

function studyModeRemainingMs(){
  if(!APP_STUDY.active) return 0;
  if(APP_STUDY.paused) return APP_STUDY.pausedRemainingMs;
  return Math.max(0, APP_STUDY.phaseEndsAt - Date.now());
}

function startStudyMode(type){
  type = (type==='notes') ? 'notes' : 'screen';
  APP_STUDY = {
    active: true,
    type: type,
    phase: 'focus',
    phaseEndsAt: Date.now() + studyPhaseLenMs('focus'),
    paused: false,
    pausedRemainingMs: 0,
    cyclesCompleted: 0,
    focusedMsTotal: 0,
    startedAt: Date.now()
  };
  saveStudyModeState();
  document.body.classList.add('study-mode-active');
  critterRemoveActive && critterRemoveActive(); // sweep away any pet currently on screen right away, don't wait for its own timer
  renderHomeCompanionCard && renderHomeCompanionCard(); // hides the big home-tab companion card immediately (companionAllowed('home') now reads false)
  renderStudyBadge();
  updateStudyNavBtn();
  if(studyModeTickTimer) clearInterval(studyModeTickTimer);
  studyModeTickTimer = setInterval(studyModeTick, 1000);
  const startLine = companionPickFrom(type==='notes' ? COMPANION_STUDY_NOTES_START_LINES : COMPANION_STUDY_SCREEN_START_LINES);
  if(type==='notes'){
    openStudyFullscreen(); // full-screen distraction-free timer for studying own notes
  } else {
    studyCompanionSay(`${startLine} (${APP.settings.studyModeFocusMin||25} min focus)`, studyModeAnchorEl());
  }
}

// endedManually = true when the person tapped Stop; false when it naturally finished (not
// currently reachable since phases auto-cycle forever, kept for future use / clarity).
function stopStudyMode(){
  if(!APP_STUDY.active) return;
  const focusedMin = Math.round(APP_STUDY.focusedMsTotal / 60000);
  const cycles = APP_STUDY.cyclesCompleted;
  const type = APP_STUDY.type || 'screen';
  const totalMs = APP_STUDY.startedAt ? (Date.now() - APP_STUDY.startedAt) : APP_STUDY.focusedMsTotal;
  // ADDED: save this session to history for Analytics, as long as any real time passed.
  if(APP_STUDY.focusedMsTotal > 0 || totalMs > 5000){
    saveStudySession({
      id: 'ss_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      type,
      startedAt: APP_STUDY.startedAt || Date.now(),
      endedAt: Date.now(),
      focusedMs: APP_STUDY.focusedMsTotal,
      totalMs,
      cycles
    });
  }
  APP_STUDY = { active:false, type:null, phase:'focus', phaseEndsAt:0, paused:false, pausedRemainingMs:0, cyclesCompleted:0, focusedMsTotal:0, startedAt:0 };
  saveStudyModeState();
  document.body.classList.remove('study-mode-active');
  if(studyModeTickTimer){ clearInterval(studyModeTickTimer); studyModeTickTimer = null; }
  removeStudyBadge();
  closeStudyFullscreen();
  updateStudyNavBtn();
  checkAchievements(); // ADDED: Study Mode volume/self-study achievements may now be met
  renderHomeCompanionCard && renderHomeCompanionCard(); // brings the home-tab companion card back
  // Study Mode is over now — companionAllowed() reads normal settings again, so this is free
  // to actually pop up and celebrate.
  const typeLabel = STUDY_TYPE_META[type] ? STUDY_TYPE_META[type].label : 'Study Mode';
  const line = focusedMin > 0
    ? `Nice work! ${typeLabel}: ${focusedMin} min focused${cycles>0 ? ` across ${cycles} cycle${cycles===1?'':'s'}` : ''}. Logged to Analytics. 🎉`
    : `${typeLabel} stopped.`;
  const anchor = document.getElementById('study-mode-badge') || document.getElementById('btn-settings');
  if(anchor && companionAllowed('popups')) spawnCompanionNear(anchor, { message: line, side:'right', duration: 5000 });
  else toast(line);
  if(APP.currentTab==='analytics') renderAnalytics(); // ADDED: refresh the new Study Mode analytics card right away
}

function toggleStudyModePause(){
  if(!APP_STUDY.active) return;
  if(!APP_STUDY.paused){
    APP_STUDY.pausedRemainingMs = Math.max(0, APP_STUDY.phaseEndsAt - Date.now());
    APP_STUDY.paused = true;
    studyCompanionSay(companionPickFrom(COMPANION_STUDY_PAUSE_LINES), studyModeAnchorEl());
  } else {
    APP_STUDY.phaseEndsAt = Date.now() + APP_STUDY.pausedRemainingMs;
    APP_STUDY.paused = false;
    studyCompanionSay(companionPickFrom(COMPANION_STUDY_RESUME_LINES), studyModeAnchorEl());
  }
  saveStudyModeState();
  renderStudyBadge();
  updateStudyModeModalIfOpen();
  updateStudyFullscreenIfOpen();
}

function studyModeTick(){
  if(!APP_STUDY.active) return;
  if(!APP_STUDY.paused){
    // Track actual focused time as it accrues (not break time), used for the end-of-session summary.
    if(APP_STUDY.phase === 'focus'){
      APP_STUDY.focusedMsTotal += 1000;
      bumpGoalProgress('focusSeconds', 1); // ADDED: today's study-minutes goal
    }
    if(Date.now() >= APP_STUDY.phaseEndsAt){
      advanceStudyPhase();
    }
  }
  saveStudyModeState();
  renderStudyBadge();
  updateStudyModeModalIfOpen();
  updateStudyFullscreenIfOpen();
}

function advanceStudyPhase(silent){
  if(APP_STUDY.phase === 'focus') APP_STUDY.cyclesCompleted += 1;
  const nextPhase = APP_STUDY.phase === 'focus' ? 'break' : 'focus';
  // ADDED: announce the transition via the companion — this is a Study Mode touchpoint so it
  // bypasses the normal quiet-mode gate (see studyCompanionSay()). Suppressed when catching up
  // several missed phases at once on reload (see initStudyMode()) so it doesn't spam messages.
  if(!silent){
    const phaseLine = companionPickFrom(nextPhase === 'break' ? COMPANION_STUDY_BREAK_LINES : COMPANION_STUDY_FOCUS_RESUME_LINES);
    studyCompanionSay(phaseLine, studyModeAnchorEl());
  }
  if(APP.settings.studyModeAutoCycle === false){
    // Not auto-cycling — land exactly on 00:00 and wait for a tap on the badge to move on,
    // rather than silently rolling into the next phase unannounced.
    APP_STUDY.phase = nextPhase;
    APP_STUDY.paused = true;
    APP_STUDY.pausedRemainingMs = studyPhaseLenMs(nextPhase);
    return;
  }
  APP_STUDY.phase = nextPhase;
  APP_STUDY.phaseEndsAt = Date.now() + studyPhaseLenMs(nextPhase);
}

// ADDED: the floating "focus buddy" — the companion reduced to a small static badge (no
// bounce, no speech bubble) showing the current phase icon + mm:ss remaining. A tap
// pauses/resumes; it deliberately never spawns a bubble.
function renderStudyBadge(){
  let el = document.getElementById('study-mode-badge');
  if(!el){
    el = document.createElement('div');
    el.id = 'study-mode-badge';
    el.className = 'study-mode-badge';
    el.title = 'Tap to pause';
    el.setAttribute('role','button');
    el.setAttribute('tabindex','0');
    el.innerHTML = `<i class="fa-solid" id="study-mode-badge-icon"></i><span id="study-mode-badge-time"></span>`;
    document.body.appendChild(el);
  }
  // ADDED: for a 'notes' session the badge only ever shows while the full-screen timer is
  // minimized — tapping it reopens that full-screen view (which has its own pause/resume/stop).
  // For a 'screen' session (in-app quiz/flashcards) the badge is the only UI, so it keeps the
  // original tap-to-pause/resume gesture.
  const isNotes = APP_STUDY.type === 'notes';
  el.onclick = isNotes ? openStudyFullscreen : toggleStudyModePause;

// Restores an in-progress session across a reload (e.g. the phone was locked, or the tab
// was refreshed). If the phase had already fully elapsed while the app was closed, this
// fast-forwards through at most a handful of phases so a stale session doesn't leave the
// badge stuck at a huge negative countdown — then settles into whichever phase is current.
function initStudyMode(){
  const saved = lsGet(LS_STUDY_MODE, null);
  if(saved && saved.active){
    APP_STUDY = Object.assign({ type:null, startedAt:0 }, saved); // ADDED: type/startedAt default-fill for sessions saved before this update
    let guard = 0;
    while(!APP_STUDY.paused && Date.now() >= APP_STUDY.phaseEndsAt && guard < 50){
      advanceStudyPhase(true);
      guard++;
    }
    document.body.classList.add('study-mode-active');
    renderStudyBadge();
    if(studyModeTickTimer) clearInterval(studyModeTickTimer);
    studyModeTickTimer = setInterval(studyModeTick, 1000);
    if(APP_STUDY.type === 'notes') openStudyFullscreen(); // resume straight into the full-screen timer
  }
  updateStudyNavBtn();
}

// If the Study Mode modal happens to be open while the timer ticks, keep its live countdown

function updateStudyModeModalIfOpen(){

// ADDED: resets the current Study Mode session back to a fresh focus phase (0 cycles, 0
// focused time, full-length timer) without ending it — lets someone who fat-fingered Stop, or
// who just wants a clean restart, get back to 00:00-remaining without losing the session
// entirely or leaving the full-screen view.
function restartStudyMode(){
  if(!APP_STUDY.active) return;
  APP_STUDY.phase = 'focus';
  APP_STUDY.phaseEndsAt = Date.now() + studyPhaseLenMs('focus');
  APP_STUDY.paused = false;
  APP_STUDY.pausedRemainingMs = 0;
  APP_STUDY.cyclesCompleted = 0;
  APP_STUDY.focusedMsTotal = 0;
  APP_STUDY.startedAt = Date.now();
  saveStudyModeState();
  renderStudyBadge();
  updateStudyModeModalIfOpen();
  if(APP_STUDY.type === 'notes') openStudyFullscreen();
  toast('Session restarted');
}

/* ============================================================
   CALCULATE RECENT QUESTIONS ADDED
   ============================================================ */
function getRecentQuestionsStats(){
  const now = Date.now();
  const sevenDaysAgo = now - (7 * 24 * 60 * 60 * 1000);
  const thirtyDaysAgo = now - (30 * 24 * 60 * 60 * 1000);
  
  let last7Days = 0, last30Days = 0, lastImportTime = null;
  
  for(const res of APP.resources){
    const qCount = res.stats.questions || 0;
    const addedAt = res.addedAt || 0;
    
    if(addedAt > thirtyDaysAgo){
      last30Days += qCount;
      if(addedAt > sevenDaysAgo) last7Days += qCount;
    }
    
    if(!lastImportTime || addedAt > lastImportTime){
      lastImportTime = addedAt;
    }
  }
  
  return { last7Days, last30Days, lastImportTime };
}

function pickCompanionAvatarDiv(className){
  className = className || 'companion-avatar';

  // pool as the built-in emoji avatars (not a replacement) — each only shows up if

  const customImages = (APP.settings && APP.settings.customCompanionImages) || [];

    .filter(img => img.enabled !== false)
    .map(img => ({ html: `<img src="${img.dataUrl}" alt="Your companion" draggable="false">`, scale: img.sizeScale || 1 }));
  const builtIn = arr => arr.filter(companionAvatarEnabled).map(id => ({ html: companionBuiltInAvatarHtml(id), scale: 1 }));

  const maleEntries = builtIn(styleMale);
  const femaleEntries = builtIn(styleFemale);
  if(maleEntries.length) sources.push(maleEntries);
  if(femaleEntries.length) sources.push(femaleEntries);
  if(customEntries.length) sources.push(customEntries);
  const pool = sources.length ? sources[Math.floor(Math.random()*sources.length)]
    : builtIn(styleMale.concat(styleFemale)).length
      ? builtIn(styleMale.concat(styleFemale))
      : styleMale.map(id=>({html: companionBuiltInAvatarHtml(id), scale:1})); // safety fallback; UI prevents turning everything off

  return `<div class="${className}" data-companion-pat="1"${styleAttr}>${pick.html}<span class="companion-name-tag">${escapeHtml(getCompanionName())}</span></div>`;

// ADDED: which pseudo-3D "pose" animation (see companion-pose-* CSS keyframes) each

const COMPANION_REACTION_POSE = {

// ADDED: plays a pose animation (celebrate/sad/think/wave) on every currently-visible
// Dr.KC avatar (there can be more than one — e.g. the Home card avatar plus a toast
// avatar at the same time). Restarts cleanly even if the same pose is still finishing
// from a moment ago, and always cleans its own class back off when done so the avatar
// falls back to its normal idle float.
function companionAvatarPlayPose(pose){
  const els = document.querySelectorAll('.companion-avatar[data-companion-pat="1"], .home-companion-avatar[data-companion-pat="1"]');
  if(!els.length) return;
  const cls = 'companion-pose-' + pose;

    el.classList.remove('companion-pose-celebrate','companion-pose-sad','companion-pose-think','companion-pose-wave');
    void el.offsetWidth; // restart the animation even if this pose just played

    setTimeout(()=>{ if(el.isConnected) el.classList.remove(cls); }, dur);
  });
}
// Pops a big animated 3D emoji reaction near `anchorEl` (or a fixed point if opts.x/opts.y are
// given instead). `key` is one of the COMPANION_REACTIONS names above. Purely decorative and
// self-removing — never blocks input, and respects the same on/off settings as the rest of the
// companion (skips quietly if the companion or its reactions are disabled).
function spawnCompanionReaction(key, anchorEl, opts){
  opts = opts || {};
  if(!companionEnabled()) return;
  if(APP.settings && APP.settings.companionReactionsEnabled === false) return;
  if(typeof isStudyModeActive === 'function' && isStudyModeActive()) return; // Study Mode stays distraction-free, same as companionAllowed()
  const r = COMPANION_REACTIONS[key];
  if(!r) return;
  let x, y;
  if(anchorEl && anchorEl.getBoundingClientRect){
    const rect = anchorEl.getBoundingClientRect();
    x = rect.left + rect.width * (opts.xPct!=null?opts.xPct:0.5);
    y = rect.top + rect.height * (opts.yPct!=null?opts.yPct:0.15);
  } else {
    x = opts.x!=null ? opts.x : window.innerWidth/2;
    y = opts.y!=null ? opts.y : window.innerHeight/2;
  }
  const el = document.createElement('div');
  el.className = 'companion-reaction';

  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2000);
  const pose = COMPANION_REACTION_POSE[key];
  if(pose) companionAvatarPlayPose(pose); // ADDED: the avatar itself reacts too, not just the popup emoji
  return el;
}

// toast, mini-toast, or notification bubble) pops a couple of floating hearts from where

// slightly more special milestone line. Wired once via event delegation since avatars are

function spawnCompanionPatHearts(x, y){
  const hearts = ['💗','✨','💕','⭐'];

function initCompanionPatting(){
  document.addEventListener('click', (e)=>{

    if(!avatar) return;
