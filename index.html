/* ============================================================
   ADDED: Flashcard Deck PDF export — one card per page (Question, then
   Answer), built with jsPDF (lazy-loaded from CDN only when first needed,
   same pattern as the .apkg import/export libs above). A real PDF is a
   format GoodNotes natively imports as an annotatable notebook, so the deck
   can be flipped through and marked up by hand — no proprietary/undocumented
   file format involved.
   ============================================================ */
let _pdfLibPromise = null;
function ensurePdfLib(){
  if(_pdfLibPromise) return _pdfLibPromise;
  _pdfLibPromise = (async ()=>{
    await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
    return window.jspdf.jsPDF;
  })();
  return _pdfLibPromise;
}
// ---------------------------------------------------------------------------
// ADDED: shared branding constants for every PDF export in the app (question/
// flashcard decks AND completed-test/session exports) so they all look
// consistent and carry the same "Generated with QBank Center" credit line.
// ---------------------------------------------------------------------------
const PDF_APP_NAME = 'QBank Center';
const PDF_ACCENT = [15, 118, 110];        // #0f766e — app brand teal
const PDF_ACCENT_LIGHT = [232, 246, 244]; // tinted background for boxed sections
const PDF_INK = [31, 35, 38];
const PDF_MUTED = [128, 136, 140];
function pdfDateStr(){
  return new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
}

// NEW: Convert image URL to base64 data URI for reliable PDF embedding
async function imageUrlToBase64(imgUrl){
  if(!imgUrl) return null;
  if(imgUrl.startsWith('data:')) return imgUrl; // Already base64

  // FIXED: this used to set crossOrigin='anonymous' unconditionally, even for images
  // hosted on the app's own origin. Same-origin canvas reads are never tainted, so that
  // flag was never needed for them — and worse, forcing it turns the request into a real
  // CORS request, which some servers/CDNs (and dev/proxy setups) handle differently from
  // a plain same-origin request and simply fail (img fires 'error') even though the exact
  // same URL loads perfectly fine as a normal on-screen <img src="..."> elsewhere in the
  // app. That mismatch is exactly why an image can display fine in the app but come up
  // "[Image could not be loaded]" only during PDF export. Now the flag is only added for
  // URLs that are genuinely cross-origin, where it's actually required to read pixel data.
  const isCrossOrigin = (src) => {
    try { return new URL(src, window.location.href).origin !== window.location.origin; }
    catch(e){ return false; } // unparseable (e.g. relative path) — treat as same-origin
  };
  const viaCanvas = (src) => new Promise((resolve) => {
    const img = new Image();
    if(isCrossOrigin(src)) img.crossOrigin = 'anonymous';
    img.onload = function(){
      try {
        const canvas = document.createElement('canvas');
        canvas.width = this.naturalWidth;
        canvas.height = this.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(this, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      } catch(e){
        resolve(null); // tainted canvas (CORS) or other issue
      }
    };
    img.onerror = () => resolve(null);
    img.src = src;
  });

  // FIXED: try the URL exactly as given first. A previous version always appended a
  // cache-busting "_pdfcb=" query param up front to dodge a stale opaque-cache edge
  // case (see below) — but for images served from a signed/token URL (S3 presigned
  // links, expiring CDN tokens, etc.) modifying the query string invalidates the
  // signature and turns a perfectly loadable image into a 403/404. That was silently
  // breaking every image on hosts that use signed URLs — exactly the "[Image could
  // not be loaded]" failures seen even for images that display fine on screen.
  // Un-modified attempts now always go first; cache-busting is only tried afterward,
  // as a fallback, so it can no longer break a URL that would otherwise have worked.
  let result = await viaCanvas(imgUrl);
  if(result) return result;

  try {
    const resp = await fetch(imgUrl, { mode: 'cors', cache: 'no-store' });
    if(resp.ok){
      const blob = await resp.blob();
      const dataUrl = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(blob);
      });
      if(dataUrl) return dataUrl;
    }
  } catch(e){ /* fall through */ }

  // FALLBACK 1: cache-busted retry — helps when the browser reused an "opaque"
  // response cached from an earlier plain (no crossOrigin) <img> load, which taints
  // the canvas even on a server that actually supports CORS. Skipped for blob:/data:
  // URLs, which don't go through HTTP caching, and for anything that already carries
  // its own signature-style token param (adding another param would likely just
  // break those the same way the old unconditional version did).
  if(!imgUrl.startsWith('blob:')){
    const bustUrl = imgUrl + (imgUrl.includes('?') ? '&' : '?') + '_pdfcb=' + Date.now();
    result = await viaCanvas(bustUrl);
    if(result) return result;
    try {
      const resp = await fetch(bustUrl, { mode: 'cors', cache: 'no-store' });
      if(resp.ok){
        const blob = await resp.blob();
        const dataUrl = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(blob);
        });
        if(dataUrl) return dataUrl;
      }
    } catch(e){ /* fall through */ }
  }

  // FALLBACK 2: last resort — a real image host with no Access-Control-Allow-Origin
  // header at all can never be read into a canvas or Blob from client-side JS, no
  // matter how the request is shaped; that's a hard browser security restriction,
  // not something retrying differently can work around. A public image proxy
  // (wsrv.nl / images.weserv.nl) fetches the image server-side and re-serves it with
  // permissive CORS headers, so it can finally be embedded. Only reached after every
  // direct attempt above has failed, and itself fails silently (returns null) if the
  // proxy is unreachable or the source requires auth/cookies a third-party proxy
  // can't provide (e.g. a private/session-gated link).
  if(!imgUrl.startsWith('blob:') && !imgUrl.startsWith('data:')){
    try {
      const proxied = 'https://wsrv.nl/?url=' + encodeURIComponent(imgUrl.replace(/^https?:\/\//,'')) + '&output=png';
      result = await viaCanvas(proxied);
      if(result) return result;
    } catch(e){ /* give up */ }
  }

  return null; // genuinely unreachable/blocked — nothing more we can do client-side
}

// NEW: Extract images from HTML content (embedded <img> tags in explanations)
async function extractImagesFromHtml(htmlText){
  if(!htmlText) return [];
  const parser = new DOMParser();
  try {
    const doc = parser.parseFromString(htmlText, 'text/html');
    const imgs = doc.querySelectorAll('img');
    const urls = [];
    for(let img of imgs) {
      if(img.src) urls.push(img.src);
    }
    return urls;
  } catch(e){
    return [];
  }
}

// Builds a Blob for the PDF, or null if there was nothing to export.
// CHANGED: redesigned for a more polished look — branded cover page, colored
// header/footer bars on every content page, a tinted answer box, page numbers,
// and a "Generated with QBank Center" credit line so exported PDFs are traceable
// back to the app.
async function buildFlashcardDeckPdfBlob(tests, label){
  const cards = [];
  for(const t of (tests||[])){
    for(const q of (t.questions||[])){
      const front = apkgStripTags(q.raw_text || q.text || '').trim();
      const hasOptions = Array.isArray(q.options) && q.options.length > 0;
      const correctLabel = correctLabelOf(q);
      const correctOption = hasOptions ? q.options.find(o=>o.label === correctLabel) : null;
      let correctText = '';
      if(hasOptions && correctLabel){
        const correctOptText = correctOption ? apkgStripTags(correctOption.text || '').trim() : '';
        correctText = correctOptText ? `${correctLabel} — ${correctOptText}` : correctLabel;
      } else if(q.correct_answer){
        correctText = String(q.correct_answer).trim();
      }
      const explanation = apkgStripTags(q.explanation || '').trim();
      if(!front && !hasOptions && !explanation) continue;
      // CHANGED: carry the question's structured options/correct-answer/explanation
      // (not just a flat front/back pair) so the renderer below can lay the card
      // out as Question -> Question images -> Options -> Correct answer ->
      // Explanation -> Explanation images, matching the Test Result PDF export.
      cards.push({
        front,
        frontRawHtml: q.raw_text || q.text || '',
        frontImages: q.question_images || [],
        hasOptions,
        options: hasOptions ? q.options : [],
        correctLabel,
        correctText,
        explanation,
        explanationRawHtml: q.explanation || '',
        explanationImages: q.explanation_images || []
      });
    }
  }
  if(!cards.length) return null;

  const JsPDFCtor = await ensurePdfLib();
  const doc = new JsPDFCtor({ unit: 'pt', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 50;
  const maxWidth = pageW - margin * 2;
  const lineHeight = 16.5;

  const deckTitle = (label || 'Untitled').trim();
  const dateStr = pdfDateStr();

  let pageNum = 1;

  // ---------- shared footer, drawn on every page (cover included) ----------
  function drawFooter(){
    doc.setDrawColor(224, 224, 224);
    doc.setLineWidth(0.6);
    doc.line(margin, pageH - 44, pageW - margin, pageH - 44);
    doc.setFont('helvetica', 'italic');
    doc.setFontSize(8.5);
    doc.setTextColor(...PDF_MUTED);
    doc.text(`Generated with ${PDF_APP_NAME}`, margin, pageH - 28);
    doc.setFont('helvetica', 'normal');
    doc.text(`Page ${pageNum}`, pageW - margin, pageH - 28, { align: 'right' });
  }

  // ---------------------------- cover page ----------------------------
  doc.setFillColor(...PDF_ACCENT);
  doc.rect(0, 0, pageW, 176, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text(PDF_APP_NAME.toUpperCase(), margin, 54);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text('Question Bank Export', margin, 72);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(25);
  const titleLines = doc.splitTextToSize(deckTitle, maxWidth).slice(0, 2);
  let ty = 128;
  titleLines.forEach(line => { doc.text(line, margin, ty); ty += 30; });

  doc.setTextColor(...PDF_INK);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(11.5);
  let infoY = 214;
  doc.text(`${cards.length} question${cards.length === 1 ? '' : 's'}`, margin, infoY);
  infoY += 20;
  doc.setTextColor(...PDF_MUTED);
  doc.text(`Generated ${dateStr} · ${PDF_APP_NAME}`, margin, infoY);

  doc.setDrawColor(...PDF_ACCENT);
  doc.setLineWidth(1.2);
  doc.line(margin, infoY + 22, pageW - margin, infoY + 22);

  drawFooter();

  // ---------------------------- content pages ----------------------------
  let y = 0;
  let cardHeaderText = '';

  function startPage(){
    doc.addPage();
    pageNum++;
    doc.setFillColor(...PDF_ACCENT);
    doc.rect(0, 0, pageW, 46, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10.5);
    doc.text(PDF_APP_NAME, margin, 29);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9.5);
    const titleTrunc = deckTitle.length > 55 ? deckTitle.slice(0, 52) + '…' : deckTitle;
    doc.text(titleTrunc, pageW - margin, 29, { align: 'right' });

    doc.setTextColor(...PDF_MUTED);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.text(cardHeaderText.toUpperCase(), margin, 68);
    doc.setDrawColor(226, 226, 226);
    doc.setLineWidth(0.6);
    doc.line(margin, 78, pageW - margin, 78);

    doc.setTextColor(...PDF_INK);
    drawFooter();
    return 100;
  }
  function ensureSpace(need){
    if(y + need > pageH - 56) y = startPage();
  }
  // Measures & draws a labeled block. When `boxed` is true, a tinted rounded
  // rectangle is drawn behind the text (used for the Answer section) so it
  // stands out visually from the Question section above it.
  function writeBlock(labelText, text, boxed){
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10.5);
    ensureSpace(lineHeight + 8);
    doc.setTextColor(...PDF_ACCENT);
    doc.text(labelText.toUpperCase(), margin, y);
    y += lineHeight + 2;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(12.5);
    const lines = doc.splitTextToSize(text || '(blank)', maxWidth - (boxed ? 24 : 0));
    const blockH = lines.length * lineHeight;

    if(boxed){
      ensureSpace(blockH + 20);
      doc.setFillColor(...PDF_ACCENT_LIGHT);
      doc.roundedRect(margin - 12, y - 14, maxWidth + 24, blockH + 20, 6, 6, 'F');
      y += 4;
    }
    doc.setTextColor(...PDF_INK);
    for(const line of lines){
      ensureSpace(lineHeight);
      doc.text(line, margin, y);
      y += lineHeight;
    }
    if(boxed) y += 10;
  }
  // Helper function to load image and get dimensions
  // FIXED: reading naturalWidth/naturalHeight never touches pixel data, so it
  // doesn't need crossOrigin at all — forcing it unnecessarily could make this
  // load fail (and skip the image entirely) on a host that doesn't handle a
  // CORS-flagged request the same way as a plain one.
  async function loadImageWithDimensions(imgUrl){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        resolve({ url: imgUrl, naturalWidth: img.naturalWidth, naturalHeight: img.naturalHeight });
      };
      img.onerror = () => reject(new Error('Failed to load image'));
      img.src = imgUrl;
    });
  }

  // Draws one image preserving its true aspect ratio — never stretches it to
  // fill maxWidth once the height cap kicks in (the old code forced full page
  // width AND a capped height at the same time, which squashed/stretched tall
  // or wide images). Smaller images are centered instead of being blown up.
  async function drawImage(imgUrl){
    try {
      const base64Img = await imageUrlToBase64(imgUrl);
      if(!base64Img){
        // FIXED: previously just skipped, so a blocked/unreachable image vanished
        // from the PDF with no trace. A short muted note makes the gap explicit
        // instead of silent, so it reads as "this image couldn't be embedded"
        // rather than looking like content was lost.
        doc.setFont('helvetica', 'italic');
        doc.setFontSize(9.5);
        doc.setTextColor(...PDF_MUTED);
        ensureSpace(lineHeight + 4);
        doc.text('[Image could not be loaded for this PDF]', margin, y);
        y += lineHeight + 4;
        doc.setTextColor(...PDF_INK);
        return;
      }
      const imgData = await loadImageWithDimensions(imgUrl);
      const aspectRatio = imgData.naturalHeight / imgData.naturalWidth;
      // FIXED: naturalWidth is in CSS pixels; maxWidth/the doc are in PDF points
      // (unit:'pt' above). Comparing them directly meant Math.min almost always
      // picked maxWidth, since a typical 600-2000px photo is "bigger" than a
      // ~495pt page width by raw number — so every image got blown up to full
      // page width no matter how small it actually was on screen. Converting
      // px -> pt at the standard 96dpi (1px = 0.75pt) puts both sides in the
      // same unit so small images stay small and only genuinely large images
      // get capped to the page width, as the centering logic below intends.
      let imgWidth = Math.min(maxWidth, imgData.naturalWidth * 0.75);
      let imgHeight = imgWidth * aspectRatio;
      const maxImgHeight = 280;
      if(imgHeight > maxImgHeight){ imgHeight = maxImgHeight; imgWidth = imgHeight / aspectRatio; }
      if(imgWidth > maxWidth){ imgWidth = maxWidth; imgHeight = imgWidth * aspectRatio; }
      const imgX = margin + (maxWidth - imgWidth) / 2; // center images narrower than the page
      ensureSpace(imgHeight + 16);
      doc.addImage(base64Img, 'PNG', imgX, y, imgWidth, imgHeight);
      y += imgHeight + 8;
    } catch(e){
      // Image failed to load/convert — skip it rather than aborting the whole export.
    }
  }
  // Merges an explicit image-URL array with any <img> tags found in the matching
  // raw HTML, de-duplicated, so the same image is never drawn twice.
  async function collectImages(explicitList, rawHtml){
    const merged = (explicitList || []).slice();
    const embedded = await extractImagesFromHtml(rawHtml);
    for(const url of embedded){ if(url && !merged.includes(url)) merged.push(url); }
    return merged;
  }
  // Draws a bordered "Options" section listing every choice, highlighting the
  // correct one in green, and drawing any image embedded inside that option's
  // own text right underneath it (options have no dedicated images array in
  // the data model, so any option image only ever exists as an <img> tag
  // inside the option's HTML) — this was previously missing entirely.
  async function writeOptionsWithImages(options, correctLabel){
    if(!options || !options.length) return;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10.5);
    ensureSpace(lineHeight + 8);
    doc.setTextColor(...PDF_ACCENT);
    doc.text('OPTIONS', margin, y);
    y += lineHeight + 4;

    for(const o of options){
      const isCorrect = o.label === correctLabel;
      // FIXED: U+2713 (✓) isn't in the WinAnsi encoding jsPDF's standard Helvetica
      // font uses, so drawing it threw off the glyph widths for the rest of the
      // line — that's why "Correct answer" (and even the option text before it,
      // like "48 to 72 hours") showed up with stray extra spaces between letters.
      // A plain ASCII marker renders correctly with normal spacing.
      const tagSuffix = isCorrect ? '   (Correct answer)' : '';
      const cleanLabel = pdfSanitizeInvisibleChars(String(o.label || '').replace(/<[^>]*>/g, ''));
      const cleanText = apkgStripTags(o.text || '').replace(/\n+/g, ' ');
      doc.setFont('helvetica', isCorrect ? 'bold' : 'normal');
      doc.setFontSize(11.5);
      const lines = doc.splitTextToSize(`${cleanLabel}.  ${cleanText}${tagSuffix}`, maxWidth - 24);
      const blockH = lines.length * lineHeight;
      ensureSpace(blockH + 14);
      if(isCorrect){
        doc.setFillColor(198, 238, 214);
        doc.roundedRect(margin - 12, y - 13, maxWidth + 24, blockH + 10, 5, 5, 'F');
        doc.setFillColor(18, 120, 70);
        doc.roundedRect(margin - 12, y - 13, 4, blockH + 10, 2, 2, 'F');
      }
      doc.setTextColor(...(isCorrect ? [12,90,52] : PDF_INK));
      lines.forEach(line=>{
        ensureSpace(lineHeight);
        doc.text(line, margin, y);
        y += lineHeight;
      });
      y += 6;
      doc.setTextColor(...PDF_INK);

      const optionImages = await extractImagesFromHtml(o.text || '');
      if(optionImages.length){
        for(const imgUrl of optionImages) await drawImage(imgUrl);
        y += 4;
      }
    }
    y += 4;
  }

  // Process all cards asynchronously.
  // Systematic order: Question -> Question images -> Options (with any image
  // each option carries) -> Correct answer -> Explanation -> Explanation images.
  for(let i = 0; i < cards.length; i++){
    const card = cards[i];
    cardHeaderText = `Question ${i + 1} of ${cards.length}`;
    y = startPage();
    writeBlock('Question', card.front, false);

    const questionImages = await collectImages(card.frontImages, card.frontRawHtml);
    if(questionImages.length){
      y += 8;
      for(const imgUrl of questionImages) await drawImage(imgUrl);
    }

    y += 16;

    if(card.hasOptions){
      await writeOptionsWithImages(card.options, card.correctLabel);
      if(card.correctText){
        y += 8;
        writeBlock('Correct answer', card.correctText, false);
      }
      if(card.explanation){
        y += 8;
        writeBlock('Explanation', card.explanation, true);
        const explanationImages = await collectImages(card.explanationImages, card.explanationRawHtml);
        if(explanationImages.length){
          y += 8;
          for(const imgUrl of explanationImages) await drawImage(imgUrl);
        }
      }
    } else {
      // No structured options for this question (e.g. bulk-imported plain-text
      // data where everything after the stem is one block) — show whatever
      // correct-answer text exists, then the full block as before.
      if(card.correctText){
        writeBlock('Correct answer', card.correctText, false);
        y += 8;
      }
      writeBlock('Answer', card.explanation || '(blank)', true);
      const backImages = await collectImages(card.explanationImages, card.explanationRawHtml);
      if(backImages.length){
        y += 8;
        for(const imgUrl of backImages) await drawImage(imgUrl);
      }
    }
  }

  return doc.output('blob');
}

/* ============================================================
   ADDED: "Download PDF" for a previous/completed test (session).
   Reuses the same branded look (cover page, colored header/footer bars,
   "Generated with QBank Center" credit) as the question/flashcard deck
   PDF export above, but one page per question with the learner's own
   answer, the correct answer, and a correct/incorrect/skipped status
   badge, plus the explanation when available.
   ============================================================ */
async function buildSessionReviewPdfBlob(session, label){
  const rows = (session.compositeIds || []).map((cid, i) => {
    const fq = flatByCompositeId(cid);
    if(!fq) return null;
    const q = fq.q;
    const a = session.answers ? session.answers[cid] : null;
    let status = 'skipped';
    if(a && a.chosen) status = a.correct ? 'correct' : 'incorrect';
    return { i, q, a, status };
  }).filter(Boolean);
  if(!rows.length) return null;

  const JsPDFCtor = await ensurePdfLib();
  const doc = new JsPDFCtor({ unit: 'pt', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 50;
  const maxWidth = pageW - margin * 2;
  const lineHeight = 16.5;

  const testTitle = (label || 'Practice test').trim();
  const dateStr = pdfDateStr();
  const correctCount = rows.filter(r=>r.status==='correct').length;
  const incorrectCount = rows.filter(r=>r.status==='incorrect').length;
  const skippedCount = rows.filter(r=>r.status==='skipped').length;
  const accuracy = (correctCount+incorrectCount) ? Math.round(correctCount/(correctCount+incorrectCount)*100) : 0;

  const STATUS_STYLE = {
    correct:   { text: 'CORRECT',  color: [22, 145, 90]  },
    incorrect: { text: 'INCORRECT', color: [200, 60, 60]  },
    skipped:   { text: 'SKIPPED',  color: [150, 130, 30]  },
  };

  let pageNum = 1;
  function drawFooter(){
    doc.setDrawColor(224, 224, 224);
    doc.setLineWidth(0.6);
    doc.line(margin, pageH - 44, pageW - margin, pageH - 44);
    doc.setFont('helvetica', 'italic');
    doc.setFontSize(8.5);
    doc.setTextColor(...PDF_MUTED);
    doc.text(`Generated with ${PDF_APP_NAME}`, margin, pageH - 28);
    doc.setFont('helvetica', 'normal');
    doc.text(`Page ${pageNum}`, pageW - margin, pageH - 28, { align: 'right' });
  }

  // ---------------------------- cover page ----------------------------
  doc.setFillColor(...PDF_ACCENT);
  doc.rect(0, 0, pageW, 176, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text(PDF_APP_NAME.toUpperCase(), margin, 54);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text('Test Result Export', margin, 72);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(25);
  const titleLines = doc.splitTextToSize(testTitle, maxWidth).slice(0, 2);
  let ty = 128;
  titleLines.forEach(line => { doc.text(line, margin, ty); ty += 30; });

  doc.setTextColor(...PDF_INK);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(11.5);
  let infoY = 214;
  doc.text(`${rows.length} question${rows.length === 1 ? '' : 's'} · ${accuracy}% accuracy`, margin, infoY);
  infoY += 20;
  doc.text(`${correctCount} correct · ${incorrectCount} incorrect · ${skippedCount} skipped`, margin, infoY);
  infoY += 20;
  doc.setTextColor(...PDF_MUTED);
  doc.text(`Generated ${dateStr} · ${PDF_APP_NAME}`, margin, infoY);

  doc.setDrawColor(...PDF_ACCENT);
  doc.setLineWidth(1.2);
  doc.line(margin, infoY + 22, pageW - margin, infoY + 22);

  drawFooter();

  // ---------------------------- content pages ----------------------------
  let y = 0;
  let headerText = '';

  function startPage(){
    doc.addPage();
    pageNum++;
    doc.setFillColor(...PDF_ACCENT);
    doc.rect(0, 0, pageW, 46, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10.5);
    doc.text(PDF_APP_NAME, margin, 29);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9.5);
    const titleTrunc = testTitle.length > 55 ? testTitle.slice(0, 52) + '…' : testTitle;
    doc.text(titleTrunc, pageW - margin, 29, { align: 'right' });

    doc.setTextColor(...PDF_MUTED);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.text(headerText.toUpperCase(), margin, 68);
    doc.setDrawColor(226, 226, 226);
    doc.setLineWidth(0.6);
    doc.line(margin, 78, pageW - margin, 78);

    doc.setTextColor(...PDF_INK);
    drawFooter();
    return 100;
  }
  function ensureSpace(need){
    if(y + need > pageH - 56) y = startPage();
  }
  function writeBlock(labelText, text, boxed, boxColor){
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10.5);
    ensureSpace(lineHeight + 8);
    doc.setTextColor(...PDF_ACCENT);
    doc.text(labelText.toUpperCase(), margin, y);
    y += lineHeight + 2;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(12.5);
    const lines = doc.splitTextToSize(text || '(blank)', maxWidth - (boxed ? 24 : 0));
    const blockH = lines.length * lineHeight;

    if(boxed){
      ensureSpace(blockH + 20);
      doc.setFillColor(...(boxColor || PDF_ACCENT_LIGHT));
      doc.roundedRect(margin - 12, y - 14, maxWidth + 24, blockH + 20, 6, 6, 'F');
      y += 4;
    }
    doc.setTextColor(...PDF_INK);
    for(const line of lines){
      ensureSpace(lineHeight);
      doc.text(line, margin, y);
      y += lineHeight;
    }
    if(boxed) y += 10;
  }

  // Helper function to load image and get dimensions
  // FIXED: reading naturalWidth/naturalHeight never touches pixel data, so it
  // doesn't need crossOrigin at all — forcing it unnecessarily could make this
  // load fail (and skip the image entirely) on a host that doesn't handle a
  // CORS-flagged request the same way as a plain one.
  async function loadImageWithDimensions(imgUrl){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        resolve({ url: imgUrl, naturalWidth: img.naturalWidth, naturalHeight: img.naturalHeight });
      };
      img.onerror = () => reject(new Error('Failed to load image'));
      img.src = imgUrl;
    });
  }

  // Draws one image preserving its true aspect ratio (never stretches it to fill
  // maxWidth once the height cap kicks in — the old code forced full width AND a
  // capped height at the same time, which squashed/stretched tall or wide images).
  // Smaller images are centered instead of being blown up to full page width.
  async function drawImage(imgUrl){
    try{
      const base64Img = await imageUrlToBase64(imgUrl);
      if(!base64Img){
        // FIXED: previously just skipped, so a blocked/unreachable image vanished
        // from the PDF with no trace. A short muted note makes the gap explicit
        // instead of silent, so it reads as "this image couldn't be embedded"
        // rather than looking like content was lost.
        doc.setFont('helvetica', 'italic');
        doc.setFontSize(9.5);
        doc.setTextColor(...PDF_MUTED);
        ensureSpace(lineHeight + 4);
        doc.text('[Image could not be loaded for this PDF]', margin, y);
        y += lineHeight + 4;
        doc.setTextColor(...PDF_INK);
        return;
      }
      const imgData = await loadImageWithDimensions(imgUrl);
      const aspectRatio = imgData.naturalHeight / imgData.naturalWidth;
      // FIXED: same px-vs-pt unit mismatch as the other drawImage() — see the
      // comment there. Converting px -> pt at 96dpi keeps small images small.
      let imgWidth = Math.min(maxWidth, imgData.naturalWidth * 0.75);
      let imgHeight = imgWidth * aspectRatio;
      const maxImgHeight = 320;
      if(imgHeight > maxImgHeight){
        imgHeight = maxImgHeight;
        imgWidth = imgHeight / aspectRatio;
      }
      if(imgWidth > maxWidth){
        imgWidth = maxWidth;
        imgHeight = imgWidth * aspectRatio;
      }
      const imgX = margin + (maxWidth - imgWidth) / 2; // center images narrower than the page
      ensureSpace(imgHeight + 16);
      doc.addImage(base64Img, 'PNG', imgX, y, imgWidth, imgHeight);
      y += imgHeight + 8;
    }catch(e){
      // Image failed to load/convert — skip it rather than aborting the whole export.
    }
  }
  // Merges an explicit image-URL array with any <img> tags found in the matching
  // raw HTML, de-duplicated, so the same image is never drawn twice.
  async function collectImages(explicitList, rawHtml){
    const merged = (explicitList || []).slice();
    const embedded = await extractImagesFromHtml(rawHtml);
    for(const url of embedded){ if(url && !merged.includes(url)) merged.push(url); }
    return merged;
  }
  // Draws a bordered "Options" section listing every choice, highlighting the
  // correct one (green) and, if it was answered wrong, the chosen one (red) —
  // this was previously missing entirely, so exported PDFs jumped straight from
  // the question to "Your answer" with no way to see the other choices.
  function writeOptions(options, correctLabel, chosenLabel){
    if(!options || !options.length) return;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10.5);
    ensureSpace(lineHeight + 8);
    doc.setTextColor(...PDF_ACCENT);
    doc.text('OPTIONS', margin, y);
    y += lineHeight + 4;

    options.forEach(o=>{
      const isCorrect = o.label === correctLabel;
      const isWrongChosen = !isCorrect && o.label === chosenLabel;
      // FIXED: U+2713/U+2717 (✓/✗) aren't in the WinAnsi encoding jsPDF's standard
      // Helvetica font uses, so drawing them threw off the glyph widths for the
      // rest of the line, making the option text show stray extra spaces between
      // letters. Plain ASCII markers render with normal spacing.
      const tagSuffix = isCorrect ? '   (Correct answer)' : (isWrongChosen ? '   (Your answer)' : '');
      // FIXED: option text was drawn raw (no HTML-tag stripping, no invisible-
      // character cleanup), which both let markup leak into the PDF and caused
      // the "big gaps in the middle of words" bug from soft hyphens etc.
      const cleanLabel = pdfSanitizeInvisibleChars(String(o.label || '').replace(/<[^>]*>/g, ''));
      const cleanText = apkgStripTags(o.text || '').replace(/\n+/g, ' ');
      doc.setFont('helvetica', (isCorrect || isWrongChosen) ? 'bold' : 'normal');
      doc.setFontSize(11.5);
      const lines = doc.splitTextToSize(`${cleanLabel}.  ${cleanText}${tagSuffix}`, maxWidth - 24);
      const blockH = lines.length * lineHeight;
      ensureSpace(blockH + 14);
      // CHANGED: increased contrast — darker fill tint plus a solid left accent
      // bar and darker ink so the correct/incorrect rows are easy to read at a
      // glance instead of pale text on a pale background.
      if(isCorrect || isWrongChosen){
        const fill = isCorrect ? [198,238,214] : [250,209,209];
        const accent = isCorrect ? [18,120,70] : [190,40,40];
        doc.setFillColor(...fill);
        doc.roundedRect(margin - 12, y - 13, maxWidth + 24, blockH + 10, 5, 5, 'F');
        doc.setFillColor(...accent);
        doc.roundedRect(margin - 12, y - 13, 4, blockH + 10, 2, 2, 'F');
      }
      doc.setTextColor(...(isCorrect ? [12,90,52] : (isWrongChosen ? [140,20,20] : PDF_INK)));
      lines.forEach(line=>{
        ensureSpace(lineHeight);
        doc.text(line, margin, y);
        y += lineHeight;
      });
      y += 6;
    });
    doc.setTextColor(...PDF_INK);
    y += 4;
  }

  for(let idx = 0; idx < rows.length; idx++){
    const row = rows[idx];
    const q = row.q;
    const correctLabel = correctLabelOf(q);
    const qRawHtml = q.raw_text || q.text || '';
    const qText = apkgStripTags(qRawHtml).trim();
    const yourAnswerText = (row.a && row.a.chosen) ? row.a.chosen : '(no answer given)';
    const correctText = `${correctLabel ? correctLabel + ' — ' : ''}${correctAnswerTextOnly(q, correctLabel)}`.trim() || '(not recorded)';
    const explanationRawHtml = q.explanation || '';
    const explanation = apkgStripTags(explanationRawHtml).trim();
    const style = STATUS_STYLE[row.status];

    headerText = `Question ${row.i + 1} of ${rows.length}`;
    y = startPage();

    // status pill, top-right of the question header area
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    const pillW = doc.getTextWidth(style.text) + 20;
    doc.setFillColor(...style.color);
    doc.roundedRect(pageW - margin - pillW, y - 14, pillW, 20, 10, 10, 'F');
    doc.setTextColor(255, 255, 255);
    doc.text(style.text, pageW - margin - pillW / 2, y, { align: 'center' });
    doc.setTextColor(...PDF_INK);

    writeBlock('Question', qText, false);

    // Question images: explicit question_images[] plus anything embedded as <img>
    // tags in the raw (pre-stripped) question HTML — merged and de-duplicated.
    const questionImages = await collectImages(q.question_images, qRawHtml);
    if(questionImages.length){
      y += 8;
      for(const imgUrl of questionImages) await drawImage(imgUrl);
    }

    y += 12;
    // Systematic order: Question -> Options -> Your answer -> Correct answer -> Explanation.
    writeOptions(q.options, correctLabel, row.a && row.a.chosen);

    writeBlock('Your answer', yourAnswerText, true, row.status==='correct' ? [226,246,235] : (row.status==='incorrect' ? [252,231,231] : PDF_ACCENT_LIGHT));
    y += 8;
    writeBlock('Correct answer', correctText, false);
    if(explanation){
      y += 8;
      writeBlock('Explanation', explanation, false);

      const explanationImages = await collectImages(q.explanation_images, explanationRawHtml);
      if(explanationImages.length){
        y += 8;
        for(const imgUrl of explanationImages) await drawImage(imgUrl);
      }
    }
  }

  return doc.output('blob');
}

// Downloads a completed session ("previous test") as a branded PDF.
async function downloadSessionAsPdf(session, label){
  if(!session){ showMiniToast('Test not found', 'error'); return; }
  showMiniToast('Building PDF…', 'success');
  try{
    const blob = await buildSessionReviewPdfBlob(session, label);
    if(!blob){ showMiniToast('Nothing to export', 'error'); return; }
    const safeFileName = (label || 'test-result').replace(/[\\/:*?"<>|]/g, '_').trim() || 'test-result';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${safeFileName}.pdf`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showMiniToast('PDF downloaded', 'success');
  }catch(e){
    console.error('Session PDF build failed', e);
    showMiniToast('Could not build the PDF', 'error');
  }
}

async function downloadSessionAsTxt(session, label){
  if(!session){ showMiniToast('Test not found', 'error'); return; }

function buildSessionReviewTxtContent(session, label){
  const rows = (session.compositeIds || []).map((cid, i) => {
    const fq = flatByCompositeId(cid);
    if(!fq) return null;
    const q = fq.q;
    const a = session.answers ? session.answers[cid] : null;
    let status = 'skipped';
    if(a && a.chosen) status = a.correct ? 'correct' : 'incorrect';
    return { i, q, a, status };
  }).filter(Boolean);
  
  if(!rows.length) return null;

  const testTitle = (label || 'Practice test').trim();
  const dateStr = new Date(session.ts).toLocaleString();
  const correctCount = rows.filter(r=>r.status==='correct').length;
  const incorrectCount = rows.filter(r=>r.status==='incorrect').length;
  const skippedCount = rows.filter(r=>r.status==='skipped').length;
  const accuracy = (correctCount+incorrectCount) ? Math.round(correctCount/(correctCount+incorrectCount)*100) : 0;
  const elapsedTime = fmtTime(session.elapsedSec||0);

  let txtContent = '';
  
  // Header
  txtContent += '='.repeat(70) + '\n';
  txtContent += testTitle + '\n';
  txtContent += '='.repeat(70) + '\n\n';
  
  // Session info
  txtContent += 'SESSION INFORMATION\n';
  txtContent += '-'.repeat(70) + '\n';
  txtContent += `Date & Time: ${dateStr}\n`;
  txtContent += `Mode: ${escapeHtml(session.mode||'practice')}\n`;
  txtContent += `Time Elapsed: ${elapsedTime}\n\n`;
  
  // Summary stats
  txtContent += 'SUMMARY\n';
  txtContent += '-'.repeat(70) + '\n';
  txtContent += `Total Questions: ${rows.length}\n`;
  txtContent += `Accuracy: ${accuracy}%\n`;
  txtContent += `Correct: ${correctCount}\n`;
  txtContent += `Incorrect: ${incorrectCount}\n`;
  txtContent += `Skipped: ${skippedCount}\n\n`;
  
  // Detailed results
  txtContent += 'DETAILED RESULTS\n';
  txtContent += '='.repeat(70) + '\n\n';
  
  rows.forEach(row => {
    const q = row.q;
    const correctLabel = correctLabelOf(q);
    const qText = apkgStripTags(q.raw_text || q.text || '').trim();
    const yourAnswerText = (row.a && row.a.chosen) ? row.a.chosen : '(no answer given)';
    const correctText = `${correctLabel ? correctLabel + ' — ' : ''}${correctAnswerTextOnly(q, correctLabel)}`.trim() || '(not recorded)';
    const explanation = apkgStripTags(q.explanation || '').trim();
    const statusStr = row.status.toUpperCase();
    
    txtContent += `Question ${row.i + 1} of ${rows.length}\n`;
    txtContent += `Status: ${statusStr}\n`;
    txtContent += '-'.repeat(70) + '\n';
    txtContent += `Question:\n${qText}\n`;
    
    // Add image count if present
    if(q.question_images && q.question_images.length > 0){
      txtContent += `\n[IMAGES: ${q.question_images.length} image(s) included in PDF/online version]\n`;
    }
    
    txtContent += `\nYour Answer:\n${yourAnswerText}\n\n`;
    txtContent += `Correct Answer:\n${correctText}\n`;
    
    if(explanation){
      txtContent += `\nExplanation:\n${explanation}`;
      if(q.explanation_images && q.explanation_images.length > 0){
        txtContent += `\n\n[IMAGES: ${q.explanation_images.length} image(s) included in PDF/online version]`;
      }
      txtContent += '\n';
    }
    
    txtContent += '\n' + '='.repeat(70) + '\n\n';
  });
  
  txtContent += `Generated by QBank Center\n`;
  
  return txtContent;
}

/* ============================================================
   ADDED: FOLDER HIERARCHY FROM IMPORTED "path" ARRAYS
   Some exports (e.g. the "Question Review Program" / QRP dumps) give each
   test/lesson a "path" array instead of (or in addition to) a flat title —
   e.g. { "title": "Pelvis", "path": ["1st Year", "Anatomy", "Pelvis"], ... }.
   Without this step the importer only ever looks at test.title via
   subjectOf() (see below), so every one of these tests landed as its own
   top-level "subject" (flattening "1st Year > Anatomy > Pelvis" down to a
   single folder named "Pelvis") instead of nesting under Year > Subject.
   This rewrites test.title into the "Subject::Subject - Lesson" convention
   the app's own "::" folder-tree renderer (buildSubjectTreeHtml) already
   understands, so a 3+ level path becomes real nested folders:
     path: ["1st Year","Anatomy","Pelvis"]  ->  title: "1st Year::Anatomy - Pelvis"
   which subjectOf() reads as subject "1st Year::Anatomy" (rendered as two
   nested folders) with lesson name "Pelvis" inside it. */
function applyImportedPathHierarchy(tests){
  if(!Array.isArray(tests)) return tests;
  for(const t of tests){
    if(!t || !Array.isArray(t.path) || !t.path.length) continue;
    // Already-processed re-imports (e.g. via "Update Resource") already have real structured
    // fields — don't clobber them.
    if(Array.isArray(t.subjectPath) && t.subjectPath.length) continue;
    const segs = t.path
      .map(p => String(p==null?'':p).trim())
      .filter(Boolean);
    if(!segs.length) continue;
    if(segs.length === 1){
      const lesson = (t.title && t.title.trim() && t.title.trim() !== segs[0]) ? t.title.trim() : (t.title || segs[0]);
      t.subjectPath = [segs[0]];
      t.lessonName = lesson;
    } else {
      t.subjectPath = segs.slice(0, -1);
      t.lessonName = segs[segs.length - 1];
    }
    syncTestTitle(t);
  }
  return tests;
}

/* ============================================================
   Parsing imported files
   ============================================================ */
/* ADDED: generic balanced-delimiter scanner shared by the TESTS_LIST array
   extractor and the FOLDER_TREE object extractor below. Starts at the index
   of the opening delimiter (open) and returns the end index (exclusive) of
   its matching close delimiter, skipping over delimiters that appear inside
   quoted strings. Returns -1 if no match is found (truncated/malformed file). */
function scanBalancedDelimiter(text, startIdx, open, close){
  let depth=0, inStr=false, esc=false;
  for(let j=startIdx; j<text.length; j++){
    const c = text[j];
    if(inStr){
      if(esc){ esc=false; }
      else if(c==='\\'){ esc=true; }
      else if(c==='"'){ inStr=false; }
    } else {
      if(c==='"') inStr=true;
      else if(c===open) depth++;
      else if(c===close){ depth--; if(depth===0) return j+1; }
    }
  }
  return -1;
}

/* ADDED: Many export tools (e.g. the "combined qbank" exporter that produced
   the RRR / QRP / marrow-style files) write TWO separate top-level structures
   into the page:
     - TESTS_LIST  — a flat array with the actual question data (what we parse
       into `tests` below). Its items only ever carry {id, title, questions, ...}
       — no folder/subject info, per that exporter's own schema.
     - FOLDER_TREE — a nested {name, path, tests:[{id, path}], folders:[...]}
       structure that records which folder/subfolder each test id actually
       lives in (e.g. "1st Year" > "Anatomy" > "Abdomen").
   The importer used to only ever look at TESTS_LIST, so every imported test
   landed as its own flat top-level folder (or all got dumped together),
   throwing away the real subject/topic organisation the source file already
   had. This walks FOLDER_TREE (if present) and returns a Map of
   testId -> folder-path-array (e.g. ["1st Year","Anatomy"]) so that
   organisation can be restored on import — see applyFolderTreeHierarchy(). */
function parseFolderTreePathMap(text){
  const map = new Map();
  try{
    const m = /FOLDER_TREE\s*=\s*\{/.exec(text);
    if(!m) return map;
    const startBrace = m.index + m[0].length - 1;
    const end = scanBalancedDelimiter(text, startBrace, '{', '}');
    if(end === -1) return map;
    const tree = JSON.parse(text.slice(startBrace, end));
    const walk = (node)=>{
      if(!node || typeof node !== 'object') return;
      const nodePath = Array.isArray(node.path) ? node.path : [];
      if(Array.isArray(node.tests)){
        for(const t of node.tests){
          if(t && t.id != null) map.set(String(t.id), nodePath.slice());
        }
      }
      if(Array.isArray(node.folders)){
        for(const f of node.folders) walk(f);
      }
    };
    walk(tree);
  }catch(e){ console.error('FOLDER_TREE parse failed', e); /* non-fatal — import still proceeds flat */ }
  return map;
}

/* ADDED: applies the testId -> folder-path map from parseFolderTreePathMap()
   onto the parsed tests, encoding it into the same "Subject::Sub - Lesson"
   title convention the rest of the app already understands (subjectOf() /
   buildSubjectTreeHtml() split on " - " and "::"). Deliberately separate from
   applyImportedPathHierarchy() below: that function treats the LAST path
   segment as the lesson name (for exports where path already includes the
   test's own name), which would collide here — FOLDER_TREE paths are pure
   folder paths, and the test's own `title` is the correct lesson name and
   must be preserved as-is, not overwritten by the folder's name. */
function applyFolderTreeHierarchy(tests, folderMap){
  if(!Array.isArray(tests) || !folderMap || !folderMap.size) return tests;
  for(const t of tests){
    if(!t) continue;
    // Already-processed re-imports already have real structured fields — don't clobber them.
    if(Array.isArray(t.subjectPath) && t.subjectPath.length) continue;
    const folderPath = folderMap.get(String(t.id));
    if(!Array.isArray(folderPath) || !folderPath.length) continue;
    let segs = folderPath
      .map(p => String(p==null?'':p).trim())
      .filter(Boolean);
    if(!segs.length) continue;
    const lessonName = (t.title && String(t.title).trim()) ? String(t.title).trim() : t.id;
    // Some exporters use a "folder per test" leaf (the deepest folder is just
    // the test's own name again, or the test's own title already starts with
    // that folder name baked in) — drop that redundant last segment so we
    // don't show e.g. "1st Year::Anatomy::Abdomen - Abdomen" or
    // "...::Embryology - 1 - Embryology - 1 - Embryology 1".
    if(segs.length > 1){
      const lastLower = segs[segs.length-1].toLowerCase();
      const lessonLower = lessonName.toLowerCase();
      if(lessonLower === lastLower || lessonLower.startsWith(lastLower + ' - ') || lessonLower.startsWith(lastLower + '-')){
        segs = segs.slice(0, -1);
      }
    }
    t.subjectPath = segs;
    t.lessonName = lessonName;
    syncTestTitle(t);
  }
  return tests;
}

/* Robustly extracts the TESTS_LIST JSON array from a raw HTML/text export,
   or accepts a plain JSON file (array of tests, single test, or {tests:[...]}),
   or a plain-text "Part 1 / Part 2 / Part 3" Q&A markdown file (see parsePlainQAText below). */
/* ADDED: Second import format — "CoreBTR Elite"-style single-file qbanks store their questions as
   a nested folder tree instead of a flat TESTS_LIST array:
     const APP_DATA = [
       { "title": "Renal & Electrolytes", "lessons": [
         { "title": "Renal Physiology Graphs", "questions": [
           { "id": "...", "text": "...", "img": null|"https://...",
             "options": {"A":"...","B":"...","C":"...","D":"..."}, "ans": "B", "expl": "..." },
           ...
         ]},
         ...
       ]},
       ...
     ];
   convertAppDataToTests() reshapes each {folder,lesson} pair into one TESTS_LIST-style test object
   (options-object+ans -> options-array with a `correct` flag, img -> question_images, expl ->
   explanation) and gives it subjectPath:[folder.title], lessonName: lesson.title so it lands in the
   Resources tab nested under a folder named after the source subject, exactly like a "path"-based
   import — see applyImportedPathHierarchy() above for the same convention. */
function convertAppDataToTests(folders){
  const tests = [];
  for(const folder of folders){
    if(!folder || typeof folder !== 'object') continue;
    const subjectName = (String(folder.title||'').trim()) || 'Untitled';
    const lessons = Array.isArray(folder.lessons) && folder.lessons.length
      ? folder.lessons
      : [{ title: subjectName, questions: Array.isArray(folder.questions) ? folder.questions : [] }];
    for(const lesson of lessons){
      if(!lesson || typeof lesson !== 'object') continue;
      const lessonName = (String(lesson.title||'').trim()) || 'General';
      const rawQs = Array.isArray(lesson.questions) ? lesson.questions : [];
      const questions = [];
      for(const q of rawQs){
        if(!q || typeof q !== 'object') continue;
        const optsObj = (q.options && typeof q.options === 'object') ? q.options : {};
        const correctKey = q.ans;
        const options = Object.keys(optsObj).sort().map(k => ({
          label: k,
          text: String(optsObj[k]==null ? '' : optsObj[k]),
          correct: k === correctKey
        }));
        if(!options.length) continue; // no parseable options — skip this question
        if(!options.some(o=>o.correct) && options.length) options[0].correct = true; // fallback
        questions.push({
          id: q.id ? String(q.id) : uid('q'),
          text: String(q.text==null ? '' : q.text),
          question_images: q.img ? [String(q.img)] : [],
          options: options,
          explanation: String(q.expl==null ? '' : q.expl),
          explanation_images: []
        });
      }
      if(!questions.length) continue; // empty lesson — skip
      const t = { id: uid('test'), subjectPath: [subjectName], lessonName: lessonName, questions: questions };
      syncTestTitle(t);
      tests.push(t);
    }
  }
  return tests;
}
/* Looks for `... APP_DATA = [ ... ]` anywhere in the file, balances the array, JSON-parses it, and
   converts it via convertAppDataToTests() above. Returns null (falls through to the other formats
   below) if the variable isn't present, isn't valid JSON, or doesn't look like this folder/lesson
   shape at all — so a file that merely happens to contain the substring "APP_DATA" elsewhere is safe. */
function tryParseAppDataFormat(text){
  const m = /APP_DATA\s*=\s*\[/.exec(text);
  if(!m) return null;
  const startBracket = m.index + m[0].length - 1;
  const end = scanBalancedDelimiter(text, startBracket, '[', ']');
  if(end === -1) return null;
  let folders;
  try{ folders = JSON.parse(text.slice(startBracket, end)); }
  catch(e){ console.error('APP_DATA parse failed', e); return null; }
  if(!Array.isArray(folders) || !folders.length) return null;
  const looksRight = folders.some(f => f && typeof f === 'object' && (Array.isArray(f.lessons) || Array.isArray(f.questions)));
  if(!looksRight) return null;
  const tests = convertAppDataToTests(folders);
  return tests.length ? tests : null;
}

function extractTestsArray(text, fileName){
  // 0) ADDED: CoreBTR-style nested "APP_DATA = [...]" qbank export — see tryParseAppDataFormat() above.
  const appDataTests = tryParseAppDataFormat(text);
  if(appDataTests) return appDataTests;

  // 1) Look for the exact assignment pattern (variable name may vary slightly
  //    across export versions, so try a small set of known/likely names).
  const patterns = [/TESTS_LIST\s*=\s*\[/, /QUESTIONS_LIST\s*=\s*\[/, /TEST_DATA\s*=\s*\[/, /QUESTION_BANK\s*=\s*\[/];
  let startBracket = -1;
  for(const re of patterns){
    const m = re.exec(text);
    if(m){ startBracket = m.index + m[0].length - 1; break; }
  }
  if(startBracket !== -1){
    const end = scanBalancedDelimiter(text, startBracket, '[', ']');
    if(end !== -1){
      const arrText = text.slice(startBracket, end);
      try{
        const tests = JSON.parse(arrText);
        // ADDED: restore real folder/subject organisation from a sibling FOLDER_TREE,
        // if this export included one (see parseFolderTreePathMap for why this is needed).
        const folderMap = parseFolderTreePathMap(text);
        if(folderMap.size) applyFolderTreeHierarchy(tests, folderMap);
        return tests;
      }
      catch(e){ console.error('TESTS_LIST parse failed', e); /* fall through to other formats */ }
    }
  }

  // 2) Plain JSON file (array of tests, single test object, or {tests:[...]})
  try{
    const parsed = JSON.parse(text);
    if(Array.isArray(parsed)) return parsed;
    if(parsed && Array.isArray(parsed.tests)) return parsed.tests;
    if(parsed && parsed.questions) return [parsed];
  }catch(e){ /* fall through */ }

  // 3) Plain-text "Part 1: Question / Part 2: Answer / Part 3: Explanation" markdown format
  const base = fileName ? fileName.replace(/\.[^/.]+$/, '') : null;
  const viaPlainText = parsePlainQAText(text, base);
  if(viaPlainText) return viaPlainText;

  return null;
}

/* ADDED: Parses the plain-text Q&A export format, e.g.:
   ## Question 3
   ### Part 1: Question
   **Q3. Which fundamental force ...?**
   A) Gravity
   B) Strong nuclear force
   C) Electromagnetic force
   D) Weak nuclear force
   ### Part 2: Answer
   **Correct Answer:** B) Strong nuclear force
   ### Part 3: Explanation
   ...explanation text...
   ---
   Blocks are separated by "## Question N" headers (optionally followed by "---" dividers).
   Returns a TESTS_LIST-shaped array with a single test, or null if the format isn't detected. */
function parsePlainQAText(text, fileNameBase){
  if(!text || !/##\s*Question\s+\d+/i.test(text)) return null;

  // Locate every "## Question N" header and slice the text into per-question blocks.
  const headerRe = /##\s*Question\s+(\d+)/gi;
  const starts = [];
  let hm;
  while((hm = headerRe.exec(text))){ starts.push({ num: hm[1], index: hm.index }); }
  if(starts.length === 0) return null;

  const questions = [];
  for(let i=0; i<starts.length; i++){
    const blockStart = starts[i].index;
    const blockEnd = (i+1 < starts.length) ? starts[i+1].index : text.length;
    const raw = text.slice(blockStart, blockEnd);

    const p2idx = raw.search(/###\s*Part\s*2\b/i);
    const p3idx = raw.search(/###\s*Part\s*3\b/i);
    if(p2idx === -1 || p3idx === -1) continue; // malformed block — skip it

    const part1 = raw.slice(0, p2idx);
    const part2 = raw.slice(p2idx, p3idx);
    let part3 = raw.slice(p3idx);

    // Question stem: the first bolded "**Qn. ...**" segment in Part 1.
    let qText = '';
    const qMatch = part1.match(/\*\*\s*Q\s*\d+\s*[.:]\s*([\s\S]*?)\*\*/i);
    if(qMatch){
      qText = qMatch[1].trim();
    } else {
      const firstLine = part1.split('\n').map(l=>l.trim()).find(l=>l && !/^###/i.test(l));
      qText = firstLine || ('Question ' + starts[i].num);
    }

    // Options: lines like "A) text" or "A. text" (supports up to F for extra options).
    const optRe = /^\s*([A-F])[\)\.]\s*(.+)$/gm;
    const options = [];
    let om;
    while((om = optRe.exec(part1))){
      options.push({ label: om[1].toUpperCase(), text: om[2].trim(), correct: false });
    }
    if(options.length === 0) continue; // no parseable options — skip block

    // Correct answer letter, from Part 2, e.g. "**Correct Answer:** B) Strong nuclear force"
    const caMatch = part2.match(/Correct\s*Answer[:\*\s]*\**\s*([A-F])[\)\.]/i);
    if(caMatch){
      const correctLabel = caMatch[1].toUpperCase();
      for(const o of options){ if(o.label === correctLabel) o.correct = true; }
    }
    // Fallback: if nothing matched as correct (unusual formatting), mark the first option.
    if(!options.some(o=>o.correct)) options[0].correct = true;

    // Explanation: Part 3 text with its own header line and trailing "---" divider stripped.
    part3 = part3.replace(/^###\s*Part\s*3[^\n]*\n?/i, '');
    part3 = part3.replace(/\n?-{3,}\s*$/, '');
    part3 = part3.trim();

    questions.push({
      id: uid('q'),
      text: qText,
      question_images: [],
      options: options,
      explanation: part3,
      explanation_images: []
    });
  }

  if(questions.length === 0) return null;

  const title = 'Imported Text - ' + (fileNameBase || 'Q&A Import');
  return [{ id: uid('test'), title: title, questions: questions }];
}

// CHANGED: sorts a resources array according to an explicitly-passed sort mode —
// 'newest' (default, most-recently-added on top), 'oldest', 'name-asc', 'name-desc'.
// Shared plumbing between the Resources tab and the Flashcard Decks tab, but each tab now
// passes in its OWN setting (resourceSortMode vs fcDeckSortMode) so the two stay fully
// independent — sorting one list never changes the other's remembered sort order.
// ADDED: last time ANY question belonging to resource `resId` was answered, per APP.historyMap.
// compositeId() always prefixes a question's key with its resourceId + '::' (see compositeId()
// above), so we can find a resource's entries by prefix without needing a rebuilt index. Used by
// the 'recent-practice' sort mode below. Returns 0 (sorts last) if the resource has never been
// attempted.
function lastPracticedAt(resId){
  const prefix = resId + '::';
  let max = 0;
  for(const cid in APP.historyMap){
    if(!cid.startsWith(prefix)) continue;
    const h = APP.historyMap[cid];
    if(!h || !h.attempts || !h.attempts.length) continue;
    const last = h.attempts[h.attempts.length-1].ts || 0;
    if(last > max) max = last;
  }
  return max;
}
// ADDED: natural/numeric string compare — treats runs of digits as numbers so "Lesson 2" sorts
// before "Lesson 10" instead of after it (plain localeCompare/`<` would put "10" before "2").
// Used by the folder-sort 'number' mode below.
function naturalCompare(a, b){
  return String(a||'').localeCompare(String(b||''), undefined, { numeric: true, sensitivity: 'base' });
}
function sortResourcesArray(arr, mode){
  mode = mode || 'newest';
  const out = arr.slice();
  if(mode === 'newest') out.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
  else if(mode === 'oldest') out.sort((a,b)=>(a.addedAt||0)-(b.addedAt||0));
  else if(mode === 'name-asc') out.sort((a,b)=>a.name.localeCompare(b.name));
  else if(mode === 'name-desc') out.sort((a,b)=>b.name.localeCompare(a.name));
  else if(mode === 'recent-practice'){
    // ADDED: most-recently-practiced resource/deck first; never-practiced ones (0) fall to the
    // bottom, tie-broken by most-recently-added so freshly imported items don't get buried.
    const practiced = {};
    for(const r of out) practiced[r.id] = lastPracticedAt(r.id);
    out.sort((a,b)=>{
      const diff = practiced[b.id] - practiced[a.id];
      if(diff !== 0) return diff;
      return (b.addedAt||0)-(a.addedAt||0);
    });
  }
  return out;
}
const RESOURCE_SORT_LABELS = { // ADDED: shared label text only, shown in the sort button/menu in both tabs — each tab still keeps its own separate sort-order setting/state
  newest: 'Newest first', oldest: 'Oldest first', 'name-asc': 'Name (A–Z)', 'name-desc': 'Name (Z–A)', 'recent-practice': 'Recently practiced'
};
const SUBJECT_SORT_LABELS = { // ADDED: shared label text only, shown in the folder-sort button inside a resource/deck's subject tree — each screen still keeps its own separate sort-order setting/state
  custom: 'Custom order', 'name-asc': 'Name (A–Z)', 'name-desc': 'Name (Z–A)', number: 'Number order', 'created-desc': 'Date created (newest first)'
};
// ADDED: resources that are QBank question-bank resources only (excludes imported Anki flashcard decks,
// which live in their own "Flashcard Decks" tab instead of Resources/Practice Builder/Home counts)
function nonFcResources(){
  const mode = (APP.settings && APP.settings.resourceSortMode) || 'newest';
  return sortResourcesArray(APP.resources.filter(r=>!r.isFlashcardDeck), mode);
}
// ADDED: the imported Anki flashcard decks only
function fcDeckResources(){
  const mode = (APP.settings && APP.settings.fcDeckSortMode) || 'newest'; // CHANGED: decks now use their own sort setting, not the Resources tab's
  return sortResourcesArray(APP.resources.filter(r=>r.isFlashcardDeck), mode);
}

function rebuildFlatIndex(){
  const flat = [];
  for(const res of APP.resources){
    for(const test of (res.tests||[])){
      const subj = subjectOf(test);
      const pyq = isPyqTest(test, res.name);
      for(const q of (test.questions||[])){
        const cid = compositeId(res.id, test.id, q.id);
        flat.push({ compositeId: cid, resourceId: res.id, resourceName: res.name, testId: test.id, testTitle: test.title, subject: subj, isPyq: pyq, q });
      }
    }
  }
  APP.flatIndex = flat;
}

async function importFile(file, folderId){
  const text = await file.text();
  const tests = extractTestsArray(text, file.name);
  if(!tests || !Array.isArray(tests) || tests.length===0){
    showMiniToast('Could not find question data in "'+file.name+'"', 'error');
    return null;
  }
  applyImportedPathHierarchy(tests); // ADDED: turn "path": ["Year","Subject","Topic"] into nested Year > Subject folders instead of a flat list
  let qCount = 0;
  for(const t of tests) qCount += (t.questions||[]).length;
  const resource = {
    id: uid('res'),
    name: file.name.replace(/\.(html?|txt|json)$/i,''),
    addedAt: Date.now(),
    folderId: folderId || null, // ADDED: if imported while browsing inside a folder, lands there instead of always Root
    tests: tests,
    stats: { tests: tests.length, questions: qCount },
    subjectCreatedAt: {} // ADDED: populated just below — backs the 'created-desc' folder-sort option
  };
  // ADDED: stamp every subject found in this import with the resource's own addedAt, so a freshly
  // imported folder tree already has real "created" data instead of sorting as all-unknown.
  for(const t of tests){ stampSubjectCreated(resource, subjectOf(t), resource.addedAt); if(t.createdAt == null) t.createdAt = resource.addedAt; }
  await idbPut('resources', resource);
  APP.resources.unshift(resource); // CHANGED: new resource appears at the top of the list
  rebuildFlatIndex();
  return resource;
}

/* ============================================================
   ADDED: UPDATE RESOURCE — parses a new file the same way importFile()
   does, but instead of creating a brand-new resource it appends the
   parsed tests onto an *existing* resource (e.g. dropping in a
   corrected/expanded export of the same qbank). Existing tests, their
   ids, and everyone's answer history for them are left untouched —
   only new tests are added, so nothing already-answered gets reset.
   ============================================================ */
async function updateResourceFromFile(resId, file){
  const res = APP.resources.find(r=>r.id===resId);
  if(!res) return null;
  const text = await file.text();
  const newTests = extractTestsArray(text, file.name);
  if(!newTests || !Array.isArray(newTests) || newTests.length===0){
    showMiniToast('Could not find question data in "'+file.name+'"', 'error');
    return null;
  }
  applyImportedPathHierarchy(newTests); // ADDED: same Year/Subject/Topic nesting fix as importFile()
  let qCount = 0;
  for(const t of newTests) qCount += (t.questions||[]).length;
  for(const t of newTests){ stampSubjectCreated(res, subjectOf(t)); if(t.createdAt == null) t.createdAt = Date.now(); } // ADDED: backs the 'created-desc' folder/lesson sort options — only stamps what isn't already known
  res.tests = (res.tests||[]).concat(newTests);
  res.stats = { tests: res.tests.length, questions: (res.stats?.questions||0) + qCount };
  await idbPut('resources', res);
  rebuildFlatIndex();
  return { resource: res, addedTests: newTests.length, addedQuestions: qCount };
}
// ADDED: drives the "Update" button's hidden file input — parses one or more files and
// merges each into the given resource, then shows a per-file status list + summary toast,
// mirroring handleFiles()'s UX but targeted at a single existing resource instead of
// creating new ones.
async function handleResourceUpdateFiles(resId, fileList, statusElId){
  const status = document.getElementById(statusElId || '');
  const files = Array.from(fileList);
  let successCount = 0, failCount = 0, addedTests = 0, addedQuestions = 0;
  for(const f of files){
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:.8rem;padding:6px 0;';
    row.innerHTML = `<div class="spinner"></div><span>Parsing ${escapeHtml(f.name)}…</span>`;
    if(status) status.appendChild(row);
    await new Promise(r=>setTimeout(r, 30)); // let spinner paint
    try{
      const res = await updateResourceFromFile(resId, f);
      if(res){
        row.innerHTML = `<span style="color:var(--green-status);">✓</span><span>${escapeHtml(f.name)} — added ${res.addedTests} tests, ${res.addedQuestions.toLocaleString()} questions</span>`;
        successCount++; addedTests += res.addedTests; addedQuestions += res.addedQuestions;
      } else {
        row.innerHTML = `<span style="color:var(--red-status);">✗</span><span>${escapeHtml(f.name)} — no question data found</span>`;
        failCount++;
      }
    }catch(e){
      console.error(e);
      row.innerHTML = `<span style="color:var(--red-status);">✗</span><span>${escapeHtml(f.name)} — failed to parse</span>`;
      failCount++;
    }
  }
  if(successCount){
    showMiniToast(`Updated — added ${addedTests} test${addedTests===1?'':'s'}, ${addedQuestions.toLocaleString()} question${addedQuestions===1?'':'s'}${failCount?` (${failCount} file${failCount===1?'':'s'} failed)`:''}`, 'success');
  } else if(failCount){
    showMiniToast('Update failed — no question data found in the selected file(s)', 'error');
  }
  const refresh = ()=>{
    if(APP.currentTab==='resource' && APP.resourceDetailResId===resId) renderResourceDetail(resId);
    if(APP.currentTab==='resources') renderResourcesList();
    renderHome();
  };
  if(successCount || failCount) setTimeout(refresh, 900); else refresh();

/* ============================================================
   ADDED: Anki .apkg import — used by the "Import .apkg" button on the
   Flashcards page. Everything runs client-side in the browser:
     - JSZip unzips the .apkg (a zip archive)
     - fzstd decompresses the modern zstd-compressed collection/media
     - sql.js (SQLite compiled to WebAssembly) reads the collection DB
   All three libraries are loaded on-demand from a CDN the first time
   this is used, so nothing is downloaded until someone actually imports
   an .apkg file. Supports both the legacy (collection.anki2, JSON
   models/decks) and modern (collection.anki21b, notetypes/fields/decks
   tables) Anki schema versions, Basic / Basic+reversed / Cloze note
   types (the vast majority of real decks), and falls back to a generic
   "dump all fields" rendering for anything else. Media (images/audio
   referenced in fields) is extracted best-effort and swapped in as
   blob URLs; failures there are non-fatal.
   ============================================================ */
let _apkgLibsPromise = null;
function loadScriptOnce(src){
  return new Promise((resolve,reject)=>{
    const existing = document.querySelector('script[data-dyn-src="'+src+'"]');
    if(existing){
      if(existing.dataset.loaded==='1') resolve();
      else existing.addEventListener('load', ()=>resolve());
      existing.addEventListener('error', ()=>reject(new Error('Failed to load '+src)));
      return;
    }
    const s = document.createElement('script');
    s.src = src;
    s.dataset.dynSrc = src;
    s.onload = ()=>{ s.dataset.loaded='1'; resolve(); };
    s.onerror = ()=>reject(new Error('Failed to load '+src));
    document.head.appendChild(s);
  });
}
function ensureApkgLibs(){
  if(_apkgLibsPromise) return _apkgLibsPromise;
  _apkgLibsPromise = (async ()=>{
    await Promise.all([
      loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'),
      loadScriptOnce('https://cdn.jsdelivr.net/npm/fzstd@0.1.1/umd/index.js'),
      loadScriptOnce('https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js')
    ]);
    const SQL = await window.initSqlJs({ locateFile: f => 'https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/'+f });
    return { JSZip: window.JSZip, fzstd: window.fzstd, SQL };
  })();
  return _apkgLibsPromise;
}

function apkgStripSound(html){ return String(html||'').replace(/\[sound:[^\]]+\]/g, ''); }
function apkgStripTags(html){
  const tmp = document.createElement('div');
  tmp.innerHTML = String(html||'').replace(/<br\s*\/?>/gi,'\n').replace(/<\/(p|div)>/gi,'\n');
  const raw = (tmp.textContent || tmp.innerText || '').replace(/\s+\n/g,'\n').trim();
  return pdfSanitizeInvisibleChars(raw);
}
// FIXED: content pasted from justified/hyphenated sources (PDFs, Word docs) often
// carries soft hyphens (U+00AD) at old syllable-break points and other zero-width
// characters. Browsers render these with no visible width, so the text looks fine
// on screen — but jsPDF's standard fonts draw them as a visible blank/space-width
// glyph, which is why exported PDFs showed gaps in the middle of words like
// "cer uloplasmin" (ceruloplasmin) or "es timation" (estimation). Stripping them
// before handing text to jsPDF fixes this everywhere text is drawn.
// FIXED: explanation/option text often carries unicode symbols (arrows, subscript
// digits, smart quotes/dashes, bullets, checkmarks) that aren't in the WinAnsi
// encoding jsPDF's standard Helvetica font uses. Handing those straight to jsPDF
// doesn't just drop the glyph — it renders as stray garbage characters (e.g. "!'"
// where a "→" was, or "„" where a subscript "4" was, as in "BH„" instead of "BH4")
// and, same as the ✓/✗ case already handled below, throws off the spacing of
// everything after it on the line. Transliterating these to plain ASCII
// equivalents before any text reaches doc.text()/splitTextToSize() fixes both the
// garbled glyphs and the knock-on spacing issue everywhere at once, since every
// text path (apkgStripTags, option labels) already funnels through this function.
function pdfSanitizeInvisibleChars(text){
  return String(text||'')
    .replace(/[\u00AD\u200B\u200C\u200D\uFEFF]/g, '')
    .replace(/\u00A0/g, ' ')
    // arrows -> ASCII "leads to" marker (covers →⇒➡ and ↓⇓, both used in this
    // content as step-by-step "leads to" flow, plus ← / ↑ for completeness)
    .replace(/[\u2192\u21D2\u27A1\u2193\u21D3]/g, ' -> ')
    .replace(/[\u2190\u21D0]/g, ' <- ')
    .replace(/\u2191/g, ' ^ ')
    .replace(/\u2194/g, ' <-> ')
    // checkmark / cross
    .replace(/[\u2713\u2714]/g, '')
    .replace(/[\u2715\u2716\u2717\u2718]/g, 'x')
    // bullets
    .replace(/[\u2022\u25CF\u25E6\u2023\u25AA]/g, '-')
    // dashes, smart quotes, ellipsis
    .replace(/[\u2012\u2013\u2014\u2015]/g, '-')
    .replace(/[\u2018\u2019\u201B]/g, "'")
    .replace(/[\u201C\u201D\u201F]/g, '"')
    .replace(/\u2026/g, '...')
    // degree / plus-minus / multiplication / division / micro
    .replace(/\u00B0/g, ' deg')
    .replace(/\u00B1/g, '+/-')
    .replace(/\u00D7/g, 'x')
    .replace(/\u00F7/g, '/')
    // subscript digits (e.g. BH₄ -> BH4) and superscript digits
    .replace(/[\u2080-\u2089]/g, d => String.fromCharCode(d.charCodeAt(0) - 0x2080 + 48))
    .replace(/[\u2070\u00B9\u00B2\u00B3\u2074-\u2079]/g, d => ({'\u2070':'0','\u00B9':'1','\u00B2':'2','\u00B3':'3','\u2074':'4','\u2075':'5','\u2076':'6','\u2077':'7','\u2078':'8','\u2079':'9'}[d] || d))
    // common Greek letters used in medical text (α-blocker, β-agonist, etc.)
    .replace(/\u03B1/g, 'alpha').replace(/\u03B2/g, 'beta').replace(/\u03B3/g, 'gamma')
    .replace(/\u03B4/g, 'delta').replace(/\u03BC/g, 'mcg').replace(/\u03BB/g, 'lambda')
    .replace(/[ \t]+/g, ' ');
}
function apkgSwapMedia(html, mediaUrlMap){
  if(!html || !mediaUrlMap) return html;
  let out = html;
  for(const filename in mediaUrlMap){
    if(filename && out.indexOf(filename) !== -1) out = out.split(filename).join(mediaUrlMap[filename]);
  }

}
// {{c1::answer}} or {{c1::answer::hint}} — hide the matching cloze number, reveal the rest
function apkgClozeFront(text, clozeNum){
  return String(text||'').replace(/\{\{c(\d+)::([\s\S]*?)(?:::([\s\S]*?))?\}\}/g, (m,n,ans,hint)=>{
    return (parseInt(n,10) === clozeNum) ? ('[' + (hint||'...') + ']') : ans;
  });
}
function apkgClozeBack(text, clozeNum){
  return String(text||'').replace(/\{\{c(\d+)::([\s\S]*?)(?:::([\s\S]*?))?\}\}/g, (m,n,ans,hint)=>{
    return (parseInt(n,10) === clozeNum) ? ('<b style="color:var(--blue-status);">'+ans+'</b>') : ans;
  });
}
// Best-effort decoder for the "media" zip entry, which maps zip entry
// names ("0","1","2",...) to real filenames. Older exports store this as
// plain JSON; modern exports store it as a (possibly zstd-compressed)
// protobuf message. We only need the "name" (field 1) of each entry.
function apkgParseMediaList(bytes){
  try{
    const txt = new TextDecoder('utf-8').decode(bytes);
    const parsed = JSON.parse(txt);
    if(parsed && typeof parsed === 'object') return parsed;
  }catch(e){ /* not JSON — fall through to protobuf */ }
  const map = {};
  try{
    const readVarint = (buf, posObj)=>{
      let result = 0, shift = 0;
      while(true){
        const b = buf[posObj.i++];
        result |= (b & 0x7f) << shift;
        if((b & 0x80) === 0) break;
        shift += 7;
      }
      return result >>> 0;
    };
    const pos = { i: 0 };
    let idx = 0;
    while(pos.i < bytes.length){
      const tag = readVarint(bytes, pos);
      if((tag & 7) !== 2) break;
      const len = readVarint(bytes, pos);
      const sub = bytes.slice(pos.i, pos.i+len);
      pos.i += len;
      const subPos = { i: 0 };
      let name = null;
      while(subPos.i < sub.length){
        const t2 = readVarint(sub, subPos);
        const wt2 = t2 & 7;
        if(wt2 === 2){
          const l2 = readVarint(sub, subPos);
          const chunk = sub.slice(subPos.i, subPos.i+l2);
          subPos.i += l2;
          if((t2 >>> 3) === 1) name = new TextDecoder('utf-8').decode(chunk);
        } else if(wt2 === 0){
          readVarint(sub, subPos);
        } else break;
      }
      if(name != null) map[String(idx)] = name;
      idx++;
    }
  }catch(e){ console.warn('apkg media list parse failed', e); }
  return map;
}
/* ADDED: generic best-effort protobuf scanner — recursively collects every UTF-8-decodable
   length-delimited (wire type 2) string found in a protobuf-encoded blob, in field order.
   Modern Anki schemas store notetype/template styling (css, qfmt, afmt) inside protobuf
   "config" blobs rather than plain SQL columns, and the exact field numbers can shift between
   Anki versions, so instead of hardcoding a .proto schema we just recover any readable text
   segments and pick the right one heuristically (see apkgExtractCss/apkgExtractTemplateFmts
   below). This mirrors the same varint/length-delimited walk already used in apkgParseMediaList. */
function apkgProtoStrings(bytes){
  const out = [];
  if(!bytes || !bytes.length) return out;
  const readVarint = (buf, posObj)=>{
    let result = 0, shift = 0;
    while(posObj.i < buf.length){
      const b = buf[posObj.i++];
      result += (b & 0x7f) * Math.pow(2, shift);
      if((b & 0x80) === 0) break;
      shift += 7;
    }
    return result;
  };
  const walk = (buf)=>{
    const pos = { i: 0 };
    while(pos.i < buf.length){
      let tag;
      try{ tag = readVarint(buf, pos); }catch(e){ break; }
      const wireType = tag & 7;
      if(wireType === 0){ readVarint(buf, pos); }
      else if(wireType === 1){ pos.i += 8; }
      else if(wireType === 5){ pos.i += 4; }
      else if(wireType === 2){
        const len = readVarint(buf, pos);
        if(len < 0 || pos.i + len > buf.length) break;
        const chunk = buf.slice(pos.i, pos.i + len);
        pos.i += len;
        try{
          const txt = new TextDecoder('utf-8', { fatal: true }).decode(chunk);
          // eslint-disable-next-line no-control-regex
          if(txt && !/[\x00-\x08\x0B\x0C\x0E-\x1F]/.test(txt)) out.push(txt);
          else walk(chunk); // looked like binary — might be a nested submessage
        }catch(e){ walk(chunk); } // not valid UTF-8 text on its own — recurse as a submessage
      } else break;
    }
  };
  try{ walk(bytes); }catch(e){ /* best-effort only */ }
  return out;
}
/* ADDED: pick the original CSS out of a notetype's protobuf config blob. The stylesheet is a
   plain string field and — unlike qfmt/afmt — never contains Anki's "{{field}}" mustache syntax,
   so that's used to tell it apart from the template format strings. */
function apkgExtractCss(configBytes){
  const strings = apkgProtoStrings(configBytes);

/* ADDED: pick the original qfmt/afmt (front/back template HTML) out of a template's protobuf

      }

          if(map[ntid]) map[ntid].fields[ord] = fname;
        }
      }

      // each note type's real look instead of falling back to a generic template. If this ever
      // fails to find anything usable for a given file, buildApkgBytes automatically falls back
      // to the plain Basic template — nothing breaks either way.
      try{
        const ntCfg = db.exec("SELECT id, config FROM notetypes");
        if(ntCfg.length){
          for(const row of ntCfg[0].values){
            const [id, cfgBlob] = row;
            if(map[id] && cfgBlob) map[id].css = apkgExtractCss(cfgBlob) || '';

      }catch(e){ /* config column absent on this schema — css stays blank, generic fallback used */ }
      try{
        const tplCfg = db.exec("SELECT ntid, ord, name, config FROM templates ORDER BY ntid, ord");
        if(tplCfg.length){
          for(const row of tplCfg[0].values){
            const [ntid, ord, tname, cfgBlob] = row;
            if(!map[ntid]) continue;
            const fmts = cfgBlob ? apkgExtractTemplateFmts(cfgBlob) : { qfmt:'', afmt:'' };
            map[ntid].tmpls[ord] = { ord, name: tname, qfmt: fmts.qfmt, afmt: fmts.afmt };
          }
        }
      }catch(e){ /* templates table/config absent — tmpls stays empty, generic fallback used */ }
    }
  }catch(e){ /* modern schema tables absent — fall back below */ }
  if(Object.keys(map).length === 0){
    try{
      const colRows = db.exec("SELECT models FROM col");
      if(colRows.length){
        const models = JSON.parse(colRows[0].values[0][0]);

          const m = models[mid];

          };
